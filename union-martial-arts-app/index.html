<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Union Martial Arts — Login</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-wrap { min-height: 620px; }
    .login-input {
      display: block;
      width: 100%;
      background: rgba(255,255,255,0.14) !important;
      border: 1px solid rgba(255,255,255,0.35) !important;
      border-radius: 12px;
      padding: 13px 14px;
      color: #fff !important;
      font-size: 15px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    .login-input::placeholder { color: rgba(255,255,255,0.6) !important; }
    .login-btn {
      display: block;
      width: 100%;
      background: #fff;
      color: #1B4FD8;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>●●● 100%</span></div>

  <div class="login-wrap">

    <img src="logo1.png" alt="Union Martial Arts" style="width:200px; margin-bottom:28px; display:block;" />

    <input class="login-input" id="correo" type="email" placeholder="Correo electrónico" />
    <input class="login-input" id="password" type="password" placeholder="Contraseña" />

    <div id="error-msg" style="color:#ffb3b3; font-size:12px; text-align:center; margin-bottom:8px; display:none;"></div>

    <button class="login-btn" onclick="entrar()">Entrar</button>

    <div style="margin-top:20px; padding-top:16px; border-top:0.5px solid rgba(255,255,255,0.2); width:100%; text-align:center;">
      <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:10px;">¿Necesitas acceso? Contáctanos</div>
      <div style="font-size:13px; color:rgba(255,255,255,0.85); margin-bottom:6px;">☎️ (656) 637.9191</div>
      <div style="font-size:13px; color:rgba(255,255,255,0.85); margin-bottom:16px;">📧 unionmartialarts.jrz@gmail.com</div>
      <img src="logo2.png" alt="Union Martial Arts Icon" style="width:70px; display:block; margin:0 auto;" />
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from './js/supabase.js'

  window.entrar = async function() {
    const correo = document.getElementById('correo').value.trim()
    const password = document.getElementById('password').value.trim()
    const errorMsg = document.getElementById('error-msg')

    if (!correo || !password) {
      errorMsg.textContent = 'Por favor escribe tu correo y contraseña.'
      errorMsg.style.display = 'block'
      return
    }

    const { data, error } = await supabase.auth.signInWithPassword({ email: correo, password })

    if (error) {
      errorMsg.textContent = 'Correo o contraseña incorrectos.'
      errorMsg.style.display = 'block'
      return
    }

    const user = data.user

    const { data: padre } = await supabase
      .from('padres')
      .select('es_admin')
      .eq('user_id', user.id)
      .single()

    if (padre?.es_admin) {
      window.location.href = 'admin.html'
    } else {
      window.location.href = 'home.html'
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.entrar()
  })
</script>

</body>
</html>
