<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Union Martial Arts — Login</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-wrap { min-height: 620px; background: #fff; padding-top: 10px !important; }
    .phone-frame { background: #fff !important; }
    .status-bar { background: #fff !important; color: #1B4FD8 !important; }
    .status-bar span { color: #1B4FD8 !important; }
    .login-input {
      display: block;
      width: 100%;
      background: #f4f6fb !important;
      border: 1.5px solid #d0d8f0 !important;
      border-radius: 12px;
      padding: 13px 14px;
      color: #1a1a2e !important;
      font-size: 15px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    .login-input::placeholder { color: #9aa5c4 !important; }
    .login-btn {
      display: block;
      width: 100%;
      background: #1B4FD8;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      text-align: center;
    }
    .contact-text { color: #888 !important; }
    .contact-info { color: #1B4FD8 !important; }
    .contact-divider { border-top: 0.5px solid #e0e0e0 !important; }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>●●● 100%</span></div>

  <div class="login-wrap">

    <img src="logo1.png" alt="Union Martial Arts" style="width:100%; max-width:380px; margin-bottom:24px; margin-top:0; display:block;" />

    <input class="login-input" id="correo" type="email" placeholder="Correo electrónico" />
    <input class="login-input" id="password" type="password" placeholder="Contraseña" />

    <div id="error-msg" style="color:#ffb3b3; font-size:12px; text-align:center; margin-bottom:8px; display:none;"></div>

    <button class="login-btn" onclick="entrar()">Entrar</button>

    <div style="margin-top:20px; padding-top:16px; border-top:0.5px solid #e0e0e0; width:100%; text-align:center;">
      <div style="font-size:12px; color:#888; margin-bottom:10px;">¿Necesitas acceso? Contáctanos</div>
      <div style="font-size:13px; color:#1B4FD8; margin-bottom:6px;">☎️ (656) 637.9191</div>
      <div style="font-size:13px; color:#1B4FD8; margin-bottom:16px;">📧 unionmartialarts.jrz@gmail.com</div>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from './js/supabase.js'

  window.entrar = async function() {
    const correo = document.getElementById('correo').value.trim()
    const password = document.getElementById('password').value.trim()
    const errorMsg = document.getElementById('error-msg')

    if (!correo || !password) {
      errorMsg.textContent = 'Por favor escribe tu correo y contraseña.'
      errorMsg.style.display = 'block'
      return
    }

    const { data, error } = await supabase.auth.signInWithPassword({ email: correo, password })

    if (error) {
      errorMsg.textContent = 'Correo o contraseña incorrectos.'
      errorMsg.style.display = 'block'
      return
    }

    const user = data.user

    const { data: padre } = await supabase
      .from('padres')
      .select('es_admin')
      .eq('user_id', user.id)
      .single()

    if (padre?.es_admin) {
      window.location.href = 'admin.html'
    } else {
      window.location.href = 'home.html'
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.entrar()
  })
</script>

</body>
</html>
