  .login .spacer { flex:1; min-height:16px; }
  .login .foot { padding-top:18px; border-top:1px solid var(--ink-100); text-align:center; }
  .login .foot .q { font-size:12px; color:var(--muted); margin-bottom:10px; }
  .login .foot a { display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px;
    color:var(--primary); font-weight:600; text-decoration:none; margin-top:7px; }
  .login .social { display:flex; justify-content:center; gap:14px; margin-top:14px; }
  .login .social a { display:inline-flex; align-items:center; justify-content:center; width:42px; height:42px;
    border-radius:var(--r-full); background:var(--soft); font-size:20px; text-decoration:none; margin:0; }
  @keyframes rise { from{transform:translateY(16px)} to{transform:translateY(0)} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .login .logo { animation:rise .7s cubic-bezier(.16,1,.3,1), float 4.5s ease-in-out .7s infinite; }
  @media (prefers-reduced-motion: reduce){ .login .logo{animation:none} }

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )

  // Reemplaza el logo con logo1.png si existe
  const logo = document.querySelector('.logo')
  if (logo) logo.src = 'logo1.png'

  document.getElementById('btn-entrar').addEventListener('click', async () => {
    const correo = document.getElementById('correo').value.trim()
    const pass = document.getElementById('password').value.trim()
    const err = document.getElementById('error-msg')
    err.style.display = 'none'

    if (!correo || !pass) {
      err.textContent = 'Por favor escribe tu correo y contraseña.'
      err.style.display = 'block'; return
    }

    const { data, error } = await supabase.auth.signInWithPassword({ email: correo, password: pass })
    if (error) { err.textContent = 'Correo o contraseña incorrectos.'; err.style.display = 'block'; return }

    const { data: padre } = await supabase.from('padres').select('es_admin').eq('user_id', data.user.id).single()
    window.location.href = padre?.es_admin ? 'admin.html' : 'home.html'
  })

  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-entrar').click() })
  lucide.createIcons()
</script>
