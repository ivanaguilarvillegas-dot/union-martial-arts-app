<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Torneos y actividades</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen" style="background:#f0f2f5;">
    <div class="page-hero">
    <div class="page-hero-top" style="position:relative;"><a href="home.html" class="navback" style="position:absolute;left:0;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;"><i data-lucide="chevron-left" style="width:20px;height:20px;"></i></a>
      <div class="hero-logo">
        <a href="home.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
          <div class="hero-logo-circle"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
          <div class="hero-logo-txt">UNION<br>MARTIAL ARTS</div>
        </a>
      </div>
      <a href="#" onclick="history.back();return false;" style="width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;flex-shrink:0;"><i data-lucide="chevron-left" style="width:20px;height:20px;"></i></a>
    </div>
    <div class="hero-title">Torneos y actividades</div>
  </div>
<div class="body">
    <div class="label">Próximos eventos</div>
    <div class="stack-10" id="list"></div>
    <div class="brandmark"><img src="assets/logo-union-blue.png" alt="" /><span>Union Martial Arts</span></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="/js/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
(async () => {
  const supabase = window.supabase.createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { session } } = await supabase.auth.getSession()
  const user = session?.user
  if (!user) { window.location.href = 'index.html' }

  const bg={Torneo:'var(--amber-bg)',Evaluación:'var(--soft)',Actividad:'var(--green-bg)',default:'var(--soft)'}
  const fg={Torneo:'var(--amber-600)',Evaluación:'var(--primary)',Actividad:'var(--green-600)',default:'var(--primary)'}
  const icon={Torneo:'trophy',Evaluación:'award',Actividad:'sparkles',default:'calendar'}

  let confirmados = new Set()
  let eventos = []

  async function cargar() {
    const hoy = new Date().toISOString().split('T')[0]
    const { data } = await supabase.from('eventos').select('*').gte('fecha', hoy).order('fecha')
    eventos = data || []

    const { data: confs } = await supabase.from('confirmaciones_torneo').select('evento_id').eq('padre_user_id', user.id)
    confirmados = new Set(confs?.map(c => c.evento_id) || [])
    render()
  }

  function render() {
    const cont = document.getElementById('list')
    if (!eventos.length) {
      cont.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin eventos próximos.</div>'
      lucide.createIcons(); return
    }
    cont.innerHTML = eventos.map(e => {
      const tipo = e.tipo?.replace(/[^a-zA-ZáéíóúÁÉÍÓÚ ]/g,'').trim() || 'Actividad'
      const conf = confirmados.has(e.id)
      return `<div class="card">
        <div style="display:flex;gap:12px;align-items:flex-start;">
          <span style="width:42px;height:42px;border-radius:var(--r-md);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:${bg[tipo]||bg.default};color:${fg[tipo]||fg.default};">
            <i data-lucide="${icon[tipo]||icon.default}" style="width:21px;height:21px"></i></span>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:700;">${e.titulo}</div>
            <div style="font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px;"><i data-lucide="calendar" style="width:12px;height:12px"></i> ${e.fecha}${e.hora ? ' · '+e.hora : ''}</div>
            ${e.lugar ? `<div style="font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;"><i data-lucide="map-pin" style="width:12px;height:12px"></i> ${e.lugar}</div>` : ''}
            ${e.descripcion ? `<div style="font-size:12.5px;color:var(--muted);margin-top:4px;">${e.descripcion}</div>` : ''}
            <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
              <span class="badge amber">${tipo}</span>
              ${e.convocatoria_url ? `<a href="${e.convocatoria_url}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:#0047AB;text-decoration:none;background:#eff6ff;border-radius:20px;padding:3px 10px;"><i data-lucide="file-text" style="width:12px;height:12px;"></i> Convocatoria</a>` : ''}
            </div>
          </div>
        </div>
        ${(e.fotos_urls?.length) ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;">${e.fotos_urls.map(u=>`<img src="${u}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--border);" />`).join('')}</div>` : e.foto_url ? `<img src="${e.foto_url}" style="width:100%;border-radius:8px;margin-top:10px;object-fit:cover;max-height:160px;" />` : ''}
        <div style="margin-top:12px;">${conf
          ? `<div class="notice green" style="margin:0;"><i data-lucide="check-circle"></i> Asistencia confirmada · se notificó al instructor</div>`
          : `<button class="btn secondary block" data-id="${e.id}"><i data-lucide="calendar-check"></i> Confirmar asistencia</button>`}
        </div>
      </div>`
    }).join('')
    lucide.createIcons()
  }

  document.getElementById('list').addEventListener('click', async ev => {
    const b = ev.target.closest('[data-id]'); if (!b) return
    const evento_id = b.dataset.id
    const evento = eventos.find(e => e.id === evento_id)

    await supabase.from('confirmaciones_torneo').insert({ evento_id, padre_user_id: user.id })

    // Obtener nombre del padre y alumno para notificar
    const { data: padre } = await supabase.from('padres').select('nombre, alumno_id').eq('user_id', user.id).maybeSingle()
    let alumnoNombre = ''
    if (padre?.alumno_id) {
      const { data: al } = await supabase.from('alumnos').select('nombre').eq('id', padre.alumno_id).maybeSingle()
      alumnoNombre = al?.nombre || ''
    }

    // Notificar al instructor
    const texto = `🏆 Confirmación de asistencia — ${alumnoNombre || padre?.nombre || 'Padre'} asistirá a: ${evento?.titulo || 'Evento'} (${evento?.fecha || ''}${evento?.hora ? ' · ' + evento.hora : ''})`
    await supabase.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: true })

    confirmados.add(evento_id)
    render()
  })

  cargar()
})();
</script>
</body>
</html>
