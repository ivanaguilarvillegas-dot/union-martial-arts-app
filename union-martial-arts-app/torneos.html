<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Torneos y actividades</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead blue">
    <a class="navback" href="home.html" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Torneos y actividades</div></div>
  </div>
  <div class="body">
    <div class="label">Próximos eventos</div>
    <div class="stack-10" id="list"></div>
    <div class="brandmark"><img src="assets/logo-union-blue.png" alt="" /><span>Union Martial Arts</span></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const E = [
    {t:'Torneo Estatal de Cinturones',f:'28 jun · 9:00 AM',lugar:'Gimnasio Municipal',tipo:'Torneo',tone:'amber',icon:'trophy'},
    {t:'Examen de cambio de cinta',f:'5 jul · 5:00 PM',lugar:'Academia UNION',tipo:'Evaluación',tone:'blue',icon:'award'},
    {t:'Clase especial Kobudo',f:'12 jul · 11:00 AM',lugar:'Academia UNION',tipo:'Actividad',tone:'green',icon:'sparkles'},
    {t:'Convivencia familiar',f:'20 jul · 1:00 PM',lugar:'Parque Central',tipo:'Actividad',tone:'green',icon:'users'},
  ];
  const bg={amber:'var(--amber-bg)',green:'var(--green-bg)',blue:'var(--soft)'};
  const fg={amber:'var(--amber-600)',green:'var(--green-600)',blue:'var(--primary)'};
  function render(){
    document.getElementById('list').innerHTML = E.map((e,i)=>`
      <div class="card">
        <div style="display:flex;gap:12px;align-items:flex-start;">
          <span style="width:42px;height:42px;border-radius:var(--r-md);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:${bg[e.tone]};color:${fg[e.tone]};"><i data-lucide="${e.icon}" style="width:21px;height:21px"></i></span>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:700;">${e.t}</div>
            <div style="font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px;"><i data-lucide="calendar" style="width:12px;height:12px"></i> ${e.f}</div>
            <div style="font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;"><i data-lucide="map-pin" style="width:12px;height:12px"></i> ${e.lugar}</div>
            <div style="margin-top:8px;"><span class="badge ${e.tone}">${e.tipo}</span></div>
          </div>
        </div>
        <div style="margin-top:12px;">${e.conf
          ? `<div class="notice green" style="margin:0;"><i data-lucide="check-circle"></i> Asistencia confirmada · se notificó al instructor</div>`
          : `<button class="btn secondary block" data-i="${i}"><i data-lucide="calendar-check"></i> Confirmar asistencia</button>`}</div>
      </div>`).join('');
    lucide.createIcons();
  }
  document.getElementById('list').addEventListener('click',ev=>{const b=ev.target.closest('[data-i]');if(!b)return;E[b.dataset.i].conf=true;render();});
  render();
</script>
</body>
</html>
