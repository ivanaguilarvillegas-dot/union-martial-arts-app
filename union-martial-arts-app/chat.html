<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chat privado — Union Martial Arts</title>
<link rel="stylesheet" href="css/uma.css?v=18"/>
<style>
body{min-height:100vh;overflow:hidden;}
.phone,.screen{display:flex!important;flex-direction:column!important;height:100vh!important;overflow:hidden!important;}
.chat-wrap{display:flex;flex-direction:column;flex:1;min-height:0;background:#f4f6fb;}
.chat-header{background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.chat-header a{color:#fff;text-decoration:none;font-size:22px;line-height:1;}
.chat-header .info{flex:1;}
.chat-header .chat-title{font-size:15px;font-weight:700;}
.chat-header .chat-sub{font-size:11px;opacity:.7;}
.messages{flex:1;overflow-y:auto;padding:12px 12px calc(110px + env(safe-area-inset-bottom,8px));display:flex;flex-direction:column;gap:8px;min-height:0;}
.chat-wrap{overflow:hidden;}
.msg{max-width:78%;padding:9px 13px;border-radius:18px;font-size:13.5px;line-height:1.45;word-break:break-word;}
.msg.from-me{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.msg.from-inst{background:#fff;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.msg-time{font-size:10px;opacity:.6;margin-top:3px;text-align:right;}
.msg-label{font-size:10px;color:var(--muted);text-align:center;margin:4px 0;}
.input-bar{position:sticky;bottom:0;z-index:2;background:#fff;border-top:1px solid var(--ink-100);padding:8px 10px calc(14px + env(safe-area-inset-bottom,8px));display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.input-bar textarea{flex:1;border:1.5px solid var(--ink-200);border-radius:20px;padding:8px 14px;font-size:14px;font-family:var(--font);resize:none;outline:none;max-height:100px;line-height:1.4;}
.input-bar textarea:focus{border-color:var(--primary);}
.send-btn{background:var(--primary);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn:active{opacity:.7;}
.send-btn svg{width:18px;height:18px;fill:#fff;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;padding:24px;gap:8px;}
.empty-state span{font-size:36px;}
</style>
</head>
<body>
<div class="phone"><div class="screen">
<div class="chat-wrap">
  <div class="navhead blue uma-hdr">
    <a href="home.html" class="navback" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="uma-hdr-brand">
      <div class="uma-hdr-logo"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
      <div class="uma-hdr-txt">UNION<br>MARTIAL ARTS</div>
    </div>
    <div class="grow"><div class="title">Chat privado</div></div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state"><span>💬</span>Escribe tu primer mensaje<br>al instructor.</div>
  </div>

  <div class="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Escribe un mensaje…" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="enviar()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons())</script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const sb = createClient(
  'https://gdajgennlsuvndanpxiz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
)

const { data: { user } } = await sb.auth.getUser()
if (!user) { window.location.href = 'index.html' }

let padre = null
const savedId = localStorage.getItem('uma_padre_id')
if (savedId) {
  const { data: ps } = await sb.from('padres').select('id').eq('id', savedId).limit(1)
  if (ps?.[0]) padre = ps[0]
}
if (!padre) {
  const { data: pr } = await sb.from('padres').select('id').eq('user_id', user.id).limit(1)
  if (pr?.[0]) padre = pr[0]
}
if (!padre) {
  const { data: pe } = await sb.from('padres').select('id').eq('correo', user.email).limit(1)
  if (pe?.[0]) { await sb.from('padres').update({ user_id: user.id }).eq('id', pe[0].id); padre = pe[0] }
}

async function cargarMensajes() {
  if (!padre) return
  const { data: msgs } = await sb.from('mensajes')
    .select('id, texto, creado_en, para_admin, de_user_id, destinatario_id, es_automatico')
    .not('de_user_id', 'is', null)
    .or(`and(para_admin.eq.true,de_user_id.eq.${user.id}),and(para_admin.eq.false,destinatario_id.eq.${padre.id})`)
    .order('creado_en', { ascending: true })
  function isSystemMessage(m) {
    if (m.es_automatico === true) return true
    // regex solo para compatibilidad con mensajes históricos sin es_automatico
    const text = (m.texto || '').toString()
    return /(✅ Check-in|❌ Ausencia|pagará|comprobante|solicitud de cita|confirmación de asistencia|🥗 hábito|nutrición completados|firmó el reglamento|evaluación|evento|diploma|cambio de cinta|sesión de meditación|rutina en casa)/i.test(text)
  }

  const hideSystem = true // padres ven chat limpio por defecto

  const box = document.getElementById('messages')
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60

  const chatMsgs = (msgs || []).filter(m => m.de_user_id !== null && !isSystemMessage(m))
  if (!chatMsgs.length) {
    box.innerHTML = '<div class="empty-state"><span>💬</span>Escribe tu primer mensaje<br>al instructor.</div>'
    return
  }

  let lastDate = ''
  box.innerHTML = chatMsgs.map(m => {
    const fromMe = m.de_user_id === user.id
    const dt = new Date(m.creado_en)
    const dateStr = dt.toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long' })
    const timeStr = dt.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' })
    let label = ''
    if (dateStr !== lastDate) { label = `<div class="msg-label">${dateStr}</div>`; lastDate = dateStr }
    const diplomaMatch = m.texto.match(/📜 Diploma: (https?:\/\/\S+)/)
    const textoLimpio = diplomaMatch ? m.texto.replace(/\n?📜 Diploma: https?:\/\/\S+/, '').trim() : m.texto
    const diplomaBtn = diplomaMatch
      ? `<a href="${diplomaMatch[1]}" target="_blank" style="display:flex;align-items:center;gap:6px;margin-top:8px;background:rgba(255,255,255,.2);border-radius:10px;padding:8px 10px;font-size:12px;font-weight:700;color:inherit;text-decoration:none;">📜 Ver / Descargar diploma</a>`
      : ''
    return `${label}<div class="msg ${fromMe ? 'from-me' : 'from-inst'}">
      ${textoLimpio}${diplomaBtn}
      <div class="msg-time">${timeStr}</div>
    </div>`
  }).join('')

  // Marcar recibidos como leídos
  await sb.from('mensajes').update({ leido: true }).eq('destinatario_id', padre.id).eq('leido', false)
  if (atBottom) box.scrollTop = box.scrollHeight
}

// Asegurar que el input no quede oculto en móvil: desplazar mensajes al enfocar
try {
  const ta = document.getElementById('msg-input')
  if (ta) ta.addEventListener('focus', () => setTimeout(() => { const b = document.getElementById('messages'); if (b) b.scrollTop = b.scrollHeight }, 300))
} catch(e) {}

window.enviar = async function() {
  const ta = document.getElementById('msg-input')
  const texto = ta.value.trim()
  if (!texto) return
  ta.value = ''; ta.style.height = 'auto'
  await sb.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: true, leido: false })
  await cargarMensajes()
}

window.autoResize = function(ta) {
  ta.style.height = 'auto'
  ta.style.height = Math.min(ta.scrollHeight, 100) + 'px'
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.enviar() }
})

cargarMensajes()
setInterval(cargarMensajes, 4000)
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{})</script>
</body></html>
