<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chat privado — Union Martial Arts</title>
<link rel="stylesheet" href="css/uma.css?v=18"/>
<style>
html,body{height:100%;overflow:hidden;}
body{margin:0;}
.app,.phone,.screen{display:flex!important;flex-direction:column!important;min-height:0!important;}
.phone{height:100%;width:100vw;max-width:none!important;padding:0!important;border:none!important;border-radius:0!important;box-shadow:none!important;overflow:hidden!important;}
.screen{position:relative;height:100dvh;overflow:hidden!important;}
.chat-page{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;background:#f4f6fb;}
.chat-wrap{display:flex;flex-direction:column;min-height:0;}
.chat-header{background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.chat-header a{color:#fff;text-decoration:none;font-size:22px;line-height:1;}
.chat-header .info{flex:1;}
.chat-header .chat-title{font-size:15px;font-weight:700;}
.chat-header .chat-sub{font-size:11px;opacity:.7;}
.chat-page > .navhead{flex-shrink:0;}
.messages{flex:1;overflow-y:auto;padding:12px 12px 110px!important;display:flex;flex-direction:column;gap:8px;min-height:0;}
.msg{max-width:78%;padding:9px 13px;border-radius:18px;font-size:13.5px;line-height:1.45;word-break:break-word;}
.msg.from-me{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.msg.from-inst{background:#fff;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.msg-time{font-size:10px;opacity:.6;margin-top:3px;text-align:right;}
.msg-label{font-size:10px;color:var(--muted);text-align:center;margin:4px 0;}
.input-bar{position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#fff;padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;align-items:flex-end;box-shadow:0 -4px 16px rgba(0,0,0,.08);}
.input-bar textarea{flex:1;border:1.5px solid var(--ink-200);border-radius:20px;padding:8px 14px;font-size:14px;font-family:var(--font);resize:none;outline:none;max-height:100px;line-height:1.4;}
.input-bar textarea:focus{border-color:var(--primary);}
.send-btn{background:var(--primary);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn:active{opacity:.7;}
.send-btn svg{width:18px;height:18px;fill:#fff;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;padding:24px;gap:8px;}
.empty-state span{font-size:36px;}
.chat-actions{margin-left:auto;display:flex;align-items:center;gap:6px;}
.chat-action-btn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;font-size:11px;font-weight:700;line-height:1;cursor:pointer;padding:7px 9px;}
.bottom-nav,.nav-bottom,.mobile-nav,.tabbar,.dock,.bottom-tabs,.footer-nav{display:none!important;}

@media (max-width:480px){
  .navhead.uma-hdr{min-height:60px;padding:6px 10px 8px;}
  .navhead.uma-hdr .title{font-size:17px!important;}
}
</style>
</head>
<body>
<div class="phone"><div class="screen">
<div class="chat-wrap chat-page">
  <div class="navhead blue uma-hdr">
    <a href="home.html" class="navback" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="uma-hdr-brand">
      <div class="uma-hdr-logo"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
      <div class="uma-hdr-txt">UNION<br>MARTIAL ARTS</div>
    </div>
    <div class="grow"><div class="title">Chat privado</div></div>
    <div class="chat-actions"><button class="chat-action-btn" id="btn-hide-chat">Ocultar historial</button></div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state"><span>💬</span>Escribe tu primer mensaje<br>al instructor.</div>
  </div>

  <div class="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Escribe un mensaje…" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="enviar()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons())</script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const sb = createClient(
  'https://gdajgennlsuvndanpxiz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
)

const { data: { user } } = await sb.auth.getUser()
if (!user) { window.location.href = 'index.html'; return }

let padre = null
let hideBeforeKey = null

function esMensajeManual(m) {
  if (!m) return false
  if (m.es_automatico === true) return false
  const t = (m.texto || '').trim()
  if (!t) return false
  const autoPatterns = [
    /^✅ Check-in:/i,
    /^❌ Ausencia:/i,
    /^🏆 Confirmación de asistencia/i,
    /^🥋/,
    /^🙏/,
    /^✅ Confirmado\.?/i,
    /^🥗/,
    /^🏋️/,
    /^🧘/,
    /^📅 Solicitud de cita/i,
    /se enteró del aviso\.?$/i,
    /envió comprobante de pago/i,
    /avisó que pagará/i
  ]
  return !autoPatterns.some(rx => rx.test(t))
}
const savedId = localStorage.getItem('uma_padre_id')
if (savedId) {
  const { data: ps } = await sb.from('padres').select('id, user_id').eq('id', savedId).limit(1)
  if (ps?.[0]) padre = ps[0]
}
if (!padre) {
  const { data: pr } = await sb.from('padres').select('id, user_id, correo').eq('user_id', user.id).limit(1)
  if (pr?.[0]) padre = pr[0]
}
if (!padre) {
  const { data: pe } = await sb.from('padres').select('id, user_id, correo').eq('correo', user.email).limit(1)
  if (pe?.[0]) { 
    try { await sb.from('padres').update({ user_id: user.id }).eq('id', pe[0].id) } catch(e) {}
    padre = pe[0] 
  }
}
if (!padre) {
  document.getElementById('messages').innerHTML = '<div class="empty-state"><span>⚠️</span>No encontramos tu perfil de padre.<br>Vuelve a iniciar sesión.</div>'
}
if (padre?.id && padre.user_id !== user.id) {
  try {
    await sb.from('padres').update({ user_id: user.id }).eq('id', padre.id)
    padre.user_id = user.id
  } catch(e) {}
}
hideBeforeKey = padre ? `uma_chat_hide_before_${padre.id}` : null

async function cargarMensajes() {
  if (!padre) return
  const { data: msgs } = await sb.from('mensajes')
    .select('id, texto, creado_en, para_admin, de_user_id, destinatario_id, es_automatico')
    .not('de_user_id', 'is', null)
    .or(`and(para_admin.eq.true,de_user_id.eq.${user.id}),and(para_admin.eq.false,destinatario_id.eq.${user.id})`)
    .order('creado_en', { ascending: true })

  const hideSystem = true
  const hideBefore = hideBeforeKey ? localStorage.getItem(hideBeforeKey) : null

  const box = document.getElementById('messages')
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60

  const chatMsgs = (msgs || []).filter(m => {
    if (m.de_user_id === null) return false
    if (hideSystem && !esMensajeManual(m)) return false
    if (hideBefore && new Date(m.creado_en).getTime() < Number(hideBefore)) return false
    return true
  })
  if (!chatMsgs.length) {
    box.innerHTML = '<div class="empty-state"><span>💬</span>Escribe tu primer mensaje<br>al instructor.</div>'
    return
  }

  let lastDate = ''
  box.innerHTML = chatMsgs.map(m => {
    const fromMe = m.de_user_id === user.id
    const dt = new Date(m.creado_en)
    const dateStr = dt.toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long' })
    const timeStr = dt.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' })
    let label = ''
    if (dateStr !== lastDate) { label = `<div class="msg-label">${dateStr}</div>`; lastDate = dateStr }
    const diplomaMatch = m.texto.match(/📜 Diploma: (https?:\/\/\S+)/)
    const textoLimpio = diplomaMatch ? m.texto.replace(/\n?📜 Diploma: https?:\/\/\S+/, '').trim() : m.texto
    const diplomaBtn = diplomaMatch
      ? `<a href="${diplomaMatch[1]}" target="_blank" style="display:flex;align-items:center;gap:6px;margin-top:8px;background:rgba(255,255,255,.2);border-radius:10px;padding:8px 10px;font-size:12px;font-weight:700;color:inherit;text-decoration:none;">📜 Ver / Descargar diploma</a>`
      : ''
    return `${label}<div class="msg ${fromMe ? 'from-me' : 'from-inst'}">
      ${textoLimpio}${diplomaBtn}
      <div class="msg-time">${timeStr}</div>
    </div>`
  }).join('')

  // Marcar recibidos como leídos
  await sb.from('mensajes').update({ leido: true }).eq('destinatario_id', user.id).eq('leido', false)
  if (atBottom) box.scrollTop = box.scrollHeight
}

// Asegurar que el input no quede oculto en móvil: desplazar mensajes al enfocar
try {
  const ta = document.getElementById('msg-input')
  if (ta) ta.addEventListener('focus', () => setTimeout(() => { const b = document.getElementById('messages'); if (b) b.scrollTop = b.scrollHeight }, 300))
} catch(e) {}

window.enviar = async function() {
  if (!padre) return
  const ta = document.getElementById('msg-input')
  const texto = ta.value.trim()
  if (!texto) return
  ta.value = ''; ta.style.height = 'auto'
  const { error } = await sb.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: true, leido: false, es_automatico: false })
  if (error) {
    alert('No se pudo enviar el mensaje: ' + error.message)
    return
  }
  await cargarMensajes()
}

window.autoResize = function(ta) {
  ta.style.height = 'auto'
  ta.style.height = Math.min(ta.scrollHeight, 100) + 'px'
}

const taInput = document.getElementById('msg-input')
taInput?.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    window.enviar()
  }
})

document.getElementById('btn-hide-chat')?.addEventListener('click', async () => {
  if (!hideBeforeKey) return
  const cur = localStorage.getItem(hideBeforeKey)
  if (!cur) {
    localStorage.setItem(hideBeforeKey, String(Date.now()))
    document.getElementById('btn-hide-chat').textContent = 'Mostrar historial'
  } else {
    localStorage.removeItem(hideBeforeKey)
    document.getElementById('btn-hide-chat').textContent = 'Ocultar historial'
  }
  await cargarMensajes()
})

if (hideBeforeKey && localStorage.getItem(hideBeforeKey)) {
  document.getElementById('btn-hide-chat').textContent = 'Mostrar historial'
}

cargarMensajes()
setInterval(cargarMensajes, 4000)
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{})</script>
</body></html>
