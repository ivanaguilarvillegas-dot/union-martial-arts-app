<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Agendar cita</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen" style="background:#f0f2f5;">
    <div class="page-hero">
    <div class="page-hero-top" style="position:relative;"><a href="home.html" class="navback" style="position:absolute;left:0;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;"><i data-lucide="chevron-left" style="width:20px;height:20px;"></i></a>
      <div class="hero-logo">
        <a href="home.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
          <div class="hero-logo-circle"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
          <div class="hero-logo-txt">UNION<br>MARTIAL ARTS</div>
        </a>
      </div>
      <a href="#" onclick="history.back();return false;" style="width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;flex-shrink:0;"><i data-lucide="chevron-left" style="width:20px;height:20px;"></i></a>
    </div>
    <div class="hero-title">Agendar cita</div>
    <div class="hero-sub">Con el instructor</div>
  </div>
<div class="body">
    <div id="form">
      <div class="card">
        <div class="stack">
          <label class="field"><span class="lab">Motivo de la cita</span>
            <select id="motivo">
              <option>Hablar del progreso de mi hijo/a</option>
              <option>Dudas sobre pagos / programas</option>
              <option>Cambio de horario</option>
              <option>Problema o situación especial</option>
              <option>Otro</option>
            </select></label>
          <label class="field"><span class="lab">Día deseado</span>
            <input type="date" id="fecha" /></label>
          <label class="field"><span class="lab">Hora deseada</span>
            <input type="time" id="hora" /></label>
          <label class="field"><span class="lab">Mensaje adicional (opcional)</span>
            <textarea id="nota" rows="2" placeholder="Información extra para el instructor…"></textarea></label>
          <div id="err" class="notice red" style="display:none;"></div>
          <button class="btn primary block" id="solicitar"><i data-lucide="calendar-clock"></i> Solicitar cita</button>
        </div>
      </div>
    </div>
    <div id="ok" style="display:none;">
      <div class="card green center">
        <div style="display:inline-flex;margin-bottom:6px;color:var(--green-600);"><i data-lucide="calendar-check" style="width:26px;height:26px"></i></div>
        <div style="font-size:15px;font-weight:700;color:var(--green-text);">Cita solicitada</div>
        <div style="font-size:13px;color:var(--green-text);margin-top:4px;">El instructor recibió tu solicitud y te confirmará pronto por mensajes.</div>
      </div>
      <button class="btn secondary block mt14" onclick="location.reload()">
        <i data-lucide="plus"></i> Agendar otra cita
      </button>
    </div>
    <div class="brandmark"><img src="assets/logo-union-blue.png" alt="" /><span>Union Martial Arts</span></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="/js/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
(async () => {
  const supabase = window.supabase.createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { session } } = await supabase.auth.getSession()
  const user = session?.user
  if (!user) { window.location.href = 'index.html' }

  // Fecha mínima: hoy
  document.getElementById('fecha').min = new Date().toISOString().split('T')[0]

  const { data: padre } = await supabase.from('padres').select('nombre, alumno_id').eq('user_id', user.id).maybeSingle()
  let alumnoNombre = ''
  if (padre?.alumno_id) {
    const { data: al } = await supabase.from('alumnos').select('nombre').eq('id', padre.alumno_id).single()
    alumnoNombre = al?.nombre || ''
  }

  document.getElementById('solicitar').addEventListener('click', async () => {
    const motivo = document.getElementById('motivo').value
    const fecha = document.getElementById('fecha').value
    const hora = document.getElementById('hora').value
    const nota = document.getElementById('nota').value.trim()
    const errEl = document.getElementById('err')

    if (!fecha) { errEl.textContent = 'Por favor selecciona el día deseado.'; errEl.style.display='flex'; return }
    errEl.style.display = 'none'

    const btn = document.getElementById('solicitar')
    btn.disabled = true; btn.textContent = 'Enviando…'

    // Guardar cita
    await supabase.from('citas').insert({
      padre_user_id: user.id,
      motivo,
      fecha_preferida: fecha,
      hora_preferida: hora || null,
      estado: 'pendiente'
    })

    // Notificar al instructor
    const textoMsg = `📅 Solicitud de cita — ${padre?.nombre || user.email}${alumnoNombre ? ' (alumno: ' + alumnoNombre + ')' : ''}\nMotivo: ${motivo}\nFecha: ${fecha}${hora ? ' a las ' + hora : ''}${nota ? '\n"' + nota + '"' : ''}`
    await supabase.from('mensajes').insert({
      de_user_id: user.id,
      texto: textoMsg,
      para_admin: true
    })

    document.getElementById('form').style.display = 'none'
    document.getElementById('ok').style.display = 'block'
    lucide.createIcons()
  })

  lucide.createIcons()
})();
</script>
</body>
</html>
