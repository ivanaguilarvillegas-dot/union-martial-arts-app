<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Programas</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead blue">
    <a class="navback" href="pagos.html" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Programas UNION</div></div>
  </div>
  <div class="body">
    <div class="stack-10" id="planes"></div>
    <div class="brandmark"><img src="assets/logo-union-blue.png" alt="" /><span>Union Martial Arts</span></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a class="on" href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  // Cargar precios y horarios desde configuracion
  const { data: cfgRows } = await supabase.from('configuracion').select('clave, valor')
    .in('clave', ['precio_inscripcion','precio_mensual_basico','precio_anual','precio_cinta_negra',
      'horario_basico_ninos','horario_martes_jueves','horario_jovenes','horario_jueves_sabado'])
  const cfg = {}; (cfgRows || []).forEach(r => { cfg[r.clave] = r.valor })

  const v = k => cfg[k] || null

  const insc     = v('precio_inscripcion')    || 'Inscripción — $500'
  const mensual  = v('precio_mensual_basico') || '$1,550 / mes'
  const anual    = v('precio_anual')          || '$12,500 contado'
  const cintaNegra = v('precio_cinta_negra') || '$9,950 anualidad'
  const h0 = v('horario_basico_ninos')    || 'Básico niños: L, M y V de 4:00 a 7:00 pm'
  const h1 = v('horario_martes_jueves')   || 'Martes 6:15 a 7:00 pm · Sábado 11:00 am a 12:00 pm'
  const h2 = v('horario_jovenes')         || 'Jóvenes/adultos: L, M y V 7:00 a 8:00 pm'
  const h3 = v('horario_jueves_sabado')   || 'Jueves 6:30 a 7:30 pm · Sábado 12:00 a 1:00 pm'

  const P = [
    {n:'Programa Básico',icon:'star',insc: insc,precio: mensual,pop:false,
      items:['5 clases por semana', h0, h2, 'Evaluaciones del día']},
    {n:'Anual UNION',icon:'calendar',insc:'o 3 pagos · mejor precio por clase',precio: anual,pop:true,
      items:['Empiezas en Básico y tras 3 meses pasas a este plan','Todo el año cubierto','Mejor precio por clase']},
    {n:'Club Cinta Negra',icon:'crown',insc:'Programa extra · 8 h de entrenamiento',precio: cintaNegra,pop:false,
      items:['Programa Kobudo + Liderazgo','Horario personalizado (sáb 10am niños)','Uniforme Club + evaluaciones mensuales','Competencias de Federación + Acrogimnasia']},
    {n:'Programa Élite UACJ',icon:'graduation-cap',insc:'Ruta al equipo representativo universitario',precio:'Camino UACJ',pop:false,elite:true,
      items:['Construye su currículum deportivo desde primaria, secundaria y prepa','Pre-califica al equipo representativo de Kickboxing de la UACJ','Requiere tener Anual UNION + Club Cinta Negra','Participar y calificar en los torneos del circuito anual','Cumplir con los reglamentos de la academia']},
  ]
  document.getElementById('planes').innerHTML = P.map(p=>`
    <div class="card" ${p.pop?'style="border:1.5px solid var(--primary);"':p.elite?'style="border:1.5px solid var(--amber-600);background:linear-gradient(180deg,var(--amber-bg),#fff);"':''}>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <span style="width:42px;height:42px;border-radius:var(--r-md);background:${p.elite?'var(--amber-bg)':'var(--soft)'};color:${p.elite?'var(--amber-600)':'var(--primary)'};display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;"><i data-lucide="${p.icon}" style="width:21px;height:21px"></i></span>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;line-height:1.3;"><span style="font-size:15px;font-weight:700;">${p.n}</span>${p.pop?'<span class="badge solid">Popular</span>':''}${p.elite?'<span class="badge amber">Élite</span>':''}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;">${p.insc}</div>
        </div>
      </div>
      <div style="font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--primary);margin-bottom:10px;">${p.precio}</div>
      <div style="display:flex;flex-direction:column;gap:7px;">
        ${p.items.map(it=>`<div style="display:flex;gap:8px;align-items:flex-start;font-size:13px;"><span style="color:var(--green-600);flex-shrink:0;margin-top:1px;"><i data-lucide="check" style="width:15px;height:15px"></i></span>${it}</div>`).join('')}
      </div>
      <a class="btn ${p.pop?'primary':p.elite?'primary':'secondary'} block mt14" href="${p.elite?'cita.html':'pagos.html'}">${p.elite?'Solicitar información':'Inscribirme'}</a>
    </div>`).join('');
  lucide.createIcons();
</script>
</body>
</html>
