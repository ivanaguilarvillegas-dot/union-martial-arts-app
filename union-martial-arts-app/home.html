<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Inicio</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen">
  <div class="header-blue">
    <div class="statusbar dark"><span>9:41</span><span class="right">
      <i data-lucide="signal"></i><i data-lucide="wifi"></i><i data-lucide="battery-full"></i></span></div>
    <div class="appbar blue">
      <div class="grow"><div class="hello">Bienvenida,</div><div class="name" id="nombre-familia">—</div></div>
      <a class="iconbtn-dark" id="btn-logout" href="#" aria-label="Cerrar sesión"><i data-lucide="log-out"></i></a>
    </div>
  </div>
  <div class="body">
    <div class="hero mb18">
      <div class="orb" style="right:-28px;top:-28px;width:120px;height:120px;"></div>
      <div class="orb" style="right:24px;bottom:-34px;width:80px;height:80px;"></div>
      <div class="badge-row"><span class="pill"><i data-lucide="award" style="width:13px;height:13px"></i> <span id="cinta-alumno">—</span></span></div>
      <div class="hname" id="nombre-alumno">Mi hijo/a</div>
      <div class="hsub" id="grupo-alumno">—</div>
      <div class="stats">
        <div class="stat"><b id="stat-clases">—</b><span>Clases</span></div>
        <div class="stat"><b id="stat-asistencia">—</b><span>Asistencia</span></div>
        <div class="stat"><b id="stat-pago">—</b><span>Pago</span></div>
      </div>
    </div>

    <div class=”card soft mb18” id=”horario-card” style=”display:none;”>
      <div style=”display:flex;align-items:center;gap:9px;margin-bottom:8px;”>
        <span style=”color:var(--primary)”><i data-lucide=”clock” class=”lucide” style=”width:16px;height:16px”></i></span>
        <span style=”font-size:13px;font-weight:700;color:var(--primary);white-space:nowrap” id=”horario-titulo”>Horario</span>
      </div>
      <div style=”padding-left:25px;font-size:13px;color:var(--muted);” id=”horario-texto”>—</div>
    </div>

    <div class=”label”>Alertas</div>
    <div class=”stack-10 mb18” id=”alertas”>
      <div class=”row”><span class=”ic”><i data-lucide=”loader”></i></span>
        <span class=”grow”><span class=”t”>Cargando…</span></span></div>
    </div>

    <div class="label">Menú</div>
    <div class="grid2" id="menu"></div>
  </div>
  <nav class="bottomnav">
    <a class="on" href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )

  // Menú siempre se dibuja primero, sin esperar datos
  const MENU = [
    ['checkin.html','clipboard-check','Check-in','Clase · torneo','blue'],
    ['evaluacion.html','trending-up','Evaluación','Diaria y mensual','green'],
    ['pagos.html','credit-card','Pagos','Mensualidad','blue'],
    ['programas.html','crown','Programas','Planes UNION','amber'],
    ['torneos.html','trophy','Torneos','Y actividades','amber'],
    ['nutricion.html','salad','Nutrición','Guía alimenticia','green'],
    ['entrena.html','dumbbell','En Casa','Rutinas','amber'],
    ['meditacion.html','moon','Meditación','Noche · 9 PM','blue'],
    ['cita.html','calendar-clock','Agendar cita','Con tu instructor','blue'],
    ['dudas.html','help-circle','Dudas','Preguntas','green'],
    ['tienda.html','shopping-bag','Tienda','Uniformes y más','amber'],
  ]
  const tone = { blue:['var(--soft)','var(--primary)'], green:['var(--green-bg)','var(--green-600)'], amber:['var(--amber-bg)','var(--amber-600)'] }
  document.getElementById('menu').innerHTML = MENU.map(([href,ic,t,s,to])=>`
    <a class="card" style="display:flex;flex-direction:column;gap:10px;text-decoration:none;color:var(--text);padding:16px 14px;" href="${href}">
      <span style="width:42px;height:42px;border-radius:var(--r-md);display:inline-flex;align-items:center;justify-content:center;background:${tone[to][0]};color:${tone[to][1]}"><i data-lucide="${ic}" style="width:21px;height:21px"></i></span>
      <span><span style="display:block;font-size:14px;font-weight:700">${t}</span><span style="display:block;font-size:11.5px;color:var(--muted);margin-top:2px">${s}</span></span>
    </a>`).join('')
  lucide.createIcons()

  // Logout
  document.getElementById('btn-logout').addEventListener('click', async (e) => {
    e.preventDefault()
    await supabase.auth.signOut()
    window.location.href = 'index.html'
  })

  // Cargar datos del padre y alumno (todo en try/catch para no romper el menú)
  async function cargarDatos() {
    try {
      const { data: { user } } = await supabase.auth.getUser()
      if (!user) { window.location.href = 'index.html'; return }

      // Buscar padre; si no está por user_id, auto-enlazar por correo (primera vez)
      let { data: padre } = await supabase.from('padres').select('nombre, alumno_id').eq('user_id', user.id).single()
      if (!padre) {
        const { data: pe } = await supabase.from('padres').select('id, nombre, alumno_id').eq('correo', user.email).single()
        if (pe) {
          await supabase.from('padres').update({ user_id: user.id }).eq('id', pe.id)
          padre = pe
        }
      }

      if (!padre) {
        document.getElementById('alertas').innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:12px;">Sin datos de alumno registrado.</div>'
        lucide.createIcons()
        return
      }

      document.getElementById('nombre-familia').textContent = 'Familia ' + (padre.nombre?.split(' ')[1] || padre.nombre || '')

      const hoy = new Date()
      const hoyStr = hoy.toISOString().split('T')[0]
      const primerDia = new Date(hoy.getFullYear(), hoy.getMonth(), 1).toISOString().split('T')[0]
      const alertas = []

      // Cargar alumno si hay alumno_id
      let alumno = null
      if (padre.alumno_id) {
        try {
          const { data: al } = await supabase.from('alumnos').select('*').eq('id', padre.alumno_id).maybeSingle()
          alumno = al
        } catch(e) {}
      }

      if (alumno) {
        document.getElementById('nombre-alumno').textContent = alumno.nombre || 'Mi hijo/a'
        document.getElementById('cinta-alumno').textContent = 'Cinta ' + (alumno.cinta || alumno.cinturon || '—')
        document.getElementById('grupo-alumno').textContent = (alumno.grupo || '') + (alumno.horario ? ' · ' + alumno.horario : '')
        if (alumno.horario) {
          document.getElementById('horario-card').style.display = 'block'
          document.getElementById('horario-titulo').textContent = 'Horario de ' + (alumno.nombre?.split(' ')[0] || 'tu hijo/a')
          document.getElementById('horario-texto').textContent = alumno.horario
        }
      }

      // DEBUG temporal — mostrar alumno_id y primerDia
      document.getElementById('alertas').innerHTML = `<div style="font-size:11px;padding:8px;background:#fffbea;border-radius:8px;color:#555;">
        DEBUG: alumno_id=${padre.alumno_id || 'NULL'} | primerDia=${primerDia}</div>`

      // Stats — solo si hay alumno vinculado
      if (padre.alumno_id) {
        try {
          const { data: checkins, error: errC } = await supabase.from('checkins')
            .select('id, tipo').eq('alumno_id', padre.alumno_id).gte('fecha', primerDia)
          document.getElementById('alertas').innerHTML += `<div style="font-size:11px;padding:8px;background:#fffbea;border-radius:8px;color:#555;margin-top:4px;">
            checkins: ${JSON.stringify(checkins)} | error: ${errC?.message || 'ninguno'}</div>`
          const asistencias = (checkins || []).filter(c => c.tipo !== 'ausencia')
          const n = asistencias.length
          document.getElementById('stat-clases').textContent = n
          document.getElementById('stat-asistencia').textContent = n ? Math.round((n / 20) * 100) + '%' : '0%'
        } catch(e) {
          document.getElementById('alertas').innerHTML += `<div style="font-size:11px;color:red;">catch checkins: ${e.message}</div>`
        }

        try {
          const { data: p1, error: e1 } = await supabase.from('pagos')
            .select('estado, mes, monto').eq('alumno_id', padre.alumno_id)
            .order('creado_en', { ascending: false }).limit(1)
          document.getElementById('alertas').innerHTML += `<div style="font-size:11px;padding:8px;background:#fffbea;border-radius:8px;color:#555;margin-top:4px;">
            pagos: ${JSON.stringify(p1)} | error: ${e1?.message || 'ninguno'}</div>`
          const ultimoPago = p1?.[0] || null
          document.getElementById('stat-pago').textContent = ultimoPago?.estado === 'pagado' ? 'Al día' : (ultimoPago ? 'Pendiente' : '—')
        } catch(e) {}

        try {
          const { data: msgs, error: errM } = await supabase.from('mensajes')
            .select('texto').eq('para_admin', false).limit(3)
          document.getElementById('alertas').innerHTML += `<div style="font-size:11px;padding:8px;background:#fffbea;border-radius:8px;color:#555;margin-top:4px;">
            mensajes: ${JSON.stringify(msgs)} | error: ${errM?.message || 'ninguno'}</div>`
        } catch(e) {}
      }

      // Mensajes del instructor a padres
      try {
        const { data: msgs } = await supabase.from('mensajes')
          .select('texto, creado_en')
          .eq('para_admin', false)
          .order('creado_en', { ascending: false })
          .limit(3)
        msgs?.forEach(m => {
          const preview = (m.texto || '').substring(0, 65)
          alertas.push(`<div class="row"><span class="ic blue"><i data-lucide="message-square"></i></span>
            <span class="grow"><span class="t">Mensaje del instructor</span><span class="s">${preview}${m.texto?.length > 65 ? '…' : ''}</span></span></div>`)
        })
      } catch(e) {}

      // Frase del día — busca en tabla frases o en configuracion
      try {
        let textoFrase = null
        const { data: frase } = await supabase.from('frases').select('texto').eq('activa', true).maybeSingle()
        if (frase?.texto) { textoFrase = frase.texto }
        else {
          const { data: cfg } = await supabase.from('configuracion').select('valor').eq('clave', 'frase_dia').maybeSingle()
          if (cfg?.valor) textoFrase = cfg.valor
        }
        if (textoFrase) {
          alertas.push(`<div class="row"><span class="ic"><i data-lucide="quote"></i></span>
            <span class="grow"><span class="t">Frase del día</span><span class="s">"${textoFrase}"</span></span></div>`)
        }
      } catch(e) {}

      // Próximos eventos
      try {
        const { data: eventos } = await supabase.from('eventos').select('titulo, fecha, lugar').gte('fecha', hoyStr).order('fecha').limit(1)
        if (eventos?.length) {
          alertas.push(`<a class="row" href="torneos.html"><span class="ic amber"><i data-lucide="trophy"></i></span>
            <span class="grow"><span class="t">${eventos[0].titulo}</span><span class="s">${eventos[0].fecha}${eventos[0].lugar ? ' · ' + eventos[0].lugar : ''}</span></span></a>`)
        }
      } catch(e) {}

      document.getElementById('alertas').innerHTML = alertas.length
        ? alertas.join('')
        : '<div style="text-align:center;color:var(--muted);font-size:13px;padding:12px;">Todo al día. ¡Sigue adelante! 🥋</div>'
      lucide.createIcons()

    } catch(err) {
      document.getElementById('alertas').innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:12px;">Sin alertas por ahora.</div>'
      lucide.createIcons()
    }
  }

  cargarDatos()
</script>
</body>
</html>
