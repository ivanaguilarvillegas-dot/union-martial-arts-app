<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Inicio</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen">
  <div class="header-blue">
    <div class="statusbar dark"><span>9:41</span><span class="right">
      <i data-lucide="signal"></i><i data-lucide="wifi"></i><i data-lucide="battery-full"></i></span></div>
    <div class="appbar blue">
      <div class="grow"><div class="hello">Bienvenida v3,</div><div class="name" id="nombre-familia">—</div></div>
      <a class="iconbtn-dark" id="btn-logout" href="#" aria-label="Cerrar sesión"><i data-lucide="log-out"></i></a>
    </div>
  </div>
  <div class="body">
    <div class="hero mb18">
      <div class="orb" style="right:-28px;top:-28px;width:120px;height:120px;"></div>
      <div class="orb" style="right:24px;bottom:-34px;width:80px;height:80px;"></div>
      <div class="badge-row"><span class="pill"><i data-lucide="award" style="width:13px;height:13px"></i> <span id="cinta-alumno">—</span></span></div>
      <div class="hname" id="nombre-alumno">Mi hijo/a</div>
      <div class="hsub" id="grupo-alumno">—</div>
      <div class="stats">
        <div class="stat"><b id="stat-clases">—</b><span>Clases</span></div>
        <div class="stat"><b id="stat-asistencia">—</b><span>Asistencia</span></div>
        <div class="stat"><b id="stat-pago">—</b><span>Pago</span></div>
      </div>
    </div>


    <div id=”alertas” style=”display:none;”></div>

    <div class="label">Menú</div>
    <div class="grid2" id="menu"></div>
  </div>
  <nav class="bottomnav">
    <a class="on" href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )

  // Menú siempre se dibuja primero, sin esperar datos
  const MENU = [
    ['notificaciones.html','bell','Avisos','Alertas · horario','blue'],
    ['checkin.html','clipboard-check','Check-in','Clase · torneo','blue'],
    ['evaluacion.html','trending-up','Evaluación','Diaria y mensual','green'],
    ['pagos.html','credit-card','Pagos','Mensualidad','blue'],
    ['programas.html','crown','Programas','Planes UNION','amber'],
    ['torneos.html','trophy','Torneos','Y actividades','amber'],
    ['nutricion.html','salad','Nutrición','Guía alimenticia','green'],
    ['entrena.html','dumbbell','En Casa','Rutinas','amber'],
    ['meditacion.html','moon','Meditación','Noche · 9 PM','blue'],
    ['cita.html','calendar-clock','Agendar cita','Con tu instructor','blue'],
    ['dudas.html','help-circle','Dudas','Preguntas','green'],
    ['tienda.html','shopping-bag','Tienda','Uniformes y más','amber'],
  ]
  const tone = { blue:['var(--soft)','var(--primary)'], green:['var(--green-bg)','var(--green-600)'], amber:['var(--amber-bg)','var(--amber-600)'] }
  document.getElementById('menu').innerHTML = MENU.map(([href,ic,t,s,to])=>`
    <a class="card" style="display:flex;flex-direction:column;gap:10px;text-decoration:none;color:var(--text);padding:16px 14px;" href="${href}">
      <span style="width:42px;height:42px;border-radius:var(--r-md);display:inline-flex;align-items:center;justify-content:center;background:${tone[to][0]};color:${tone[to][1]}"><i data-lucide="${ic}" style="width:21px;height:21px"></i></span>
      <span><span style="display:block;font-size:14px;font-weight:700">${t}</span><span style="display:block;font-size:11.5px;color:var(--muted);margin-top:2px">${s}</span></span>
    </a>`).join('')
  lucide.createIcons()

  // Logout
  document.getElementById('btn-logout').addEventListener('click', async (e) => {
    e.preventDefault()
    await supabase.auth.signOut()
    window.location.href = 'index.html'
  })

  async function cargarDatos() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = 'index.html'; return }
    cargarAlertas()
    mostrarBadge()

    const hoy = new Date()
    const hoyStr = hoy.toISOString().split('T')[0]
    const primerDia = new Date(hoy.getFullYear(), hoy.getMonth(), 1).toISOString().split('T')[0]

    // Buscar padre — primero por user_id, luego por correo
    let padre = null
    try {
      const { data: p1 } = await supabase.from('padres').select('id, nombre, alumno_id').eq('user_id', user.id).maybeSingle()
      if (p1) { padre = p1 }
      else {
        const { data: p2 } = await supabase.from('padres').select('id, nombre, alumno_id').eq('correo', user.email).maybeSingle()
        if (p2) {
          await supabase.from('padres').update({ user_id: user.id }).eq('id', p2.id)
          padre = p2
        }
      }
    } catch(e) {}

    if (padre) {
      document.getElementById('nombre-familia').textContent = 'Familia ' + (padre.nombre?.split(' ')[1] || padre.nombre || '')
    }

    // Alumno y stats — solo si hay alumno_id
    if (padre?.alumno_id) {
      try {
        const { data: al } = await supabase.from('alumnos').select('*').eq('id', padre.alumno_id).maybeSingle()
        if (al) {
          document.getElementById('nombre-alumno').textContent = al.nombre || 'Mi hijo/a'
          document.getElementById('cinta-alumno').textContent = 'Cinta ' + (al.cinta || al.cinturon || '—')
          document.getElementById('grupo-alumno').textContent = al.grupo || '—'
        }
      } catch(e) {}

      try {
        const { data: checkins } = await supabase.from('checkins')
          .select('id, tipo').eq('alumno_id', padre.alumno_id).gte('fecha', primerDia)
        const n = (checkins || []).filter(c => c.tipo !== 'ausencia').length
        document.getElementById('stat-clases').textContent = n
        document.getElementById('stat-asistencia').textContent = n ? Math.round((n / 20) * 100) + '%' : '0%'
      } catch(e) {}

      try {
        const { data: pagos } = await supabase.from('pagos')
          .select('estado').eq('alumno_id', padre.alumno_id)
          .order('creado_en', { ascending: false }).limit(1)
        const p = pagos?.[0]
        document.getElementById('stat-pago').textContent = p?.estado === 'pagado' ? 'Al día' : (p ? 'Pendiente' : '—')
      } catch(e) {}
    }

  }

  async function cargarAlertas() {
    const el = document.getElementById('alertas')
    if (!el) return
    const hoyStr = new Date().toISOString().split('T')[0]
    const items = []

    const [avisoRes, fraseRes, evsRes] = await Promise.allSettled([
      supabase.from('configuracion').select('valor').eq('clave', 'aviso_general').maybeSingle(),
      supabase.from('frases').select('texto').eq('activa', true).maybeSingle(),
      supabase.from('eventos').select('titulo, fecha, lugar').gte('fecha', hoyStr).order('fecha').limit(3)
    ])

    const aviso = avisoRes.value?.data
    if (aviso?.valor) items.push(`<div class="row"><span class="ic blue"><i data-lucide="message-square"></i></span><span class="grow"><span class="t">Aviso del instructor</span><span class="s">${aviso.valor.substring(0,100)}</span></span></div>`)

    const frase = fraseRes.value?.data
    if (frase?.texto) items.push(`<div class="row"><span class="ic"><i data-lucide="quote"></i></span><span class="grow"><span class="t">Frase del día</span><span class="s">${frase.texto}</span></span></div>`)

    const evs = evsRes.value?.data || []
    evs.forEach(ev => items.push(`<a class="row" href="torneos.html"><span class="ic amber"><i data-lucide="trophy"></i></span><span class="grow"><span class="t">${ev.titulo}</span><span class="s">${ev.fecha}${ev.lugar ? ' · '+ev.lugar : ''}</span></span><span class="trail"><i data-lucide="chevron-right"></i></span></a>`))

    el.innerHTML = items.length
      ? items.join('')
      : '<div style="text-align:center;color:var(--muted);font-size:13px;padding:12px;">Todo al día. ¡Sigue adelante! 🥋</div>'

    lucide.createIcons()
  }

  async function mostrarBadge() {
    let count = 0
    const hoy = new Date().toISOString().split('T')[0]
    const visto = localStorage.getItem('notif_visto') || '2000-01-01'

    const [a, f, e] = await Promise.allSettled([
      supabase.from('configuracion').select('valor, actualizado_en').eq('clave', 'aviso_general').maybeSingle(),
      supabase.from('frases').select('id, fecha_envio').eq('activa', true).maybeSingle(),
      supabase.from('eventos').select('id').gte('fecha', hoy)
    ])

    const aviso = a.value?.data
    if (aviso?.valor && aviso.actualizado_en > visto) count += 1

    const frase = f.value?.data
    if (frase && (!frase.fecha_envio || frase.fecha_envio > visto.split('T')[0])) count += 1

    const numEvs = e.value?.data?.length || 0
    if (numEvs > 0) count += numEvs

    if (count > 0) {
      const link = document.querySelector('a[href="notificaciones.html"]')
      if (link) {
        link.style.position = 'relative'
        link.insertAdjacentHTML('beforeend',
          `<span style="position:absolute;top:8px;right:8px;min-width:20px;height:20px;padding:0 6px;background:#dc2626;color:#fff;border-radius:10px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;border:2px solid #fff;box-sizing:border-box;line-height:1;">${count}</span>`)
      }
    }
  }

  cargarDatos()
</script>
</body>
</html>
