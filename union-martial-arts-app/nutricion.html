<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Nutrición</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead blue">
    <a class="navback" href="home.html" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Nutrición</div></div>
  </div>
  <div class="body">
    <div class="label row"><span>Hábitos de hoy</span><span class="badge blue" id="cnt">0/4</span></div>
    <div class="notice green" id="notif" style="display:none;"><i data-lucide="bell-ring"></i> Se notificó a tu instructor</div>
    <div class="card flush mb18" style="padding:6px;" id="habitos"></div>

    <div class="card green mb12">
      <div style="display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(--green-text);margin-bottom:12px;"><i data-lucide="circle-check-big" class="lucide" style="width:17px;height:17px"></i> Incluir en tu dieta</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;" id="good"></div>
    </div>
    <div class="card red mb18">
      <div style="display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(--red-text);margin-bottom:12px;"><i data-lucide="circle-x" class="lucide" style="width:17px;height:17px"></i> Evitar antes de entrenar</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;" id="bad"></div>
    </div>

    <div class="label">Ejemplo de día de entrenamiento</div>
    <div class="card" id="dia"></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const habitos = ['Tomé 8 vasos de agua','Desayuné antes de entrenar','Comí fruta o verdura','Evité refresco y frituras'];
  const good = ['Pollo a la plancha','Arroz integral','Plátano','Huevo','Atún','Avena','Fruta fresca','Agua natural','Verduras','Frijoles','Yogur natural','Nueces'];
  const bad = ['Refresco','Comida rápida','Frituras','Dulces','Jugos de caja','Carnes procesadas','Exceso de sal'];
  const dia = [['sunrise','Desayuno','Avena con plátano + 2 huevos + agua'],['utensils','Comida','Pollo a la plancha + arroz + ensalada'],['timer','2 horas antes de entrenar','Fruta + hidratación abundante'],['zap','Post-entrenamiento','Huevo + tortilla + agua o leche'],['moon','Cena ligera','Atún + verduras + agua']];

  document.getElementById('good').innerHTML = good.map(f=>`<span class="chip good">${f}</span>`).join('');
  document.getElementById('bad').innerHTML = bad.map(f=>`<span class="chip bad">${f}</span>`).join('');
  document.getElementById('dia').innerHTML = `<div style="display:flex;flex-direction:column;gap:14px;">`+dia.map(([ic,t,s])=>`
    <div style="display:flex;gap:12px;align-items:flex-start;"><span style="width:34px;height:34px;flex-shrink:0;border-radius:var(--r-sm);background:var(--soft);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="${ic}" style="width:17px;height:17px"></i></span>
      <div><div style="font-size:13.5px;font-weight:700;">${t}</div><div style="font-size:12.5px;color:var(--muted);margin-top:2px;">${s}</div></div></div>`).join('')+`</div>`;

  const state = {};
  document.getElementById('habitos').innerHTML = habitos.map((h,i)=>`
    <button class="checkitem" data-h="${i}"><span class="box"><i data-lucide="check"></i></span><span class="txt">${h}</span></button>`).join('');
  document.getElementById('habitos').addEventListener('click',e=>{
    const b=e.target.closest('[data-h]'); if(!b)return;
    state[b.dataset.h]=!state[b.dataset.h]; b.classList.toggle('done');
    const n=Object.values(state).filter(Boolean).length;
    document.getElementById('cnt').textContent=n+'/4';
    document.getElementById('cnt').className='badge '+(n===4?'green':'blue');
    document.getElementById('notif').style.display = n>0?'flex':'none';
    lucide.createIcons();
  });
  lucide.createIcons();
</script>
</body>
</html>
