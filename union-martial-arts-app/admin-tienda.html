<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Editar tienda</title>
<link rel="stylesheet" href="css/uma.css" />
<style>
  .ed { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); padding:12px; box-shadow:var(--shadow-card); }
  .ed .top { display:flex; gap:12px; }
  .ed .ph { width:78px; height:78px; flex-shrink:0; border-radius:var(--r-md); background:linear-gradient(135deg,var(--soft),#fff); display:flex; align-items:center; justify-content:center; color:var(--uma-blue-300); overflow:hidden; position:relative; cursor:pointer; }
  .ed .ph img { width:100%; height:100%; object-fit:cover; }
  .ed .ph .cam { position:absolute; bottom:3px; right:3px; width:22px; height:22px; border-radius:var(--r-full); background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; }
  .ed .ph .cam svg { width:13px; height:13px; }
  .ed .ph svg.big { width:26px; height:26px; }
  .ed input { width:100%; height:38px; padding:0 10px; border:1px solid var(--border-input); border-radius:var(--r-sm); font-family:var(--font); font-size:13px; outline:none; }
  .ed input:focus { border-color:var(--primary); }
  .ed .fields { flex:1; display:flex; flex-direction:column; gap:6px; }
</style>
</head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark">
    <a class="navback" href="admin-editar.html" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Editar tienda</div></div>
  </div>
  <div class="body">
    <div class="card soft mb16" style="display:flex;align-items:center;gap:10px;">
      <span style="color:var(--primary)"><i data-lucide="info" class="lucide" style="width:16px;height:16px"></i></span>
      <span style="font-size:12.5px;">Edita nombre, descripción y precio, y <strong>sube la foto</strong> de cada producto.</span>
    </div>
    <div class="stack-10" id="list"></div>
    <button class="btn secondary block mt14" id="add"><i data-lucide="plus"></i> Agregar producto</button>
    <div id="save-msg" class="notice green" style="display:none;margin-top:12px;"><i data-lucide="check"></i> Tienda guardada</div>
    <button class="btn primary block mt12" id="btn-guardar"><i data-lucide="save"></i> Guardar cambios</button>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { session } } = await supabase.auth.getSession()
  const user = session?.user
  if (!user) { window.location.href = 'index.html' }

  let PROD = []

  async function cargar() {
    const { data } = await supabase.from('productos').select('*').order('creado_en')
    PROD = data || []
    render()
  }

  function card(x, i) {
    return `<div class="ed" data-id="${x.id||''}" data-i="${i}">
      <div class="top">
        <label class="ph">
          ${x.imagen_url ? `<img src="${x.imagen_url}" alt="" />` : `<i data-lucide="image-plus" class="big"></i>`}
          <span class="cam"><i data-lucide="camera"></i></span>
          <input type="file" accept="image/*" hidden data-file="${i}" />
        </label>
        <div class="fields">
          <input class="f-nombre" value="${x.nombre||''}" placeholder="Nombre del producto" />
          <input class="f-desc" value="${x.descripcion||''}" placeholder="Descripción" />
          <input class="f-precio" value="${x.precio||''}" placeholder="Precio (MXN)" inputmode="numeric" />
        </div>
      </div>
      <button class="btn danger sm" data-del="${i}" style="width:100%;margin-top:8px;"><i data-lucide="trash-2"></i> Eliminar producto</button>
    </div>`
  }

  function render() {
    document.getElementById('list').innerHTML = PROD.map(card).join('')
    lucide.createIcons()
  }

  // Subir imagen de producto
  document.getElementById('list').addEventListener('change', async e => {
    const f = e.target.closest('[data-file]'); if (!f || !f.files[0]) return
    const file = f.files[0]
    const i = parseInt(f.dataset.file)
    const nombre = Date.now() + '_' + file.name
    const { error } = await supabase.storage.from('tienda').upload(nombre, file)
    if (!error) {
      const url = supabase.storage.from('tienda').getPublicUrl(nombre).data.publicUrl
      PROD[i].imagen_url = url
      render()
    }
  })

  // Agregar producto
  document.getElementById('add').addEventListener('click', () => {
    PROD.push({ nombre: '', descripcion: '', precio: '', imagen_url: '' })
    render()
  })

  // Eliminar producto
  document.getElementById('list').addEventListener('click', async e => {
    const btn = e.target.closest('[data-del]'); if (!btn) return
    if (!confirm('¿Eliminar este producto?')) return
    const i = parseInt(btn.dataset.del)
    const prod = PROD[i]
    if (prod?.id) {
      await supabase.from('productos').delete().eq('id', prod.id)
    }
    PROD.splice(i, 1)
    render()
  })

  // Guardar tienda
  document.getElementById('btn-guardar').addEventListener('click', async () => {
    const btn = document.getElementById('btn-guardar')
    btn.disabled = true; btn.innerHTML = '<i data-lucide="loader"></i> Guardando…'
    lucide.createIcons()
    const cards = document.querySelectorAll('.ed')
    let hayError = null
    for (let i = 0; i < cards.length; i++) {
      const c = cards[i]
      const id = c.dataset.id
      const nombre = c.querySelector('.f-nombre').value.trim()
      const descripcion = c.querySelector('.f-desc').value.trim()
      const precio = parseFloat(c.querySelector('.f-precio').value) || 0
      const imagen_url = PROD[i]?.imagen_url || null
      if (!nombre) continue
      if (id) {
        const { error } = await supabase.from('productos').update({ nombre, descripcion, precio, imagen_url }).eq('id', id)
        if (error) { hayError = error.message; break }
      } else {
        const { data: nuevo, error } = await supabase.from('productos').insert({ nombre, descripcion, precio, imagen_url }).select().single()
        if (error) { hayError = error.message; break }
        if (nuevo) PROD[i] = nuevo
      }
    }
    btn.disabled = false; btn.innerHTML = '<i data-lucide="save"></i> Guardar cambios'
    lucide.createIcons()
    if (hayError) {
      alert('❌ Error al guardar: ' + hayError)
    } else {
      document.getElementById('save-msg').style.display = 'flex'
      setTimeout(() => { document.getElementById('save-msg').style.display = 'none' }, 3000)
      cargar()
    }
  })

  cargar()
</script>
</body>
</html>
