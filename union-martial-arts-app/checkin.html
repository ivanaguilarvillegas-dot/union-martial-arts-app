<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Check-in</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead blue">
    <a class="navback" href="home.html" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Check-in</div></div>
  </div>
  <div class="body">
    <div class="label">Registrar llegada de hoy</div>
    <div class="card mb18">
      <div class="stack">
        <div>
          <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;">Tipo de asistencia</div>
          <div style="display:flex;gap:8px;" id="tipos">
            <button class="chip on" data-tipo="clase">Clase</button>
            <button class="chip" data-tipo="torneo">Torneo</button>
            <button class="chip" data-tipo="actividad">Actividad extra</button>
          </div>
        </div>
        <label class="field"><span class="lab">Día</span>
          <select><option>Hoy — Lunes 23 jun</option><option>Domingo 22 jun</option><option>Sábado 21 jun</option></select></label>
        <div id="horaWrap">
          <label class="field" id="horaClase"><span class="lab">Hora de entrada (horario de Mateo)</span>
            <select><option>4:00 PM</option><option>5:00 PM</option><option>6:00 PM</option><option>6:15 PM (Mar)</option><option>11:00 AM (Sáb)</option></select></label>
        </div>
        <div class="notice green" id="msg" style="display:none;flex-direction:column;align-items:flex-start;">
          <span style="display:inline-flex;align-items:center;gap:6px;margin-bottom:4px;"><i data-lucide="shield-check"></i> ¡Llegada registrada!</span>
          <span style="font-weight:500;">Gracias, tu hijo está en buenas manos. 🥋 El instructor confirmará su asistencia.</span>
        </div>
        <button class="btn primary block" id="confirm"><i data-lucide="check"></i> Confirmar llegada</button>
      </div>
    </div>

    <div class="label">Historial reciente</div>
    <div class="stack-8" id="hist"></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a class="on" href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )

  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  const { data: padre } = await supabase.from('padres').select('alumno_id').eq('user_id', user.id).single()
  const alumnoId = padre?.alumno_id

  // Tipo de asistencia
  const tipos = document.getElementById('tipos')
  tipos.addEventListener('click', e => {
    const b = e.target.closest('[data-tipo]'); if(!b) return
    ;[...tipos.children].forEach(c=>c.classList.remove('on')); b.classList.add('on')
  })

  // Confirmar llegada
  document.getElementById('confirm').addEventListener('click', async () => {
    if (!alumnoId) { alert('No hay alumno vinculado a tu cuenta.'); return }
    const hoy = new Date().toISOString().split('T')[0]
    const tipo = document.querySelector('#tipos .on')?.dataset.tipo || 'clase'

    // Verificar si ya hay checkin hoy
    const { data: existe } = await supabase.from('checkins').select('id').eq('alumno_id', alumnoId).eq('fecha', hoy).single()
    if (existe) {
      document.getElementById('msg').style.display = 'flex'
      document.getElementById('msg').innerHTML = '<span style="display:inline-flex;align-items:center;gap:6px"><i data-lucide="info"></i> Ya registraste la llegada de hoy.</span>'
      lucide.createIcons(); return
    }

    await supabase.from('checkins').insert({ alumno_id: alumnoId, fecha: hoy, tipo })
    document.getElementById('msg').style.display = 'flex'
    lucide.createIcons()
    cargarHistorial()
  })

  // Historial
  async function cargarHistorial() {
    if (!alumnoId) return
    const { data } = await supabase.from('checkins').select('*').eq('alumno_id', alumnoId).order('fecha', { ascending: false }).limit(10)
    const cont = document.getElementById('hist')
    if (!data || !data.length) { cont.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:16px">Sin registros aún.</div>'; return }
    cont.innerHTML = data.map(c => `
      <div class="row"><span class="ic green"><i data-lucide="calendar-check"></i></span>
        <span class="grow"><span class="t">${c.fecha}</span><span class="s">${c.tipo || 'Clase'}</span></span>
        <span class="trail"><span class="badge green">Registrado</span></span></div>`).join('')
    lucide.createIcons()
  }

  cargarHistorial()
  lucide.createIcons()
</script>
</body>
</html>
