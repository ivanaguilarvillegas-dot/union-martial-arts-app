<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Check-in</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead blue">
    <a class="navback" href="home.html" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Check-in</div></div>
  </div>
  <div class="body">
    <div class="label">Registrar llegada de hoy</div>
    <div class="card mb18">
      <div class="stack">
        <div>
          <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;">Tipo de asistencia</div>
          <div style="display:flex;gap:8px;" id="tipos">
            <button class="chip on" data-tipo="clase">Clase</button>
            <button class="chip" data-tipo="torneo">Torneo</button>
            <button class="chip" data-tipo="actividad">Actividad extra</button>
          </div>
        </div>
        <label class="field"><span class="lab">Día</span>
          <select><option>Hoy — Lunes 23 jun</option><option>Domingo 22 jun</option><option>Sábado 21 jun</option></select></label>
        <div id="horaWrap">
          <label class="field" id="horaClase"><span class="lab">Hora de entrada (horario de Mateo)</span>
            <select><option>4:00 PM</option><option>5:00 PM</option><option>6:00 PM</option><option>6:15 PM (Mar)</option><option>11:00 AM (Sáb)</option></select></label>
        </div>
        <div class="notice green" id="msg" style="display:none;flex-direction:column;align-items:flex-start;">
          <span style="display:inline-flex;align-items:center;gap:6px;margin-bottom:4px;"><i data-lucide="shield-check"></i> ¡Llegada registrada!</span>
          <span style="font-weight:500;">Gracias, tu hijo está en buenas manos. 🥋 El instructor confirmará su asistencia.</span>
        </div>
        <button class="btn primary block" id="confirm"><i data-lucide="check"></i> Confirmar llegada</button>
      </div>
    </div>

    <div class="label">Historial reciente</div>
    <div class="stack-8" id="hist"></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a class="on" href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const HIST = [
    ['Viernes 20 jun','18:02 · Clase','calendar-check','green'],
    ['Sábado 14 jun','11:05 · Torneo','trophy','amber'],
    ['Miércoles 11 jun','18:05 · Clase','calendar-check','green'],
    ['Sábado 7 jun','10:30 · Actividad extra','sparkles','green'],
  ];
  document.getElementById('hist').innerHTML = HIST.map(([d,s,ic,to])=>`
    <div class="row"><span class="ic ${to}"><i data-lucide="${ic}"></i></span>
      <span class="grow"><span class="t">${d}</span><span class="s">${s}</span></span>
      <span class="trail"><span class="badge green">Confirmado</span></span></div>`).join('');

  const tipos = document.getElementById('tipos');
  tipos.addEventListener('click', e => {
    const b = e.target.closest('[data-tipo]'); if(!b) return;
    [...tipos.children].forEach(c=>c.classList.remove('on')); b.classList.add('on');
    const clase = b.dataset.tipo === 'clase';
    document.getElementById('horaWrap').innerHTML = clase
      ? `<label class="field"><span class="lab">Hora de entrada (horario de Mateo)</span><select><option>4:00 PM</option><option>5:00 PM</option><option>6:00 PM</option><option>6:15 PM (Mar)</option><option>11:00 AM (Sáb)</option></select></label>`
      : `<label class="field"><span class="lab">Hora de entrada</span><input type="time" /></label>`;
  });
  document.getElementById('confirm').addEventListener('click', ()=>{
    document.getElementById('msg').style.display='flex'; lucide.createIcons();
  });
  lucide.createIcons();
</script>
</body>
</html>
