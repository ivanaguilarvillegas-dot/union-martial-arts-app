<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Check-in</title>
<link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0047AB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Union MA">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen" style="background:#f0f2f5;">
    <div class="page-hero">
    <div class="page-hero-top" style="position:relative;"><a href="home.html" class="navback" style="position:absolute;left:0;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;"><i data-lucide="chevron-left" style="width:20px;height:20px;"></i></a>
      <div class="hero-logo">
        <a href="home.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
          <div class="hero-logo-circle"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
          <div class="hero-logo-txt">UNION<br>MARTIAL ARTS</div>
        </a>
      </div>
      <a href="#" onclick="history.back();return false;" style="width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;flex-shrink:0;"><i data-lucide="chevron-left" style="width:20px;height:20px;"></i></a>
    </div>
    <div class="hero-title">Check-in</div>
    <div class="hero-sub">Registro de asistencia</div>
  </div>
<div class="body">

    <!-- Selector modo: dos tarjetas grandes -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;" id="modo-tabs">
      <button data-modo="asiste" style="border:2px solid var(--primary,#1d4ed8);border-radius:14px;background:var(--primary,#1d4ed8);color:#fff;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-family:inherit;" id="tab-asiste">
        <i data-lucide="clipboard-check" style="width:26px;height:26px;"></i>
        <span style="font-size:13px;font-weight:700;">Llegó a clase</span>
        <span style="font-size:10px;opacity:.75;line-height:1.3;">Confirma su asistencia</span>
      </button>
      <button data-modo="ausente" style="border:2px solid #e5e7eb;border-radius:14px;background:#fff;color:#374151;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-family:inherit;" id="tab-ausente">
        <i data-lucide="calendar-x" style="width:26px;height:26px;color:#6b7280;"></i>
        <span style="font-size:13px;font-weight:700;">No asistirá</span>
        <span style="font-size:10px;color:#9ca3af;line-height:1.3;">Justifica la ausencia</span>
      </button>
    </div>

    <!-- Panel: asiste -->
    <div id="panel-asiste">
      <div class="card mb18">
        <div class="stack">
          <div>
            <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;">Tipo de evento</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;" id="tipos">
              <button class="chip on" data-tipo="clase">Clase</button>
              <button class="chip" data-tipo="torneo">Torneo</button>
              <button class="chip" data-tipo="actividad">Actividad extra</button>
            </div>
          </div>
          <div class="notice green" id="msg-asiste" style="display:none;flex-direction:column;align-items:flex-start;">
            <span style="display:inline-flex;align-items:center;gap:6px;"><i data-lucide="shield-check"></i> ¡Llegada registrada!</span>
            <span style="font-weight:500;margin-top:4px;">El instructor fue notificado. 🥋</span>
          </div>
          <button class="btn primary block" id="btn-asiste"><i data-lucide="check"></i> Confirmar llegada</button>
        </div>
      </div>
    </div>

    <!-- Panel: ausente -->
    <div id="panel-ausente" style="display:none;">
      <div class="card mb18">
        <div class="stack">
          <div style="font-size:12px;font-weight:500;color:var(--muted);">Motivo de ausencia</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;" id="motivos">
            <button class="chip on" data-motivo="Enfermedad">🤒 Enfermedad</button>
            <button class="chip" data-motivo="Escuela">📚 Escuela</button>
            <button class="chip" data-motivo="Viaje">✈️ Viaje</button>
            <button class="chip" data-motivo="Otro">💬 Otro</button>
          </div>
          <label class="field"><span class="lab">Mensaje al instructor (opcional)</span>
            <textarea id="nota-ausencia" rows="2" placeholder="Ej. Tiene fiebre, regresa el jueves…"></textarea></label>
          <div class="notice red" id="msg-ausente" style="display:none;flex-direction:column;align-items:flex-start;">
            <span style="display:inline-flex;align-items:center;gap:6px;"><i data-lucide="bell"></i> Ausencia registrada</span>
            <span style="font-weight:500;margin-top:4px;">El instructor fue notificado.</span>
          </div>
          <button class="btn danger block" id="btn-ausente"><i data-lucide="x"></i> Reportar ausencia</button>
        </div>
      </div>
    </div>

    <div class="label">Historial reciente</div>
    <div class="stack-8" id="hist"></div>
  </div>
    <div class="brandmark"><img src="/assets/logo-union-blue.png" alt="" /><span>Union Martial Arts</span></div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a class="on" href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="/js/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>

  async function cargarPadre(supabase, user) {
    const savedId = localStorage.getItem('uma_padre_id')
    if (savedId) {
      const { data } = await supabase.from('padres').select('*').eq('id', savedId).maybeSingle()
      if (data) return data
    }
    const { data: p1 } = await supabase.from('padres').select('*').eq('user_id', user.id).limit(1).maybeSingle()
    if (p1) { localStorage.setItem('uma_padre_id', p1.id); return p1 }
    const { data: p2 } = await supabase.from('padres').select('*').eq('correo', user.email).limit(1).maybeSingle()
    if (p2) {
      await supabase.from('padres').update({ user_id: user.id }).eq('id', p2.id)
      localStorage.setItem('uma_padre_id', p2.id)
      return p2
    }
    return null
  }

(async () => {
  const supabase = window.supabase.createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )

  const { data: { session } } = await supabase.auth.getSession()
  const user = session?.user
  if (!user) { window.location.href = 'index.html'; }

  let padre = null, alumnoId = null, alumnoNombre = ''
  try {
    padre = await cargarPadre(supabase, user)
    alumnoId = padre?.alumno_id

    // Fallback: buscar alumno donde padre_id = padre.id
    if (!alumnoId && padre?.id) {
      const { data: alPorPadre } = await supabase.from('alumnos').select('id, nombre').eq('padre_id', padre.id).maybeSingle()
      if (alPorPadre) { alumnoId = alPorPadre.id; alumnoNombre = alPorPadre.nombre }
    }

    if (alumnoId && !alumnoNombre) {
      const { data: al } = await supabase.from('alumnos').select('nombre').eq('id', alumnoId).maybeSingle()
      alumnoNombre = al?.nombre || 'tu hijo/a'
    }
  } catch(e) {}

  // Debug visible — muestra estado del alumno vinculado
  const dbg = document.createElement('div')
  dbg.id = 'dbg-alumno'
  dbg.style.cssText = 'font-size:11px;padding:6px 10px;border-radius:8px;margin-bottom:10px;text-align:center;'
  if (alumnoId) {
    dbg.style.background = '#ecfdf5'; dbg.style.color = '#065f46'
    dbg.textContent = '✓ Alumno vinculado: ' + (alumnoNombre || alumnoId)
  } else {
    dbg.style.background = '#fef2f2'; dbg.style.color = '#991b1b'
    dbg.textContent = '⚠️ Sin alumno vinculado | padre: ' + (padre?.id ? padre.id.slice(0,8) + '…' : 'no encontrado') + ' | user: ' + user.id.slice(0,8) + '…'
  }
  document.querySelector('.body')?.prepend(dbg)

  // Tabs modo
  function activarModo(modo) {
    const asiste = modo === 'asiste'
    const tabA = document.getElementById('tab-asiste')
    const tabB = document.getElementById('tab-ausente')
    // Tab activo: fondo azul, icono blanco
    tabA.style.background = asiste ? 'var(--primary,#1d4ed8)' : '#fff'
    tabA.style.borderColor = asiste ? 'var(--primary,#1d4ed8)' : '#e5e7eb'
    tabA.style.color = asiste ? '#fff' : '#374151'
    tabA.querySelector('i').style.color = asiste ? '#fff' : '#6b7280'
    // Tab ausente: fondo rojo si activo
    tabB.style.background = !asiste ? '#fef2f2' : '#fff'
    tabB.style.borderColor = !asiste ? '#fca5a5' : '#e5e7eb'
    tabB.style.color = !asiste ? '#991b1b' : '#374151'
    tabB.querySelector('i').style.color = !asiste ? '#dc2626' : '#6b7280'
    document.getElementById('panel-asiste').style.display = asiste ? 'block' : 'none'
    document.getElementById('panel-ausente').style.display = asiste ? 'none' : 'block'
  }
  document.getElementById('modo-tabs').addEventListener('click', e => {
    const b = e.target.closest('[data-modo]'); if (!b) return
    activarModo(b.dataset.modo)
  })
  activarModo('asiste')

  // Tipo de asistencia
  document.getElementById('tipos').addEventListener('click', e => {
    const b = e.target.closest('[data-tipo]'); if (!b) return
    ;[...document.getElementById('tipos').children].forEach(c => c.classList.remove('on')); b.classList.add('on')
  })

  // Motivo de ausencia
  document.getElementById('motivos').addEventListener('click', e => {
    const b = e.target.closest('[data-motivo]'); if (!b) return
    ;[...document.getElementById('motivos').children].forEach(c => c.classList.remove('on')); b.classList.add('on')
  })

  // Confirmar llegada
  document.getElementById('btn-asiste').addEventListener('click', async () => {
    if (!alumnoId) { alert('No hay alumno vinculado a tu cuenta.'); return }
    const hoy = new Date().toISOString().split('T')[0]
    const tipo = document.querySelector('#tipos .on')?.dataset.tipo || 'clase'

    const { data: existe } = await supabase.from('checkins').select('id').eq('alumno_id', alumnoId).eq('fecha', hoy).eq('tipo', tipo).maybeSingle()
    if (existe) {
      const m = document.getElementById('msg-asiste')
      m.style.display = 'flex'
      m.innerHTML = '<span style="display:inline-flex;align-items:center;gap:6px"><i data-lucide="info"></i> Ya registraste ' + tipo + ' de hoy.</span>'
      lucide.createIcons(); return
    }

    const ahora = new Date()
    const hora = ahora.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: true })
    await supabase.from('checkins').insert({ alumno_id: alumnoId, fecha: hoy, tipo, hora })

    // Notificar al instructor
    await supabase.from('mensajes').insert({
      de_user_id: user.id,
      texto: `✅ Check-in: ${alumnoNombre} llegó a ${tipo} el ${hoy} a las ${hora}`,
      para_admin: true
    })

    // Auto-respuesta del sistema al padre
    const frases = [
      `🥋 Recibido. ${alumnoNombre} está en clase. ¡Gracias por avisar, que tenga un excelente entrenamiento!`,
      `✅ Confirmado. Recibimos a ${alumnoNombre} en ${tipo}. ¡Éxito en el entrenamiento!`,
      `🙏 Gracias. ${alumnoNombre} ya está con nosotros. ¡Nos vemos al terminar la clase!`,
    ]
    const respuesta = frases[Math.floor(Math.random() * frases.length)]
    await supabase.from('mensajes').insert({
      de_user_id: null,
      texto: respuesta,
      para_admin: false,
      destinatario_id: padre?.id
    })

    document.getElementById('msg-asiste').style.display = 'flex'
    lucide.createIcons()
    cargarHistorial()
  })

  // Reportar ausencia
  document.getElementById('btn-ausente').addEventListener('click', async () => {
    const errDiv = document.getElementById('msg-ausente')
    const btn = document.getElementById('btn-ausente')

    if (!alumnoId) {
      errDiv.style.display = 'flex'
      errDiv.style.background = '#fef2f2'
      errDiv.innerHTML = '<span style="color:#991b1b;font-size:13px;">⚠️ No hay alumno vinculado a tu cuenta. Verifica tu perfil.</span>'
      return
    }

    btn.disabled = true
    const hoy = new Date().toISOString().split('T')[0]
    const motivo = document.querySelector('#motivos .on')?.dataset.motivo || 'Otro'
    const nota = document.getElementById('nota-ausencia').value.trim()

    // Verificar si ya existe un registro hoy
    const { data: existente } = await supabase.from('checkins')
      .select('id').eq('alumno_id', alumnoId).eq('fecha', hoy).maybeSingle()

    let errCheckin
    if (existente) {
      const res = await supabase.from('checkins').update({
        tipo: 'ausencia', ausencia_motivo: motivo
      }).eq('id', existente.id)
      // Si falla por columna inexistente, intentar sin ausencia_motivo
      if (res.error && res.error.message.includes('ausencia_motivo')) {
        const r2 = await supabase.from('checkins').update({ tipo: 'ausencia' }).eq('id', existente.id)
        errCheckin = r2.error
      } else {
        errCheckin = res.error
      }
    } else {
      const res = await supabase.from('checkins').insert({
        alumno_id: alumnoId, fecha: hoy, tipo: 'ausencia', ausencia_motivo: motivo
      })
      // Si falla por columna inexistente, intentar sin ausencia_motivo
      if (res.error && res.error.message.includes('ausencia_motivo')) {
        const r2 = await supabase.from('checkins').insert({
          alumno_id: alumnoId, fecha: hoy, tipo: 'ausencia'
        })
        errCheckin = r2.error
      } else {
        errCheckin = res.error
      }
    }

    btn.disabled = false

    if (errCheckin) {
      errDiv.style.display = 'flex'
      errDiv.style.background = '#fef2f2'
      errDiv.innerHTML = `<span style="color:#991b1b;font-size:12px;">❌ Error: ${errCheckin.message}</span>`
      return
    }

    // Notificar al instructor
    const texto = `❌ Ausencia: ${alumnoNombre} no asistirá el ${hoy} — Motivo: ${motivo}${nota ? ' · ' + nota : ''}`
    await supabase.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: true }).catch(() => {})

    errDiv.style.background = ''
    errDiv.innerHTML = `<span style="display:inline-flex;align-items:center;gap:6px;"><i data-lucide="bell"></i> Ausencia registrada</span><span style="font-weight:500;margin-top:4px;">El instructor fue notificado.</span>`
    errDiv.style.display = 'flex'
    lucide.createIcons()
    cargarHistorial()
  })

  async function cargarHistorial() {
    if (!alumnoId) return
    const { data } = await supabase.from('checkins').select('*').eq('alumno_id', alumnoId).order('fecha', { ascending: false }).limit(10)
    const cont = document.getElementById('hist')
    if (!data?.length) { cont.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:16px">Sin registros aún.</div>'; return }
    cont.innerHTML = data.map(c => {
      const ausencia = c.tipo === 'ausencia'
      return `<div class="row">
        <span class="ic ${ausencia ? 'red' : 'green'}"><i data-lucide="${ausencia ? 'x-circle' : 'calendar-check'}"></i></span>
        <span class="grow">
          <span class="t">${c.fecha}</span>
          <span class="s">${ausencia ? 'Ausencia — ' + (c.ausencia_motivo || '') : (c.tipo || 'Clase') + (c.hora ? ' · ' + c.hora : '')}</span>
        </span>
        <span class="trail"><span class="badge ${ausencia ? 'red' : 'green'}">${ausencia ? 'Ausente' : 'Asistió'}</span></span>
      </div>`
    }).join('')
    lucide.createIcons()
  }

  cargarHistorial()
  lucide.createIcons()
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }
</script>
</body>
</html>
