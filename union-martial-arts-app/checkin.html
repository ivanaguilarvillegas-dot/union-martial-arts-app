<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Union Martial Arts — Check-in</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>●●● 100%</span></div>

  <div class="nav-header">
    <a href="home.html" class="back-btn">← Volver</a>
    <h1>Check-in</h1>
  </div>

  <div class="screen-body">

    <div class="section-title">Registrar llegada de hoy</div>
    <div class="card">
      <label>Día de la clase</label>
      <select id="sel-dia"></select>

      <label>Hora de entrada</label>
      <select id="sel-hora">
        <option>5:00 PM</option>
        <option>6:00 PM</option>
        <option>7:00 PM</option>
      </select>

      <div id="msg-checkin" style="font-size:13px; text-align:center; padding:8px; border-radius:8px; display:none; margin-top:8px;"></div>

      <button class="btn-primary" onclick="registrarCheckin()">Confirmar llegada</button>
    </div>

    <div class="section-title">Historial reciente</div>
    <div id="historial-checkins">
      <div style="text-align:center; color:var(--text-secondary); font-size:13px; padding:20px;">Cargando historial...</div>
    </div>

  </div>

  <div class="bottom-nav">
    <a href="home.html" class="bnav-item"><span class="bnav-icon">🏠</span>Inicio</a>
    <a href="checkin.html" class="bnav-item active"><span class="bnav-icon">✅</span>Check-in</a>
    <a href="pagos.html" class="bnav-item"><span class="bnav-icon">💳</span>Pagos</a>
    <a href="evaluacion.html" class="bnav-item"><span class="bnav-icon">📊</span>Perfil</a>
  </div>
</div>

<script type="module">
  import { supabase } from './js/supabase.js'

  let alumnoId = null

  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado']
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']

  function formatearFecha(fechaStr) {
    const d = new Date(fechaStr + 'T12:00:00')
    return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`
  }

  function generarDias() {
    const sel = document.getElementById('sel-dia')
    for (let i = 0; i < 7; i++) {
      const d = new Date()
      d.setDate(d.getDate() - i)
      const val = d.toISOString().split('T')[0]
      const opt = document.createElement('option')
      opt.value = val
      opt.textContent = i === 0 ? 'Hoy — ' + formatearFecha(val) : formatearFecha(val)
      sel.appendChild(opt)
    }
  }

  async function cargarDatos() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = 'index.html'; return }

    const { data: padre } = await supabase
      .from('padres')
      .select('alumno_id')
      .eq('user_id', user.id)
      .single()

    alumnoId = padre?.alumno_id
    cargarHistorial()
  }

  async function cargarHistorial() {
    if (!alumnoId) return
    const { data } = await supabase
      .from('checkins')
      .select('*')
      .eq('alumno_id', alumnoId)
      .order('fecha', { ascending: false })
      .limit(10)

    const cont = document.getElementById('historial-checkins')
    if (!data || data.length === 0) {
      cont.innerHTML = '<div style="text-align:center; color:var(--text-secondary); font-size:13px; padding:20px;">Sin asistencias registradas aún.</div>'
      return
    }

    cont.innerHTML = data.map(c => `
      <div class="checkin-row">
        <div>
          <div style="font-size:14px; font-weight:500;">${formatearFecha(c.fecha)}</div>
          <div style="font-size:12px; color:var(--text-secondary);">${c.hora?.substring(0,5) || ''}</div>
        </div>
        <span class="badge green">Asistió</span>
      </div>`).join('')
  }

  window.registrarCheckin = async function() {
    if (!alumnoId) return
    const fecha = document.getElementById('sel-dia').value
    const hora = document.getElementById('sel-hora').value
    const msg = document.getElementById('msg-checkin')

    const { data: existe } = await supabase
      .from('checkins')
      .select('id')
      .eq('alumno_id', alumnoId)
      .eq('fecha', fecha)
      .single()

    if (existe) {
      msg.textContent = '⚠️ Ya registraste asistencia este día.'
      msg.style.background = '#FFF5F5'
      msg.style.color = '#9B2C2C'
      msg.style.display = 'block'
      return
    }

    const { error } = await supabase
      .from('checkins')
      .insert({ alumno_id: alumnoId, fecha, hora })

    if (error) {
      msg.textContent = 'Error al registrar. Intenta de nuevo.'
      msg.style.background = '#FFF5F5'
      msg.style.color = '#9B2C2C'
    } else {
      msg.textContent = '✅ Asistencia registrada exitosamente.'
      msg.style.background = '#F0FFF4'
      msg.style.color = '#276749'
      cargarHistorial()
    }
    msg.style.display = 'block'
  }

  generarDias()
  cargarDatos()
</script>

</body>
</html>
