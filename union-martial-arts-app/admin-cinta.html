<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subir de cinta</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Subir de cinta</div></div></div>
  <div class="body">
    <div id="form"><div class="card"><div class="stack">
      <label class="field"><span class="lab">Alumno</span>
        <select id="al"><option>Mateo Reyes — Cinta Azul</option><option>Sofía Luna — Cinta Verde</option><option>Diego Ortiz — Cinta Amarilla</option></select></label>
      <label class="field"><span class="lab">Nueva cinta / grado</span>
        <select id="nv"></select></label>
      <label class="field"><span class="lab">Fecha del examen</span><input type="date" /></label>
      <button class="btn primary block" id="save"><i data-lucide="award"></i> Confirmar ascenso</button>
    </div></div></div>
    <div id="ok" style="display:none;"><div class="card green center">
      <div style="display:inline-flex;margin-bottom:6px;color:var(--green-600);"><i data-lucide="award" style="width:26px;height:26px"></i></div>
      <div style="font-size:15px;font-weight:700;color:var(--green-text);">¡Ascenso registrado!</div>
      <div style="font-size:13px;color:var(--green-text);margin-top:4px;">Se notificó a la familia del nuevo rango.</div></div></div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const BELTS = ['Blanca','Amarilla','Anaranjada','Morada','Azul','Verde','Café I','Café II','Café III','Roja','Roja-Negra','Negra','Negra I grado','Negra II grado','Negra III grado','Negra IV grado','Negra V grado'];
  document.getElementById('nv').innerHTML = BELTS.map(b=>`<option>Cinta ${b}</option>`).join('');
  document.getElementById('save').addEventListener('click',()=>{document.getElementById('form').style.display='none';document.getElementById('ok').style.display='block';lucide.createIcons();});
  lucide.createIcons();
</script>
</body></html>
