<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subir de cinta</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Subir de cinta</div></div></div>
  <div class="body">
    <div id="form"><div class="card"><div class="stack">
      <label class="field"><span class="lab">Alumno</span>
        <select id="al"><option>Mateo Reyes — Cinta Azul</option><option>Sofía Luna — Cinta Verde</option><option>Diego Ortiz — Cinta Amarilla</option></select></label>
      <label class="field"><span class="lab">Nueva cinta / grado</span>
        <select id="nv"></select></label>
      <label class="field"><span class="lab">Fecha del examen</span><input type="date" /></label>
      <button class="btn primary block" id="save"><i data-lucide="award"></i> Confirmar ascenso</button>
    </div></div></div>
    <div id="ok" style="display:none;"><div class="card green center">
      <div style="display:inline-flex;margin-bottom:6px;color:var(--green-600);"><i data-lucide="award" style="width:26px;height:26px"></i></div>
      <div style="font-size:15px;font-weight:700;color:var(--green-text);">¡Ascenso registrado!</div>
      <div style="font-size:13px;color:var(--green-text);margin-top:4px;">Se notificó a la familia del nuevo rango.</div></div></div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  const BELTS = ['Blanca','Amarilla','Anaranjada','Morada','Azul','Verde','Café I','Café II','Café III','Roja','Roja-Negra','Negra','Negra I grado','Negra II grado','Negra III grado','Negra IV grado','Negra V grado']
  document.getElementById('nv').innerHTML = BELTS.map(b => `<option value="${b}">Cinta ${b}</option>`).join('')

  // Cargar alumnos reales
  const { data: alumnos } = await supabase.from('alumnos').select('id, nombre, cinta').order('nombre')
  const sel = document.getElementById('al')
  if (alumnos?.length) {
    sel.innerHTML = alumnos.map(a => `<option value="${a.id}">${a.nombre}${a.cinta ? ' — Cinta ' + a.cinta : ''}</option>`).join('')
  }

  document.getElementById('save').addEventListener('click', async () => {
    const alumno_id = sel.value
    const nueva_cinta = document.getElementById('nv').value
    const fecha = document.querySelector('input[type=date]').value || new Date().toISOString().split('T')[0]

    if (!alumno_id) { alert('Selecciona un alumno.'); return }

    // Actualizar cinta del alumno
    const { error } = await supabase.from('alumnos').update({ cinta: nueva_cinta }).eq('id', alumno_id)
    if (error) { alert('Error: ' + error.message); return }

    // Registrar en mensajes para notificar a los padres
    const alumno = alumnos.find(a => a.id === alumno_id)
    await supabase.from('mensajes').insert({
      de_user_id: user.id,
      texto: `¡Felicidades! ${alumno?.nombre || 'Tu hijo/a'} ha ascendido a Cinta ${nueva_cinta} el ${fecha}. ¡Sigue adelante! 🥋`,
      para_admin: false
    })

    document.getElementById('form').style.display = 'none'
    document.getElementById('ok').style.display = 'block'
    lucide.createIcons()
  })

  lucide.createIcons()
</script>
</body></html>
