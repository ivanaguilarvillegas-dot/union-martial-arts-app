<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Meditación</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark">
    <a class="navback" href="home.html" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="sub">Visualización nocturna</div><div class="title">Meditación</div></div>
  </div>
  <div class="body">
    <div class="card invert mb14 center" style="padding:20px;">
      <div style="font-size:11px;opacity:.55;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Frase del día · 21 jun</div>
      <div style="font-size:15px;line-height:1.65;font-style:italic;margin-bottom:10px;">“La disciplina es el puente entre las metas y los logros.”</div>
      <div style="font-size:12px;opacity:.6;">— Jim Rohn</div>
    </div>

    <div class="label">Recordatorio nocturno</div>
    <div class="card mb18">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="width:38px;height:38px;border-radius:var(--r-md);background:var(--soft);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="moon" style="width:19px;height:19px"></i></span>
          <div><div style="font-size:14px;font-weight:700;">Meditación nocturna</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">Recordatorio activo</div></div>
        </div>
        <span class="badge blue">9:00 PM</span>
      </div>
    </div>

    <div class="label row"><span>Sesiones de audio</span><span class="badge blue" id="cnt">0/4 hechas</span></div>
    <div class="notice green" id="notif" style="display:none;"><i data-lucide="bell-ring"></i> Se notificó a tu instructor</div>
    <div class="stack-10" id="list"></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  // Cargar frase activa del instructor
  const { data: frase } = await supabase.from('frases').select('texto, fecha_envio').eq('activa', true).single()
  if (frase) {
    const fraseEl = document.querySelector('.card.invert')
    fraseEl.querySelector('div:first-child').textContent = 'Frase del día · ' + (frase.fecha_envio || '')
    fraseEl.querySelector('div:nth-child(2)').textContent = '"' + frase.texto + '"'
    fraseEl.querySelector('div:last-child').textContent = '— Tu instructor'
  }

  // Sesiones base
  const S = [
    ['Respiración 4-7-8','5 minutos · Relajación profunda'],
    ['Visualización del campeón','8 minutos · Para atletas jóvenes'],
    ['Gratitud y metas','6 minutos · Reflexión positiva'],
    ['Sueño reparador','10 minutos · Antes de dormir']
  ]
  const done = {}
  let audios = []

  // Cargar audios del instructor desde Storage
  async function cargar() {
    const { data } = await supabase.storage.from('media').list('audios', { limit: 20 })
    audios = (data || []).map(a => ({
      nombre: a.name.replace(/^\d+_/, '').replace(/\.[^.]+$/, ''),
      url: supabase.storage.from('media').getPublicUrl('audios/' + a.name).data.publicUrl
    }))
    render()
  }

  function render() {
    const total = S.length + audios.length
    document.getElementById('list').innerHTML = S.map(([t, s], i) => {
      const on = !!done['s' + i]
      const aud = audios.find(a => a.nombre.toLowerCase().includes(t.toLowerCase().split(' ')[0].toLowerCase()))
      return `<div class="row"><span class="ic"><i data-lucide="headphones"></i></span>
        <span class="grow"><span class="t">${t}</span><span class="s">${s}</span></span>
        <span class="trail" style="gap:8px;">
          ${aud ? `<a class="iconbtn solid" href="${aud.url}" target="_blank" aria-label="Reproducir"><i data-lucide="play"></i></a>` : `<button class="iconbtn solid" disabled style="opacity:.3;"><i data-lucide="play"></i></button>`}
          <button class="iconbtn" data-k="s${i}" style="background:${on?'var(--green-600)':'var(--sunken)'};color:${on?'#fff':'var(--faint)'};">
            <i data-lucide="check"></i></button>
        </span></div>`
    }).join('') + audios.filter(a => !S.some(([t]) => a.nombre.toLowerCase().includes(t.toLowerCase().split(' ')[0].toLowerCase()))).map((a, i) => {
      const on = !!done['a' + i]
      return `<div class="row"><span class="ic"><i data-lucide="music"></i></span>
        <span class="grow"><span class="t">${a.nombre}</span><span class="s">Audio del instructor</span></span>
        <span class="trail" style="gap:8px;">
          <a class="iconbtn solid" href="${a.url}" target="_blank"><i data-lucide="play"></i></a>
          <button class="iconbtn" data-k="a${i}" style="background:${on?'var(--green-600)':'var(--sunken)'};color:${on?'#fff':'var(--faint)'};">
            <i data-lucide="check"></i></button>
        </span></div>`
    }).join('')

    const n = Object.values(done).filter(Boolean).length
    document.getElementById('cnt').textContent = n + '/' + total + ' hechas'
    document.getElementById('cnt').className = 'badge ' + (n === total ? 'green' : 'blue')
    document.getElementById('notif').style.display = n > 0 ? 'flex' : 'none'
    lucide.createIcons()
  }

  document.getElementById('list').addEventListener('click', e => {
    const b = e.target.closest('[data-k]'); if (!b) return
    done[b.dataset.k] = !done[b.dataset.k]; render()
  })

  cargar()
</script>
</body>
</html>
