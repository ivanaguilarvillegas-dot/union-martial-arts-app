<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reto del Tatami</title><link rel="stylesheet" href="css/uma.css"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#080810;overflow:hidden;}
.screen{background:#080810!important;}
.score-bar{background:linear-gradient(90deg,#0047AB,#003a8c);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.score-side{text-align:center;}
.score-name{font-size:9px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.06em;text-transform:uppercase;}
.score-num{font-size:28px;font-weight:900;color:#fff;line-height:1;}
.score-pts{font-size:9px;color:rgba(255,255,255,.45);}
.stamina-bar{height:4px;background:rgba(255,255,255,.1);border-radius:99px;margin-top:3px;overflow:hidden;}
.stamina-fill{height:100%;border-radius:99px;transition:width .2s;}
canvas{display:block;width:100%;}
.log-area{background:#0f0f1a;padding:6px 12px;font-size:11px;font-weight:600;color:#94a3b8;min-height:30px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.log-area .warn{color:#f59e0b;}.log-area .good{color:#4ade80;}
.round-badge{display:inline-block;background:#0047AB;color:#fff;font-size:9px;font-weight:800;padding:1px 7px;border-radius:99px;margin-right:4px;}
.btns-wrap{padding:8px 10px 12px;background:#080810;flex:1;}
.moves-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
.move-btn{padding:8px 4px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);font-size:10px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:#e2e8f0;transition:background .1s,transform .1s;}
.move-btn:active{background:rgba(255,255,255,.15);transform:scale(.92);}
.move-btn .ico{font-size:17px;line-height:1;}
.move-btn .pts{font-size:9px;color:#60a5fa;font-weight:700;}
.move-btn.disabled{opacity:.32;pointer-events:none;}
.move-btn.firing{background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.5);transform:scale(.95);box-shadow:0 0 10px rgba(255,255,255,.3);}
.tooltip-box{background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:6px 10px;font-size:10px;color:#cbd5e1;line-height:1.5;margin-bottom:6px;}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.btn-def{background:rgba(0,71,171,.2);border-color:#0047AB;color:#93c5fd;}
.btn-def.active{background:#0047AB;color:#fff;}
.btn-combo{background:rgba(245,158,11,.15);border-color:#d97706;color:#fbbf24;}
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:18px;}
.result-card{background:#fff;border-radius:22px;padding:24px 20px;text-align:center;max-width:310px;width:100%;}
</style>
</head>
<body>
<div class="phone"><div class="screen" style="display:flex;flex-direction:column;">
  <div class="navhead dark">
    <a class="navback" href="juegos.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="sub" style="opacity:.5;">Point Fighting</div><div class="title">Reto del Tatami</div></div>
    <button onclick="resetGame()" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;">↺</button>
  </div>

  <div class="score-bar">
    <div class="score-side">
      <div class="score-name">🥋 Tú</div>
      <div class="score-num" id="p-score">0</div>
      <div class="score-pts">meta: <b id="meta-pts">7</b></div>
      <div class="stamina-bar"><div class="stamina-fill" id="p-stamina" style="width:100%;background:#4ade80;"></div></div>
    </div>
    <div style="text-align:center;">
      <div style="color:rgba(255,255,255,.25);font-size:10px;font-weight:800;">VS</div>
      <div style="background:rgba(255,255,255,.1);border-radius:8px;font-size:9px;font-weight:800;color:rgba(255,255,255,.7);padding:2px 8px;margin-top:3px;" id="round-lbl">Round 1</div>
    </div>
    <div class="score-side">
      <div class="score-num" id="a-score">0</div>
      <div class="score-name">Rival 🥋</div>
      <div class="score-pts" id="ai-lvl-lbl">Nivel 1</div>
      <div class="stamina-bar"><div class="stamina-fill" id="a-stamina" style="width:100%;background:#f87171;"></div></div>
    </div>
  </div>

  <canvas id="c" width="390" height="220"></canvas>

  <div class="log-area" id="log"><span class="round-badge">Round 1</span> ¡Presiona un movimiento para atacar!</div>

  <div class="btns-wrap">
    <div class="moves-grid">
      <button class="move-btn" id="btn-golpe"   onclick="playerMove('golpe')"  ><span class="ico">👊</span>Golpe<span class="pts">+1 · 1⚡</span></button>
      <button class="move-btn" id="btn-patada"  onclick="playerMove('patada')" ><span class="ico">🦵</span>Patada<span class="pts">+1 · 2⚡</span></button>
      <button class="move-btn" id="btn-barrida" onclick="playerMove('barrida')"><span class="ico">💨</span>Barrida<span class="pts">+1 · 1⚡</span></button>
      <button class="move-btn" id="btn-cabeza"  onclick="playerMove('cabeza')" ><span class="ico">🎯</span>P.Cabeza<span class="pts">+2 · 3⚡</span></button>
      <button class="move-btn" id="btn-salto"   onclick="playerMove('salto')"  ><span class="ico">🚀</span>P.Salto<span class="pts">+3 · 4⚡</span></button>
      <button class="move-btn" id="btn-contra"  onclick="playerMove('contra')" style="display:none;"><span class="ico">⚡</span>Contra<span class="pts">+2 · 2⚡</span></button>
    </div>
    <div class="tooltip-box" id="def-tip">🛡️ <b>Defensa</b> — bloquea el próximo ataque del rival y te deja contraatacar ⚡ al instante. Cuesta 2 energía.</div>
    <div class="bottom-row">
      <button class="move-btn btn-def"   id="btn-def"   onclick="activarDefensa()"><span class="ico">🛡️</span>Defensa<span class="pts">2⚡ · bloquea rival</span></button>
      <button class="move-btn btn-combo" id="btn-combo" onclick="activarCombo()" style="display:none;"><span class="ico">🔥</span>COMBO<span class="pts">x2 daño · ¡úsalo!</span></button>
    </div>
  </div>

  <div class="result-overlay" id="result" style="display:none;">
    <div class="result-card">
      <div style="font-size:48px;margin-bottom:8px;" id="r-icon">🏆</div>
      <div style="font-size:20px;font-weight:900;color:#111;margin-bottom:4px;" id="r-title"></div>
      <div style="font-size:11px;font-weight:800;color:#0047AB;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;" id="r-valor"></div>
      <div style="font-size:12px;color:#6b7280;line-height:1.6;margin-bottom:8px;font-style:italic;" id="r-frase"></div>
      <div style="background:#f0f9ff;border-radius:10px;padding:10px;font-size:11px;color:#0369a1;font-weight:600;line-height:1.5;margin-bottom:16px;" id="r-reto"></div>
      <div style="display:flex;flex-direction:column;gap:7px;">
        <button class="btn primary block" onclick="resetGame()">🔄 Jugar de nuevo</button>
        <button class="btn secondary block" onclick="location.href='juegos.html'">← Volver</button>
      </div>
    </div>
  </div>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
lucide.createIcons()

const VALORES=[
  {n:'Disciplina',i:'🥋',f:'"Cada punto se construye con constancia, técnica y control."',r:'Completa tu rutina aunque hoy no tengas ganas.'},
  {n:'Control',   i:'🧘',f:'"La fuerza más importante es saber controlarte."',             r:'Respira antes de reaccionar con enojo.'},
  {n:'Esfuerzo',  i:'💪',f:'"Cada intento te acerca a tu mejor versión."',                  r:'Termina una tarea aunque te cueste trabajo.'},
  {n:'Constancia',i:'🔥',f:'"Cada intento cuenta."',                                         r:'Practica algo difícil una vez más.'},
  {n:'Enfoque',   i:'🎯',f:'"Cuando tu mente está presente, tu técnica mejora."',            r:'Realiza una actividad sin distraerte hasta terminarla.'},
  {n:'Humildad',  i:'🌱',f:'"Siempre hay algo nuevo que aprender."',                         r:'Acepta una corrección sin enojarte.'},
]

const MOVES={
  golpe:  {pts:1,stamina:1,name:'Golpe',   hit:.70,type:'punch',height:'body'},
  patada: {pts:1,stamina:2,name:'Patada',  hit:.60,type:'kick', height:'body'},
  barrida:{pts:1,stamina:1,name:'Barrida', hit:.55,type:'sweep',height:'low'},
  cabeza: {pts:2,stamina:3,name:'P.Cabeza',hit:.40,type:'kick', height:'head'},
  salto:  {pts:3,stamina:4,name:'P.Salto', hit:.32,type:'jump', height:'head'},
  contra: {pts:2,stamina:2,name:'Contra',  hit:.82,type:'punch',height:'body'},
}
const AI_EASY=['golpe','patada','golpe','barrida']
const AI_MED =['golpe','patada','cabeza','golpe','barrida']
const AI_HARD=['golpe','patada','cabeza','salto','golpe','cabeza']

const canvas=document.getElementById('c')
const ctx=canvas.getContext('2d')
const W=390,H=220,FLOOR=200

// Fighter positions — they face EACH OTHER
const PX=105  // player center (faces right →)
const AX=285  // AI center    (faces left ←)

let pScore=0,aScore=0,pStamina=5,aStamina=5,maxStamina=5
let defending=false,defTimer=null,comboReady=false,comboTimer=null
let consecutiveHits=0,gameOver=false,aiTimer=null,regenTimer=null
let round=1,metaPoints=7,aiLevel=1

// Animation state — tracks WHAT is happening right now for drawing
let pAnim={type:'idle',t:0,maxT:0}  // type: idle|punch|kick|jump|block|hit
let aAnim={type:'idle',t:0,maxT:0}
let impactAnim={active:false,x:0,y:0,t:0,color:'#FFD700',pts:0}
let scoreFloats=[]

const logoImg=new Image(); logoImg.src='assets/logo-union-white.png'; let logoOk=false; logoImg.onload=()=>logoOk=true

// Draw a fighter lying on the floor (knocked down by sweep)
function drawFighterDown(cx, dir, anim, gi){
  const giColor=gi==='black'?GI_BLACK:GI_WHITE
  const beltCol=gi==='black'?'#fff':'#111'
  const t=anim.t/anim.maxT
  const fallDir=dir  // falls backward (away from opponent)

  // Extended shadow
  ctx.save();ctx.globalAlpha=.22;ctx.fillStyle='#000'
  ctx.beginPath();ctx.ellipse(cx,FLOOR+5,44,7,0,0,Math.PI*2);ctx.fill();ctx.restore()

  // Body lying horizontal (feet toward player, head away)
  ctx.fillStyle=giColor
  ctx.fillRect(cx-fallDir*42,FLOOR-16,fallDir>0?84:-84,16)
  // Belt stripe on body
  ctx.fillStyle=beltCol
  ctx.fillRect(cx+fallDir*8,FLOOR-16,fallDir>0?14:-14,16)
  // Gi lapel lines
  ctx.strokeStyle=gi==='black'?'#333':'#bbb';ctx.lineWidth=1
  ctx.beginPath();ctx.moveTo(cx-fallDir*10,FLOOR-16);ctx.lineTo(cx-fallDir*10,FLOOR);ctx.stroke()

  // Legs pointing up (comical stumps in the air)
  ctx.strokeStyle=giColor;ctx.lineWidth=10;ctx.lineCap='round'
  // Front leg
  ctx.beginPath();ctx.moveTo(cx+fallDir*28,FLOOR-8);ctx.lineTo(cx+fallDir*22,FLOOR-40);ctx.stroke()
  // Back leg
  ctx.beginPath();ctx.moveTo(cx+fallDir*38,FLOOR-8);ctx.lineTo(cx+fallDir*34,FLOOR-38);ctx.stroke()
  // Feet / shoes (sticking up)
  ctx.fillStyle='#1a1a1a'
  ctx.beginPath();ctx.roundRect(cx+fallDir*16,FLOOR-48,14,8,3);ctx.fill()
  ctx.beginPath();ctx.roundRect(cx+fallDir*28,FLOOR-46,14,8,3);ctx.fill()
  // Kick pads on feet (red)
  ctx.fillStyle=RED
  ctx.beginPath();ctx.ellipse(cx+fallDir*20,FLOOR-52,8,7,0,0,Math.PI*2);ctx.fill()
  ctx.beginPath();ctx.ellipse(cx+fallDir*33,FLOOR-50,8,7,0,0,Math.PI*2);ctx.fill()

  // Arms splayed out
  ctx.strokeStyle=giColor;ctx.lineWidth=8
  ctx.beginPath();ctx.moveTo(cx-fallDir*18,FLOOR-12);ctx.lineTo(cx-fallDir*10,FLOOR-36);ctx.stroke()
  ctx.beginPath();ctx.moveTo(cx+fallDir*2,FLOOR-12);ctx.lineTo(cx+fallDir*8,FLOOR-34);ctx.stroke()
  // Gloves on hands
  ctx.fillStyle=RED
  ctx.beginPath();ctx.ellipse(cx-fallDir*9,FLOOR-39,9,8,0,0,Math.PI*2);ctx.fill()
  ctx.beginPath();ctx.ellipse(cx+fallDir*10,FLOOR-37,9,8,0,0,Math.PI*2);ctx.fill()

  // Head with helmet lying on its side
  const hx=cx-fallDir*38,hy=FLOOR-10
  ctx.fillStyle=SKIN;ctx.beginPath();ctx.ellipse(hx,hy,13,10,0,0,Math.PI*2);ctx.fill()
  ctx.fillStyle=RED;ctx.beginPath();ctx.ellipse(hx,hy,15,12,0,0,Math.PI*2);ctx.fill()
  ctx.fillStyle=gi==='black'?'#0e0e10':'rgba(230,230,220,.95)'
  ctx.beginPath();ctx.ellipse(hx+fallDir*5,hy,10,8,0,0,Math.PI*2);ctx.fill()
  ctx.fillStyle=SKIN;ctx.beginPath();ctx.ellipse(hx+fallDir*5,hy,8,6,0,0,Math.PI*2);ctx.fill()
  // Dizzy eyes
  ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('😵',hx+fallDir*4,hy+4)
  // Chin guard
  ctx.fillStyle=RED;ctx.beginPath();ctx.roundRect(hx-10,hy+6,20,8,3);ctx.fill()

  // Spinning stars above head while down
  if(t<0.8){
    const spin=anim.t*0.18,sr=14
    ctx.font='13px sans-serif';ctx.textAlign='center'
    ctx.fillText('⭐',hx+Math.cos(spin)*sr,hy-20+Math.sin(spin)*5)
    ctx.fillText('💫',hx+Math.cos(spin+Math.PI)*sr,hy-20+Math.sin(spin+Math.PI)*5)
  }

  // "DERRIBO!" text appears at the start
  if(t<0.4){
    ctx.save();ctx.globalAlpha=1-t/0.4*0.5
    ctx.font='bold 16px Inter,sans-serif';ctx.textAlign='center'
    ctx.strokeStyle='rgba(0,0,0,.8)';ctx.lineWidth=3
    ctx.strokeText('¡DERRIBO!',cx,FLOOR-62)
    ctx.fillStyle='#FFD700';ctx.fillText('¡DERRIBO!',cx,FLOOR-62)
    ctx.restore()
  }
}

// ── DRAWING ──────────────────────────────────────────────────────────────────
const RED='#cc1f1f', SKIN='#f0c08a', GI_BLACK='#111', GI_WHITE='#f0f0f0'

function drawTatami(){
  // Dark arena
  const bg=ctx.createLinearGradient(0,0,0,H)
  bg.addColorStop(0,'#06060f');bg.addColorStop(.6,'#0a0a18');bg.addColorStop(1,'#080810')
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H)
  // UNION logo on the back wall — white logo watermark
  if(logoOk){
    ctx.save()
    ctx.globalAlpha=.11
    const lw=160,lh=100
    ctx.drawImage(logoImg,W/2-lw/2,18,lw,lh)
    ctx.restore()
  } else {
    // Fallback text logo
    ctx.save();ctx.globalAlpha=.07
    ctx.font='bold 38px Inter,sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center'
    ctx.fillText('UNION',W/2,90);ctx.restore()
  }
  // Blue glow from top center
  const glow=ctx.createRadialGradient(W/2,40,10,W/2,60,180)
  glow.addColorStop(0,'rgba(0,71,171,.15)');glow.addColorStop(1,'rgba(0,0,0,0)')
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,H)
  // Tatami mat
  const mat=ctx.createLinearGradient(0,FLOOR-12,0,FLOOR+28)
  mat.addColorStop(0,'#7a5c0c');mat.addColorStop(.5,'#6a4e08');mat.addColorStop(1,'#4a3605')
  ctx.fillStyle=mat;ctx.fillRect(0,FLOOR-10,W,38)
  // Grid lines on mat
  ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=.7
  for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,FLOOR-10);ctx.lineTo(x,FLOOR+28);ctx.stroke()}
  // Center dashed line
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.setLineDash([6,5])
  ctx.beginPath();ctx.moveTo(W/2,FLOOR-10);ctx.lineTo(W/2,FLOOR+28);ctx.stroke()
  ctx.setLineDash([])
  // Floor shadow
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,FLOOR+28,W,H-FLOOR-28)
}

/*
 * Draw a fighter in TRUE SIDE PROFILE, facing a direction.
 * cx      — horizontal center of fighter
 * dir     — +1 = faces RIGHT (player), -1 = faces LEFT (AI)
 * anim    — current animation state object
 * gi      — 'black' or 'white'
 * oppX    — opponent's center X (for contact limb drawing)
 * jumpY   — vertical offset when jumping (negative = up)
 */
function drawFighter(cx, dir, anim, gi, oppX, jumpY){
  // Special: knocked down by sweep
  if(anim.type==='down'){ drawFighterDown(cx,dir,anim,gi); return }

  const jy=jumpY||0
  const fY=FLOOR+jy        // feet Y
  const kneeY=fY-38        // knees
  const hipY=fY-55         // hip
  const torsoBot=hipY      // bottom of torso
  const torsoTop=hipY-46   // top of torso / shoulders
  const neckY=torsoTop-4
  const headY=neckY-17     // head center

  const giColor = gi==='black'?GI_BLACK:GI_WHITE
  const giEdge  = gi==='black'?'#2a2a2a':'#ccc'
  const beltCol = gi==='black'?'#fff':'#111'
  const isHit   = anim.type==='hit'
  const isBlk   = anim.type==='block'
  const t       = anim.t/Math.max(1,anim.maxT)  // 0→1 progress

  ctx.save()
  if(isHit) ctx.globalAlpha=.5

  // Shadow
  ctx.save();ctx.globalAlpha*=.22;ctx.fillStyle='#000'
  ctx.beginPath();ctx.ellipse(cx,FLOOR+5,24,5,0,0,Math.PI*2);ctx.fill();ctx.restore()

  // ── BACK LEG (away from opponent) ──
  const backLegX = cx - dir*10
  ctx.strokeStyle=giColor;ctx.lineWidth=9;ctx.lineCap='round'
  ctx.beginPath();ctx.moveTo(cx-dir*5,hipY);ctx.lineTo(backLegX,kneeY);ctx.lineTo(backLegX-dir*8,fY);ctx.stroke()
  // Back foot
  ctx.fillStyle='#1a1a1a'
  ctx.beginPath();ctx.roundRect(backLegX-dir*8-(dir>0?14:0),fY-5,14,7,3);ctx.fill()

  // ── FRONT LEG — animated on kick/sweep/jump ──
  const isKicking = (anim.type==='kick'||anim.type==='sweep'||anim.type==='jump')
  if(isKicking){
    // Leg extends toward opponent
    const kickProgress = t<.5 ? t*2 : 2-t*2  // 0→1→0 swing
    // Foot travels from normal position to near opponent body
    const targetX = oppX - dir*20
    const footX   = cx + dir*15 + (targetX - cx - dir*15)*kickProgress
    const targetY = anim.type==='jump'   ? headY+15 :  // kick to head height
                    anim.type==='sweep'  ? fY-8 :       // low sweep
                                           hipY+5       // body kick
    const footY   = (fY-10) + (targetY - (fY-10))*kickProgress

    // Thigh from hip
    const kneeKickX = cx + dir*20 + (targetX - cx)*kickProgress*.5
    const kneeKickY = (hipY+20) + (targetY-10 - (hipY+20))*kickProgress*.6
    ctx.strokeStyle=giColor;ctx.lineWidth=10
    ctx.beginPath();ctx.moveTo(cx,hipY);ctx.lineTo(kneeKickX,kneeKickY);ctx.stroke()
    // Shin + foot pad
    ctx.strokeStyle=RED;ctx.lineWidth=12
    ctx.beginPath();ctx.moveTo(kneeKickX,kneeKickY);ctx.lineTo(footX,footY);ctx.stroke()
    ctx.fillStyle=RED
    ctx.beginPath();ctx.ellipse(footX,footY,13,9,Math.atan2(footY-kneeKickY,footX-kneeKickX),0,Math.PI*2);ctx.fill()
    ctx.fillStyle='rgba(255,255,255,.22)'
    ctx.beginPath();ctx.ellipse(footX-dir*4,footY-4,5,3,0,0,Math.PI*2);ctx.fill()

    // Trigger impact when kick is at full extension
    if(kickProgress>.85 && anim.impactSent!==true){
      anim.impactSent=true
      // impact triggered separately by game logic
    }
  } else {
    // Normal front leg in stance
    const frontLegX = cx + dir*12
    ctx.strokeStyle=giColor;ctx.lineWidth=9
    ctx.beginPath();ctx.moveTo(cx+dir*5,hipY);ctx.lineTo(frontLegX,kneeY);ctx.lineTo(frontLegX+dir*8,fY);ctx.stroke()
    ctx.fillStyle='#1a1a1a'
    ctx.beginPath();ctx.roundRect(frontLegX+dir*8-(dir>0?0:14),fY-5,14,7,3);ctx.fill()
  }

  // ── BODY (GI) ── slightly angled profile rectangle
  ctx.fillStyle=giColor;ctx.strokeStyle=giEdge;ctx.lineWidth=1.5
  // Profile body: narrower in front, angled for fighting stance
  ctx.beginPath()
  ctx.moveTo(cx-dir*14, torsoTop)
  ctx.lineTo(cx+dir*10, torsoTop+6)  // shoulder line angled
  ctx.lineTo(cx+dir*12, torsoBot)
  ctx.lineTo(cx-dir*12, torsoBot)
  ctx.closePath();ctx.fill();ctx.stroke()

  // Gi lapel (facing direction)
  ctx.strokeStyle=gi==='black'?'#333':'#bbb';ctx.lineWidth=1.5
  ctx.beginPath();ctx.moveTo(cx+dir*2,torsoTop+6);ctx.lineTo(cx+dir*6,torsoTop+22);ctx.stroke()
  ctx.beginPath();ctx.moveTo(cx+dir*2,torsoTop+6);ctx.lineTo(cx-dir*2,torsoTop+22);ctx.stroke()

  // UNION logo on black gi
  if(gi==='black'){
    if(logoOk){
      ctx.save()
      if(dir<0){ctx.translate(cx*2,0);ctx.scale(-1,1)}
      ctx.drawImage(logoImg,cx-11,torsoTop+24,22,13)
      ctx.restore()
    } else {
      ctx.fillStyle='#0047AB';ctx.beginPath();ctx.roundRect(cx-8,torsoTop+24,16,10,2);ctx.fill()
      ctx.fillStyle='#fff';ctx.font='bold 5px Inter,sans-serif';ctx.textAlign='center'
      ctx.fillText('UNION',cx,torsoTop+32)
    }
  }

  // Belt
  ctx.fillStyle=beltCol;ctx.fillRect(cx-dir*12,hipY-8,dir>0?24:-24,6)
  // Belt knot at front
  ctx.beginPath();ctx.roundRect(cx+dir*2,hipY-10,dir>0?8:-8,9,2);ctx.fill()

  // ── BACK ARM (away from opponent — guard) ──
  const backShoulderX = cx - dir*10
  const backElbowX    = cx - dir*15
  const backFistX     = cx - dir*8
  const backFistY     = torsoTop+20
  ctx.strokeStyle=giColor;ctx.lineWidth=8
  ctx.beginPath();ctx.moveTo(backShoulderX,torsoTop+8);ctx.lineTo(backElbowX,backFistY-10);ctx.lineTo(backFistX,backFistY);ctx.stroke()
  ctx.fillStyle=RED;ctx.beginPath();ctx.ellipse(backFistX,backFistY,9,8,0,0,Math.PI*2);ctx.fill()

  // ── FRONT ARM — animated on punch ──
  const frontShoulderX = cx + dir*8
  if(anim.type==='punch'||anim.type==='contra'){
    const punchProg = t<.5 ? t*2 : 2-t*2
    // Fist travels from shoulder all the way to opponent body
    const targetFistX = oppX - dir*18
    const targetFistY = torsoTop+22
    const fistX = frontShoulderX + (targetFistX-frontShoulderX)*punchProg
    const fistY = (torsoTop+14) + (targetFistY-(torsoTop+14))*punchProg
    // Arm line shoulder→fist
    ctx.strokeStyle=giColor;ctx.lineWidth=8
    ctx.beginPath();ctx.moveTo(frontShoulderX,torsoTop+10);ctx.lineTo(fistX,fistY);ctx.stroke()
    // Glove
    ctx.fillStyle=RED
    ctx.beginPath();ctx.ellipse(fistX,fistY,12,10,0,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='rgba(255,255,255,.2)'
    ctx.beginPath();ctx.ellipse(fistX-dir*4,fistY-4,4,3,0,0,Math.PI*2);ctx.fill()
  } else if(isBlk){
    // Both arms raised in guard
    ctx.strokeStyle=giColor;ctx.lineWidth=8
    ctx.beginPath();ctx.moveTo(frontShoulderX,torsoTop+8);ctx.lineTo(cx+dir*22,headY+10);ctx.stroke()
    ctx.fillStyle=RED;ctx.beginPath();ctx.ellipse(cx+dir*24,headY+8,10,9,0,0,Math.PI*2);ctx.fill()
  } else {
    // Normal guard
    const fistX=cx+dir*24,fistY=torsoTop+12
    ctx.strokeStyle=giColor;ctx.lineWidth=8
    ctx.beginPath();ctx.moveTo(frontShoulderX,torsoTop+8);ctx.lineTo(fistX,fistY);ctx.stroke()
    ctx.fillStyle=RED;ctx.beginPath();ctx.ellipse(fistX,fistY,11,9,0,0,Math.PI*2);ctx.fill()
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.ellipse(fistX-dir*3,fistY-3,4,3,0,0,Math.PI*2);ctx.fill()
  }

  // ── NECK ──
  ctx.fillStyle=SKIN;ctx.fillRect(cx+dir*2,neckY,dir>0?6:-6,10)

  // ── HEAD base (no eyes yet — they go AFTER helmet) ──
  ctx.fillStyle=SKIN
  ctx.beginPath();ctx.ellipse(cx+dir*4,headY,13,15,0,0,Math.PI*2);ctx.fill()

  // ── HELMET shell (Top Ten) — drawn over head ──
  ctx.fillStyle=RED
  ctx.beginPath();ctx.ellipse(cx+dir*3,headY-3,19,21,0,0,Math.PI*2);ctx.fill()
  // Side ear guards
  ctx.beginPath();ctx.ellipse(cx-dir*6,headY,5,10,0,0,Math.PI*2);ctx.fill()

  // ── FACE OPENING — wide cutout toward opponent ──
  const faceAngle = dir>0 ? 0 : Math.PI
  // Dark panel behind face
  ctx.fillStyle=gi==='black'?'#0e0e10':'rgba(230,230,220,.95)'
  ctx.beginPath()
  ctx.ellipse(cx+dir*4,headY,12,14,0,faceAngle-1.25,faceAngle+1.25)
  ctx.closePath();ctx.fill()
  // Skin visible through opening
  ctx.fillStyle=SKIN
  ctx.beginPath()
  ctx.ellipse(cx+dir*4,headY,10,12,0,faceAngle-1.1,faceAngle+1.1)
  ctx.closePath();ctx.fill()

  // ── FACE FEATURES drawn LAST so visible through opening ──
  if(isHit){
    ctx.font='12px sans-serif';ctx.textAlign='center'
    ctx.fillText('😵',cx+dir*7,headY+5)
  } else {
    // Eye — large and clear
    ctx.fillStyle='#1a1a1a'
    ctx.beginPath();ctx.ellipse(cx+dir*9,headY-1,3,3.5,0,0,Math.PI*2);ctx.fill()
    // White of eye
    ctx.fillStyle='rgba(255,255,255,.7)'
    ctx.beginPath();ctx.ellipse(cx+dir*10,headY-2,1.4,1.4,0,0,Math.PI*2);ctx.fill()
    // Eyebrow
    ctx.strokeStyle='#5a3a1a';ctx.lineWidth=1.8
    ctx.beginPath();ctx.moveTo(cx+dir*5,headY-8);ctx.lineTo(cx+dir*13,headY-6);ctx.stroke()
    // Nose tip
    ctx.strokeStyle='#b07050';ctx.lineWidth=1.2
    ctx.beginPath();ctx.moveTo(cx+dir*13,headY+3);ctx.lineTo(cx+dir*15,headY+8);ctx.lineTo(cx+dir*11,headY+10);ctx.stroke()
    // Mouth line
    ctx.strokeStyle='#c07858';ctx.lineWidth=1.2
    ctx.beginPath();ctx.arc(cx+dir*8,headY+12,3,-.4,.4);ctx.stroke()
  }

  // ── HELMET finishing touches ──
  // Top shine
  ctx.fillStyle='rgba(255,255,255,.18)'
  ctx.beginPath();ctx.ellipse(cx-dir*1,headY-14,7,4,dir*.2,0,Math.PI*2);ctx.fill()
  // Helmet band / stripe
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=2
  ctx.beginPath();ctx.arc(cx+dir*3,headY-3,17,Math.PI*.25,Math.PI*.75);ctx.stroke()
  // Chin guard (below helmet, covers jaw)
  ctx.fillStyle=RED
  ctx.beginPath();ctx.roundRect(cx+dir*3-13,headY+11,26,10,5);ctx.fill()
  // Chin strap hint
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5
  ctx.beginPath();ctx.moveTo(cx+dir*3-13,headY+16);ctx.lineTo(cx+dir*3+13,headY+16);ctx.stroke()

  ctx.restore();ctx.globalAlpha=1
}

function drawImpact(){
  if(!impactAnim.active) return
  const prog=impactAnim.t/14
  if(prog>=1){impactAnim.active=false;return}
  const a=1-prog
  ctx.save();ctx.globalAlpha=a
  const r1=8+14*prog, r2=18+20*prog, spk=9
  ctx.fillStyle='#fff';ctx.strokeStyle=impactAnim.color;ctx.lineWidth=2
  ctx.beginPath()
  for(let i=0;i<spk*2;i++){
    const ang=i*Math.PI/spk+(prog*.5),r=i%2===0?r2:r1
    if(i===0) ctx.moveTo(impactAnim.x+Math.cos(ang)*r,impactAnim.y+Math.sin(ang)*r)
    else ctx.lineTo(impactAnim.x+Math.cos(ang)*r,impactAnim.y+Math.sin(ang)*r)
  }
  ctx.closePath();ctx.fill();ctx.stroke()
  if(impactAnim.pts){
    ctx.font=`900 ${Math.round(14*(1-prog*.3))}px Inter,sans-serif`
    ctx.fillStyle=impactAnim.color;ctx.textAlign='center'
    ctx.strokeStyle='rgba(0,0,0,.7)';ctx.lineWidth=3
    const txt='+'+impactAnim.pts+(impactAnim.pts>1?' pts':'pt')
    ctx.strokeText(txt,impactAnim.x,impactAnim.y-r2-4)
    ctx.fillText(txt,impactAnim.x,impactAnim.y-r2-4)
  }
  ctx.restore()
  impactAnim.t++
}

function triggerImpact(x,y,color,pts){
  impactAnim={active:true,x,y,t:0,color:color||'#FFD700',pts:pts||0}
}

function draw(){
  ctx.clearRect(0,0,W,H)
  drawTatami()

  // Advance animations — when 'down' finishes, show get-up then idle
  if(pAnim.t<pAnim.maxT){ pAnim.t++ }
  else if(pAnim.type==='down'){ pAnim.type='idle'; enableButtons(true) }
  else if(pAnim.type!=='idle'&&pAnim.type!=='hit'&&pAnim.type!=='block'){ pAnim.type='idle' }

  if(aAnim.t<aAnim.maxT){ aAnim.t++ }
  else if(aAnim.type==='down'){ aAnim.type='idle' }
  else if(aAnim.type!=='idle'&&aAnim.type!=='hit'&&aAnim.type!=='block'){ aAnim.type='idle' }

  const pJumpY = pAnim.type==='jump' ? -35*Math.sin(Math.PI*pAnim.t/pAnim.maxT) : 0
  const aJumpY = aAnim.type==='jump' ? -35*Math.sin(Math.PI*aAnim.t/aAnim.maxT) : 0

  drawFighter(PX, +1, pAnim, 'black', AX, pJumpY)
  drawFighter(AX, -1, aAnim, 'white', PX, aJumpY)
  drawImpact()
}

let animId
function loop(){draw();animId=requestAnimationFrame(loop)}

// ── GAME LOGIC ────────────────────────────────────────────────────────────────

function setLog(h){document.getElementById('log').innerHTML=`<span class="round-badge">Round ${round}</span>${h}`}

function playAnim(who, type, frames){
  const a = who==='p'?pAnim:aAnim
  a.type=type;a.t=0;a.maxT=frames;a.impactSent=false
}

function updateStamina(){
  const pp=Math.max(0,pStamina/maxStamina)*100
  document.getElementById('p-stamina').style.width=pp+'%'
  document.getElementById('p-stamina').style.background=pStamina>=3?'#4ade80':pStamina>=2?'#facc15':'#f87171'
  Object.entries(MOVES).forEach(([k,m])=>{
    const b=document.getElementById('btn-'+k);if(b) b.classList.toggle('disabled',pStamina<m.stamina)
  })
}
function regenStamina(){
  if(gameOver) return
  if(pStamina<maxStamina){pStamina=Math.min(maxStamina,pStamina+1);updateStamina()}
  if(aStamina<maxStamina) aStamina=Math.min(maxStamina,aStamina+1)
}

function checkCombo(){
  if(consecutiveHits>=2&&!comboReady){
    comboReady=true
    document.getElementById('btn-combo').style.display='flex'
    clearTimeout(comboTimer)
    comboTimer=setTimeout(()=>{comboReady=false;document.getElementById('btn-combo').style.display='none'},4000)
  }
}

function enableButtons(on){
  document.querySelectorAll('.move-btn,.btn-def').forEach(b=>{
    b.style.opacity = on?'':'.32'
    b.style.pointerEvents = on?'':'none'
  })
}

function fireBtn(key){
  const b=document.getElementById('btn-'+key);if(!b) return
  b.classList.add('firing')
  setTimeout(()=>b.classList.remove('firing'),500)
}

function playerMove(key){
  if(gameOver) return
  const m=MOVES[key];if(!m) return
  if(pStamina<m.stamina){setLog(`<span class="warn">⚡ Sin energía para ${m.name}. ¡Espera!</span>`);return}
  fireBtn(key)
  pStamina-=m.stamina;updateStamina()

  // Play attack animation on player
  const animType = m.type==='punch'||m.type==='contra'?'punch':m.type==='jump'?'jump':'kick'
  playAnim('p', animType, 30)

  const aiBlockRate=aiLevel===1?.18:aiLevel===2?.28:.38
  const aiBlocking=Math.random()<aiBlockRate&&key!=='contra'

  setTimeout(()=>{
    if(aiBlocking){
      playAnim('a','block',18)
      consecutiveHits=0
      setLog(`🛡️ Rival bloqueó tu ${m.name}. <span class="warn">¡Cambia técnica!</span>`)
    } else {
      const fatigue=pStamina<2?.8:1
      const combo=key==='contra'?1.3:1
      if(Math.random()<m.hit*fatigue*combo){
        const pts=key==='contra'?m.pts*2:m.pts
        pScore+=pts;document.getElementById('p-score').textContent=pScore
        const iy=m.height==='head'?FLOOR-130:m.height==='low'?FLOOR-15:FLOOR-80
        triggerImpact(AX-18, iy, '#FFD700', pts)
        if(key==='barrida'){
          playAnim('a','down',85)   // rival cae al piso ~1.4s
        } else {
          playAnim('a','hit',22)
        }
        consecutiveHits++;checkCombo()
        if(comboReady&&key!=='contra'){comboReady=false;document.getElementById('btn-combo').style.display='none'}
        setLog(`<span class="good">+${pts} ${pts===1?'punto':'puntos'}</span> — ${m.name} conectó!${consecutiveHits>=2?' 🔥 ¡COMBO!':''}`)
        checkWin()
      } else {
        consecutiveHits=0
        setLog(`Tu ${m.name} no llegó. <span class="warn">El rival se esquivó.</span>`)
      }
    }
    if(key==='contra') document.getElementById('btn-contra').style.display='none'
  },280)
}

function activarCombo(){
  if(gameOver||!comboReady) return
  comboReady=false;document.getElementById('btn-combo').style.display='none';clearTimeout(comboTimer)
  playerMove('contra')
}

function activarDefensa(){
  if(gameOver) return
  if(pStamina<2){setLog(`<span class="warn">⚡ Sin energía para defender.</span>`);return}
  pStamina-=2;updateStamina()
  defending=true;document.getElementById('btn-def').classList.add('active')
  playAnim('p','block',20)
  setLog(`🛡️ Defensa activa — bloquearás el próximo ataque y podrás contraatacar.`)
  clearTimeout(defTimer)
  defTimer=setTimeout(()=>{defending=false;document.getElementById('btn-def').classList.remove('active')},2300)
}

function aiAttack(){
  if(gameOver) return
  if(aAnim.type==='down') return   // no ataca mientras está en el piso
  const keys=aiLevel===1?AI_EASY:aiLevel===2?AI_MED:AI_HARD
  const key=keys[Math.floor(Math.random()*keys.length)]
  const m=MOVES[key]
  const animType=m.type==='punch'?'punch':m.type==='jump'?'jump':'kick'
  playAnim('a', animType, 28)

  // AI double attack on higher levels
  if(aiLevel>=2&&Math.random()<.28){
    setTimeout(()=>{
      if(!gameOver){
        const k2=keys[Math.floor(Math.random()*keys.length)]
        playAnim('a', MOVES[k2].type==='punch'?'punch':'kick', 26)
      }
    },680)
  }

  setTimeout(()=>{
    if(defending){
      defending=false;clearTimeout(defTimer);document.getElementById('btn-def').classList.remove('active')
      playAnim('p','block',16)
      triggerImpact(PX+18, FLOOR-80, '#60a5fa', 0)
      document.getElementById('btn-contra').style.display='flex'
      setTimeout(()=>{document.getElementById('btn-contra').style.display='none'},2500)
      setLog(`<span class="good">🛡️ ¡Bloqueaste el ${m.name}! Puedes contraatacar ahora.</span>`)
    } else {
      const aiHit=aiLevel===1?.45:aiLevel===2?.60:.72
      if(Math.random()<aiHit){
        aScore++;document.getElementById('a-score').textContent=aScore
        const iy=m.height==='head'?FLOOR-130:FLOOR-80
        triggerImpact(PX+18, iy, '#f87171', 1)
        if(key==='barrida'){
          playAnim('p','down',85)   // jugador cae al piso
          enableButtons(false)      // deshabilita controles mientras está caído
          setLog(`<span class="warn">⚠️ ¡Rival te tiró con barrida! DERRIBO 😵 Espera a levantarte.</span>`)
        } else {
          playAnim('p','hit',22)
          setLog(`<span class="warn">⚠️ Rival anotó con ${m.name}.</span> <span>¡Ataca o defiéndete!</span>`)
        }
        checkWin()
      } else {
        setLog(`Rival intentó ${m.name} pero falló. <span class="good">¡Tu oportunidad!</span>`)
      }
    }
  },300)
}

function checkWin(){
  if(pScore>=metaPoints) endRound(true)
  else if(aScore>=metaPoints) endRound(false)
}

function endRound(pWon){
  if(!pWon||round>=3){endGame(pWon);return}
  round++;aiLevel=Math.min(3,round);metaPoints=7+(round-1)*2
  pScore=0;aScore=0;pStamina=maxStamina;aStamina=maxStamina
  document.getElementById('p-score').textContent='0'
  document.getElementById('a-score').textContent='0'
  document.getElementById('round-lbl').textContent='Round '+round
  document.getElementById('meta-pts').textContent=metaPoints
  document.getElementById('ai-lvl-lbl').textContent='Nivel '+aiLevel
  updateStamina();clearInterval(aiTimer)
  const d=aiLevel===1?2800:aiLevel===2?2200:1700
  const sp=aiLevel===1?1400:aiLevel===2?900:600
  aiTimer=setInterval(()=>{if(!gameOver)aiAttack()},d+Math.random()*sp)
  setLog(`<span class="good">¡Ganaste el Round ${round-1}! Rival Nivel ${aiLevel}. Meta: ${metaPoints} pts</span>`)
}

function endGame(won){
  gameOver=true;clearInterval(aiTimer);clearInterval(regenTimer)
  const v=VALORES[Math.floor(Math.random()*VALORES.length)]
  document.getElementById('r-icon').textContent=won?'🏆':'💪'
  document.getElementById('r-title').textContent=won?`¡Campeón! (${round} round${round>1?'s':''})`:'Sigue entrenando'
  document.getElementById('r-valor').textContent=(won?'Valor desbloqueado: ':'Recuerda: ')+v.n
  document.getElementById('r-frase').textContent=v.f
  document.getElementById('r-reto').innerHTML=`<b>🎯 Reto del día:</b><br>${v.r}`
  document.getElementById('result').style.display='flex'
}

function resetGame(){
  cancelAnimationFrame(animId);clearInterval(aiTimer);clearInterval(regenTimer)
  pScore=0;aScore=0;pStamina=5;aStamina=5;round=1;aiLevel=1;metaPoints=7
  gameOver=false;defending=false;comboReady=false;consecutiveHits=0
  pAnim={type:'idle',t:0,maxT:0};aAnim={type:'idle',t:0,maxT:0}
  impactAnim.active=false
  document.getElementById('p-score').textContent='0'
  document.getElementById('a-score').textContent='0'
  document.getElementById('round-lbl').textContent='Round 1'
  document.getElementById('meta-pts').textContent='7'
  document.getElementById('ai-lvl-lbl').textContent='Nivel 1'
  document.getElementById('result').style.display='none'
  document.getElementById('btn-def').classList.remove('active')
  document.getElementById('btn-contra').style.display='none'
  document.getElementById('btn-combo').style.display='none'
  updateStamina()
  regenTimer=setInterval(regenStamina,2500)
  aiTimer=setInterval(()=>{if(!gameOver)aiAttack()},2800+Math.random()*1400)
  setLog(`<span>¡Presiona un movimiento para atacar! Meta: 7 puntos</span>`)
  loop()
}

resetGame()
</script>
