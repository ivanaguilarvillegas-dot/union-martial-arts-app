<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reto del Tatami</title><link rel="stylesheet" href="css/uma.css"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a1a;overflow:hidden;}
.screen{background:#0a0a1a!important;}
.score-bar{background:#0047AB;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.score-side{text-align:center;}
.score-name{font-size:10px;font-weight:700;color:rgba(255,255,255,.65);letter-spacing:.06em;text-transform:uppercase;}
.score-num{font-size:30px;font-weight:900;color:#fff;line-height:1;}
.score-goal{font-size:10px;color:rgba(255,255,255,.5);}
canvas{display:block;width:100%;}
.log-area{background:#111;padding:7px 14px;font-size:12px;font-weight:600;color:#94a3b8;min-height:32px;border-bottom:1px solid #1e293b;flex-shrink:0;}
.log-area span{color:#60a5fa;}
.btns-wrap{padding:10px 12px 14px;background:#0a0a1a;flex:1;}
.btns-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:7px;}
.move-btn{padding:9px 4px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);font-size:11px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:#e2e8f0;transition:background .1s,transform .1s;}
.move-btn:active{background:rgba(255,255,255,.15);transform:scale(.93);}
.move-btn .ico{font-size:18px;line-height:1;}
.move-btn .pts{font-size:9px;color:#60a5fa;font-weight:700;}
.btn-def{grid-column:span 3;background:rgba(0,71,171,.2);border-color:#0047AB;color:#93c5fd;}
.btn-def.active{background:#0047AB;color:#fff;}
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.result-card{background:#fff;border-radius:24px;padding:26px 22px;text-align:center;max-width:320px;width:100%;}
</style>
</head>
<body>
<div class="phone"><div class="screen" style="display:flex;flex-direction:column;">
  <div class="navhead dark">
    <a class="navback" href="juegos.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="sub" style="opacity:.6;">Point Fighting</div><div class="title">Reto del Tatami</div></div>
    <button onclick="resetGame()" style="background:rgba(255,255,255,.12);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;">↺ Reiniciar</button>
  </div>

  <div class="score-bar">
    <div class="score-side">
      <div class="score-name">🥋 Tú</div>
      <div class="score-num" id="p-score">0</div>
      <div class="score-goal">meta: 7</div>
    </div>
    <div style="color:rgba(255,255,255,.3);font-size:11px;font-weight:800;">VS</div>
    <div class="score-side">
      <div class="score-num" id="a-score">0</div>
      <div class="score-name">Rival 🥋</div>
      <div class="score-goal">meta: 7</div>
    </div>
  </div>

  <canvas id="c" width="390" height="210"></canvas>

  <div class="log-area" id="log">Presiona un botón para atacar. <span>¡Primero en 7 puntos gana!</span></div>

  <div class="btns-wrap">
    <div class="btns-grid">
      <button class="move-btn" onclick="playerMove('golpe')"><span class="ico">👊</span>Golpe<span class="pts">+1</span></button>
      <button class="move-btn" onclick="playerMove('patada')"><span class="ico">🦵</span>Patada<span class="pts">+1</span></button>
      <button class="move-btn" onclick="playerMove('barrida')"><span class="ico">💨</span>Barrida<span class="pts">+1</span></button>
      <button class="move-btn" onclick="playerMove('cabeza')"><span class="ico">🎯</span>P.Cabeza<span class="pts">+2</span></button>
      <button class="move-btn" onclick="playerMove('salto')"><span class="ico">🚀</span>P.Salto<span class="pts">+3</span></button>
      <button class="move-btn btn-def" id="btn-def" onclick="activarDefensa()"><span class="ico">🛡️</span>Defensa</button>
    </div>
  </div>

  <div class="result-overlay" id="result" style="display:none;">
    <div class="result-card">
      <div style="font-size:52px;margin-bottom:10px;" id="r-icon">🏆</div>
      <div style="font-size:21px;font-weight:900;color:#111;margin-bottom:6px;" id="r-title"></div>
      <div style="font-size:11px;font-weight:800;color:#0047AB;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;" id="r-valor"></div>
      <div style="font-size:13px;color:#6b7280;line-height:1.6;margin-bottom:8px;font-style:italic;" id="r-frase"></div>
      <div style="background:#f0f9ff;border-radius:10px;padding:10px;font-size:12px;color:#0369a1;font-weight:600;line-height:1.5;margin-bottom:18px;" id="r-reto" style="display:none;"></div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn primary block" onclick="resetGame()">🔄 Jugar de nuevo</button>
        <button class="btn secondary block" onclick="location.href='juegos.html'">← Volver a juegos</button>
      </div>
    </div>
  </div>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
lucide.createIcons()

const VALORES = [
  {n:'Disciplina',  i:'🥋', f:'"Cada punto se construye con constancia, técnica y control."', r:'Completa tu rutina aunque hoy no tengas ganas.'},
  {n:'Control',     i:'🧘', f:'"La fuerza más importante es saber controlarte."',              r:'Respira antes de reaccionar con enojo.'},
  {n:'Esfuerzo',    i:'💪', f:'"Cada intento te acerca a tu mejor versión."',                   r:'Termina una tarea aunque te cueste trabajo.'},
  {n:'Constancia',  i:'🔥', f:'"Cada intento cuenta."',                                          r:'Practica algo difícil una vez más, aunque no te salga.'},
  {n:'Enfoque',     i:'🎯', f:'"Cuando tu mente está presente, tu técnica mejora."',             r:'Realiza una actividad sin distraerte hasta terminarla.'},
  {n:'Humildad',    i:'🌱', f:'"Siempre hay algo nuevo que aprender."',                          r:'Acepta una corrección sin enojarte.'},
]

const MOVES = {
  golpe:  {pts:1,name:'Golpe',    hit:.72,type:'punch', height:'body'},
  patada: {pts:1,name:'Patada',   hit:.65,type:'kick',  height:'body'},
  barrida:{pts:1,name:'Barrida',  hit:.60,type:'sweep', height:'low'},
  cabeza: {pts:2,name:'P.Cabeza', hit:.45,type:'kick',  height:'head'},
  salto:  {pts:3,name:'P.Salto',  hit:.35,type:'jump',  height:'head'},
}
const AI_KEYS = ['golpe','patada','barrida','cabeza']

const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const W = 390, H = 210, FLOOR = 190

// Fighter state
let P = {x:95,  score:0, state:'idle', jumpY:0, hitTimer:0}
let A = {x:295, score:0, state:'idle', jumpY:0, hitTimer:0}
let impactX=-1, impactY=-1, impactTimer=0
let pScore=0, aScore=0, defending=false, defTimer=null, gameOver=false, aiTimer=null

// ── DRAWING ──────────────────────────────────────────────────────────────────

const RED='#d42020', WHITE='#f5f5f5', BLACK='#111', SKIN='#f5c99b', SKIN2='#e8b47a'
const UNION_BLUE='#0047AB'

function drawFighter(cx, isPlayer, st, jy) {
  const flip = !isPlayer
  ctx.save()
  if(flip){ ctx.translate(cx*2,0); ctx.scale(-1,1) }

  const gy = jy // jump Y offset (negative = up)
  const floorY = FLOOR + gy
  const hipY   = floorY - 48
  const torsoY = hipY - 46
  const shouldY= torsoY
  const headCY = torsoY - 22
  const gi     = isPlayer ? BLACK : WHITE
  const giEdge = isPlayer ? '#333' : '#ccc'
  const belt   = isPlayer ? WHITE : BLACK
  const hit    = P.hitTimer > 0 && !isPlayer || A.hitTimer > 0 && isPlayer

  if(hit){ ctx.globalAlpha=.55 }

  // Shadow
  ctx.save(); ctx.globalAlpha*=.25
  ctx.fillStyle='#000'
  ctx.beginPath(); ctx.ellipse(cx, FLOOR+4, 22, 5, 0, 0, Math.PI*2); ctx.fill()
  ctx.restore()

  // ── LEGS ──
  ctx.strokeStyle = gi==='#111' ? '#1a1a1a' : '#ddd'
  ctx.lineWidth = 9; ctx.lineCap = 'round'
  if(st==='kick'||st==='sweep'||st==='jump'){
    // Kicking leg extends forward
    ctx.beginPath(); ctx.moveTo(cx-6,hipY); ctx.lineTo(cx-12,floorY); ctx.stroke()
    ctx.strokeStyle = RED // kick pad
    ctx.lineWidth = 11
    ctx.beginPath(); ctx.moveTo(cx+4,hipY-6); ctx.lineTo(cx+38,hipY-8); ctx.stroke()
    // Kick foot/pad
    ctx.fillStyle=RED
    ctx.beginPath(); ctx.ellipse(cx+44,hipY-8,10,8,-.2,0,Math.PI*2); ctx.fill()
  } else {
    ctx.beginPath(); ctx.moveTo(cx-8,hipY); ctx.lineTo(cx-14,floorY); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(cx+4,hipY); ctx.lineTo(cx+8,floorY); ctx.stroke()
    // Feet/shoes
    ctx.fillStyle='#222'; ctx.fillRect(cx-18,floorY-4,14,8)
    ctx.fillRect(cx+4,floorY-4,14,8)
  }

  // ── BODY (GI) ──
  ctx.fillStyle = gi
  ctx.strokeStyle = giEdge; ctx.lineWidth=1.5
  ctx.beginPath(); ctx.roundRect(cx-16, torsoY-2, 32, 48, 4); ctx.fill(); ctx.stroke()

  // Gi lapels (v-neck detail)
  ctx.strokeStyle = giEdge==='#ddd'?'#bbb':'#444'; ctx.lineWidth=1.5
  ctx.beginPath(); ctx.moveTo(cx,torsoY+2); ctx.lineTo(cx-6,torsoY+18); ctx.stroke()
  ctx.beginPath(); ctx.moveTo(cx,torsoY+2); ctx.lineTo(cx+6,torsoY+18); ctx.stroke()

  // UNION logo on black gi
  if(isPlayer){
    ctx.fillStyle=UNION_BLUE
    ctx.beginPath(); ctx.roundRect(cx-8,torsoY+20,16,10,3); ctx.fill()
    ctx.fillStyle='#fff'; ctx.font='bold 6px Inter,sans-serif'; ctx.textAlign='center'
    ctx.fillText('UNION',cx,torsoY+28)
  }

  // Belt
  ctx.fillStyle=belt; ctx.fillRect(cx-16,hipY-8,32,7)
  // Belt knot
  ctx.beginPath(); ctx.roundRect(cx-5,hipY-10,10,10,3); ctx.fill()

  // ── ARMS & GLOVES ──
  const gloveR = 10
  if(st==='punch'){
    // Right arm punching forward
    ctx.strokeStyle=gi; ctx.lineWidth=8; ctx.lineCap='round'
    ctx.beginPath(); ctx.moveTo(cx+14,shouldY+12); ctx.lineTo(cx+44,shouldY+18); ctx.stroke()
    // Glove at end
    ctx.fillStyle=RED
    ctx.beginPath(); ctx.ellipse(cx+50,shouldY+18,12,10,0,0,Math.PI*2); ctx.fill()
    ctx.fillStyle='rgba(255,255,255,.25)'
    ctx.beginPath(); ctx.ellipse(cx+46,shouldY+14,5,4,-.3,0,Math.PI*2); ctx.fill()
    // Left arm (guard)
    ctx.strokeStyle=gi; ctx.lineWidth=8
    ctx.beginPath(); ctx.moveTo(cx-14,shouldY+12); ctx.lineTo(cx-4,shouldY+5); ctx.stroke()
    ctx.fillStyle=RED
    ctx.beginPath(); ctx.ellipse(cx-2,shouldY+4,10,9,0,0,Math.PI*2); ctx.fill()
  } else {
    // Both arms in guard
    ctx.strokeStyle=gi; ctx.lineWidth=8; ctx.lineCap='round'
    ctx.beginPath(); ctx.moveTo(cx+14,shouldY+10); ctx.lineTo(cx+22,shouldY+28); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(cx-14,shouldY+10); ctx.lineTo(cx-22,shouldY+28); ctx.stroke()
    // Gloves
    ctx.fillStyle=RED
    ctx.beginPath(); ctx.ellipse(cx+24,shouldY+30,10,9,0,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.ellipse(cx-24,shouldY+30,10,9,0,0,Math.PI*2); ctx.fill()
    // Glove shine
    ctx.fillStyle='rgba(255,255,255,.2)'
    ctx.beginPath(); ctx.ellipse(cx+21,shouldY+27,4,3,-.3,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.ellipse(cx-27,shouldY+27,4,3,-.3,0,Math.PI*2); ctx.fill()
  }

  // ── NECK ──
  ctx.fillStyle=SKIN; ctx.fillRect(cx-5,headCY+12,10,12)

  // ── HEAD ──
  ctx.fillStyle=SKIN2
  ctx.beginPath(); ctx.ellipse(cx,headCY,15,16,0,0,Math.PI*2); ctx.fill()
  ctx.fillStyle=SKIN
  ctx.beginPath(); ctx.ellipse(cx,headCY-2,14,14,0,0,Math.PI*2); ctx.fill()

  // Eyes / face
  if(hit){
    ctx.fillStyle='#333'; ctx.font='14px sans-serif'; ctx.textAlign='center'
    ctx.fillText('😵',cx,headCY+5)
  } else {
    ctx.fillStyle='#222'
    ctx.beginPath(); ctx.ellipse(cx-5,headCY-1,2.5,3,0,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.ellipse(cx+5,headCY-1,2.5,3,0,0,Math.PI*2); ctx.fill()
    // Mouth
    ctx.strokeStyle='#c0876a'; ctx.lineWidth=1.5
    ctx.beginPath(); ctx.arc(cx,headCY+5,4,0.1,Math.PI-.1); ctx.stroke()
  }

  // ── HELMET (Top Ten style) ──
  // Main shell
  ctx.fillStyle=RED
  ctx.beginPath(); ctx.ellipse(cx,headCY-4,19,20,0,0,Math.PI*2); ctx.fill()
  // Face opening (cutout)
  ctx.fillStyle= isPlayer?'#1a1a1a':'rgba(255,255,255,.9)'
  ctx.beginPath(); ctx.ellipse(cx,headCY+1,12,15,0,-Math.PI*.7,Math.PI*.7); ctx.fill()
  // Face skin showing
  ctx.fillStyle=SKIN
  ctx.beginPath(); ctx.ellipse(cx,headCY+1,10,13,0,-Math.PI*.6,Math.PI*.6); ctx.fill()
  // Eyes visible through helmet
  if(!hit){
    ctx.fillStyle='#222'
    ctx.beginPath(); ctx.ellipse(cx-5,headCY-1,2,2.5,0,0,Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.ellipse(cx+5,headCY-1,2,2.5,0,0,Math.PI*2); ctx.fill()
  }
  // Helmet shine
  ctx.fillStyle='rgba(255,255,255,.18)'
  ctx.beginPath(); ctx.ellipse(cx-4,headCY-14,7,5,-.4,0,Math.PI*2); ctx.fill()
  // Chin guard
  ctx.fillStyle=RED
  ctx.beginPath(); ctx.roundRect(cx-13,headCY+10,26,10,4); ctx.fill()

  ctx.restore()
  ctx.globalAlpha=1
}

function drawImpact() {
  if(impactTimer<=0) return
  const a = impactTimer/12
  ctx.save(); ctx.globalAlpha=a
  const spikes=8, r1=8*a+4, r2=18*a+8
  ctx.fillStyle='#fff'; ctx.strokeStyle='#FFD700'; ctx.lineWidth=2
  ctx.beginPath()
  for(let i=0;i<spikes*2;i++){
    const angle=i*Math.PI/spikes
    const r=i%2===0?r2:r1
    if(i===0) ctx.moveTo(impactX+Math.cos(angle)*r, impactY+Math.sin(angle)*r)
    else ctx.lineTo(impactX+Math.cos(angle)*r, impactY+Math.sin(angle)*r)
  }
  ctx.closePath(); ctx.fill(); ctx.stroke()
  ctx.font=`bold ${Math.round(14*a)}px sans-serif`; ctx.fillStyle='#FFD700'; ctx.textAlign='center'
  ctx.fillText('HIT!',impactX,impactY-r2-4)
  ctx.restore()
}

function drawTatami(){
  // Floor
  const g=ctx.createLinearGradient(0,0,0,H)
  g.addColorStop(0,'#1a1a0a'); g.addColorStop(.7,'#2a2010'); g.addColorStop(1,'#1a1608')
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H)

  // Tatami mat
  const mat=ctx.createLinearGradient(0,FLOOR-20,0,FLOOR+20)
  mat.addColorStop(0,'#8B6914'); mat.addColorStop(.5,'#7a5c10'); mat.addColorStop(1,'#6b4f0c')
  ctx.fillStyle=mat; ctx.fillRect(0,FLOOR-8,W,30)

  // Mat lines
  ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1
  for(let x=0;x<W;x+=40){ ctx.beginPath();ctx.moveTo(x,FLOOR-8);ctx.lineTo(x,FLOOR+22);ctx.stroke() }

  // Center stripe
  ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=2
  ctx.beginPath();ctx.moveTo(W/2,FLOOR-8);ctx.lineTo(W/2,FLOOR+22);ctx.stroke()

  // Background glow
  const glow=ctx.createRadialGradient(W/2,FLOOR-60,10,W/2,FLOOR-60,120)
  glow.addColorStop(0,'rgba(0,71,171,.08)'); glow.addColorStop(1,'rgba(0,0,0,0)')
  ctx.fillStyle=glow; ctx.fillRect(0,0,W,H)
}

function draw(){
  ctx.clearRect(0,0,W,H)
  drawTatami()
  // Player: left side facing right
  const pSt = P.state
  const aSt = A.state
  drawFighter(P.x, true,  pSt, P.jumpY)
  drawFighter(A.x, false, aSt, A.jumpY)
  drawImpact()
  if(impactTimer>0) impactTimer--
  if(P.hitTimer>0) P.hitTimer--
  if(A.hitTimer>0) A.hitTimer--
}

let animId
function loop(){ draw(); animId=requestAnimationFrame(loop) }

// ── GAME LOGIC ────────────────────────────────────────────────────────────────

function setLog(txt){ document.getElementById('log').innerHTML=txt }

function showImpact(x,y){
  impactX=x; impactY=y; impactTimer=14
}

function playerMove(key){
  if(gameOver) return
  const m = MOVES[key]
  const aiBlocking = Math.random()<.25

  P.state = m.type==='punch'?'punch':(m.type==='jump'?'jump':'kick')
  if(m.type==='jump') P.jumpY=-28
  setTimeout(()=>{ P.state='idle'; P.jumpY=0 },420)

  setTimeout(()=>{
    if(aiBlocking){
      setLog(`🛡️ El rival bloqueó tu ${m.name}.`)
    } else if(Math.random()<m.hit){
      pScore++
      document.getElementById('p-score').textContent=pScore
      A.hitTimer=18
      const iy = m.height==='head' ? FLOOR-130 : m.height==='low' ? FLOOR-20 : FLOOR-80
      showImpact(A.x-20, iy)
      setLog(`<span>+${m.pts} ${m.pts>1?'puntos':'punto'}</span> — ${m.name} conectó! 💥`)
      checkWin()
    } else {
      setLog(`Tu ${m.name} no llegó. ¡Intenta de nuevo!`)
    }
  },250)
}

function activarDefensa(){
  if(gameOver) return
  defending=true
  document.getElementById('btn-def').classList.add('active')
  setLog(`🛡️ Defensa activa — bloqueando el próximo ataque.`)
  clearTimeout(defTimer)
  defTimer=setTimeout(()=>{ defending=false; document.getElementById('btn-def').classList.remove('active') },1800)
}

function aiAttack(){
  if(gameOver) return
  const key=AI_KEYS[Math.floor(Math.random()*AI_KEYS.length)]
  const m=MOVES[key]
  A.state=m.type==='punch'?'punch':'kick'
  setTimeout(()=>{ A.state='idle' },420)

  setTimeout(()=>{
    if(defending){
      defending=false; document.getElementById('btn-def').classList.remove('active'); clearTimeout(defTimer)
      showImpact(P.x+20, FLOOR-80)
      setLog(`🛡️ ¡Bloqueaste el ${m.name} del rival! Bien.`)
    } else if(Math.random()<.58){
      aScore++
      document.getElementById('a-score').textContent=aScore
      P.hitTimer=18
      const iy = m.height==='head' ? FLOOR-130 : FLOOR-80
      showImpact(P.x+20, iy)
      setLog(`⚠️ Rival anotó con ${m.name}. <span>¡Defiéndete!</span>`)
      checkWin()
    } else {
      setLog(`El rival intentó ${m.name} pero falló.`)
    }
  },250)
}

function checkWin(){
  if(pScore>=7) endGame(true)
  else if(aScore>=7) endGame(false)
}

function endGame(won){
  gameOver=true; clearInterval(aiTimer)
  const v=VALORES[Math.floor(Math.random()*VALORES.length)]
  document.getElementById('r-icon').textContent = won?'🏆':'💪'
  document.getElementById('r-title').textContent = won?'¡Round ganado!':'Sigue entrenando'
  document.getElementById('r-valor').textContent = (won?'Valor desbloqueado: ':'Recuerda: ') + v.n
  document.getElementById('r-frase').textContent = v.f
  const reto = document.getElementById('r-reto')
  reto.style.display='block'
  reto.innerHTML = `<b>🎯 Reto del día:</b><br>${v.r}`
  if(!won){
    const el=document.getElementById('r-frase')
    el.textContent='"Los grandes peleadores también aprenden de cada round." '+v.f
  }
  document.getElementById('result').style.display='flex'
}

function resetGame(){
  pScore=0; aScore=0; gameOver=false; defending=false
  P.state='idle'; P.jumpY=0; P.hitTimer=0
  A.state='idle'; A.jumpY=0; A.hitTimer=0
  impactTimer=0
  document.getElementById('p-score').textContent='0'
  document.getElementById('a-score').textContent='0'
  document.getElementById('result').style.display='none'
  document.getElementById('btn-def').classList.remove('active')
  clearInterval(aiTimer); startAI()
}

function startAI(){
  aiTimer=setInterval(()=>{ if(!gameOver) aiAttack() }, 2000+Math.random()*1400)
}

loop()
startAI()
</script>
</body></html>
