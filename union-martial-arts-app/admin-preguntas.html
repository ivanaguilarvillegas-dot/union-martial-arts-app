<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin - Preguntas de Padres</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f2167">
<link rel="stylesheet" href="css/uma.css?v=18" />
<style>
.ap-head{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--uma-blue-700,#0d1a5e);color:#fff;}
.ap-head .ttl{font-size:16px;font-weight:800;line-height:1;}
.ap-head .sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;}
.ap-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;flex-shrink:0;}

.wrap{padding:12px;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.metric{background:#fff;border-radius:12px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.metric .v{font-size:19px;font-weight:800;color:var(--uma-blue-700,#0d1a5e);line-height:1;}
.metric .l{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.2;}
.metric .v.green{color:#059669;}
.metric .v.amber{color:#b45309;}

.tabs{display:flex;gap:8px;margin-bottom:10px;}
.tab{flex:1;border:none;border-radius:10px;padding:9px 8px;font-size:12px;font-weight:700;background:#e5e7eb;color:#334155;cursor:pointer;}
.tab.active{background:#dbeafe;color:#1d4ed8;}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:99px;background:#dc2626;color:#fff;font-size:10px;font-weight:800;padding:0 5px;margin-left:6px;}

.q-list{display:flex;flex-direction:column;gap:8px;}
.q-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.q-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.q-title{font-size:13px;font-weight:800;color:#111827;line-height:1.3;}
.q-meta{font-size:11px;color:#6b7280;line-height:1.45;margin-top:6px;}
.q-text{font-size:13px;color:#0f172a;line-height:1.5;margin-top:10px;white-space:pre-wrap;}
.q-resp{font-size:12px;color:#166534;line-height:1.45;margin-top:10px;background:#ecfdf5;border:1px solid #bbf7d0;border-radius:8px;padding:8px;white-space:pre-wrap;}
.state{font-size:10px;font-weight:800;border-radius:99px;padding:3px 8px;white-space:nowrap;}
.state.pending{background:#fff7ed;color:#9a3412;}
.state.done{background:#ecfdf5;color:#166534;}

.q-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.btn-sm{border:none;border-radius:8px;padding:7px 10px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-blue{background:#dbeafe;color:#1d4ed8;}
.btn-green{background:#dcfce7;color:#166534;}
.btn-red{background:#fee2e2;color:#b91c1c;}

.answer-box{display:none;margin-top:10px;padding:10px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;}
.answer-box textarea{width:100%;min-height:80px;border:1px solid #d1d5db;border-radius:8px;padding:8px;font-size:12.5px;resize:vertical;}
.answer-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:8px;}

.empty{background:#fff;border-radius:12px;padding:16px;font-size:12.5px;color:#6b7280;text-align:center;}
</style>
</head>
<body>
<div class="phone"><div class="screen" style="background:#f4f6fb;overflow-y:auto;">

  <div class="ap-head">
    <a class="ap-back" href="admin.html" aria-label="Volver"><i data-lucide="arrow-left" style="width:18px;height:18px;"></i></a>
    <div>
      <div class="ttl">Preguntas de Padres</div>
      <div class="sub">Centro de ayuda y seguimiento</div>
    </div>
  </div>

  <div class="wrap">
    <div class="metrics">
      <div class="metric"><div class="v" id="m-pend">0</div><div class="l">Preguntas pendientes</div></div>
      <div class="metric"><div class="v green" id="m-mes">0</div><div class="l">Respondidas este mes</div></div>
      <div class="metric"><div class="v amber" id="m-tiempo">0h</div><div class="l">Tiempo promedio respuesta</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="pendientes">Pendientes <span class="badge" id="b-pend">0</span></button>
      <button class="tab" data-tab="respondidas">Respondidas</button>
    </div>

    <div class="q-list" id="q-list"></div>
  </div>

</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const sb = createClient(
  'https://gdajgennlsuvndanpxiz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
)

function e(v) { return encodeURIComponent(String(v || '')) }
function d(v) { return decodeURIComponent(String(v || '')) }
function tokenMap(raw) {
  const out = {}
  String(raw || '').split(';').forEach(pair => {
    const i = pair.indexOf('=')
    if (i > 0) out[pair.slice(0, i).trim()] = d(pair.slice(i + 1).trim())
  })
  return out
}
function parseFaqQ(texto) {
  if (!String(texto || '').startsWith('[[FAQ_Q]]')) return null
  const m = tokenMap(String(texto).replace('[[FAQ_Q]]', '').trim())
  if (!m.id) return null
  return m
}
function parseFaqA(texto) {
  if (!String(texto || '').startsWith('[[FAQ_A]]')) return null
  const m = tokenMap(String(texto).replace('[[FAQ_A]]', '').trim())
  if (!m.qid) return null
  return m
}
async function insertMensaje(payload) {
  let { error } = await sb.from('mensajes').insert(payload)
  if (error && error.code === '42703' && Object.prototype.hasOwnProperty.call(payload, 'es_automatico')) {
    const fallback = { ...payload }
    delete fallback.es_automatico
    ;({ error } = await sb.from('mensajes').insert(fallback))
  }
  return { error }
}

let tab = 'pendientes'
let preguntas = []

function fmtFecha(f) {
  if (!f) return ''
  const dt = new Date(f)
  return dt.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
}

function calcPromedioHoras(items) {
  const vals = items
    .filter(i => i.respuesta_ts)
    .map(i => (new Date(i.respuesta_ts) - new Date(i.creado_en)) / 3600000)
    .filter(v => Number.isFinite(v) && v >= 0)
  if (!vals.length) return 0
  return vals.reduce((a, b) => a + b, 0) / vals.length
}

function render() {
  const cont = document.getElementById('q-list')
  const pendientes = preguntas.filter(p => p.estado !== 'respondida')
  const respondidas = preguntas.filter(p => p.estado === 'respondida')
  const rows = tab === 'pendientes' ? pendientes : respondidas

  document.getElementById('b-pend').textContent = String(pendientes.length)
  document.getElementById('m-pend').textContent = String(pendientes.length)

  const now = new Date()
  const y = now.getFullYear()
  const m = now.getMonth()
  const respMes = respondidas.filter(r => {
    const dt = new Date(r.respuesta_ts || r.actualizado_en || r.creado_en)
    return dt.getFullYear() === y && dt.getMonth() === m
  })
  document.getElementById('m-mes').textContent = String(respMes.length)

  const prom = calcPromedioHoras(respondidas)
  document.getElementById('m-tiempo').textContent = prom >= 24 ? (prom / 24).toFixed(1) + 'd' : prom.toFixed(1) + 'h'

  if (!rows.length) {
    cont.innerHTML = '<div class="empty">No hay preguntas en esta pestaña.</div>'
    return
  }

  cont.innerHTML = rows.map(item => {
    const stateClass = item.estado === 'respondida' ? 'done' : 'pending'
    const stateText = item.estado === 'respondida' ? 'Respondida' : 'Pendiente'

    return `<div class="q-card" data-qid="${item.qid}">
      <div class="q-top">
        <div class="q-title">${item.alumno || 'Alumno'} · ${item.padre || 'Padre'}</div>
        <span class="state ${stateClass}">${stateText}</span>
      </div>
      <div class="q-meta">Fecha: ${fmtFecha(item.creado_en)}</div>
      <div class="q-text">${item.pregunta || ''}</div>
      ${item.respuesta ? `<div class="q-resp">Respuesta: ${item.respuesta}</div>` : ''}

      <div class="q-actions">
        <button class="btn-sm btn-blue" data-acc="toggle-reply">Responder</button>
        ${item.estado !== 'respondida' ? '<button class="btn-sm btn-green" data-acc="mark">Marcar respondida</button>' : ''}
        <button class="btn-sm btn-red" data-acc="delete">Eliminar</button>
      </div>

      <div class="answer-box" data-box="reply">
        <textarea placeholder="Escribe la respuesta para el padre..." data-input="reply"></textarea>
        <div class="answer-actions">
          <button class="btn-sm" data-acc="cancel">Cancelar</button>
          <button class="btn-sm btn-blue" data-acc="send">Enviar respuesta</button>
        </div>
      </div>
    </div>`
  }).join('')

  lucide.createIcons()
}

async function loadData() {
  const { data: auth } = await sb.auth.getUser()
  const user = auth?.user
  if (!user) { window.location.href = 'index.html'; return }

  const { data: admin } = await sb.from('padres').select('es_admin').eq('user_id', user.id).single()
  if (!admin?.es_admin) { window.location.href = 'home.html'; return }

  const { data: qRows } = await sb.from('mensajes')
    .select('id, texto, creado_en, de_user_id, para_admin')
    .eq('para_admin', true)
    .order('creado_en', { ascending: false })
    .limit(500)

  const { data: aRows } = await sb.from('mensajes')
    .select('id, texto, creado_en, destinatario_id, para_admin')
    .eq('para_admin', false)
    .order('creado_en', { ascending: false })
    .limit(700)

  const map = {}
  ;(qRows || []).forEach(r => {
    const q = parseFaqQ(r.texto)
    if (!q?.id) return
    map[q.id] = {
      row_id: r.id,
      qid: q.id,
      creado_en: r.creado_en,
      actualizado_en: r.creado_en,
      estado: q.accion === 'eliminada' ? 'eliminada' : 'pendiente',
      pregunta: q.pregunta || '',
      alumno: q.alumno || '',
      padre: q.padre || '',
      padre_id: q.padre_id || '',
      padre_user_id: q.padre_user_id || '',
      alumno_id: q.alumno_id || '',
      respuesta: '',
      respuesta_ts: ''
    }
  })

  ;(aRows || []).slice().reverse().forEach(r => {
    const a = parseFaqA(r.texto)
    if (!a?.qid || !map[a.qid]) return
    if (a.accion === 'eliminada') {
      map[a.qid].estado = 'eliminada'
      map[a.qid].actualizado_en = r.creado_en
    }
    if (a.accion === 'respondida' || a.accion === 'marcar_respondida') {
      map[a.qid].estado = 'respondida'
      map[a.qid].respuesta = a.respuesta || map[a.qid].respuesta
      map[a.qid].respuesta_ts = r.creado_en
      map[a.qid].actualizado_en = r.creado_en
    }
  })

  preguntas = Object.values(map)
    .filter(p => p.estado !== 'eliminada')
    .sort((a, b) => new Date(b.creado_en) - new Date(a.creado_en))

  render()
}

async function responder(item, texto) {
  const payload = '[[FAQ_A]] ' + [
    'qid=' + e(item.qid),
    'padre_id=' + e(item.padre_id),
    'padre_user_id=' + e(item.padre_user_id),
    'alumno_id=' + e(item.alumno_id),
    'alumno=' + e(item.alumno),
    'padre=' + e(item.padre),
    'accion=' + e('respondida'),
    'respuesta=' + e(texto),
    'ts=' + e(new Date().toISOString())
  ].join(';')

  const destinatario = item.padre_id || item.padre_user_id || null

  const ins = await insertMensaje({
    de_user_id: null,
    texto: payload,
    para_admin: false,
    destinatario_id: destinatario,
    leido: false,
    es_automatico: true
  })
  if (ins.error) throw ins.error

  const chat = await insertMensaje({
    de_user_id: null,
    texto,
    para_admin: false,
    destinatario_id: destinatario,
    leido: false,
    es_automatico: true
  })
  if (chat.error) throw chat.error

  const notif = await insertMensaje({
    de_user_id: null,
    texto: '[[FAQ_NOTIFY]] ' + [
      'qid=' + e(item.qid),
      'titulo=' + e('Tu pregunta fue respondida'),
      'mensaje=' + e('El instructor respondió tu duda. Toca para abrir Chat Privado.'),
      'accion=' + e('abrir_chat'),
      'url=' + e('chat.html'),
      'ts=' + e(new Date().toISOString())
    ].join(';'),
    para_admin: false,
    destinatario_id: destinatario,
    leido: false,
    es_automatico: true
  })
  if (notif.error) throw notif.error
}

async function marcarRespondida(item) {
  const payload = '[[FAQ_A]] ' + [
    'qid=' + e(item.qid),
    'padre_id=' + e(item.padre_id),
    'padre_user_id=' + e(item.padre_user_id),
    'alumno_id=' + e(item.alumno_id),
    'alumno=' + e(item.alumno),
    'padre=' + e(item.padre),
    'accion=' + e('marcar_respondida'),
    'respuesta=' + e(item.respuesta || ''),
    'ts=' + e(new Date().toISOString())
  ].join(';')

  const destinatario = item.padre_id || item.padre_user_id || null
  const ins = await insertMensaje({
    de_user_id: null,
    texto: payload,
    para_admin: false,
    destinatario_id: destinatario,
    leido: false,
    es_automatico: true
  })
  if (ins.error) throw ins.error
}

async function eliminar(item) {
  const payload = '[[FAQ_A]] ' + [
    'qid=' + e(item.qid),
    'accion=' + e('eliminada'),
    'ts=' + e(new Date().toISOString())
  ].join(';')

  const destinatario = item.padre_id || item.padre_user_id || null
  const ins = await insertMensaje({
    de_user_id: null,
    texto: payload,
    para_admin: false,
    destinatario_id: destinatario,
    leido: false,
    es_automatico: true
  })
  if (ins.error) throw ins.error
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    btn.classList.add('active')
    tab = btn.dataset.tab
    render()
  })
})

document.getElementById('q-list').addEventListener('click', async (ev) => {
  const card = ev.target.closest('.q-card')
  const action = ev.target.closest('[data-acc]')?.dataset.acc
  if (!card || !action) return

  const item = preguntas.find(p => p.qid === card.dataset.qid)
  if (!item) return

  const box = card.querySelector('[data-box="reply"]')
  const input = card.querySelector('[data-input="reply"]')

  try {
    if (action === 'toggle-reply') {
      box.style.display = box.style.display === 'block' ? 'none' : 'block'
      if (box.style.display === 'block') input.focus()
      return
    }
    if (action === 'cancel') {
      box.style.display = 'none'
      input.value = ''
      return
    }
    if (action === 'send') {
      const texto = (input.value || '').trim()
      if (!texto) return
      await responder(item, texto)
      await loadData()
      return
    }
    if (action === 'mark') {
      await marcarRespondida(item)
      await loadData()
      return
    }
    if (action === 'delete') {
      await eliminar(item)
      await loadData()
      return
    }
  } catch (e) {
    console.error(e)
  }
})

await loadData()
lucide.createIcons()
</script>
</body>
</html>
