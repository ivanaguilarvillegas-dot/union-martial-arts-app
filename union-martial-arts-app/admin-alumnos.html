<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Union Martial Arts — Alumnos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>●●● 100%</span></div>
  <div class="nav-header dark">
    <a href="admin.html" class="back-btn">← Volver</a>
    <h1>Alumnos registrados</h1>
  </div>
  <div class="screen-body">
    <input type="text" id="buscador" placeholder="🔍 Buscar alumno..." oninput="buscar(this.value)" />
    <div class="tabs">
      <a href="#" class="tab active" onclick="filtro('todos',this)">Todos</a>
      <a href="#" class="tab" onclick="filtro('pagado',this)">Al día</a>
      <a href="#" class="tab" onclick="filtro('pendiente',this)">Pendiente</a>
    </div>
    <div class="section-title" id="contador-label">Cargando...</div>
    <div id="lista-alumnos">
      <div style="text-align:center; color:var(--text-secondary); font-size:13px; padding:20px;">Cargando alumnos...</div>
    </div>
  </div>
  <div class="bottom-nav">
    <a href="admin.html" class="bnav-item"><span class="bnav-icon">📊</span>Panel</a>
    <a href="admin-alumnos.html" class="bnav-item active"><span class="bnav-icon">👥</span>Alumnos</a>
    <a href="admin-pagos.html" class="bnav-item"><span class="bnav-icon">💳</span>Pagos</a>
    <a href="admin-frase.html" class="bnav-item"><span class="bnav-icon">💬</span>Mensajes</a>
  </div>
</div>

<script type="module">
  import { supabase } from './js/supabase.js'

  let todosAlumnos = []
  let estadoPagos = {}
  let filtroActual = 'todos'

  async function cargarDatos() {
    const { data: alumnos } = await supabase
      .from('alumnos')
      .select('*')
      .eq('activo', true)
      .order('nombre')

    const { data: pagos } = await supabase
      .from('pagos')
      .select('alumno_id, estado')
      .order('creado_en', { ascending: false })

    pagos?.forEach(p => {
      if (!estadoPagos[p.alumno_id]) estadoPagos[p.alumno_id] = p.estado
    })

    todosAlumnos = alumnos || []
    renderizar(todosAlumnos)
  }

  function iniciales(nombre) {
    return nombre?.split(' ').slice(0,2).map(n => n[0]).join('').toUpperCase() || '?'
  }

  function renderizar(lista) {
    const cont = document.getElementById('lista-alumnos')
    document.getElementById('contador-label').textContent = lista.length + ' alumno' + (lista.length !== 1 ? 's' : '')
    if (lista.length === 0) {
      cont.innerHTML = '<div style="text-align:center; color:var(--text-secondary); font-size:13px; padding:20px;">Sin resultados.</div>'
      return
    }
    cont.innerHTML = lista.map(a => {
      const estado = estadoPagos[a.id] || 'sin registro'
      const badge = estado === 'pagado'
        ? '<span class="badge green">Al día</span>'
        : estado === 'pendiente'
        ? '<span class="badge red">Pendiente</span>'
        : '<span class="badge gray">Sin pago</span>'
      return `
        <div class="student-row">
          <div class="avatar">${iniciales(a.nombre)}</div>
          <div style="flex:1;">
            <div class="student-name">${a.nombre}</div>
            <div class="student-sub">Cint. ${a.cinturon} · ${a.grupo || ''}</div>
          </div>
          ${badge}
        </div>`
    }).join('')
  }

  window.filtro = function(estado, el) {
    filtroActual = estado
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    el.classList.add('active')
    const q = document.getElementById('buscador').value.toLowerCase()
    aplicarFiltros(q)
  }

  window.buscar = function(texto) {
    aplicarFiltros(texto.toLowerCase())
  }

  function aplicarFiltros(q) {
    let lista = todosAlumnos.filter(a => a.nombre.toLowerCase().includes(q))
    if (filtroActual !== 'todos') {
      lista = lista.filter(a => estadoPagos[a.id] === filtroActual)
    }
    renderizar(lista)
  }

  cargarDatos()
</script>
</body>
</html>
