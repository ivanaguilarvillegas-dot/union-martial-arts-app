<script>
(async () => {
  const supabase = window.supabase.createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { session } } = await supabase.auth.getSession()
  const user = session?.user
  if (!user) { window.location.href = 'index.html' }

  const CINTAS = {
    'Blanca':    { color:'#ffffff', border:'#d1d5db', text:'#374151' },
    'Amarilla':  { color:'#fbbf24', border:'#d97706', text:'#78350f' },
    'Anaranjada':{ color:'#f97316', border:'#ea580c', text:'#fff' },
    'Morada':    { color:'#7c3aed', border:'#6d28d9', text:'#fff' },
    'Azul':      { color:'#1d4ed8', border:'#1e40af', text:'#fff' },
    'Verde':     { color:'#16a34a', border:'#15803d', text:'#fff' },
    'Café I':    { color:'#92400e', border:'#78350f', text:'#fff' },
    'Café II':   { color:'#92400e', border:'#78350f', text:'#fff' },
    'Café III':  { color:'#92400e', border:'#78350f', text:'#fff' },
    'Roja':      { color:'#dc2626', border:'#b91c1c', text:'#fff' },
    'Roja-Negra':{ color:'#dc2626', border:'#111827', text:'#fff', split:true },
    'Negra':     { color:'#111827', border:'#000', text:'#fff' },
    'Negra I grado':  { color:'#111827', border:'#000', text:'#fff' },
    'Negra II grado': { color:'#111827', border:'#000', text:'#fff' },
    'Negra III grado':{ color:'#111827', border:'#000', text:'#fff' },
    'Negra IV grado': { color:'#111827', border:'#000', text:'#fff' },
    'Negra V grado':  { color:'#111827', border:'#000', text:'#fff' },
  }

  function beltSVG(cinta) {
    const cfg = CINTAS[cinta] || { color:'#e5e7eb', border:'#d1d5db', text:'#374151' }
    const m = (cinta||'').match(/(\d+)\s*grado/)
    const dan = m ? parseInt(m[1]) : 0
    const fill = cfg.split ? `<defs><linearGradient id="rn" x1="0" y1="0" x2="1" y2="0"><stop offset="50%" stop-color="#dc2626"/><stop offset="50%" stop-color="#111827"/></linearGradient></defs>` : ''
    const rectFill = cfg.split ? 'url(#rn)' : cfg.color
    const nudoFill = cfg.split ? '#111827' : cfg.color
    const stripes = Array.from({length:dan},(_,i)=>`<rect x="${58-i*5}" y="7" width="3" height="8" fill="#fbbf24"/>`).join('')
    return `<svg width="68" height="22" viewBox="0 0 68 22" xmlns="http://www.w3.org/2000/svg">
      ${fill}
      <rect x="0" y="7" width="68" height="8" rx="4" fill="${rectFill}" stroke="${cfg.border}" stroke-width="0.8"/>
      ${stripes}
      <rect x="26" y="4" width="16" height="14" rx="3" fill="${nudoFill}" stroke="${cfg.border}" stroke-width="0.8"/>
      <line x1="34" y1="5" x2="34" y2="17" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
    </svg>`
  }

  const TODOS_HORARIOS = [
    'Lunes, Miércoles y Viernes · 4:00 PM – 5:00 PM',
    'Lunes, Miércoles y Viernes · 5:00 PM – 6:00 PM',
    'Lunes, Miércoles y Viernes · 6:00 PM – 7:00 PM',
    'Martes · 6:15 PM – 7:00 PM',
    'Sábado · 11:00 AM – 12:00 PM',
    'Sábado Club Cinta Negra Niños · 10:00 AM – 12:00 PM',
    'Lunes, Miércoles, Jueves y Viernes · 7:00 PM – 8:00 PM',
    'Sábado · 12:00 PM – 1:00 PM',
    'Sábado Club Cinta Negra Jóvenes · 12:00 PM – 2:00 PM',
  ]

  function actualizarHorariosEdit(horarioActual) {
    const sel = (horarioActual||'').split(' | ')
    document.getElementById('edit-horario-checks').innerHTML = TODOS_HORARIOS.map(h => `
      <label style="display:flex;align-items:center;gap:8px;padding:7px 10px;border:1.5px solid var(--border-input);border-radius:8px;cursor:pointer;font-size:12px;line-height:1.3;">
        <input type="checkbox" value="${h}" ${sel.includes(h)?'checked':''} style="width:15px;height:15px;accent-color:var(--primary);flex-shrink:0;" />${h}</label>`).join('')
  }

  function getHorariosEdit() {
    return [...document.querySelectorAll('#edit-horario-checks input:checked')].map(i=>i.value).join(' | ')
  }

  let alumnos = [], pagosMap = {}, checkinMap = {}, filtroActivo = 'todos'
  let borrarId = null

  async function cargar() {
    const hoy = new Date()
    const hace35 = new Date(hoy - 35*86400000).toISOString().split('T')[0]
    const hace70 = new Date(hoy - 70*86400000).toISOString().split('T')[0]

    const [{ data: als, count }, { data: pagos }, { data: checkins }] = await Promise.all([
      supabase.from('alumnos').select('*', { count:'exact' }).order('nombre'),
      supabase.from('pagos').select('alumno_id, fecha_pago, estado').gte('fecha_pago', hace70).order('fecha_pago', { ascending:false }),
      supabase.from('checkins').select('alumno_id, fecha').gte('fecha', hace35).order('fecha', { ascending:false }),
    ])

    alumnos = als || []
    document.getElementById('sub').textContent = (count||0) + ' alumnos'

    pagosMap = {}
    for (const p of (pagos||[])) {
      if (!pagosMap[p.alumno_id]) pagosMap[p.alumno_id] = p
    }
    checkinMap = {}
    for (const c of (checkins||[])) {
      if (!checkinMap[c.alumno_id]) checkinMap[c.alumno_id] = c.fecha
    }

    filtrar()
  }

  window.setFiltro = function(f) {
    filtroActivo = f
    document.querySelectorAll('.fchip').forEach(b => b.classList.toggle('on', b.dataset.f === f))
    filtrar()
  }

  window.filtrar = function() {
    const q = (document.getElementById('buscar').value||'').toLowerCase()
    const hoy = new Date().toISOString().split('T')[0]
    const hace35 = new Date(Date.now()-35*86400000).toISOString().split('T')[0]

    const lista = alumnos.filter(a => {
      if (q && !a.nombre?.toLowerCase().includes(q)) return false
      const g = (a.grupo||'').toLowerCase()
      const c = (a.cinta||'').toLowerCase()
      const p = pagosMap[a.id]
      const pagoFecha = p?.fecha_pago || ''
      const alDia = pagoFecha >= hace35
      const pendiente = pagoFecha && pagoFecha < hace35
      const vencido = !pagoFecha
      if (filtroActivo === 'infantil') return g.includes('infant')
      if (filtroActivo === 'juvenil') return g.includes('juven')
      if (filtroActivo === 'adultos') return g.includes('adult')
      if (filtroActivo === 'negro') return c.includes('negra') || c.includes('negro')
      if (filtroActivo === 'pendiente') return pendiente
      if (filtroActivo === 'vencido') return vencido
      return true
    })

    render(lista)
  }

  function render(lista) {
    const el = document.getElementById('list')
    if (!lista.length) {
      el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin resultados.</div>'
      lucide.createIcons(); return
    }

    const hace35 = new Date(Date.now()-35*86400000).toISOString().split('T')[0]

    el.innerHTML = lista.map(a => {
      const ini = (a.nombre||'').trim().split(/\s+/).slice(0,2).map(p=>p[0]).join('').toUpperCase()||'?'
      const foto = a.foto_url ? `<img src="${a.foto_url}" />` : ini
      const p = pagosMap[a.id]
      const pagoFecha = p?.fecha_pago||''
      let pagoBadge = ''
      if (pagoFecha >= hace35) pagoBadge = '<span class="pago-badge pago-al-dia">Al día</span>'
      else if (pagoFecha) pagoBadge = '<span class="pago-badge pago-pendiente">Pendiente</span>'
      else pagoBadge = '<span class="pago-badge pago-vencido">Sin pago</span>'

      const ultima = checkinMap[a.id]
      const fechaStr = ultima ? 'Asistió ' + new Date(ultima+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short'}) : 'Sin asistencias'

      return `<div class="al-card" data-id="${a.id}">
        <div class="al-foto">${foto}</div>
        <div class="al-info">
          <div class="al-nombre">${a.nombre||'—'}</div>
          <div class="al-grupo">${a.grupo||'Sin grupo'}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
            ${beltSVG(a.cinta)}
          </div>
        </div>
        <div class="al-right">
          ${pagoBadge}
          <span class="al-fecha">${fechaStr}</span>
          <div style="display:flex;gap:5px;margin-top:2px;">
            <button class="iconbtn" data-editar="${a.id}" style="width:28px;height:28px;" title="Editar"><i data-lucide="pencil" style="width:13px;height:13px"></i></button>
            <button class="iconbtn" data-borrar="${a.id}" style="width:28px;height:28px;color:var(--red-600);" title="Eliminar"><i data-lucide="trash-2" style="width:13px;height:13px"></i></button>
          </div>
        </div>
      </div>`
    }).join('')

    lucide.createIcons()
  }

  document.getElementById('list').addEventListener('click', async e => {
    const editBtn = e.target.closest('[data-editar]')
    if (editBtn) {
      const a = alumnos.find(x => x.id === editBtn.dataset.editar)
      if (!a) return
      document.getElementById('edit-id').value = a.id
      document.getElementById('edit-nombre').value = a.nombre||''
      document.getElementById('edit-curp').value = a.curp||''
      document.getElementById('edit-fecha-ingreso').value = a.fecha_ingreso||''
      document.getElementById('edit-cinta').value = a.cinta||''
      document.getElementById('edit-grupo').value = a.grupo||''
      const fotoWrap = document.getElementById('admin-foto-wrap')
      const fotoBorrar = document.getElementById('admin-foto-borrar')
      if (a.foto_url) {
        fotoWrap.innerHTML = `<img src="${a.foto_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /><div style="position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;background:#1d4ed8;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;"><i data-lucide="camera" style="width:10px;height:10px;color:#fff;"></i></div>`
        fotoBorrar.style.display = 'flex'
      } else {
        fotoWrap.innerHTML = `<i data-lucide="user" style="width:26px;height:26px;color:#4a7fcb;"></i><div style="position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;background:#1d4ed8;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;"><i data-lucide="camera" style="width:10px;height:10px;color:#fff;"></i></div>`
        fotoBorrar.style.display = 'none'
      }
      lucide.createIcons()
      actualizarHorariosEdit(a.horario||'')
      const { data: p } = await supabase.from('padres').select('nombre,telefono,correo,parentesco,contacto_emergencia_nombre,contacto_emergencia_tel,contacto_emergencia_parentesco,autorizado_nombre,autorizado_tel,autorizado_parentesco').eq('alumno_id', a.id).maybeSingle()
      document.getElementById('edit-padre-nombre').value = p?.nombre||''
      document.getElementById('edit-telefono').value = p?.telefono||''
      document.getElementById('edit-correo').value = p?.correo||''
      document.getElementById('edit-parentesco').value = p?.parentesco||'Madre'
      document.getElementById('edit-emerg-nombre').value = p?.contacto_emergencia_nombre||''
      document.getElementById('edit-emerg-tel').value = p?.contacto_emergencia_tel||''
      document.getElementById('edit-emerg-parentesco').value = p?.contacto_emergencia_parentesco||''
      document.getElementById('edit-autoriz-nombre').value = p?.autorizado_nombre||''
      document.getElementById('edit-autoriz-tel').value = p?.autorizado_tel||''
      document.getElementById('edit-autoriz-parentesco').value = p?.autorizado_parentesco||''
      document.getElementById('edit-direccion').value = p?.direccion||''
      document.getElementById('modal').style.display = 'flex'
      lucide.createIcons()
      return
    }
    const borrarBtn = e.target.closest('[data-borrar]')
    if (borrarBtn) {
      borrarId = borrarBtn.dataset.borrar
      const a = alumnos.find(x => x.id === borrarId)
      document.getElementById('borrar-nombre-txt').textContent = '¿Eliminar a ' + (a?.nombre||'este alumno') + '? Esta acción no se puede deshacer.'
      document.getElementById('modal-borrar').style.display = 'flex'
    }
  })

  document.getElementById('modal-cancelar').addEventListener('click', () => { document.getElementById('modal').style.display='none' })

  document.getElementById('admin-foto-input').addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return
    const id = document.getElementById('edit-id').value; if (!id) return
    const ext = file.name.split('.').pop().toLowerCase()
    const path = `${user.id}/alumno-${id}.${ext}`
    const fotoWrap = document.getElementById('admin-foto-wrap')
    fotoWrap.style.opacity = '.5'
    const { error } = await supabase.storage.from('fotos-alumnos').upload(path, file, { upsert:true, contentType:file.type })
    if (error) { alert('Error: '+error.message); fotoWrap.style.opacity='1'; return }
    const { data:{ publicUrl } } = supabase.storage.from('fotos-alumnos').getPublicUrl(path)
    const url = publicUrl+'?t='+Date.now()
    await supabase.from('alumnos').update({ foto_url: url }).eq('id', id)
    const al = alumnos.find(a=>a.id===id); if (al) al.foto_url = url
    fotoWrap.style.opacity='1'
    fotoWrap.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /><div style="position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;background:#1d4ed8;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;"><i data-lucide="camera" style="width:10px;height:10px;color:#fff;"></i></div>`
    document.getElementById('admin-foto-borrar').style.display='flex'
    lucide.createIcons(); filtrar()
  })

  window.borrarFotoAdmin = async () => {
    const id = document.getElementById('edit-id').value; if (!id) return
    if (!confirm('¿Borrar la foto del alumno?')) return
    for (const ext of ['jpg','jpeg','png','webp']) await supabase.storage.from('fotos-alumnos').remove([`alumno-${id}.${ext}`])
    await supabase.from('alumnos').update({ foto_url:null }).eq('id', id)
    const al = alumnos.find(a=>a.id===id); if (al) al.foto_url = null
    const fotoWrap = document.getElementById('admin-foto-wrap')
    fotoWrap.innerHTML = `<i data-lucide="user" style="width:26px;height:26px;color:#4a7fcb;"></i><div style="position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;background:#1d4ed8;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;"><i data-lucide="camera" style="width:10px;height:10px;color:#fff;"></i></div>`
    document.getElementById('admin-foto-borrar').style.display='none'
    lucide.createIcons(); filtrar()
  }

  document.getElementById('modal-guardar').addEventListener('click', async () => {
    const id = document.getElementById('edit-id').value
    const nombre = document.getElementById('edit-nombre').value.trim()
    const cinta = document.getElementById('edit-cinta').value
    const grupo = document.getElementById('edit-grupo').value
    const horario = getHorariosEdit()
    if (!nombre) { alert('El nombre es obligatorio'); return }
    const btn = document.getElementById('modal-guardar')
    btn.disabled=true; btn.textContent='Guardando…'
    const { error } = await supabase.from('alumnos').update({
      nombre, cinta:cinta||null, grupo:grupo||null, horario:horario||null, curp:(document.getElementById('edit-curp').value.trim().toUpperCase())||null,
      fecha_ingreso: document.getElementById('edit-fecha-ingreso').value||null
    }).eq('id', id)
    if (!error) {
      await supabase.from('padres').update({
        nombre: document.getElementById('edit-padre-nombre').value.trim()||null,
        telefono: document.getElementById('edit-telefono').value.trim()||null,
        correo: document.getElementById('edit-correo').value.trim()||null,
        parentesco: document.getElementById('edit-parentesco').value||null,
        contacto_emergencia_nombre: document.getElementById('edit-emerg-nombre').value.trim()||null,
        contacto_emergencia_tel: document.getElementById('edit-emerg-tel').value.trim()||null,
        contacto_emergencia_parentesco: document.getElementById('edit-emerg-parentesco').value.trim()||null,
        autorizado_nombre: document.getElementById('edit-autoriz-nombre').value.trim()||null,
        autorizado_tel: document.getElementById('edit-autoriz-tel').value.trim()||null,
        autorizado_parentesco: document.getElementById('edit-autoriz-parentesco').value.trim()||null,
        direccion: document.getElementById('edit-direccion').value.trim()||null,
      }).eq('alumno_id', id)
    }
    btn.disabled=false; btn.innerHTML='<i data-lucide="save"></i> Guardar'; lucide.createIcons()
    if (error) { alert('❌ '+error.message); return }
    document.getElementById('modal').style.display='none'
    await cargar()
  })

  document.getElementById('borrar-cancelar').addEventListener('click', () => { document.getElementById('modal-borrar').style.display='none'; borrarId=null })
  document.getElementById('borrar-confirmar').addEventListener('click', async () => {
    if (!borrarId) return
    const btn = document.getElementById('borrar-confirmar')
    btn.disabled=true; btn.textContent='Eliminando…'
    const { error } = await supabase.from('alumnos').delete().eq('id', borrarId)
    btn.disabled=false; btn.innerHTML='<i data-lucide="trash-2"></i> Eliminar'; lucide.createIcons()
    if (error) { alert('❌ '+error.message); return }
    document.getElementById('modal-borrar').style.display='none'
    borrarId=null; await cargar()
  })

  cargar()
})();
</script>
<script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(()=>{}) }</script>
</body></html>
