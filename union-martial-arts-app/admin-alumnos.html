<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alumnos</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="sub" id="sub">Cargando…</div><div class="title">Alumnos</div></div>
    <a class="iconbtn-dark" href="admin-nuevo-alumno.html" aria-label="Agregar"><i data-lucide="user-plus"></i></a></div>
  <div class="body">
    <a class="btn secondary block mb14" href="admin-nuevo-alumno.html"><i data-lucide="user-plus"></i> Agregar nuevo alumno</a>
    <div class="label">Lista de alumnos</div>
    <div class="stack-8" id="list"></div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a class="on" href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>

<!-- Modal editar alumno -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:16px;padding:18px;width:100%;max-width:380px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18);">
    <div style="font-size:15px;font-weight:700;margin-bottom:12px;flex-shrink:0;">Editar alumno</div>
    <input type="hidden" id="edit-id" />
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Nombre completo</label>
      <input type="text" id="edit-nombre" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Cinta</label>
      <select id="edit-cinta" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;background:#fff;">
        <option value="">Sin cinta</option>
        <option value="blanca">Blanca</option>
        <option value="amarilla">Amarilla</option>
        <option value="naranja">Naranja</option>
        <option value="verde">Verde</option>
        <option value="azul">Azul</option>
        <option value="morada">Morada</option>
        <option value="café">Café</option>
        <option value="negra">Negra</option>
      </select>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Grupo / nivel</label>
      <select id="edit-grupo" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;background:#fff;">
        <option value="">Sin grupo</option>
        <option value="Infantil (5-12 años)">Infantil (5-12 años)</option>
        <option value="Juvenil (13-17 años)">Juvenil (13-17 años)</option>
        <option value="Adultos (18+ años)">Adultos (18+ años)</option>
      </select>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Horario</label>
      <select id="edit-horario" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;background:#fff;">
        <option value="">Sin horario</option>
        <option value="Lun, Mié y Vie · 5:00 PM">Lun, Mié y Vie — 5:00 PM</option>
        <option value="Lun, Mié y Vie · 6:00 PM">Lun, Mié y Vie — 6:00 PM</option>
        <option value="Lun, Mié y Vie · 7:00 PM">Lun, Mié y Vie — 7:00 PM</option>
        <option value="Mar y Jue · 6:00 PM">Mar y Jue — 6:00 PM</option>
        <option value="Sábado · 10:00 AM">Sábado — 10:00 AM</option>
      </select>
    </div>
    <!-- Scroll para campos extras -->
    <div style="max-height:55vh;overflow-y:auto;padding-right:4px;">
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:4px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Padre / tutor</div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Nombre</label>
          <input type="text" id="edit-padre-nombre" placeholder="Nombre del padre/tutor" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Teléfono</label>
          <input type="tel" id="edit-telefono" placeholder="(656) 000-0000" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Correo</label>
          <input type="email" id="edit-correo" placeholder="correo@ejemplo.com" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Parentesco</label>
          <select id="edit-parentesco" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;background:#fff;">
            <option value="Madre">Madre</option>
            <option value="Padre">Padre</option>
            <option value="Tutor">Tutor/a</option>
            <option value="Abuelo/a">Abuelo/a</option>
          </select>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:4px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Contacto de emergencia</div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Nombre</label>
          <input type="text" id="edit-emerg-nombre" placeholder="Nombre de emergencia" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Teléfono</label>
          <input type="tel" id="edit-emerg-tel" placeholder="(656) 000-0000" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Parentesco</label>
          <input type="text" id="edit-emerg-parentesco" placeholder="Ej: Tío, Abuela…" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:16px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Persona autorizada a recoger</div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Nombre</label>
          <input type="text" id="edit-autoriz-nombre" placeholder="Nombre autorizado" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Teléfono</label>
          <input type="tel" id="edit-autoriz-tel" placeholder="(656) 000-0000" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
        <div style="margin-bottom:4px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Parentesco</label>
          <input type="text" id="edit-autoriz-parentesco" placeholder="Ej: Hermana, Tío…" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button class="btn secondary" style="flex:1;" id="modal-cancelar">Cancelar</button>
      <button class="btn primary" style="flex:1;" id="modal-guardar"><i data-lucide="save"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- Modal confirmar borrar -->
<div id="modal-borrar" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:16px;padding:22px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.18);">
    <div style="font-size:15px;font-weight:700;margin-bottom:8px;">¿Eliminar alumno?</div>
    <div style="font-size:13.5px;color:var(--muted);margin-bottom:18px;" id="borrar-nombre-txt">Esta acción no se puede deshacer.</div>
    <div style="display:flex;gap:10px;">
      <button class="btn secondary" style="flex:1;" id="borrar-cancelar">Cancelar</button>
      <button class="btn" style="flex:1;background:var(--red-600);color:#fff;" id="borrar-confirmar"><i data-lucide="trash-2"></i> Eliminar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  let alumnos = []
  let borrarId = null

  async function cargar() {
    const { data, count } = await supabase.from('alumnos').select('*', { count: 'exact' }).order('nombre')
    alumnos = data || []
    document.getElementById('sub').textContent = (count || 0) + ' activos'
    render()
  }

  function render() {
    const list = document.getElementById('list')
    if (!alumnos.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin alumnos registrados.</div>'
    } else {
      list.innerHTML = alumnos.map(a => {
        const ini = a.nombre?.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase() || '?'
        return `<div class="row" style="gap:10px;">
          <a href="admin-evaluacion.html?alumno=${a.id}" style="display:flex;align-items:center;gap:10px;flex:1;text-decoration:none;color:inherit;min-width:0;">
            <span class="avatar" style="width:34px;height:34px;font-size:12px;flex-shrink:0;">${ini}</span>
            <span class="grow" style="min-width:0;">
              <span class="t" style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.nombre}</span>
              <span class="s">${a.cinta ? 'Cinta ' + a.cinta : 'Sin cinta'}${a.grupo ? ' · ' + a.grupo : ''}</span>
            </span>
          </a>
          <span style="display:flex;gap:6px;flex-shrink:0;">
            <button class="iconbtn" data-editar="${a.id}" style="width:32px;height:32px;" title="Editar"><i data-lucide="pencil" style="width:15px;height:15px"></i></button>
            <button class="iconbtn" data-borrar="${a.id}" style="width:32px;height:32px;color:var(--red-600);" title="Eliminar"><i data-lucide="trash-2" style="width:15px;height:15px"></i></button>
          </span>
        </div>`
      }).join('')
    }
    lucide.createIcons()
  }

  // Editar
  document.getElementById('list').addEventListener('click', async e => {
    const editBtn = e.target.closest('[data-editar]')
    if (editBtn) {
      const a = alumnos.find(x => x.id === editBtn.dataset.editar)
      if (!a) return
      document.getElementById('edit-id').value = a.id
      document.getElementById('edit-nombre').value = a.nombre || ''
      document.getElementById('edit-cinta').value = a.cinta || ''
      document.getElementById('edit-grupo').value = a.grupo || ''
      document.getElementById('edit-horario').value = a.horario || ''
      // Cargar datos del padre vinculado
      const { data: p } = await supabase.from('padres').select('nombre, telefono, correo, parentesco, contacto_emergencia_nombre, contacto_emergencia_tel, contacto_emergencia_parentesco, autorizado_nombre, autorizado_tel, autorizado_parentesco').eq('alumno_id', a.id).maybeSingle()
      document.getElementById('edit-padre-nombre').value = p?.nombre || ''
      document.getElementById('edit-telefono').value = p?.telefono || ''
      document.getElementById('edit-correo').value = p?.correo || ''
      document.getElementById('edit-parentesco').value = p?.parentesco || 'Madre'
      document.getElementById('edit-emerg-nombre').value = p?.contacto_emergencia_nombre || ''
      document.getElementById('edit-emerg-tel').value = p?.contacto_emergencia_tel || ''
      document.getElementById('edit-emerg-parentesco').value = p?.contacto_emergencia_parentesco || ''
      document.getElementById('edit-autoriz-nombre').value = p?.autorizado_nombre || ''
      document.getElementById('edit-autoriz-tel').value = p?.autorizado_tel || ''
      document.getElementById('edit-autoriz-parentesco').value = p?.autorizado_parentesco || ''
      document.getElementById('modal').style.display = 'flex'
      lucide.createIcons()
      return
    }
    const borrarBtn = e.target.closest('[data-borrar]')
    if (borrarBtn) {
      borrarId = borrarBtn.dataset.borrar
      const a = alumnos.find(x => x.id === borrarId)
      document.getElementById('borrar-nombre-txt').textContent = '¿Eliminar a ' + (a?.nombre || 'este alumno') + '? Esta acción no se puede deshacer.'
      document.getElementById('modal-borrar').style.display = 'flex'
    }
  })

  document.getElementById('modal-cancelar').addEventListener('click', () => {
    document.getElementById('modal').style.display = 'none'
  })

  document.getElementById('modal-guardar').addEventListener('click', async () => {
    const id = document.getElementById('edit-id').value
    const nombre = document.getElementById('edit-nombre').value.trim()
    const cinta = document.getElementById('edit-cinta').value
    const grupo = document.getElementById('edit-grupo').value
    const horario = document.getElementById('edit-horario').value
    if (!nombre) { alert('El nombre es obligatorio'); return }
    const btn = document.getElementById('modal-guardar')
    btn.disabled = true; btn.textContent = 'Guardando…'

    const { error } = await supabase.from('alumnos').update({
      nombre, cinta: cinta || null, grupo: grupo || null, horario: horario || null
    }).eq('id', id)

    if (!error) {
      await supabase.from('padres').update({
        nombre: document.getElementById('edit-padre-nombre').value.trim() || null,
        telefono: document.getElementById('edit-telefono').value.trim() || null,
        correo: document.getElementById('edit-correo').value.trim() || null,
        parentesco: document.getElementById('edit-parentesco').value || null,
        contacto_emergencia_nombre: document.getElementById('edit-emerg-nombre').value.trim() || null,
        contacto_emergencia_tel: document.getElementById('edit-emerg-tel').value.trim() || null,
        contacto_emergencia_parentesco: document.getElementById('edit-emerg-parentesco').value.trim() || null,
        autorizado_nombre: document.getElementById('edit-autoriz-nombre').value.trim() || null,
        autorizado_tel: document.getElementById('edit-autoriz-tel').value.trim() || null,
        autorizado_parentesco: document.getElementById('edit-autoriz-parentesco').value.trim() || null,
      }).eq('alumno_id', id)
    }

    btn.disabled = false; btn.innerHTML = '<i data-lucide="save"></i> Guardar'; lucide.createIcons()
    if (error) { alert('❌ Error: ' + error.message); return }
    document.getElementById('modal').style.display = 'none'
    await cargar()
  })

  document.getElementById('borrar-cancelar').addEventListener('click', () => {
    document.getElementById('modal-borrar').style.display = 'none'
    borrarId = null
  })

  document.getElementById('borrar-confirmar').addEventListener('click', async () => {
    if (!borrarId) return
    const btn = document.getElementById('borrar-confirmar')
    btn.disabled = true; btn.textContent = 'Eliminando…'
    const { error } = await supabase.from('alumnos').delete().eq('id', borrarId)
    btn.disabled = false; btn.innerHTML = '<i data-lucide="trash-2"></i> Eliminar'; lucide.createIcons()
    if (error) { alert('❌ Error: ' + error.message); return }
    document.getElementById('modal-borrar').style.display = 'none'
    borrarId = null
    await cargar()
  })

  cargar()
</script>
</body></html>
