<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Horario — Union MA</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/assets/icon-192.png">
<meta name="theme-color" content="#0047AB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Union MA">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="stylesheet" href="css/uma.css?v=18" />
<link rel="stylesheet" href="css/header-unified.css?v=1"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
<style>
/* Hero — igual que avisos */
.hor-hero { background:linear-gradient(135deg,#0047AB 0%,#1a5cc8 100%); padding:16px 18px 22px; color:#fff; }
.hor-hero-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.hero-logo { display:flex; align-items:center; gap:10px; }
.hero-logo-circle { width:40px; height:40px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.hero-logo-circle img { width:28px; height:28px; object-fit:contain; }
.hero-logo-txt { font-size:11px; font-weight:800; letter-spacing:.04em; line-height:1.2; opacity:.9; }
.hero-avatar { width:38px; height:38px; background:rgba(255,255,255,.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; flex-shrink:0; }
.hero-title { font-size:22px; font-weight:800; margin-bottom:2px; }
.hero-sub { font-size:13px; opacity:.75; }

/* Cards */
.seg-card { background:#fff; border-radius:16px; margin-bottom:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.horario-row { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid #f3f4f6; }
.horario-row:last-child { border-bottom:none; }
.dia-chip { background:#eff6ff; color:#0047AB; border-radius:8px; padding:5px 12px; font-size:12px; font-weight:700; min-width:72px; text-align:center; flex-shrink:0; }
.hora-txt { font-size:13px; color:#374151; font-weight:500; }

/* Próxima clase */
.prox-card { background:#fff; border-radius:16px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:12px; }
.prox-ic { width:44px; height:44px; background:#eff6ff; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
</style>
</head>
<body>
<div class="phone"><div class="screen" style="background:#f0f2f5;">

  <!-- Hero -->
  <div class="navhead blue uma-hdr hdr-unified">
    <a href="home.html" class="navback" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="uma-hdr-brand">
      <div class="uma-hdr-logo"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
      <div class="uma-hdr-txt">UNION<br>MARTIAL ARTS</div>
    </div>
    <div class="grow"><div class="title">Horario</div></div>
  </div>
  <div style="display:none;" id="hero-initials"></div>
  <div style="display:none;" id="hero-alumno"></div>

  <div class="body">

    <!-- Clases asignadas -->
    <div class="label">Clases asignadas</div>
    <div id="segs-wrap">
      <div class="seg-card" style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">
        <i class="ti ti-loader-2" style="font-size:22px;display:block;margin:0 auto 8px;opacity:.4;"></i>
        Cargando horario…
      </div>
    </div>

    <!-- Próxima clase -->
    <div id="proxima-section" style="display:none;">
      <div class="label" style="margin-top:4px;">Próxima clase</div>
      <div class="prox-card">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="prox-ic">
            <i class="ti ti-calendar-clock" style="font-size:22px;color:#0047AB;"></i>
          </div>
          <div>
            <div style="font-size:14px;font-weight:700;color:#111827;" id="prox-dia">—</div>
            <div style="font-size:12px;color:#6b7280;margin-top:2px;" id="prox-hora"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )

  function showErr(msg) {
    document.getElementById('segs-wrap').innerHTML =
      `<div class="seg-card" style="padding:16px;color:#dc2626;font-size:13px;text-align:center;">${msg}</div>`
  }

  function initials(name) {
    if (!name) return '?'
    return name.trim().split(/\s+/).slice(0,2).map(p => p[0]).join('').toUpperCase()
  }

  async function initHorario() {
    try {
    const _to = setTimeout(() => {
      document.getElementById('segs-wrap').innerHTML = '<div class="seg-card" style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">No hay clases asignadas por el momento.</div>';
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }, 8000);
    const { data: authData } = await supabase.auth.getUser()
    const user = authData?.user
    
    if (!user) { window.location.href = 'index.html'; return }

    // Misma selección de padre que Perfil: uma_padre_id -> user_id -> correo.
    let padre = null
    const savedPadreId = localStorage.getItem('uma_padre_id')
    if (savedPadreId) {
      const { data: sp, error: errSp } = await supabase.from('padres')
        .select('id, alumno_id, nombre, correo')
        .eq('id', savedPadreId)
        .limit(1)
      if (errSp) {
        showErr(errSp.message)
        lucide.createIcons(); return
      }
      if (sp?.[0]) padre = sp[0]
    }

    if (!padre) {
      const { data: r1, error: err1 } = await supabase.from('padres')
        .select('id, alumno_id, nombre, correo')
        .eq('user_id', user.id)
        .limit(1)

      if (err1) {
        showErr(err1.message)
        lucide.createIcons(); return
      }
      if (r1?.[0]) padre = r1[0]
    }

    if (!padre) {
      const { data: r2, error: err2 } = await supabase.from('padres')
        .select('id, alumno_id, nombre, correo')
        .eq('correo', user.email)
        .limit(1)

      if (err2) {
        showErr(err2.message)
        lucide.createIcons(); return
      }
      if (r2?.[0]) {
        const { error: errUpd } = await supabase.from('padres')
          .update({ user_id: user.id })
          .eq('id', r2[0].id)
        if (errUpd) {
          showErr(errUpd.message)
          lucide.createIcons(); return
        }
        padre = r2[0]
      }
    }

    if (!padre) {
      showErr('No se encontró el padre para este usuario.')
      lucide.createIcons(); return
    }

    if (padre?.nombre) {
      document.getElementById('hero-initials').textContent = initials(padre.nombre)
    }

    if (!padre?.alumno_id) {
      document.getElementById('hero-alumno').textContent = 'Sin alumno vinculado'
      showErr('No hay un alumno vinculado a tu cuenta. Contacta al instructor.')
      lucide.createIcons(); return
    }

    
    // Cargar alumno
    const { data: alRows, error: errAl } = await supabase.from('alumnos')
      .select('nombre, horario, cinta')
      .eq('id', padre.alumno_id)
      .limit(1)
    
    if (errAl) {
      showErr(errAl.message)
      lucide.createIcons(); return
    }

    const al = alRows?.[0] || null

    if (padre?.nombre) {
      document.getElementById('hero-initials').textContent = initials(padre.nombre)
    }

    if (!padre?.alumno_id) {
      document.getElementById('hero-alumno').textContent = 'Sin alumno vinculado'
      showErr('No hay un alumno vinculado a tu cuenta. Contacta al instructor.')
      lucide.createIcons(); return
    }

    if (!al) {
      showErr('No se pudo cargar el alumno. Verifica con el instructor.')
      lucide.createIcons(); return
    }

    document.getElementById('hero-alumno').textContent =
      al.nombre + (al.cinta ? '  ·  Cinta ' + al.cinta : '')

    const wrap = document.getElementById('segs-wrap')

    if (!al.horario || !al.horario.trim()) {
      wrap.innerHTML = `<div class="seg-card" style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">
        <i class="ti ti-calendar-off" style="font-size:28px;display:block;margin:0 auto 8px;opacity:.3;"></i>
        Sin horario asignado aún.
      </div>`
      lucide.createIcons(); return
    }

    // Mostrar exactamente los segmentos guardados para el alumno.
    const segmentos = al.horario.split('|').map(s => s.trim()).filter(Boolean)

    const rows = segmentos.map(seg => {
      const partes = seg.split('·')
      const diaStr = (partes[0] || seg).trim()
      const horaStr = partes.length > 1 ? partes.slice(1).join('·').trim() : ''
      return { raw: seg, diaStr, horaStr }
    })

    wrap.innerHTML = `<div class="seg-card">` +
      rows.map(r => `
        <div class="horario-row">
          <div class="dia-chip">${r.raw}</div>
          <div class="hora-txt"></div>
        </div>`).join('') +
      `</div>`

    function textoSinAcentos(s) {
      return (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase()
    }

    function parseHora12h(txt) {
      const m = (txt || '').match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i)
      if (!m) return null
      let h = parseInt(m[1], 10)
      const min = parseInt(m[2] || '0', 10)
      const ap = m[3].toUpperCase()
      if (ap === 'PM' && h !== 12) h += 12
      if (ap === 'AM' && h === 12) h = 0
      return { h, min }
    }

    function parseRangoHoras(txt) {
      const partes = (txt || '').split(/[\-–]/).map(p => p.trim()).filter(Boolean)
      const inicio = parseHora12h(partes[0] || '')
      const fin = parseHora12h(partes[1] || '')
      return { inicio, fin }
    }

    function inicioDelDia(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate())
    }

    function esMismoDia(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate()
    }

    function fmtHorasMin(minutosTotales) {
      const mins = Math.max(1, Math.ceil(minutosTotales))
      const h = Math.floor(mins / 60)
      const m = mins % 60
      return `${h} h ${m} min`
    }

    const dias = [
      { n: 'domingo', i: 0 },
      { n: 'lunes', i: 1 },
      { n: 'martes', i: 2 },
      { n: 'miercoles', i: 3 },
      { n: 'jueves', i: 4 },
      { n: 'viernes', i: 5 },
      { n: 'sabado', i: 6 }
    ]

    const ahora = new Date()
    const enCurso = []
    const proximas = []

    for (const r of rows) {
      const diaNormalizado = textoSinAcentos(r.diaStr)
      const rango = parseRangoHoras(r.horaStr)
      for (const d of dias) {
        if (!diaNormalizado.includes(d.n)) continue

        const inicio = new Date(ahora)
        const diff = (d.i - ahora.getDay() + 7) % 7
        inicio.setDate(ahora.getDate() + diff)
        inicio.setSeconds(0, 0)
        inicio.setHours(rango.inicio ? rango.inicio.h : 12, rango.inicio ? rango.inicio.min : 0, 0, 0)

        const fin = new Date(inicio)
        if (rango.fin) {
          fin.setHours(rango.fin.h, rango.fin.min, 0, 0)
          if (fin <= inicio) fin.setDate(fin.getDate() + 1)
        } else {
          fin.setMinutes(fin.getMinutes() + 60)
        }

        if (ahora >= inicio && ahora < fin) {
          enCurso.push({ inicio, fin, hora: r.horaStr, nombreDia: d.n })
          continue
        }

        let proximoInicio = inicio
        if (proximoInicio <= ahora) {
          proximoInicio = new Date(proximoInicio)
          proximoInicio.setDate(proximoInicio.getDate() + 7)
        }

        proximas.push({ inicio: proximoInicio, hora: r.horaStr, nombreDia: d.n })
      }
    }

    if (enCurso.length) {
      enCurso.sort((a, b) => a.fin - b.fin)
      const actual = enCurso[0]
      const minRest = Math.max(1, Math.ceil((actual.fin - ahora) / 60000))
      document.getElementById('prox-dia').textContent = 'En clase ahora'
      document.getElementById('prox-hora').innerHTML = `Termina en ${minRest} min${actual.hora ? '<br>' + actual.hora : ''}`
      document.getElementById('proxima-section').style.display = 'block'
    } else if (proximas.length) {
      proximas.sort((a, b) => a.inicio - b.inicio)
      const siguiente = proximas[0]

      const hoy0 = inicioDelDia(ahora)
      const sig0 = inicioDelDia(siguiente.inicio)
      const diasDif = Math.round((sig0 - hoy0) / 86400000)
      const totalMin = Math.max(1, Math.ceil((siguiente.inicio - ahora) / 60000))

      if (esMismoDia(siguiente.inicio, ahora)) {
        document.getElementById('prox-dia').textContent = 'Hoy'
        document.getElementById('prox-hora').innerHTML = `Comienza en ${fmtHorasMin(totalMin)}${siguiente.hora ? '<br>' + siguiente.hora : ''}`
      } else if (diasDif === 1) {
        document.getElementById('prox-dia').textContent = 'Mañana'
        document.getElementById('prox-hora').innerHTML = `Comienza en ${fmtHorasMin(totalMin)}${siguiente.hora ? '<br>' + siguiente.hora : ''}`
      } else {
        document.getElementById('prox-dia').textContent = siguiente.nombreDia.charAt(0).toUpperCase() + siguiente.nombreDia.slice(1)
        const restoMin = totalMin - (diasDif * 1440)
        document.getElementById('prox-hora').innerHTML = `Comienza en ${diasDif} día${diasDif === 1 ? '' : 's'} / ${fmtHorasMin(restoMin)}${siguiente.hora ? '<br>' + siguiente.hora : ''}`
      }

      document.getElementById('proxima-section').style.display = 'block'
    } else {
      document.getElementById('proxima-section').style.display = 'none'
    }

    lucide.createIcons()
    clearTimeout(_to);
    } catch(e) {
      showErr('Error: ' + e.message)
      lucide.createIcons()
    }
  }

  initHorario();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }
</script>
</body>
</html>
