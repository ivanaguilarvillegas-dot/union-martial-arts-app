<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Horario — Union MA</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0047AB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Union MA">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="stylesheet" href="css/uma.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
<style>
/* Hero — igual que avisos */
.hor-hero { background:linear-gradient(135deg,#0047AB 0%,#1a5cc8 100%); padding:16px 18px 22px; color:#fff; }
.hor-hero-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.hero-logo { display:flex; align-items:center; gap:10px; }
.hero-logo-circle { width:40px; height:40px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.hero-logo-circle img { width:28px; height:28px; object-fit:contain; }
.hero-logo-txt { font-size:11px; font-weight:800; letter-spacing:.04em; line-height:1.2; opacity:.9; }
.hero-avatar { width:38px; height:38px; background:rgba(255,255,255,.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; flex-shrink:0; }
.hero-title { font-size:22px; font-weight:800; margin-bottom:2px; }
.hero-sub { font-size:13px; opacity:.75; }

/* Cards */
.seg-card { background:#fff; border-radius:16px; margin-bottom:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.horario-row { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid #f3f4f6; }
.horario-row:last-child { border-bottom:none; }
.dia-chip { background:#eff6ff; color:#0047AB; border-radius:8px; padding:5px 12px; font-size:12px; font-weight:700; min-width:72px; text-align:center; flex-shrink:0; }
.hora-txt { font-size:13px; color:#374151; font-weight:500; }

/* Próxima clase */
.prox-card { background:#fff; border-radius:16px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:12px; }
.prox-ic { width:44px; height:44px; background:#eff6ff; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
</style>
</head>
<body>
<div class="phone"><div class="screen" style="background:#f0f2f5;">

  <!-- Hero -->
  <div class="hor-hero">
    <div class="hor-hero-top">
      <div class="hero-logo">
        <div class="hero-logo-circle">
          <img src="/assets/logo-union-blue.png" alt="UMA" />
        </div>
        <div class="hero-logo-txt">UNION<br>MARTIAL ARTS</div>
      </div>
      <div class="hero-avatar" id="hero-initials">—</div>
    </div>
    <div class="hero-title">Horario</div>
    <div class="hero-sub" id="hero-alumno">Cargando…</div>
  </div>

  <div class="body"><div id="debug-box" style="display:none;background:#fef3c7;border:1.5px solid #fde68a;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;line-height:1.8;"></div>

    <!-- Clases asignadas -->
    <div class="label">Clases asignadas</div>
    <div id="segs-wrap">
      <div class="seg-card" style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">
        <i class="ti ti-loader-2" style="font-size:22px;display:block;margin:0 auto 8px;opacity:.4;"></i>
        Cargando horario…
      </div>
    </div>

    <!-- Próxima clase -->
    <div id="proxima-section" style="display:none;">
      <div class="label" style="margin-top:4px;">Próxima clase</div>
      <div class="prox-card">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="prox-ic">
            <i class="ti ti-calendar-clock" style="font-size:22px;color:#0047AB;"></i>
          </div>
          <div>
            <div style="font-size:14px;font-weight:700;color:#111827;" id="prox-dia">—</div>
            <div style="font-size:12px;color:#6b7280;margin-top:2px;" id="prox-hora"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  document.getElementById('debug-box').innerHTML = 'Cargando supabase…'
  document.getElementById('debug-box').style.display = 'block'
  if (!window.supabase) { document.getElementById('debug-box').innerHTML = 'Error: supabase no cargó'; }
  const { createClient } = window.supabase
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )

  ;(async () => {

  function showErr(msg) {
    document.getElementById('segs-wrap').innerHTML =
      `<div class="seg-card" style="padding:16px;color:#dc2626;font-size:13px;text-align:center;">${msg}</div>`
  }

  function initials(name) {
    if (!name) return '?'
    return name.trim().split(/\s+/).slice(0,2).map(p => p[0]).join('').toUpperCase()
  }

  const dbg = document.getElementById('debug-box')
  const upd = t => { dbg.innerHTML = t; dbg.style.display = 'block' }

  try {
    upd('Paso 1: verificando sesión…')
    const { data: sessionData } = await supabase.auth.getSession()
    const user = sessionData?.session?.user
    upd('Paso 1 OK — user: ' + (user ? user.email : 'null (no sesión)'))
    if (!user) { window.location.href = 'index.html'; return }

    // Cargar padre — intenta por user_id primero, luego por correo
    upd('Paso 2: buscando padre (user_id=' + user.id + ')…')
    let padre = null
    const { data: p1, error: p1err } = await supabase.from('padres').select('id, alumno_id, nombre').eq('user_id', user.id).maybeSingle()
    upd('Paso 2a: p1=' + JSON.stringify(p1) + (p1err?' err:'+p1err.message:''))
    if (p1?.alumno_id) {
      padre = p1
    } else {
      upd('Paso 2b: buscando por correo=' + user.email)
      const { data: p2, error: p2err } = await supabase.from('padres').select('id, alumno_id, nombre').eq('correo', user.email).maybeSingle()
      upd('Paso 2b: p2=' + JSON.stringify(p2) + (p2err?' err:'+p2err.message:''))
      if (p2) {
        await supabase.from('padres').update({ user_id: user.id }).eq('id', p2.id)
        padre = p2
      }
    }

    if (padre?.nombre) {
      document.getElementById('hero-initials').textContent = initials(padre.nombre)
    }

    if (!padre?.alumno_id) {
      document.getElementById('hero-alumno').textContent = 'Sin alumno vinculado'
      showErr('No hay un alumno vinculado a tu cuenta. Contacta al instructor.')
      lucide.createIcons(); return
    }

    // Cargar alumno
    const { data: al, error: alErr } = await supabase.from('alumnos')
      .select('nombre, horario, cinta').eq('id', padre.alumno_id).maybeSingle()

    if (alErr || !al) {
      showErr('No se pudo cargar el alumno.' + (alErr ? ' (' + alErr.message + ')' : ''))
      lucide.createIcons(); return
    }

    document.getElementById('hero-alumno').textContent =
      al.nombre + (al.cinta ? '  ·  Cinta ' + al.cinta : '')

    const wrap = document.getElementById('segs-wrap')

    document.getElementById('debug-box').innerHTML = '<b>alumno:</b> ' + al.nombre + ' | <b>horario raw:</b> ' + JSON.stringify(al.horario)
    document.getElementById('debug-box').style.display = 'block'

    if (!al.horario || !al.horario.trim()) {
      wrap.innerHTML = `<div class="seg-card" style="padding:24px;text-align:center;color:var(--muted);font-size:13px;"><i class="ti ti-calendar-off" style="font-size:28px;display:block;margin:0 auto 8px;opacity:.3;"></i>Sin horario asignado. (valor: "${JSON.stringify(al.horario)}")</div>`
      lucide.createIcons(); return
    }
    // Parsear horario
    // Soporta: "Lunes·6pm | Miércoles·6pm" o "Lunes 6pm, Miércoles 6pm" o "Lunes - 6pm"
    const segmentos = al.horario.split('|').map(s => s.trim()).filter(Boolean)

    const rows = segmentos.map(seg => {
      // Separadores: ·, -, :, espacio doble, o primera palabra = día
      let diaStr = seg, horaStr = ''
      const m = seg.match(/^(.+?)[\s]*[·\-–]\s*(.+)$/)
      if (m) {
        diaStr = m[1].trim()
        horaStr = m[2].trim()
      } else {
        // Intenta dividir por primer espacio si la segunda parte parece hora
        const parts = seg.split(/\s+/)
        if (parts.length >= 2 && /\d/.test(parts[parts.length - 1])) {
          horaStr = parts.pop()
          diaStr = parts.join(' ')
        }
      }
      return { diaStr, horaStr }
    })

    wrap.innerHTML = `<div class="seg-card">` +
      rows.map(r => `
        <div class="horario-row">
          <div class="dia-chip">${r.diaStr}</div>
          <div class="hora-txt">${r.horaStr || '—'}</div>
        </div>`).join('') +
      `</div>`

    // Calcular próxima clase
    const DIAS_MAP = {
      'domingo':0,'lunes':1,'martes':2,'miércoles':3,'miercoles':3,
      'jueves':4,'viernes':5,'sábado':6,'sabado':6
    }
    const hoy = new Date()
    const diaHoy = hoy.getDay()
    let proximoDia = null, proximaHora = '', diasHasta = 99

    for (const r of rows) {
      const l = r.diaStr.toLowerCase()
      for (const [nombre, num] of Object.entries(DIAS_MAP)) {
        if (l.includes(nombre)) {
          let diff = (num - diaHoy + 7) % 7
          if (diff === 0) diff = 7
          if (diff < diasHasta) { diasHasta = diff; proximoDia = r.diaStr; proximaHora = r.horaStr }
          break
        }
      }
    }

    if (proximoDia) {
      const proxFecha = new Date(hoy)
      proxFecha.setDate(hoy.getDate() + diasHasta)
      const opcFecha = { weekday:'long', day:'numeric', month:'long' }
      document.getElementById('prox-dia').textContent =
        proximoDia + ' · ' + proxFecha.toLocaleDateString('es-MX', opcFecha)
      document.getElementById('prox-hora').textContent = proximaHora
      document.getElementById('proxima-section').style.display = 'block'
    }

    lucide.createIcons()
  } catch(e) {
    showErr('Error: ' + e.message)
    lucide.createIcons()
  }
  })()
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }
</script>
</body>
</html>
