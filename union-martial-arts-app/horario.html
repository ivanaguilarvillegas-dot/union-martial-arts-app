<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Horario — Union MA</title>
<link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f2167">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Union MA">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="stylesheet" href="css/uma.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
<style>
  .hor-hero { background:linear-gradient(135deg,#0f2167 0%,#1a3a9e 100%); border-radius:20px; padding:24px 20px; margin-bottom:16px; color:#fff; text-align:center; }
  .hor-hero .alumno-ic { width:60px; height:60px; background:rgba(255,255,255,.15); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
  .hor-hero .alumno-nom { font-size:16px; font-weight:700; margin-bottom:4px; }
  .hor-hero .alumno-cinta { font-size:12px; opacity:.8; }

  .seg-card { background:#fff; border-radius:16px; margin-bottom:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .seg-head { display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid #f0f2f5; }
  .seg-ic { width:38px; height:38px; border-radius:12px; background:#eff6ff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .seg-title { font-size:14px; font-weight:700; color:var(--text); }
  .seg-sub { font-size:12px; color:var(--muted); margin-top:1px; }
  .seg-body { padding:14px 16px; }
  .horario-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f8f9fa; }
  .horario-row:last-child { border-bottom:none; }
  .dia-chip { background:#eff6ff; color:#1d4ed8; border-radius:8px; padding:4px 10px; font-size:12px; font-weight:700; min-width:68px; text-align:center; }
  .hora-txt { font-size:13px; color:var(--text); font-weight:500; }
  .proximo-badge { background:#dcfce7; color:#16a34a; border-radius:8px; padding:3px 8px; font-size:11px; font-weight:700; margin-left:auto; }
</style>
</head>
<body>
<div class="phone"><div class="screen" style="background:#f0f2f5;">
  <div class="navhead blue">
    <a class="navback" href="home.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Horario</div></div>
  </div>

  <div class="body">
    <!-- Hero alumno -->
    <div class="hor-hero">
      <div class="alumno-ic">
        <i class="ti ti-karate" style="font-size:28px;color:#fff;"></i>
      </div>
      <div class="alumno-nom" id="alumno-nom">—</div>
      <div class="alumno-cinta" id="alumno-cinta"></div>
    </div>

    <!-- Segmentos de horario -->
    <div class="label">Clases asignadas</div>
    <div id="segs-wrap">
      <div class="seg-card" id="skeleton" style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">
        <i data-lucide="loader" style="width:20px;height:20px;"></i> Cargando horario…
      </div>
    </div>

    <!-- Próxima clase -->
    <div class="label" style="margin-top:4px;">Próxima clase</div>
    <div class="card" id="proxima-wrap" style="display:none;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:42px;height:42px;background:#eff6ff;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i data-lucide="calendar-clock" style="color:#1d4ed8;width:20px;height:20px;"></i>
        </div>
        <div>
          <div style="font-size:14px;font-weight:700;" id="prox-dia">—</div>
          <div style="font-size:12px;color:var(--muted);" id="prox-hora">—</div>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )

  function showErr(msg) {
    const el = document.getElementById('segs-wrap')
    if (el) el.innerHTML = `<div class="card" style="padding:16px;color:#dc2626;font-size:13px;">${msg}</div>`
    lucide.createIcons()
  }

  try {
    const { data: authData } = await supabase.auth.getUser()
    const user = authData?.user
    if (!user) { window.location.href = 'index.html'; return }

    // Cargar padre
    let padre = null
    try {
      const { data: p1 } = await supabase.from('padres').select('alumno_id, nombre').eq('user_id', user.id).maybeSingle()
      if (p1?.alumno_id) { padre = p1 }
      else {
        const { data: p2 } = await supabase.from('padres').select('id, alumno_id, nombre').eq('correo', user.email).maybeSingle()
        if (p2) { await supabase.from('padres').update({ user_id: user.id }).eq('id', p2.id); padre = p2 }
      }
    } catch(e) { showErr('Error al cargar datos del padre: ' + e.message); return }

    if (!padre?.alumno_id) { showErr('Sin alumno vinculado a tu cuenta.'); return }

    // Cargar alumno
    const { data: al, error: alErr } = await supabase.from('alumnos').select('nombre, horario, cinta').eq('id', padre.alumno_id).maybeSingle()
    if (alErr || !al) { showErr('No se encontró el alumno.' + (alErr ? ' ' + alErr.message : '')); return }

    document.getElementById('alumno-nom').textContent = al.nombre || '—'
    document.getElementById('alumno-cinta').textContent = al.cinta ? 'Cinta ' + al.cinta : ''

    const wrap = document.getElementById('segs-wrap')
    wrap.innerHTML = ''

    if (!al.horario) {
      wrap.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin horario asignado aún.</div>'
      lucide.createIcons(); return
    }

    // Parsear horario — soporta separador | o ,
    const segmentos = al.horario.split(/\s*\|\s*|\s*,\s*/).filter(Boolean)

    const rows = segmentos.map(seg => {
      const partes = seg.split('·')
      const diaStr = (partes[0] || seg).trim()
      const horaStr = partes.length > 1 ? partes[1].trim() : ''
      return { diaStr, horaStr }
    })

    wrap.innerHTML = `<div class="seg-card"><div class="seg-body" style="padding:8px 16px;">` +
      rows.map(r => `
        <div class="horario-row">
          <div class="dia-chip">${r.diaStr}</div>
          <div class="hora-txt">${r.horaStr || '—'}</div>
        </div>`).join('') +
    `</div></div>`

    // Calcular próxima clase
    const DIAS_MAP = {'domingo':0,'lunes':1,'martes':2,'miércoles':3,'miercoles':3,'jueves':4,'viernes':5,'sábado':6,'sabado':6}
    const hoy = new Date()
    const diaHoy = hoy.getDay()
    let proximoDia = null, proximaHora = '', diasHasta = 99

    for (const r of rows) {
      const l = r.diaStr.toLowerCase()
      for (const [nombre, num] of Object.entries(DIAS_MAP)) {
        if (l.includes(nombre)) {
          let diff = (num - diaHoy + 7) % 7
          if (diff === 0) diff = 7
          if (diff < diasHasta) { diasHasta = diff; proximoDia = r.diaStr; proximaHora = r.horaStr }
          break
        }
      }
    }

    if (proximoDia) {
      const proxFecha = new Date(hoy)
      proxFecha.setDate(hoy.getDate() + diasHasta)
      const opcFecha = { weekday:'long', day:'numeric', month:'long' }
      document.getElementById('prox-dia').textContent = proximoDia + ' · ' + proxFecha.toLocaleDateString('es-MX', opcFecha)
      document.getElementById('prox-hora').textContent = proximaHora
      document.getElementById('proxima-wrap').style.display = 'block'
    }

    lucide.createIcons()
  } catch(e) {
    showErr('Error inesperado: ' + e.message)
  }
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }
</script>
</body>
</html>
