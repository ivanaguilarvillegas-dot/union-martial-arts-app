<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestionar pagos</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="sub">Junio 2025</div><div class="title">Gestionar pagos</div></div></div>
  <div class="body">
    <div class="label">Mensualidad por alumno</div>
    <div class="stack-8" id="list"></div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a class="on" href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>

<!-- Modal confirmar pago con monto editable -->
<div id="modal-pago" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:16px;padding:22px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.18);">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px;">Confirmar pago</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px;" id="modal-alumno-nombre">Alumno</div>
    <div style="margin-bottom:14px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;">Monto recibido (MXN)</label>
      <div style="display:flex;align-items:center;gap:8px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;height:46px;">
        <span style="font-size:18px;font-weight:700;color:var(--muted);">$</span>
        <input type="number" id="modal-monto" min="1" style="flex:1;border:none;outline:none;font-size:18px;font-weight:700;font-family:inherit;" />
      </div>
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;">Forma de pago</label>
      <select id="modal-forma" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;background:#fff;outline:none;">
        <option value="efectivo">Efectivo</option>
        <option value="transferencia">Transferencia bancaria</option>
        <option value="mercadopago">Mercado Pago</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn secondary" style="flex:1;" id="modal-cancelar">Cancelar</button>
      <button class="btn primary" style="flex:1;" id="modal-confirmar"><i data-lucide="check"></i> Confirmar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  const mes = new Date().toLocaleString('es-MX', { month: 'long', year: 'numeric' })
  document.querySelector('.sub').textContent = mes.charAt(0).toUpperCase() + mes.slice(1)

  let pagos = []
  let pagoSeleccionado = null

  function iniciales(nombre) {
    return nombre?.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase() || '?'
  }

  async function cargar() {
    const { data } = await supabase
      .from('pagos')
      .select('*, alumnos(nombre)')
      .order('creado_en', { ascending: false })
    pagos = data || []
    render()
  }

  function render() {
    const list = document.getElementById('list')
    if (!pagos.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin registros de pago.</div>'
      return
    }
    list.innerHTML = pagos.map(p => {
      const ok = p.estado === 'pagado'
      const nombre = p.alumnos?.nombre || 'Alumno'
      const ini = iniciales(nombre)
      const tieneComp = !!p.comprobante_url
      return `<div class="card mb10">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="avatar" style="width:34px;height:34px;font-size:12px;flex-shrink:0;">${ini}</span>
          <span class="grow">
            <span class="t" style="font-size:13.5px;font-weight:600;">${nombre}</span>
            <span class="s">$${Number(p.monto).toLocaleString('es-MX')} MXN · ${p.mes||'—'}${p.forma_pago ? ' · '+p.forma_pago : ''}</span>
          </span>
          <button data-id="${p.id}" data-ok="${ok}" data-monto="${p.monto||0}" data-forma="${p.forma_pago||'efectivo'}" data-nombre="${nombre}"
            style="display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:var(--r-full);border:none;cursor:pointer;font-weight:600;font-size:12px;background:${ok?'var(--green-bg)':'var(--red-bg)'};color:${ok?'var(--green-text)':'var(--red-text)'};flex-shrink:0;">
            <i data-lucide="${ok?'check':'clock'}" style="width:13px;height:13px"></i> ${ok?'Pagado':'Pendiente'}
          </button>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
          ${tieneComp ? `<button class="btn secondary sm" data-comp="${encodeURIComponent(p.comprobante_url)}" style="font-size:12px;"><i data-lucide="file-image" style="width:13px;height:13px"></i> Ver comprobante</button>` : ''}
          ${ok ? `<button class="btn secondary sm" data-recibo="${p.id}" style="font-size:12px;"><i data-lucide="file-text" style="width:13px;height:13px"></i> Ver recibo</button>` : ''}
        </div>
      </div>`
    }).join('')
    lucide.createIcons()
  }

  document.getElementById('list').addEventListener('click', e => {
    const comp = e.target.closest('[data-comp]')
    if (comp) { window.open(decodeURIComponent(comp.dataset.comp), '_blank'); return }
    const rec = e.target.closest('[data-recibo]')
    if (rec) { window.open('recibo.html?id=' + rec.dataset.recibo, '_blank'); return }

    const btn = e.target.closest('[data-id]')
    if (!btn) return

    const yaOk = btn.dataset.ok === 'true'

    if (yaOk) {
      // Desmarcar como pendiente directamente
      if (!confirm('¿Marcar este pago como pendiente?')) return
      supabase.from('pagos').update({ estado: 'pendiente', fecha_pago: null }).eq('id', btn.dataset.id).then(() => cargar())
      return
    }

    // Abrir modal para confirmar con monto editable
    pagoSeleccionado = { id: btn.dataset.id, nombre: btn.dataset.nombre }
    document.getElementById('modal-alumno-nombre').textContent = btn.dataset.nombre + ' · ' + (pagos.find(p=>p.id===btn.dataset.id)?.mes||'')
    document.getElementById('modal-monto').value = btn.dataset.monto || ''
    document.getElementById('modal-forma').value = btn.dataset.forma || 'efectivo'
    document.getElementById('modal-pago').style.display = 'flex'
    lucide.createIcons()
  })

  document.getElementById('modal-cancelar').addEventListener('click', () => {
    document.getElementById('modal-pago').style.display = 'none'
    pagoSeleccionado = null
  })

  document.getElementById('modal-confirmar').addEventListener('click', async () => {
    if (!pagoSeleccionado) return
    const monto = parseInt(document.getElementById('modal-monto').value) || 0
    const forma = document.getElementById('modal-forma').value
    if (monto < 1) { alert('Ingresa el monto recibido'); return }

    const btn = document.getElementById('modal-confirmar')
    btn.disabled = true; btn.textContent = 'Guardando…'

    const hoy = new Date().toISOString().split('T')[0]
    const { error } = await supabase.from('pagos').update({
      estado: 'pagado',
      monto,
      forma_pago: forma,
      fecha_pago: hoy
    }).eq('id', pagoSeleccionado.id)

    if (error) { alert('❌ Error: ' + error.message); btn.disabled = false; btn.innerHTML = '<i data-lucide="check"></i> Confirmar'; lucide.createIcons(); return }

    // Notificar al padre
    const pago = pagos.find(p => p.id === pagoSeleccionado.id)
    await supabase.from('mensajes').insert({
      de_user_id: user.id,
      texto: `✅ Pago confirmado · ${pago?.alumnos?.nombre||'tu hijo/a'} · ${pago?.mes||''} · $${monto.toLocaleString('es-MX')} MXN · ${forma} · Fecha: ${hoy}`,
      para_admin: false
    })

    document.getElementById('modal-pago').style.display = 'none'
    pagoSeleccionado = null
    btn.disabled = false; btn.innerHTML = '<i data-lucide="check"></i> Confirmar'; lucide.createIcons()
    await cargar()
  })

  cargar()
</script>
</body></html>
