<!-- Modal confirmar pago -->
<div id="modal-pago" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:flex-end;justify-content:center;">
  <div style="background:#fff;border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:430px;">

    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;" id="modal-alumno-nombre"></div>

    <!-- Comprobante preview -->
    <div id="modal-comp-wrap" style="display:none;margin-bottom:12px;">

      <select id="modal-forma" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;background:#fff;outline:none;">

    <div style="display:flex;gap:10px;">
      <button class="btn secondary" style="flex:1;" id="modal-cancelar">Cancelar</button>
      <button class="btn primary" style="flex:1;" id="modal-confirmar"><i data-lucide="check"></i> Confirmar</button>
    </div>

</div>

<!-- Modal nuevo pago -->
<div id="modal-nuevo-pago" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:flex-end;justify-content:center;">
  <div style="background:#fff;border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:430px;">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px;">Nuevo cargo</div>

    <div style="margin-bottom:12px;">

      <input type="text" id="nuevo-pago-mes" placeholder="Ej: Julio 2026" style="width:100%;height:42px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;" />
    </div>
    <div style="margin-bottom:18px;">
      <label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;">Monto (MXN)</label>
      <div style="display:flex;align-items:center;gap:8px;border:1.5px solid var(--border-input);border-radius:10px;padding:0 12px;height:46px;">
        <span style="font-size:18px;font-weight:700;color:var(--muted);">$</span>
        <input type="number" id="nuevo-pago-monto" min="1" style="flex:1;border:none;outline:none;font-size:18px;font-weight:700;font-family:inherit;" />

    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn secondary" style="flex:1;" id="nuevo-pago-cancelar">Cancelar</button>
      <button class="btn primary" style="flex:1;" id="nuevo-pago-crear"><i data-lucide="plus"></i> Crear</button>

  </div>
</div>

<style>
.tab{flex:1;padding:8px;border:none;background:none;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:10px;font-family:inherit;}

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://gdajgennlsuvndanpxiz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
)
const { data: { user } } = await supabase.auth.getUser()
if (!user) { window.location.href = 'index.html' }

let pagos = [], tabActual = 'revisar', pagoSel = null, nuevoPagoAlumnoId = null
let pagoEventos = {}

function iniciales(n) { return (n||'?').split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase() }

function etiquetaMetodo(metodo) {
  const normalizado = String(metodo || '').toLowerCase()
  if (normalizado === 'efectivo') return 'Efectivo en academia'
  if (normalizado === 'transferencia') return 'Transferencia bancaria'
  if (normalizado === 'mercadopago') return 'Mercado Pago'
  return '—'
}

function estadoPago(p) {
  if (!p) return 'pendiente'
  const estadoRaw = String(p.estado || '').toLowerCase().trim()
  if (estadoRaw === 'pagado' || estadoRaw === 'aprobado') return 'aprobado'
  if (estadoRaw === 'rechazado') return 'rechazado'
  if ([
    'por_revisar',
    'por revisar',
    'pendiente_revision',
    'pendiente de revision',
    'pendiente_aprobacion',
    'pendiente de aprobacion'
  ].includes(estadoRaw)) return 'por_revisar'
  const ev = pagoEventos[p.id]
  if (ev?.accion === 'aprobado') return 'aprobado'
  if (ev?.accion === 'rechazado') return 'rechazado'
  const acciones = ['aviso_efectivo', 'envio_comprobante', 'mercadopago_iniciado', 'marcar_recibido']
  if (acciones.includes(ev?.accion) || !!p.forma_pago || !!p.comprobante_url) return 'por_revisar'
  return 'pendiente'
}

function textoEstado(estado) {
  if (estado === 'aprobado') return 'aprobado'
  if (estado === 'rechazado') return 'rechazado'
  if (estado === 'por_revisar') return 'por revisar'
  return 'pendiente'
}

function avisoPadreEstado(p) {
  const ev = pagoEventos[p.id]
  if (!ev) return 'sin aviso'
  if (ev.accion === 'rechazado') return 'notificación enviada'
  if (ev.accion === 'aprobado') return 'recibo enviado'
  if (['aviso_efectivo', 'envio_comprobante', 'mercadopago_iniciado', 'marcar_recibido'].includes(ev.accion)) return 'notificación enviada'
  return 'sin aviso'
}

async function cargar() {
  const { data, error } = await supabase
    .from('pagos')
    .select('*, alumnos(nombre)')
    .order('creado_en', { ascending: false })
  pagos = error ? [] : (data || [])

  const { data: padresRows } = await supabase
    .from('padres')
    .select('id, alumno_id, nombre')
  const padrePorAlumno = {}
  ;(padresRows || []).forEach(p => { if (p.alumno_id) padrePorAlumno[p.alumno_id] = p })
  pagos = pagos.map(p => ({ ...p, _padre: padrePorAlumno[p.alumno_id] || null }))

  const { data: msgs } = await supabase
    .from('mensajes')
    .select('texto, creado_en')
    .order('creado_en', { ascending: false })
    .limit(500)

  pagoEventos = {}
  ;(msgs || []).forEach(m => {
    const ev = parsePayToken(m.texto)
    if (!ev?.pago) return
    const prev = pagoEventos[ev.pago]
    if (!prev || String(m.creado_en || '') > String(prev.creado_en || '')) {
      pagoEventos[ev.pago] = { ...ev, creado_en: m.creado_en }
    }
  })

  const porRevisar = pagos.filter(p => estadoRevision(p) === 'por_revisar').length
  const cnt = document.getElementById('cnt-revisar')
  if (porRevisar > 0) { cnt.textContent = porRevisar; cnt.style.display = 'inline' }
  else cnt.style.display = 'none'

  render()
}

function parsePayToken(text) {
  if (!String(text || '').startsWith('[[PAY]]')) return null
  const raw = String(text).replace('[[PAY]]', '').trim()
  const out = {}
  raw.split(';').forEach(pair => {
    const i = pair.indexOf('=')
    if (i > 0) out[pair.slice(0, i).trim()] = pair.slice(i + 1).trim()
  })
  return out
}

function mkPayToken(payload = {}) {
  const base = {
    pago: payload.pago || '',
    alumno: payload.alumno || '',
    accion: payload.accion || '',
    metodo: payload.metodo || '',
    comp: payload.comp || '',
    ts: new Date().toISOString()
  }
  return '[[PAY]] ' + Object.entries(base)
    .map(([k, v]) => `${k}=${String(v).replace(/;/g, ',')}`)
    .join(';')
}

function estadoRevision(p) {
  return estadoPago(p)
}

window.cambiarTab = function(tab) {
  tabActual = tab
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab))
  render()
}

function render() {
  const filtro = tabActual === 'revisar'
    ? pagos.filter(p => estadoRevision(p) === 'por_revisar')
    : tabActual === 'pendientes'
    ? pagos.filter(p => ['pendiente', 'rechazado', 'por_revisar'].includes(estadoRevision(p)))
    : pagos.filter(p => estadoRevision(p) === 'aprobado')

  const body = document.getElementById('pagos-body')
  const tituloSeccion = tabActual === 'revisar'
    ? 'Por revisar'
    : tabActual === 'pendientes'
    ? 'Pendientes'
    : 'Pagados / Historial'

  if (!filtro.length) {
    const msgs = {
      revisar: '✅ Sin comprobantes pendientes.',
      pendientes: 'Sin pagos pendientes.',
      pagados: 'Sin pagos confirmados aún.'
    }
    body.innerHTML = `<div style="font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">${tituloSeccion}</div><div style="text-align:center;color:var(--muted);font-size:13px;padding:22px 0 10px;">${msgs[tabActual]}</div>`
    return
  }

  body.innerHTML = `<div style="font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">${tituloSeccion}</div>` + filtro.map(p => {
    const nombre = p.alumnos?.nombre || 'Alumno'
    const ini = iniciales(nombre)
    const rev = estadoRevision(p)
    const ok = rev === 'aprobado'
    const tieneComp = !!p.comprobante_url
    const metodo = p.forma_pago || pagoEventos[p.id]?.metodo || '—'
    const metodoNorm = String(metodo || '').toLowerCase()
    const esTransferencia = metodoNorm === 'transferencia'
    const esImagen = tieneComp && /\.(jpg|jpeg|png|gif|webp)$/i.test(p.comprobante_url)
    const fecha = p.fecha_pago || String(p.creado_en || '').slice(0,10) || '—'
    const estadoTxt = textoEstado(rev)
    const badgeBg = rev === 'aprobado' ? 'var(--green-bg)' : rev === 'rechazado' ? 'var(--red-bg)' : rev === 'por_revisar' ? '#fef3c7' : 'var(--soft)'
    const badgeTx = rev === 'aprobado' ? 'var(--green-text)' : rev === 'rechazado' ? 'var(--red-text)' : rev === 'por_revisar' ? '#92400e' : 'var(--muted)'
    const ev = pagoEventos[p.id]
    const puedeAprobar = !ok && rev === 'por_revisar' && (!esTransferencia || tieneComp)
    const avisoTxt = avisoPadreEstado(p)

    return `<div class="pago-card ${tabActual === 'revisar' ? 'highlight' : ''}">
      ${tabActual === 'revisar' ? `<div style="font-size:11px;font-weight:700;color:#d97706;margin-bottom:8px;display:flex;align-items:center;gap:4px;">
        <i data-lucide="alert-circle" style="width:13px;height:13px"></i> Pago por revisar
      </div>` : ''}
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span class="avatar" style="width:34px;height:34px;font-size:12px;flex-shrink:0;">${ini}</span>
        <span class="grow">
          <span class="t" style="font-size:13.5px;font-weight:600;">${nombre}</span>
          <span class="s">Concepto: ${p.mes || '—'}</span>
          <span class="s">Monto: $${Number(p.monto||0).toLocaleString('es-MX')} MXN</span>
          <span class="s">Método: ${etiquetaMetodo(metodo)}</span>
          <span class="s">Fecha: ${fecha}${tieneComp ? ' · con comprobante' : ''}</span>
          <span class="s">Padre: ${avisoTxt}</span>
        </span>
        <span style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:99px;background:${badgeBg};color:${badgeTx};font-size:11px;font-weight:700;">${estadoTxt}</span>
      </div>
      ${ev?.accion === 'marcar_recibido' ? `<div style="font-size:11px;color:#92400e;margin-bottom:8px;">Efectivo marcado como recibido por admin. Falta aprobación final.</div>` : ''}
      ${esTransferencia && !tieneComp ? `<div style="font-size:11px;color:#b91c1c;margin-bottom:8px;">Falta comprobante de transferencia. No se puede aprobar sin revisar el archivo.</div>` : ''}
      ${ev?.accion === 'rechazado' ? `<div style="font-size:11px;color:#b91c1c;margin-bottom:8px;">Pago rechazado. El padre puede reenviar aviso o comprobante.</div>` : ''}
      ${tieneComp && esImagen ? `<img src="${p.comprobante_url}" style="width:100%;border-radius:10px;max-height:120px;object-fit:contain;background:#f4f6fb;margin-bottom:8px;" onerror="this.style.display='none'" />` : ''}
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${tieneComp ? `<a href="${p.comprobante_url}" target="_blank" class="btn secondary sm"><i data-lucide="file-image" style="width:12px;height:12px"></i> Ver comprobante</a>` : ''}
        ${!ok && rev === 'por_revisar' ? `<button class="btn secondary sm" data-recibido="${p.id}"><i data-lucide="wallet" style="width:12px;height:12px"></i> Marcar recibido</button>` : ''}
        ${puedeAprobar ? `<button class="btn secondary sm" data-aprobar="${p.id}"><i data-lucide="check" style="width:12px;height:12px"></i> Aprobar</button>` : ''}
        ${!ok && rev === 'por_revisar' ? `<button class="btn sm" style="background:var(--red-bg);color:var(--red-text);border:none;cursor:pointer;font-size:11px;padding:5px 10px;border-radius:8px;" data-rechazar="${p.id}">Rechazar</button>` : ''}
        ${ok ? `<a href="recibo.html?id=${p.id}" target="_blank" class="btn secondary sm"><i data-lucide="file-text" style="width:12px;height:12px"></i> Ver recibo</a>` : ''}
        ${ok ? `<button class="btn secondary sm" data-nuevo-pago="${p.alumno_id}" data-nuevo-nombre="${nombre}"><i data-lucide="plus" style="width:12px;height:12px"></i> Nuevo cargo</button>` : ''}
        ${ok ? `<button class="btn sm" style="background:var(--red-bg);color:var(--red-text);border:none;cursor:pointer;font-size:11px;padding:5px 10px;border-radius:8px;" data-desmarcar="${p.id}">Desmarcar</button>` : ''}
      </div>
    </div>`
  }).join('')
  lucide.createIcons()
}

document.getElementById('pagos-body').addEventListener('click', async e => {
  // Aprobar pago
  const btnConf = e.target.closest('[data-aprobar]')
  if (btnConf) {
    const p = pagos.find(x => x.id === btnConf.dataset.aprobar)
    if (!p) return
    pagoSel = p
    document.getElementById('modal-alumno-nombre').textContent = (p.alumnos?.nombre||'Alumno') + ' · ' + (p.mes||'')
    document.getElementById('modal-monto').value = p.monto || ''
    document.getElementById('modal-forma').value = p.forma_pago || (p.comprobante_url ? 'transferencia' : 'efectivo')
    const compWrap = document.getElementById('modal-comp-wrap')
    if (p.comprobante_url) {
      compWrap.style.display = 'block'
      const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(p.comprobante_url)
      document.getElementById('modal-comp-img').style.display = isImg ? 'block' : 'none'
      document.getElementById('modal-comp-fallback').style.display = isImg ? 'none' : 'inline-flex'
      document.getElementById('modal-comp-img').src = p.comprobante_url
      document.getElementById('modal-comp-link').href = p.comprobante_url
      document.getElementById('modal-comp-fallback').href = p.comprobante_url
    } else {
      compWrap.style.display = 'none'
    }
    document.getElementById('modal-pago').style.display = 'flex'
    lucide.createIcons(); return
  }

  // Marcar recibido
  const btnRec = e.target.closest('[data-recibido]')
  if (btnRec) {
    const p = pagos.find(x => x.id === btnRec.dataset.recibido)
    if (!p) return
    const token = mkPayToken({ pago: p.id, alumno: p.alumno_id, accion: 'marcar_recibido', metodo: p.forma_pago || 'efectivo' })
    await supabase.from('mensajes').insert({
      de_user_id: user.id,
      para_admin: false,
      destinatario_id: p._padre?.id || null,
      texto: `${token} · Recibimos tu aviso de pago en efectivo. En revisión final.`
    })
    await cargar()
    return
  }

  // Rechazar
  const btnR = e.target.closest('[data-rechazar]')
  if (btnR) {
    const p = pagos.find(x => x.id === btnR.dataset.rechazar)
    if (!p) return
    const token = mkPayToken({ pago: p.id, alumno: p.alumno_id, accion: 'rechazado', metodo: p.forma_pago || '' })
    await supabase.from('mensajes').insert({
      de_user_id: user.id,
      para_admin: false,
      destinatario_id: p._padre?.id || null,
      texto: `${token} · El pago fue rechazado. Sube un nuevo comprobante o selecciona otro método.`
    })
    await supabase.from('pagos').update({ estado: 'rechazado' }).eq('id', p.id)
    await cargar()
    return
  }

  // Nuevo cargo
  const btnNP = e.target.closest('[data-nuevo-pago]')
  if (btnNP) {
    nuevoPagoAlumnoId = btnNP.dataset.nuevoPago
    const mesActual = new Date().toLocaleString('es-MX', { month: 'long', year: 'numeric' })
    document.getElementById('nuevo-pago-alumno-nombre').textContent = btnNP.dataset.nuevoNombre
    document.getElementById('nuevo-pago-mes').value = mesActual.charAt(0).toUpperCase() + mesActual.slice(1)
    document.getElementById('nuevo-pago-monto').value = ''
    document.getElementById('modal-nuevo-pago').style.display = 'flex'
    lucide.createIcons(); return
  }

  // Desmarcar pagado
  const btnD = e.target.closest('[data-desmarcar]')
  if (btnD) {
    if (!confirm('¿Marcar como pendiente?')) return
    await supabase.from('pagos').update({ estado: 'pendiente', fecha_pago: null }).eq('id', btnD.dataset.desmarcar)
    await cargar()
  }
})

document.getElementById('modal-cancelar').addEventListener('click', () => {
  document.getElementById('modal-pago').style.display = 'none'; pagoSel = null
})

document.getElementById('modal-confirmar').addEventListener('click', async () => {
  if (!pagoSel) return
  const monto = parseInt(document.getElementById('modal-monto').value) || 0
  const forma = document.getElementById('modal-forma').value
  if (monto < 1) { alert('Ingresa el monto recibido'); return }
  if (forma === 'transferencia' && !pagoSel.comprobante_url) {
    alert('Este pago es por transferencia y requiere comprobante antes de aprobar.')
    return
  }

  const btn = document.getElementById('modal-confirmar')
  btn.disabled = true; btn.textContent = 'Guardando…'

  const hoy = new Date().toISOString().split('T')[0]
  const { error } = await supabase.from('pagos').update({
    estado: 'pagado', monto, forma_pago: forma, fecha_pago: hoy
  }).eq('id', pagoSel.id)

  if (error) {
    alert('❌ Error: ' + error.message)
    btn.disabled = false; btn.innerHTML = '<i data-lucide="check"></i> Confirmar'; lucide.createIcons(); return
  }

  // Actualizar fecha_proximo_pago según el plan del alumno
  const { data: alumnoData } = await supabase.from('alumnos').select('plan_pago').eq('id', pagoSel.alumno_id).maybeSingle()
  const esAnual = alumnoData?.plan_pago && alumnoData.plan_pago !== 'mensual'
  const diasSiguiente = esAnual ? 365 : 30
  const fechaProxima = new Date(); fechaProxima.setDate(fechaProxima.getDate() + diasSiguiente)
  await supabase.from('alumnos').update({ fecha_proximo_pago: fechaProxima.toISOString().split('T')[0] }).eq('id', pagoSel.alumno_id)

  // Obtener padre vinculado al alumno para enviarle mensaje
  const { data: padre } = await supabase.from('padres').select('id').eq('alumno_id', pagoSel.alumno_id).maybeSingle()
  const nombre = pagoSel.alumnos?.nombre || 'tu hijo/a'

  const token = mkPayToken({ pago: pagoSel.id, alumno: pagoSel.alumno_id, accion: 'aprobado', metodo: forma, comp: pagoSel.comprobante_url || '' })
  await supabase.from('mensajes').insert({
    de_user_id: user.id,
    texto: `${token} · ✅ Pago confirmado — ${nombre} · ${pagoSel.mes||''} · $${monto.toLocaleString('es-MX')} MXN (${forma}). Puedes ver tu recibo en la app.`,
    para_admin: false,
    destinatario_id: padre?.id || null
  })

  document.getElementById('modal-pago').style.display = 'none'
  pagoSel = null
  btn.disabled = false; btn.innerHTML = '<i data-lucide="check"></i> Confirmar'; lucide.createIcons()
  await cargar()
})

document.getElementById('nuevo-pago-cancelar').addEventListener('click', () => {
  document.getElementById('modal-nuevo-pago').style.display = 'none'; nuevoPagoAlumnoId = null
})

document.getElementById('nuevo-pago-crear').addEventListener('click', async () => {
  if (!nuevoPagoAlumnoId) return
  const mes = document.getElementById('nuevo-pago-mes').value.trim()
  const monto = parseInt(document.getElementById('nuevo-pago-monto').value) || 0
  if (!mes) { alert('Escribe el mes'); return }
  if (monto < 1) { alert('Escribe el monto'); return }
  const btn = document.getElementById('nuevo-pago-crear')
  btn.disabled = true; btn.textContent = 'Creando…'
  const existeAbierto = pagos.some(p => p.alumno_id === nuevoPagoAlumnoId && p.estado !== 'pagado')
  if (existeAbierto) {
    btn.disabled = false; btn.innerHTML = '<i data-lucide="plus"></i> Crear'; lucide.createIcons()
    alert('Ya existe un pago abierto para este alumno. Evita duplicados.')
    return
  }
  const { error } = await supabase.from('pagos').insert({ alumno_id: nuevoPagoAlumnoId, mes, monto, estado: 'pendiente' })
  btn.disabled = false; btn.innerHTML = '<i data-lucide="plus"></i> Crear'; lucide.createIcons()
  if (error) { alert('❌ Error: ' + error.message); return }
  document.getElementById('modal-nuevo-pago').style.display = 'none'
  nuevoPagoAlumnoId = null
  await cargar()
})

cargar()
</script>
