<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestionar pagos</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="sub">Junio 2025</div><div class="title">Gestionar pagos</div></div></div>
  <div class="body">
    <div class="label">Mensualidad por alumno</div>
    <div class="stack-8" id="list"></div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a class="on" href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const R = [['MR','Mateo Reyes',false],['SL','Sofía Luna',true],['DO','Diego Ortiz',false],['VC','Valeria Cruz',true],['IM','Iker Méndez',false],['RG','Renata Gil',true]];
  const st = R.map(r=>r[2]);
  function render(){
    document.getElementById('list').innerHTML = R.map((r,i)=>`
      <div class="row"><span class="avatar" style="width:34px;height:34px;font-size:12px;">${r[0]}</span>
        <span class="grow"><span class="t">${r[1]}</span><span class="s">$1,550 MXN</span></span>
        <span class="trail"><button data-i="${i}" style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--r-full);border:none;cursor:pointer;font-weight:600;font-size:12px;background:${st[i]?'var(--green-bg)':'var(--red-bg)'};color:${st[i]?'var(--green-text)':'var(--red-text)'};"><i data-lucide="${st[i]?'check':'clock'}" style="width:14px;height:14px"></i> ${st[i]?'Pagado':'Pendiente'}</button></span></div>`).join('');
    lucide.createIcons();
  }
  document.getElementById('list').addEventListener('click',e=>{const b=e.target.closest('[data-i]');if(!b)return;st[b.dataset.i]=!st[b.dataset.i];render();});
  render();
</script>
</body></html>
