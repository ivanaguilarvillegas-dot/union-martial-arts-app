<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Union Martial Arts — Crear Evento</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>●●● 100%</span></div>
  <div class="nav-header dark">
    <a href="admin.html" class="back-btn">← Volver</a>
    <h1>Crear Evento</h1>
  </div>
  <div class="screen-body">
    <div class="section-title">Nuevo evento</div>
    <div class="card">
      <label>Tipo de evento</label>
      <select id="tipo">
        <option>🏆 Torneo</option>
        <option>📚 Clase especial</option>
        <option>🎓 Examen de cinturón</option>
        <option>🎉 Evento social</option>
        <option>⚠️ Aviso importante</option>
        <option>🏖️ Vacaciones / Sin clases</option>
      </select>
      <label>Título del evento</label>
      <input type="text" id="titulo" placeholder="Ej: Torneo Infantil UMA — Junio" />
      <label>Fecha</label>
      <input type="date" id="fecha" />
      <label>Hora</label>
      <input type="text" id="hora" placeholder="Ej: 10:00 AM — 2:00 PM" />
      <label>Lugar</label>
      <input type="text" id="lugar" placeholder="Ej: Gimnasio Central UMA" />
      <label>Descripción</label>
      <textarea id="descripcion" rows="3" placeholder="Detalles del evento para los padres..."
        style="width:100%; border:0.5px solid var(--uma-blue-border); border-radius:10px; padding:12px; font-size:14px; font-family:inherit; resize:none;"></textarea>
      <div id="msg-evento" style="font-size:13px; text-align:center; padding:10px; border-radius:8px; display:none; margin-top:8px;"></div>
      <button class="btn-primary" onclick="publicar()">Publicar evento</button>
    </div>
    <div class="section-title">Eventos próximos</div>
    <div id="lista-eventos">
      <div style="text-align:center; color:var(--text-secondary); font-size:13px; padding:16px;">Cargando...</div>
    </div>
  </div>
  <div class="bottom-nav">
    <a href="admin.html" class="bnav-item"><span class="bnav-icon">📊</span>Panel</a>
    <a href="admin-alumnos.html" class="bnav-item"><span class="bnav-icon">👥</span>Alumnos</a>
    <a href="admin-pagos.html" class="bnav-item"><span class="bnav-icon">💳</span>Pagos</a>
    <a href="admin-frase.html" class="bnav-item"><span class="bnav-icon">💬</span>Mensajes</a>
  </div>
</div>
<script type="module">
  import { supabase } from './js/supabase.js'

  async function cargarEventos() {
    const hoy = new Date().toISOString().split('T')[0]
    const { data } = await supabase.from('eventos').select('*').gte('fecha', hoy).order('fecha').limit(5)
    const cont = document.getElementById('lista-eventos')
    if (!data || data.length === 0) {
      cont.innerHTML = '<div style="text-align:center; color:var(--text-secondary); font-size:13px; padding:16px;">Sin eventos próximos.</div>'
      return
    }
    cont.innerHTML = data.map(e => `
      <div class="alert-row">
        <div class="alert-icon amber">📅</div>
        <div style="flex:1;">
          <div class="alert-title">${e.titulo}</div>
          <div class="alert-sub">${e.fecha}${e.lugar ? ' · ' + e.lugar : ''}</div>
        </div>
      </div>`).join('')
  }

  window.publicar = async function() {
    const titulo = document.getElementById('titulo').value.trim()
    const fecha = document.getElementById('fecha').value
    const tipo = document.getElementById('tipo').value
    const hora = document.getElementById('hora').value.trim()
    const lugar = document.getElementById('lugar').value.trim()
    const descripcion = document.getElementById('descripcion').value.trim()
    const msg = document.getElementById('msg-evento')

    if (!titulo || !fecha) {
      msg.textContent = 'El título y la fecha son obligatorios.'
      msg.style.background = '#FFF5F5'; msg.style.color = '#9B2C2C'
      msg.style.display = 'block'; return
    }

    const { error } = await supabase.from('eventos').insert({ titulo, fecha, tipo, hora, lugar, descripcion })

    if (error) {
      msg.textContent = 'Error al publicar. Intenta de nuevo.'
      msg.style.background = '#FFF5F5'; msg.style.color = '#9B2C2C'
    } else {
      msg.textContent = '✅ Evento publicado. Ya aparece en la app de los padres.'
      msg.style.background = '#F0FFF4'; msg.style.color = '#276749'
      document.getElementById('titulo').value = ''
      document.getElementById('fecha').value = ''
      document.getElementById('hora').value = ''
      document.getElementById('lugar').value = ''
      document.getElementById('descripcion').value = ''
      cargarEventos()
    }
    msg.style.display = 'block'
  }

  cargarEventos()
</script>
</body>
</html>
