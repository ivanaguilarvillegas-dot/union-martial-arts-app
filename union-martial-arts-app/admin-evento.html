<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crear torneo o actividad</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Crear torneo o actividad</div></div></div>
  <div class="body">
    <div id="form"><div class="card"><div class="stack">
      <div>
        <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;">Tipo</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="tipos">
          <button class="chip on">Torneo</button><button class="chip">Clase especial</button>
          <button class="chip">Actividad</button><button class="chip">Aviso</button>
        </div>
      </div>
      <label class="field"><span class="lab">Nombre del evento</span><input placeholder="Ej. Torneo Estatal de Cinturones" /></label>
      <label class="field"><span class="lab">Fecha y hora</span><input placeholder="28 jun · 9:00 AM" /></label>
      <label class="field"><span class="lab">Lugar</span><input placeholder="Gimnasio Municipal" /></label>
      <label class="field"><span class="lab">Descripción</span><textarea rows="3" placeholder="Detalles del evento…"></textarea></label>
      <button class="btn primary block" id="save"><i data-lucide="plus"></i> Publicar evento</button>
    </div></div></div>
    <div id="ok" style="display:none;"><div class="card green center">
      <div style="display:inline-flex;margin-bottom:6px;color:var(--green-600);"><i data-lucide="calendar-check" style="width:26px;height:26px"></i></div>
      <div style="font-size:15px;font-weight:700;color:var(--green-text);">Evento publicado</div>
      <div style="font-size:13px;color:var(--green-text);margin-top:4px;">Visible para los padres en “Torneos y actividades”.</div></div></div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  const tipos = document.getElementById('tipos')
  tipos.addEventListener('click', e => {
    const b = e.target.closest('.chip'); if (!b) return
    ;[...tipos.children].forEach(c => c.classList.remove('on')); b.classList.add('on')
  })

  // Cambiar inputs a tipo date/time/text separados
  const inputs = document.querySelectorAll('#form input')

  document.getElementById('save').addEventListener('click', async () => {
    const tipo = document.querySelector('#tipos .on')?.textContent || 'Torneo'
    const titulo = inputs[0].value.trim()
    const fecha = inputs[1].value.trim()
    const hora = inputs[2].value.trim()
    const lugar = inputs[3].value.trim()
    const descripcion = document.querySelector('#form textarea').value.trim()

    if (!titulo || !fecha) { alert('Escribe el nombre y la fecha del evento.'); return }

    const { error } = await supabase.from('eventos').insert({ tipo, titulo, fecha, hora: hora || null, lugar: lugar || null, descripcion: descripcion || null })
    if (error) { alert('Error al guardar: ' + error.message); return }

    document.getElementById('form').style.display = 'none'
    document.getElementById('ok').style.display = 'block'
    lucide.createIcons()
  })

  lucide.createIcons()
</script>
</body></html>
