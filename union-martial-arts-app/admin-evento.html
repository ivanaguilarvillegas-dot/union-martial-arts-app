<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eventos — UNION Admin</title><link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f2167">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Union MA">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="stylesheet" href="css/uma.css?v=18" />
<style>
.ev-card{background:#fff;border-radius:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden;border:1px solid #e5e7eb;min-width:0;}
.ev-media{width:100%;aspect-ratio:16/9;background:#0d1a5e;position:relative;overflow:hidden;}
.ev-media img{width:100%;height:100%;object-fit:cover;display:block;}
.ev-media-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.58);font-size:14px;font-weight:700;letter-spacing:.03em;}
.ev-media-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;font-weight:800;letter-spacing:.04em;padding:4px 8px;border-radius:999px;backdrop-filter:blur(4px);}
.ev-body{padding:14px;display:flex;flex-direction:column;gap:10px;min-width:0;}
.ev-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;min-width:0;}
.ev-title-wrap{min-width:0;flex:1;}
.ev-tipo{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#1d4ed8;margin-bottom:4px;}
.ev-titulo{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.35;overflow-wrap:anywhere;}
.ev-meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px;line-height:1.35;}
.ev-meta span{display:inline-flex;align-items:center;gap:3px;}
.ev-desc{font-size:12.5px;color:var(--muted);line-height:1.45;overflow-wrap:anywhere;}
.ev-section{display:flex;flex-direction:column;gap:8px;}
.ev-section-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.ev-actions{display:flex;flex-wrap:wrap;gap:8px;min-width:0;}
.ev-actions .ev-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 10px;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;border:1px solid transparent;min-width:0;white-space:nowrap;}
.ev-actions .ev-btn.resource{background:#eff6ff;color:#0047AB;border-color:#dbeafe;}
.ev-actions .ev-btn.edit{background:#fff;border-color:#e5e7eb;color:#111827;}
.ev-actions .ev-btn.disable{background:#fff1f2;color:#dc2626;border-color:#fecaca;}
.ev-extra-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:8px;}
.ev-extra-grid a{display:block;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb;background:#f8fafc;}
.ev-extra-grid img{width:100%;height:92px;object-fit:cover;display:block;}
.ev-file-list{display:flex;flex-wrap:wrap;gap:8px;}
.ev-file{display:inline-flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:8px 10px;font-size:12px;font-weight:700;color:#111827;text-decoration:none;min-width:0;max-width:100%;}
.ev-file span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:210px;}
.ev-card-row{display:flex;flex-direction:column;gap:12px;}
.tab-bar{display:flex;gap:4px;padding:10px 12px 0;background:#f4f6fb;}
.tab{flex:1;padding:8px;border:none;background:none;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:10px;font-family:inherit;}
.tab.active{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.1);}
@media (max-width: 520px) {
  .ev-body{padding:12px;}
  .ev-actions .ev-btn{flex:1 1 calc(50% - 4px);}
  .ev-file span{max-width:140px;}
}
</style>
</head>
<body>
<div class="phone"><div class="screen" style="background:#f4f6fb;">
  <div class="navhead dark">
    <a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Eventos</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" data-tab="lista" onclick="cambiarTab('lista')">Eventos publicados</button>
    <button class="tab" data-tab="nuevo" onclick="cambiarTab('nuevo')">+ Nuevo evento</button>
  </div>

  <!-- Lista de eventos -->
  <div id="tab-lista" class="body">
    <div id="eventos-list">
      <div style="text-align:center;color:var(--muted);font-size:13px;padding:24px;">Cargando…</div>
    </div>
  </div>

  <!-- Formulario nuevo -->
  <div id="tab-nuevo" class="body" style="display:none;">
    <div class="card"><div class="stack">
      <div>
        <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;">Tipo</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="tipos">
          <button class="chip on" data-tipo="Torneo">Torneo</button>
          <button class="chip" data-tipo="Clase especial">Clase especial</button>
          <button class="chip" data-tipo="Actividad">Actividad</button>
          <button class="chip" data-tipo="Examen">Examen</button>
        </div>
      </div>
      <label class="field"><span class="lab">Nombre del evento</span>
        <input id="titulo" placeholder="Ej. Torneo Estatal de Cinturones" /></label>
      <label class="field"><span class="lab">Fecha</span>
        <input type="date" id="fecha" /></label>
      <label class="field"><span class="lab">Hora (opcional)</span>
        <input type="time" id="hora" /></label>
      <label class="field"><span class="lab">Lugar (opcional)</span>
        <input id="lugar" placeholder="Ej. Gimnasio Municipal" /></label>
      <label class="field"><span class="lab">Descripción</span>
        <textarea id="desc" rows="3" placeholder="Detalles del evento…"></textarea></label>
      <div style="margin-bottom:12px;">
        <span class="field-lbl">Imagen del evento (opcional)</span>
        <input type="file" id="foto-evento" accept="image/*" />
      </div>
      <div style="margin-bottom:12px;">
        <span class="field-lbl">Convocatoria (PDF) — opcional</span>
        <input type="file" id="pdf-evento" accept="application/pdf" />
      </div>
      <div id="existing-preview" style="display:none;margin-bottom:12px;border:1px dashed var(--ink-200);padding:12px;border-radius:12px;background:#ffffff;">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;">Vista previa actual</div>
        <div id="preview-img" style="margin-bottom:10px;"></div>
        <div id="preview-pdf" style="margin-bottom:10px;"></div>
        <div id="preview-link" style="font-size:13px;color:var(--muted);"></div>
      </div>
      <label class="field"><span class="lab">Link externo de convocatoria (opcional)</span>
        <input id="link-convocatoria" placeholder="https://..." /></label>
      <div id="err-msg" class="notice red" style="display:none;"></div>
      <button class="btn primary block" id="save"><i data-lucide="plus"></i> Publicar evento</button>
    </div></div>
    <div id="ok" style="display:none;">
      <div class="card green center">
        <div style="display:inline-flex;margin-bottom:6px;color:var(--green-600);"><i data-lucide="calendar-check" style="width:26px;height:26px"></i></div>
        <div style="font-size:15px;font-weight:700;color:var(--green-text);" id="ok-msg">Evento publicado</div>
        <div style="font-size:13px;color:var(--green-text);margin-top:4px;">Visible para los padres.</div>
      </div>
      <button class="btn secondary block mt14" onclick="resetForm()"><i data-lucide="plus"></i> Crear otro evento</button>
      <button class="btn primary block mt10" onclick="cambiarTab('lista')"><i data-lucide="list"></i> Ver todos los eventos</button>
    </div>
  </div>

  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-chat.html"><i data-lucide="message-square"></i>Chat</a>
  </nav>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://gdajgennlsuvndanpxiz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
)
const { data: { user } } = await supabase.auth.getUser()
if (!user) { window.location.href = 'index.html' }

let editingEventId = null
let editingOriginalFoto = null
let editingOriginalPdf = null

function esc(value) {
  return String(value ?? '').replace(/[&<>"]|'/g, match => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[match]))
}

function splitList(value) {
  if (!value) return []
  if (Array.isArray(value)) return value.map(v => String(v).trim()).filter(Boolean)
  return String(value)
    .split(/\r?\n|\s*[,;]\s*/)
    .map(v => v.trim())
    .filter(Boolean)
}

function fileNameFromUrl(url) {
  try {
    const raw = new URL(url, window.location.href).pathname.split('/').filter(Boolean).pop() || url
    return decodeURIComponent(raw).replace(/^.*?\//, '')
  } catch {
    return String(url).split('/').pop() || String(url)
  }
}

function buildEventResources(ev) {
  const links = []
  if (ev.convocatoria_pdf_url) links.push({ label: 'Ver convocatoria', href: ev.convocatoria_pdf_url, kind: 'resource' })
  if (ev.convocatoria_link) links.push({ label: 'Abrir enlace', href: ev.convocatoria_link, kind: 'resource' })
  const extraImages = splitList(ev.imagenes_adicionales || ev.imagenes_urls || ev.galeria_urls || ev.fotos_adicionales || ev.fotos_urls)
  const extraFiles = splitList(ev.archivos_adicionales || ev.archivos_urls || ev.documentos_urls || ev.adjuntos_urls)
  return { links, extraImages, extraFiles }
}

function renderEventCard(ev, { admin = true, confirmado = false } = {}) {
  const fechaFmt = ev.fecha
    ? new Date(ev.fecha + 'T12:00:00').toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' })
    : '—'
  const tipo = esc(ev.tipo || 'Evento')
  const titulo = esc(ev.titulo || 'Sin título')
  const lugar = esc(ev.lugar || '')
  const descripcion = esc(ev.descripcion || '')
  const { links, extraImages, extraFiles } = buildEventResources(ev)
  const media = ev.foto_url
    ? `<img src="${esc(ev.foto_url)}" alt="${titulo}">`
    : `<div class="ev-media-empty"><i data-lucide="calendar" style="width:30px;height:30px;"></i></div>`
  const resourceHtml = links.length ? `
    <div class="ev-section">
      <div class="ev-section-title">Recursos</div>
      <div class="ev-actions">
        ${links.map(link => `<a class="ev-btn resource" href="${esc(link.href)}" target="_blank" rel="noopener"><i data-lucide="link" style="width:13px;height:13px;"></i>${esc(link.label)}</a>`).join('')}
      </div>
    </div>` : ''
  const imagesHtml = extraImages.length ? `
    <div class="ev-section">
      <div class="ev-section-title">Imágenes adicionales</div>
      <div class="ev-extra-grid">
        ${extraImages.map(src => `<a href="${esc(src)}" target="_blank" rel="noopener"><img src="${esc(src)}" alt="${titulo}"></a>`).join('')}
      </div>
    </div>` : ''
  const filesHtml = extraFiles.length ? `
    <div class="ev-section">
      <div class="ev-section-title">Archivos</div>
      <div class="ev-file-list">
        ${extraFiles.map(src => `<a class="ev-file" href="${esc(src)}" target="_blank" rel="noopener"><i data-lucide="paperclip" style="width:13px;height:13px;flex-shrink:0;"></i><span>${esc(fileNameFromUrl(src))}</span></a>`).join('')}
      </div>
    </div>` : ''
  const actionHtml = admin
    ? `<div class="ev-section">
        <div class="ev-actions">
          <a class="ev-btn resource" href="${esc(ev.convocatoria_pdf_url || ev.convocatoria_link || '#')}" target="_blank" rel="noopener" style="${ev.convocatoria_pdf_url || ev.convocatoria_link ? '' : 'display:none;'}"><i data-lucide="file-text" style="width:13px;height:13px;"></i>Ver convocatoria</a>
          <button class="ev-btn edit" data-editar="${esc(ev.id)}"><i data-lucide="edit" style="width:13px;height:13px;"></i>Editar</button>
          <button class="ev-btn disable" data-borrar="${esc(ev.id)}"><i data-lucide="trash-2" style="width:13px;height:13px;"></i>Desactivar</button>
        </div>
      </div>`
    : `<div class="ev-section">
        ${confirmado
          ? '<div class="notice green" style="margin:0;"><i data-lucide="check-circle"></i> Asistencia confirmada · se notificó al instructor</div>'
          : `<button class="btn secondary block" data-id="${esc(ev.id)}"><i data-lucide="calendar-check"></i> Confirmar asistencia</button>`}
      </div>`

  return `<div class="ev-card">
    <div class="ev-media">
      ${media}
      ${tipo ? `<div class="ev-media-badge">${tipo.toUpperCase()}</div>` : ''}
    </div>
    <div class="ev-body">
      <div class="ev-head">
        <div class="ev-title-wrap">
          <div class="ev-tipo">${tipo}</div>
          <div class="ev-titulo">${titulo}</div>
        </div>
      </div>
      <div class="ev-meta">
        <span><i data-lucide="calendar" style="width:12px;height:12px;"></i>${esc(fechaFmt)}</span>
        ${ev.hora ? `<span><i data-lucide="clock" style="width:12px;height:12px;"></i>${esc(ev.hora)}</span>` : ''}
        ${lugar ? `<span><i data-lucide="map-pin" style="width:12px;height:12px;"></i>${lugar}</span>` : ''}
      </div>
      ${descripcion ? `<div class="ev-desc">${descripcion}</div>` : ''}
      ${resourceHtml}
      ${imagesHtml}
      ${filesHtml}
      ${actionHtml}
    </div>
  </div>`
}

document.getElementById('fecha').value = new Date().toISOString().split('T')[0]

window.cambiarTab = function(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab))
  document.getElementById('tab-lista').style.display = tab === 'lista' ? 'block' : 'none'
  document.getElementById('tab-nuevo').style.display = tab === 'nuevo' ? 'block' : 'none'
  if (tab === 'lista') cargarEventos()
}

async function cargarEventos() {
  const el = document.getElementById('eventos-list')
  el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:24px;">Cargando…</div>'
  const { data, error } = await supabase.from('eventos').select('*').order('fecha', { ascending: true })
  if (error) { el.innerHTML = `<div style="color:red;padding:16px;font-size:13px;">Error: ${error.message}</div>`; return }
  if (!data?.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:13px;padding:32px;">
      <div style="font-size:32px;margin-bottom:8px;">📅</div>Sin eventos publicados.
      <br><button class="btn primary sm mt14" onclick="cambiarTab('nuevo')" style="margin-top:12px;">+ Crear primer evento</button>
    </div>`
    return
  }

  const hoy = new Date().toISOString().split('T')[0]
  el.innerHTML = data.map(ev => {
    const pasado = ev.fecha < hoy
    return `${renderEventCard(ev, { admin: true })}`
  }).join('')
  lucide.createIcons()
}

document.getElementById('tab-lista').addEventListener('click', async e => {
  const borrarBtn = e.target.closest('[data-borrar]')
  const editarBtn = e.target.closest('[data-editar]')
  if (editarBtn) {
    const id = editarBtn.dataset.editar
    const { data } = await supabase.from('eventos').select('*').eq('id', id).limit(1)
    const ev = data?.[0]
    if (!ev) return alert('Evento no encontrado')
    // Llenar formulario
    editingEventId = ev.id
    editingOriginalFoto = ev.foto_url || null
    editingOriginalPdf = ev.convocatoria_pdf_url || null
    // tipo
    ;[...document.getElementById('tipos').children].forEach(c => c.classList.toggle('on', c.dataset.tipo === (ev.tipo || 'Torneo')))
    document.getElementById('titulo').value = ev.titulo || ''
    document.getElementById('fecha').value = ev.fecha || new Date().toISOString().split('T')[0]
    document.getElementById('hora').value = ev.hora || ''
    document.getElementById('lugar').value = ev.lugar || ''
    document.getElementById('desc').value = ev.descripcion || ''
    document.getElementById('link-convocatoria').value = ev.convocatoria_link || ''
    const previewWrap = document.getElementById('existing-preview')
    if (previewWrap) {
      const imgHtml = ev.foto_url ? `<img src="${ev.foto_url}" alt="${ev.titulo}" style="width:100%;max-height:140px;object-fit:cover;border-radius:10px;" />` : ''
      const pdfHtml = ev.convocatoria_pdf_url ? `<a class="btn sm" href="${ev.convocatoria_pdf_url}" target="_blank" style="background:#eff6ff;color:#0047AB;padding:6px 10px;border-radius:8px;text-decoration:none;font-weight:700;">📎 PDF actual</a>` : ''
      const linkHtml = ev.convocatoria_link ? `Link actual: <a href="${ev.convocatoria_link}" target="_blank" style="color:#0f4fff;">${ev.convocatoria_link}</a>` : ''
      document.getElementById('preview-img').innerHTML = imgHtml
      document.getElementById('preview-pdf').innerHTML = pdfHtml
      document.getElementById('preview-link').innerHTML = linkHtml
      previewWrap.style.display = (imgHtml || pdfHtml || linkHtml) ? 'block' : 'none'
    }
    cambiarTab('nuevo')
    const btn = document.getElementById('save')
    btn.innerHTML = '<i data-lucide="save"></i> Actualizar evento'
    lucide.createIcons()
    window.scrollTo(0,0)
    return
  }
  if (borrarBtn) {
    if (!confirm('¿Desactivar este evento? Los padres ya no lo verán.')) return
    borrarBtn.disabled = true; borrarBtn.textContent = 'Guardando…'
    const id = borrarBtn.dataset.borrar
    // Borrar confirmaciones vinculadas primero para no violar FK
    await supabase.from('confirmaciones_torneo').delete().eq('evento_id', id)
    let result = await supabase.from('eventos').update({ activo: false }).eq('id', id)
    if (result.error && result.error.code === '42703') {
      // La columna activo no existe; el evento se borra en su lugar
      result = await supabase.from('eventos').delete().eq('id', id)
    }
    if (result.error) { alert('❌ Error: ' + result.error.message); borrarBtn.disabled = false; borrarBtn.innerHTML = '<i data-lucide="trash-2" style="width:13px;height:13px;"></i> Desactivar'; lucide.createIcons(); return }
    await cargarEventos()
    return
  }
})

// Tipos
document.getElementById('tipos').addEventListener('click', e => {
  const b = e.target.closest('.chip'); if (!b) return
  ;[...document.getElementById('tipos').children].forEach(c => c.classList.remove('on')); b.classList.add('on')
})

// Guardar nuevo evento
document.getElementById('save').addEventListener('click', async () => {
  const tipo = document.querySelector('#tipos .on')?.dataset.tipo || 'Torneo'
  const titulo = document.getElementById('titulo').value.trim()
  const fecha = document.getElementById('fecha').value
  const hora = document.getElementById('hora').value || null
  const lugar = document.getElementById('lugar').value.trim() || null
  const descripcion = document.getElementById('desc').value.trim() || null
  const fotoFile = document.getElementById('foto-evento')?.files?.[0]
  const pdfFile = document.getElementById('pdf-evento')?.files?.[0]
  const convocatoriaLink = document.getElementById('link-convocatoria')?.value.trim() || null
  const errEl = document.getElementById('err-msg')

  if (!titulo) { errEl.textContent = 'Escribe el nombre del evento.'; errEl.style.display = 'flex'; return }
  if (!fecha) { errEl.textContent = 'Selecciona la fecha.'; errEl.style.display = 'flex'; return }
  errEl.style.display = 'none'

  const btn = document.getElementById('save')
  btn.disabled = true; btn.textContent = 'Publicando…'
  let registro = { tipo, titulo, fecha, hora, lugar, descripcion }
  try {
    if (fotoFile) {
      const ext = fotoFile.name.split('.').pop().toLowerCase()
      const path = `${user.id}/evento-foto-${Date.now()}.${ext}`
      const up = await supabase.storage.from('eventos').upload(path, fotoFile, { upsert: true, contentType: fotoFile.type })
      if (!up.error) {
        registro.foto_url = supabase.storage.from('eventos').getPublicUrl(path).data.publicUrl
      }
    }
    if (pdfFile) {
      const ext2 = pdfFile.name.split('.').pop().toLowerCase()
      const path2 = `${user.id}/evento-pdf-${Date.now()}.${ext2}`
      const up2 = await supabase.storage.from('eventos').upload(path2, pdfFile, { upsert: true, contentType: pdfFile.type })
      if (!up2.error) {
        registro.convocatoria_pdf_url = supabase.storage.from('eventos').getPublicUrl(path2).data.publicUrl
      }
    }
    if (convocatoriaLink) registro.convocatoria_link = convocatoriaLink
    // If editing and no new files uploaded, preserve existing URLs
    if (editingEventId) {
      if (!fotoFile && editingOriginalFoto) registro.foto_url = editingOriginalFoto
      if (!pdfFile && editingOriginalPdf) registro.convocatoria_pdf_url = editingOriginalPdf
    }
  } catch (e) {}
  let error = null
  if (editingEventId) {
    const res = await supabase.from('eventos').update(registro).eq('id', editingEventId)
    error = res.error
  } else {
    const res = await supabase.from('eventos').insert(registro)
    error = res.error
  }
  if (error) {
    errEl.textContent = 'Error: ' + error.message; errEl.style.display = 'flex'
    btn.disabled = false; btn.innerHTML = '<i data-lucide="plus"></i> Publicar evento'
    lucide.createIcons(); return
  }
  const horaStr = hora ? ' a las ' + hora : ''
  let textoMsg = `📅 ${tipo}: ${titulo} — ${fecha}${horaStr}${lugar ? ' · ' + lugar : ''}${descripcion ? '\n' + descripcion : ''}`
  if (registro.convocatoria_link) textoMsg += '\nConvocatoria: ' + registro.convocatoria_link
  await supabase.from('mensajes').insert({
    de_user_id: user.id,
    texto: textoMsg,
    para_admin: false
  })

  document.getElementById('form-wrap') // no-op, just keep ref
  document.querySelector('#tab-nuevo .card').style.display = 'none'
  document.getElementById('ok').style.display = 'block'
  document.getElementById('ok-msg').textContent = (editingEventId ? '✅ ' + titulo + ' actualizado' : '✅ ' + titulo + ' publicado')
  lucide.createIcons()
  // reset editing state
  editingEventId = null
  editingOriginalFoto = null
  editingOriginalPdf = null
  const btnReset = document.getElementById('save')
  btnReset.disabled = false; btnReset.innerHTML = '<i data-lucide="plus"></i> Publicar evento'
})

window.resetForm = function() {
  document.querySelector('#tab-nuevo .card').style.display = 'block'
  document.getElementById('ok').style.display = 'none'
  document.getElementById('titulo').value = ''
  document.getElementById('hora').value = ''
  document.getElementById('lugar').value = ''
  document.getElementById('desc').value = ''
  document.getElementById('fecha').value = new Date().toISOString().split('T')[0]
  editingEventId = null
  editingOriginalFoto = null
  editingOriginalPdf = null
  document.getElementById('foto-evento').value = ''
  document.getElementById('pdf-evento').value = ''
  document.getElementById('link-convocatoria').value = ''
  ;[...document.getElementById('tipos').children].forEach((c,i) => c.classList.toggle('on', i===0))
  const btn = document.getElementById('save')
  btn.disabled = false; btn.innerHTML = '<i data-lucide="plus"></i> Publicar evento'
  lucide.createIcons()
}

cargarEventos()
</script>
