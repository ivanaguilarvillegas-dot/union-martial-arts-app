<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crear torneo o actividad</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Crear torneo o actividad</div></div></div>
  <div class="body">
    <div id="form"><div class="card"><div class="stack">
      <div>
        <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;">Tipo</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="tipos">
          <button class="chip on" data-tipo="Torneo">Torneo</button>
          <button class="chip" data-tipo="Clase especial">Clase especial</button>
          <button class="chip" data-tipo="Actividad">Actividad</button>
          <button class="chip" data-tipo="Aviso">Aviso</button>
        </div>
      </div>
      <label class="field"><span class="lab">Nombre del evento</span>
        <input id="titulo" placeholder="Ej. Torneo Estatal de Cinturones" /></label>
      <label class="field"><span class="lab">Fecha</span>
        <input type="date" id="fecha" /></label>
      <label class="field"><span class="lab">Hora (opcional)</span>
        <input type="time" id="hora" /></label>
      <label class="field"><span class="lab">Lugar (opcional)</span>
        <input id="lugar" placeholder="Ej. Gimnasio Municipal" /></label>
      <label class="field"><span class="lab">Descripción</span>
        <textarea id="desc" rows="3" placeholder="Detalles del evento…"></textarea></label>
      <div id="err-msg" class="notice red" style="display:none;"></div>
      <button class="btn primary block" id="save"><i data-lucide="plus"></i> Publicar evento</button>
    </div></div></div>
    <div id="ok" style="display:none;">
      <div class="card green center">
        <div style="display:inline-flex;margin-bottom:6px;color:var(--green-600);"><i data-lucide="calendar-check" style="width:26px;height:26px"></i></div>
        <div style="font-size:15px;font-weight:700;color:var(--green-text);" id="ok-msg">Evento publicado</div>
        <div style="font-size:13px;color:var(--green-text);margin-top:4px;">Visible para los padres en Torneos y actividades.</div>
      </div>
      <button class="btn secondary block mt14" onclick="location.reload()"><i data-lucide="plus"></i> Crear otro evento</button>
    </div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { session } } = await supabase.auth.getSession()
  const user = session?.user
  if (!user) { window.location.href = 'index.html' }

  // Fecha por defecto hoy
  document.getElementById('fecha').value = new Date().toISOString().split('T')[0]

  const tipos = document.getElementById('tipos')
  tipos.addEventListener('click', e => {
    const b = e.target.closest('.chip'); if (!b) return
    ;[...tipos.children].forEach(c => c.classList.remove('on')); b.classList.add('on')
  })

  document.getElementById('save').addEventListener('click', async () => {
    const tipo = document.querySelector('#tipos .on')?.dataset.tipo || 'Torneo'
    const titulo = document.getElementById('titulo').value.trim()
    const fecha = document.getElementById('fecha').value
    const hora = document.getElementById('hora').value || null
    const lugar = document.getElementById('lugar').value.trim() || null
    const descripcion = document.getElementById('desc').value.trim() || null
    const errEl = document.getElementById('err-msg')

    if (!titulo) { errEl.textContent = 'Escribe el nombre del evento.'; errEl.style.display='flex'; return }
    if (!fecha) { errEl.textContent = 'Selecciona la fecha del evento.'; errEl.style.display='flex'; return }
    errEl.style.display = 'none'

    const btn = document.getElementById('save')
    btn.disabled = true; btn.textContent = 'Publicando…'

    const { error } = await supabase.from('eventos').insert({ tipo, titulo, fecha, hora, lugar, descripcion })
    if (error) {
      errEl.textContent = 'Error: ' + error.message
      errEl.style.display = 'flex'
      btn.disabled = false; btn.innerHTML = '<i data-lucide="plus"></i> Publicar evento'
      lucide.createIcons(); return
    }

    // Notificar a todos los padres vía mensajes
    const horaStr = hora ? ' a las ' + hora : ''
    await supabase.from('mensajes').insert({
      de_user_id: user.id,
      texto: `📅 ${tipo}: ${titulo} — ${fecha}${horaStr}${lugar ? ' · ' + lugar : ''}${descripcion ? '\n' + descripcion : ''}`,
      para_admin: false
    })

    document.getElementById('form').style.display = 'none'
    document.getElementById('ok').style.display = 'block'
    document.getElementById('ok-msg').textContent = titulo + ' publicado'
    lucide.createIcons()
  })
  lucide.createIcons()
</script>
</body></html>
