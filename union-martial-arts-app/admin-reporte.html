<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reporte mensual</title>
<link rel="stylesheet" href="css/uma.css" />
<style>
  @media print {
    .phone { box-shadow: none !important; border: none !important; }
    .navhead, .bottomnav, .no-print { display: none !important; }
    .body { padding: 0 !important; }
    .screen { border-radius: 0 !important; height: auto !important; overflow: visible !important; }
    .phone { width: 100% !important; max-width: 100% !important; }
    body { background: #fff !important; }
    .page-break { page-break-before: always; }
  }
  .rep-header { background: var(--uma-blue-700,#1a3a5c); color:#fff; border-radius: var(--r-lg); padding: 20px; margin-bottom: 16px; }
  .rep-header .school { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; opacity: .7; margin-bottom: 4px; }
  .rep-header .alumno-name { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
  .rep-header .periodo { font-size: 13px; opacity: .85; }
  .rep-section { margin-bottom: 14px; }
  .rep-section .sec-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .rep-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--ink-100); font-size: 13px; }
  .rep-row:last-child { border-bottom: none; }
  .rep-row .label { color: var(--muted); min-width: 90px; font-size: 12px; }
  .rep-row .val { flex: 1; font-weight: 500; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .stat-box { background: var(--soft); border-radius: var(--r-md); padding: 10px; text-align: center; }
  .stat-box .n { font-size: 22px; font-weight: 800; color: var(--primary); }
  .stat-box .l { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .badge-green { background: var(--green-bg); color: var(--green-text); font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
  .badge-red { background: var(--red-bg,#fee); color: var(--red-text,#c00); font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
  .badge-blue { background: var(--blue-bg,#e8f0ff); color: var(--uma-blue-700,#1a3a5c); font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
  .empty { font-size: 13px; color: var(--muted); text-align: center; padding: 12px 0; }
  select, .sel { height: 40px; border: 1px solid var(--border-input); border-radius: var(--r-sm); font-size: 13px; font-family: var(--font); padding: 0 10px; width: 100%; outline: none; }
  .gen-btn { margin-top: 10px; }
</style>
</head>
<body>
<div class="phone"><div class="screen">
  <div class="page-hero no-print" style="padding-bottom:18px;">
    <div class="page-hero-top" style="position:relative;">
      <a href="admin.html" class="navback" style="position:absolute;left:0;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;"><i data-lucide="chevron-left" style="width:20px;height:20px;"></i></a>
      <div class="hero-logo">
        <div class="hero-logo-circle"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
        <div class="hero-logo-txt">UNION<br>MARTIAL ARTS</div>
      </div>
      <button class="iconbtn-dark" id="btn-print" style="display:none;background:rgba(255,255,255,.2);border:none;border-radius:50%;width:34px;height:34px;color:#fff;cursor:pointer;" aria-label="Imprimir"><i data-lucide="printer" style="width:18px;height:18px;"></i></button>
    </div>
    <div style="font-size:20px;font-weight:800;margin-top:10px;">Reporte mensual</div>
    <div style="font-size:13px;opacity:.75;margin-top:2px;">Historial por alumno</div>
  </div>

  <div class="body">
    <!-- Selector -->
    <div class="card mb14 no-print" id="selector">
      <div class="stack">
        <label class="field"><span class="lab">Alumno</span>
          <select id="al-sel"><option value="">Selecciona alumno…</option></select></label>
        <label class="field"><span class="lab">Mes</span>
          <input type="month" id="mes" /></label>
        <button class="btn primary block gen-btn" id="btn-gen"><i data-lucide="file-text"></i> Generar reporte</button>
      </div>
    </div>

    <!-- Reporte generado -->
    <div id="reporte" style="display:none;"></div>
  </div>

  <nav class="bottomnav no-print">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>

<script>
// Script independiente — carga alumnos sin depender de supabase.min.js
(async function loadAlumnos() {
  try {
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
    const r = await fetch('https://gdajgennlsuvndanpxiz.supabase.co/rest/v1/alumnos?select=id,nombre,cinturon,grupo', { headers: { 'apikey': KEY } })
    const data = await r.json()
    const sel = document.getElementById('al-sel')
    if (Array.isArray(data) && data.length) {
      sel.innerHTML = '<option value="">Selecciona alumno…</option>' + data.map(a => `<option value="${a.id}">${a.nombre||a.id}</option>`).join('')
    } else {
      sel.innerHTML = '<option value="">Sin alumnos: ' + JSON.stringify(data).slice(0,60) + '</option>'
    }
  } catch(e) {
    document.getElementById('al-sel').innerHTML = '<option value="">Error: ' + e.message + '</option>'
  }
})();
</script>
<script src="/js/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
(async () => {
  const supabase = window.supabase.createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { session } } = await supabase.auth.getSession()
  const user = session?.user
  if (!user) { window.location.href = 'index.html'; return }

  // Mes actual por defecto
  const hoy = new Date()
  document.getElementById('mes').value = hoy.toISOString().slice(0, 7)

  // Generar
  document.getElementById('btn-gen').addEventListener('click', async () => {
    const alumnoId = document.getElementById('al-sel').value
    const mes = document.getElementById('mes').value
    if (!alumnoId || !mes) { alert('Selecciona alumno y mes.'); return }

    const btn = document.getElementById('btn-gen')
    btn.disabled = true; btn.textContent = 'Cargando…'

    try {
    const alumno = (alumnos || []).find(a => a.id === alumnoId) || { nombre: '—', cinta: '', grupo: '' }
    const [anio, mesNum] = mes.split('-')
    const inicio = `${mes}-01`
    const fin = new Date(parseInt(anio), parseInt(mesNum), 0).toISOString().split('T')[0]
    const nombreMes = new Date(parseInt(anio), parseInt(mesNum) - 1).toLocaleString('es-MX', { month: 'long', year: 'numeric' })

    // Cargar datos en paralelo
    const [
      { data: checkins },
      { data: evaluaciones },
      { data: pagos },
      { data: citas },
    ] = await Promise.all([
      supabase.from('checkins').select('*').eq('alumno_id', alumnoId).gte('fecha', inicio).lte('fecha', fin).order('fecha'),
      supabase.from('evaluaciones').select('*').eq('alumno_id', alumnoId).gte('fecha', inicio).lte('fecha', fin).order('fecha'),
      supabase.from('pagos').select('*').eq('alumno_id', alumnoId).gte('fecha', inicio).lte('fecha', fin).order('fecha'),
      supabase.from('citas').select('*').eq('padre_user_id', user.id).gte('fecha_preferida', inicio).lte('fecha_preferida', fin).order('fecha_preferida'),
    ])

    // Cargar padre del alumno
    const { data: padre } = await supabase.from('padres').select('nombre, correo, user_id').eq('alumno_id', alumnoId).maybeSingle()

    // Cargar mensajes de actividades en casa enviados por este padre
    let msgsActividad = []
    if (padre?.user_id) {
      const { data: mAct } = await supabase.from('mensajes')
        .select('texto, creado_en').eq('de_user_id', padre.user_id).eq('para_admin', true)
        .gte('creado_en', inicio + 'T00:00:00').lte('creado_en', fin + 'T23:59:59')
        .order('creado_en')
      msgsActividad = (mAct || []).filter(m => m.texto && (m.texto.includes('🏋️') || m.texto.includes('🧘') || m.texto.includes('🥗')))
    }

    // Estadísticas asistencia
    const clases = (checkins || []).filter(c => c.tipo === 'clase' || (!c.tipo && c.tipo !== 'ausencia'))
    const torneos = (checkins || []).filter(c => c.tipo === 'torneo')
    const extras = (checkins || []).filter(c => c.tipo === 'actividad extra' || c.tipo === 'extra')
    const asistencias = (checkins || []).filter(c => c.tipo !== 'ausencia')
    const ausencias = (checkins || []).filter(c => c.tipo === 'ausencia')

    // Evaluaciones diarias vs mensuales
    const evalDiarias = (evaluaciones || []).filter(e => e.actitud !== undefined || e.esfuerzo !== undefined || e.puntuacion !== undefined && !e.tecnica_golpe)
    const evalMensual = (evaluaciones || []).filter(e => e.tecnica_golpe !== undefined)
    const ultimaMensual = evalMensual[evalMensual.length - 1]

    const fmt = f => f ? new Date(f + 'T12:00:00').toLocaleDateString('es-MX', { day: 'numeric', month: 'short' }) : '—'
    const fmtMoney = n => n != null ? '$' + Number(n).toLocaleString('es-MX') : '—'

    const rep = document.getElementById('reporte')
    rep.innerHTML = `
      <div class="rep-header">
        <div class="school">Union Martial Arts · Reporte mensual</div>
        <div class="alumno-name">${alumno?.nombre || '—'}</div>
        <div class="periodo">${nombreMes.charAt(0).toUpperCase() + nombreMes.slice(1)}${alumno?.cinta ? ' · Cinta ' + alumno.cinta : ''}${alumno?.grupo ? ' · ' + alumno.grupo : ''}</div>
      </div>

      <!-- Asistencia resumen -->
      <div class="rep-section">
        <div class="sec-title">Asistencia</div>
        <div class="stat-grid">
          <div class="stat-box"><div class="n" style="color:var(--green-text)">${clases.length}</div><div class="l">Clases</div></div>
          <div class="stat-box"><div class="n" style="color:var(--amber-600,#b45309)">${torneos.length}</div><div class="l">Torneos</div></div>
          <div class="stat-box"><div class="n" style="color:var(--red-text,#c00)">${ausencias.length}</div><div class="l">Ausencias</div></div>
        </div>
        ${asistencias.map(c => `
          <div class="rep-row">
            <span class="label">${fmt(c.fecha)}</span>
            <span class="val">${c.tipo || 'Clase'}${c.hora ? ' · ' + c.hora : ''}</span>
            <span class="badge-green">Asistió</span>
          </div>`).join('') || '<div class="empty">Sin asistencias registradas.</div>'}
        ${ausencias.map(c => `
          <div class="rep-row">
            <span class="label">${fmt(c.fecha)}</span>
            <span class="val">${c.ausencia_motivo || 'Ausencia'}</span>
            <span class="badge-red">Faltó</span>
          </div>`).join('')}
      </div>

      <!-- Actividades en casa -->
      <div class="rep-section">
        <div class="sec-title">Actividades en casa</div>
        <div class="stat-grid">
          <div class="stat-box"><div class="n">${msgsActividad.filter(m=>m.texto.includes('🏋️')).length}</div><div class="l">Rutinas</div></div>
          <div class="stat-box"><div class="n">${msgsActividad.filter(m=>m.texto.includes('🧘')).length}</div><div class="l">Meditación</div></div>
          <div class="stat-box"><div class="n">${msgsActividad.filter(m=>m.texto.includes('🥗')).length}</div><div class="l">Nutrición</div></div>
        </div>
        ${msgsActividad.length ? msgsActividad.map(m => `
          <div class="rep-row">
            <span class="label">${new Date(m.creado_en).toLocaleDateString('es-MX',{day:'numeric',month:'short'})}</span>
            <span class="val">${m.texto}</span>
          </div>`).join('') : '<div class="empty">Sin actividades en casa registradas.</div>'}
      </div>

      <!-- Evaluaciones conducta -->
      <div class="rep-section">
        <div class="sec-title">Conducta y evaluaciones diarias (${evalDiarias.length})</div>
        ${evalDiarias.length ? (() => {
          const tot = evalDiarias.length
          const actOk = evalDiarias.filter(e=>e.actitud).length
          const esf = evalDiarias.filter(e=>e.esfuerzo).length
          const tec = evalDiarias.filter(e=>e.tecnica).length
          const par = evalDiarias.filter(e=>e.participacion).length
          return `<div class="stat-grid" style="grid-template-columns:1fr 1fr;">
            <div class="stat-box"><div class="n" style="font-size:16px;">${actOk}/${tot}</div><div class="l">Buena actitud</div></div>
            <div class="stat-box"><div class="n" style="font-size:16px;">${esf}/${tot}</div><div class="l">Esfuerzo</div></div>
            <div class="stat-box"><div class="n" style="font-size:16px;">${tec}/${tot}</div><div class="l">Técnica</div></div>
            <div class="stat-box"><div class="n" style="font-size:16px;">${par}/${tot}</div><div class="l">Participación</div></div>
          </div>` +
          evalDiarias.map(e => `
          <div class="rep-row">
            <span class="label">${fmt(e.fecha)}</span>
            <span class="val">${e.puntuacion != null ? e.puntuacion + '%' : '—'}${e.nota ? ' · <span style="color:var(--muted);font-size:12px;">"' + e.nota + '"</span>' : ''}</span>
          </div>`).join('')
        })() : '<div class="empty">Sin evaluaciones diarias.</div>'}
      </div>

      ${ultimaMensual ? `
      <div class="rep-section">
        <div class="sec-title">Evaluación mensual</div>
        ${[
          ['Técnica de golpe', ultimaMensual.tecnica_golpe],
          ['Patadas', ultimaMensual.patadas],
          ['Defensa', ultimaMensual.defensa],
          ['Condición física', ultimaMensual.condicion_fisica],
          ['Disciplina', ultimaMensual.disciplina],
          ['Coordinación', ultimaMensual.coordinacion],
        ].map(([l, v]) => v != null ? `
          <div class="rep-row">
            <span class="label">${l}</span>
            <span class="val" style="display:flex;align-items:center;gap:8px;">
              <span style="flex:1;height:6px;background:var(--ink-100);border-radius:99px;overflow:hidden;">
                <span style="display:block;height:100%;width:${v*10}%;background:var(--primary);border-radius:99px;"></span>
              </span>
              <b>${v}/10</b>
            </span>
          </div>` : '').join('')}
        ${ultimaMensual.comentarios ? `<div class="rep-row"><span class="label">Comentario</span><span class="val">${ultimaMensual.comentarios}</span></div>` : ''}
      </div>` : ''}

      <!-- Pagos -->
      <div class="rep-section">
        <div class="sec-title">Pagos</div>
        ${pagos?.length ? pagos.map(p => `
          <div class="rep-row">
            <span class="label">${fmt(p.fecha)}</span>
            <span class="val">${p.concepto || p.plan || 'Mensualidad'}</span>
            <span class="badge-blue">${fmtMoney(p.monto)}</span>
          </div>`).join('') : '<div class="empty">Sin pagos registrados este mes.</div>'}
        ${pagos?.length ? `<div class="rep-row" style="font-weight:700;"><span class="label">Total</span><span class="val"></span><span>${fmtMoney(pagos.reduce((s,p)=>s+(p.monto||0),0))}</span></div>` : ''}
      </div>

      <!-- Citas -->
      <div class="rep-section">
        <div class="sec-title">Citas agendadas</div>
        ${citas?.length ? citas.map(c => `
          <div class="rep-row">
            <span class="label">${fmt(c.fecha_preferida)}</span>
            <span class="val">${c.motivo || '—'}</span>
            <span class="badge-blue">${c.estado || 'pendiente'}</span>
          </div>`).join('') : '<div class="empty">Sin citas este mes.</div>'}
      </div>


      <div style="text-align:center;padding:16px 0 4px;">
        <div style="display:inline-flex;align-items:center;gap:10px;background:#f0f4ff;border-radius:12px;padding:10px 18px;">
          <div style="width:36px;height:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1);flex-shrink:0;">
            <img src="/assets/logo-union-blue.png" style="width:26px;height:26px;object-fit:contain;" alt="UMA"/>
          </div>
          <div style="text-align:left;">
            <div style="font-size:11px;font-weight:800;color:#0047AB;letter-spacing:.04em;">UNION MARTIAL ARTS</div>
            <div style="font-size:10px;color:#6b7280;margin-top:1px;">Generado el ${new Date().toLocaleDateString('es-MX', { day:'numeric', month:'long', year:'numeric' })}</div>
          </div>
        </div>
      </div>

      <button class="btn primary block mt14 no-print" onclick="window.print()">
        <i data-lucide="printer"></i> Guardar como PDF
      </button>
      <button class="btn secondary block mt10 no-print" onclick="document.getElementById('reporte').style.display='none';document.getElementById('selector').style.display='block';document.getElementById('btn-print').style.display='none';">
        <i data-lucide="arrow-left"></i> Nuevo reporte
      </button>
    `
    lucide.createIcons()
    rep.style.display = 'block'
    document.getElementById('selector').style.display = 'none'
    document.getElementById('btn-print').style.display = 'flex'
    btn.disabled = false; btn.innerHTML = '<i data-lucide="file-text"></i> Generar reporte'
    lucide.createIcons()
    } catch(err) {
      btn.disabled = false; btn.innerHTML = '<i data-lucide="file-text"></i> Generar reporte'
      const errDiv = document.createElement('div')
      errDiv.style.cssText = 'background:#fee;color:#c00;padding:12px;border-radius:10px;font-size:13px;margin-top:10px;'
      errDiv.textContent = '❌ Error al generar reporte: ' + (err?.message || err)
      document.getElementById('selector').appendChild(errDiv)
      lucide.createIcons()
    }
  })

  document.getElementById('btn-print').addEventListener('click', () => window.print())

  lucide.createIcons()
</script>
</body>
</html>
