<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Tienda</title>
<link rel="stylesheet" href="css/uma.css" />
<style>
  .prod { background:#fff; border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--shadow-card); display:flex; flex-direction:column; }
  .prod .ph { aspect-ratio:1/1; max-height:200px; background:linear-gradient(135deg,var(--soft),#fff); display:flex; align-items:center; justify-content:center; color:var(--uma-blue-300); }
  .prod .ph img { width:100%; height:100%; object-fit:cover; }
  .prod .ph svg { width:42px; height:42px; }
  .prod .info { padding:12px; flex:1; display:flex; flex-direction:column; gap:2px; }
  .prod .pn { font-size:13.5px; font-weight:600; line-height:1.3; }
  .prod .pd { font-size:11.5px; color:var(--muted); }
  .prod .pp { font-family:var(--font-display); font-size:17px; font-weight:800; color:var(--primary); margin-top:4px; }
  .prod .btn { border-radius:0; margin-top:auto; }
  .pgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
</style>
</head>
<body>
<div class="phone"><div class="screen" style="background:#f0f2f5;">
    <div class="page-hero">
    <div class="page-hero-top">
      <div class="hero-logo">
        <a href="home.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
          <div class="hero-logo-circle"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
          <div class="hero-logo-txt">UNION<br>MARTIAL ARTS</div>
        </a>
      </div>
      <div class="hero-avatar" id="hero-initials">MA</div>
    </div>
    <div class="hero-title">Tienda del equipo</div>
  </div>
<div class="body">
    <div class="card soft mb16" style="display:flex;align-items:center;gap:10px;">
      <span style="color:var(--primary)"><i data-lucide="shopping-bag" class="lucide" style="width:18px;height:18px"></i></span>
      <span style="font-size:12.5px;color:var(--text);">Uniformes, ropa deportiva y accesorios oficiales. Haz tu pedido por WhatsApp.</span>
    </div>
    <div class="pgrid" id="grid"></div>
    <div class="brandmark"><img src="assets/logo-union-blue.png" alt="" /><span>Union Martial Arts</span></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  const wa = (n, p) => `https://wa.me/526566379191?text=${encodeURIComponent('Hola, quiero pedir: ' + n + ' ($' + p + ' MXN)')}`

  const { data: productos } = await supabase.from('productos').select('*').order('creado_en')
  const grid = document.getElementById('grid')

  if (!productos?.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin productos disponibles por el momento.</div>'
  } else {
    grid.innerHTML = productos.map(x => `
      <div class="prod">
        <div class="ph">${x.imagen_url ? `<img src="${x.imagen_url}" alt="${x.nombre}" />` : `<i data-lucide="shopping-bag"></i>`}</div>
        <div class="info">
          <div class="pn">${x.nombre}</div>
          <div class="pd">${x.descripcion || ''}</div>
          <div class="pp">$${Number(x.precio).toLocaleString()}</div>
        </div>
        <a class="btn primary block" href="${wa(x.nombre, x.precio)}" target="_blank" rel="noopener">💬 Pedir</a>
      </div>`).join('')
  }
  lucide.createIcons()
</script>
</body>
</html>
