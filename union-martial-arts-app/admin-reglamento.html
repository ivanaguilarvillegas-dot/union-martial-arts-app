<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reglamento y firmas</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin-editar.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Reglamento y firmas</div></div></div>
  <div class="body">
    <div class="label">Documento</div>
    <div class="card mb16">
      <label style="display:flex;align-items:center;gap:11px;padding:11px;background:var(--soft);border-radius:var(--r-md);cursor:pointer;">
        <span style="color:var(--primary);"><i data-lucide="file-up" style="width:18px;height:18px"></i></span>
        <span style="flex:1;font-size:13.5px;font-weight:600;" id="fname">Subir reglamento (PDF)</span>
        <span style="color:var(--primary);"><i data-lucide="upload" style="width:16px;height:16px"></i></span>
        <input type="file" accept="application/pdf" hidden id="pdf" />
      </label>
      <label class="checkitem" style="border:none;margin-top:8px;cursor:pointer;" id="req">
        <span class="box" id="reqbox" style="background:var(--green-600);color:#fff;"><i data-lucide="check"></i></span>
        <span class="txt" style="color:var(--text);font-weight:600;">Requerir firma de los padres</span>
      </label>
    </div>
    <div class="label">Estado de firmas</div>
    <div class="stack-8" id="list"></div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  // Subir PDF del reglamento a Storage
  document.getElementById('pdf').addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return
    document.getElementById('fname').textContent = 'Subiendo...'
    const { error } = await supabase.storage.from('documentos').upload('reglamento.pdf', file, { upsert: true })
    if (error) { alert('Error: ' + error.message); return }
    document.getElementById('fname').textContent = '✅ ' + file.name + ' subido'
  })

  // Toggle requerir firma
  let req = true
  document.getElementById('req').addEventListener('click', () => {
    req = !req
    const b = document.getElementById('reqbox')
    b.style.background = req ? 'var(--green-600)' : 'var(--sunken)'
    b.style.color = req ? '#fff' : 'var(--faint)'
    b.innerHTML = req ? '<i data-lucide="check"></i>' : ''
    lucide.createIcons()
  })

  // Cargar estado de firmas real
  async function cargarFirmas() {
    const { data: padres } = await supabase.from('padres').select('nombre').eq('es_admin', false).order('nombre')
    const { data: firmas } = await supabase.from('firmas_reglamento').select('padre_user_id, nombre_firma, firmado_en')

    const firmaSet = new Set(firmas?.map(f => f.nombre_firma) || [])
    const list = document.getElementById('list')

    if (!padres?.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">Sin familias registradas.</div>'
      return
    }

    list.innerHTML = padres.map(p => {
      const ok = firmaSet.has(p.nombre) || firmas?.some(f => f.nombre_firma === p.nombre)
      return `<div class="row">
        <span class="ic ${ok?'green':'amber'}"><i data-lucide="${ok?'badge-check':'clock'}"></i></span>
        <span class="grow"><span class="t">${p.nombre}</span><span class="s">${ok?'Firmado de acuerdo':'Pendiente de firma'}</span></span>
        <span class="trail"><span class="badge ${ok?'green':'amber'}">${ok?'Firmado':'Pendiente'}</span></span>
      </div>`
    }).join('')
    lucide.createIcons()
  }

  cargarFirmas()
  lucide.createIcons()
</script>
</body></html>
