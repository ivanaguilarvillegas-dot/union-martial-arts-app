<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Citas — UNION Admin</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f2167">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Union MA">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="stylesheet" href="css/uma.css?v=18" />
<style>
.cita-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.cita-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cita-avatar{width:38px;height:38px;border-radius:50%;background:#eef2ff;color:#1d4ed8;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.cita-nombre{font-size:14px;font-weight:700;color:var(--text);}
.cita-fecha{font-size:11px;color:var(--muted);margin-top:2px;}
.cita-motivo{font-size:13px;color:var(--text);line-height:1.5;background:#f8f9fc;border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.cita-pref{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cita-chip{background:#eef2ff;color:#1d4ed8;font-size:11px;font-weight:600;border-radius:99px;padding:4px 10px;display:flex;align-items:center;gap:4px;}
.cita-chip i{width:12px;height:12px;}
.cita-actions{display:flex;gap:8px;}
.cita-btn{flex:1;padding:9px 12px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;}
.cita-btn.confirm{background:#0d1a5e;color:#fff;}
.cita-btn.reject{background:#fff1f2;color:#dc2626;border:1px solid #fecaca;}
.cita-btn:active{opacity:.8;}
.cita-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;border-radius:99px;padding:3px 8px;}
.cita-badge.pendiente{background:#fff7ed;color:#d97706;}
.cita-badge.confirmada{background:#f0fdf4;color:#059669;}
.cita-badge.rechazada{background:#fff1f2;color:#dc2626;}
.respuesta-area{margin-top:8px;}
.respuesta-area textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;font-size:13px;font-family:inherit;resize:none;outline:none;box-sizing:border-box;}
.respuesta-area textarea:focus{border-color:var(--primary);}
.tab-bar{display:flex;gap:2px;padding:10px 12px 0;background:#f4f6fb;position:sticky;top:0;z-index:10;}
.tab{flex:1;padding:8px;border:none;background:none;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:10px;font-family:inherit;position:relative;}
.tab.active{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.tab .tab-count{position:absolute;top:4px;right:8px;background:#dc2626;color:#fff;font-size:9px;font-weight:800;border-radius:99px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
</style>
</head>
<body>
<div class="phone"><div class="screen" style="background:#f4f6fb;">
  <div class="navhead dark">
    <a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Citas</div></div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab active" data-tab="pendientes" onclick="cambiarTab('pendientes')">Pendientes<span class="tab-count" id="cnt-pendientes" style="display:none"></span></button>
    <button class="tab" data-tab="confirmadas" onclick="cambiarTab('confirmadas')">Confirmadas</button>
    <button class="tab" data-tab="todas" onclick="cambiarTab('todas')">Todas</button>
  </div>

  <div class="body" id="citas-body">
    <div style="text-align:center;color:var(--muted);font-size:13px;padding:24px;">Cargando…</div>
  </div>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const sb = createClient(
  'https://gdajgennlsuvndanpxiz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
)

const { data: { user } } = await sb.auth.getUser()
if (!user) { window.location.href = 'index.html' }

let todasCitas = []
let tabActual = 'pendientes'

window.cambiarTab = function(tab) {
  tabActual = tab
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab))
  render()
}

async function cargar() {
  const { data } = await sb.from('citas')
    .select('*, padres(nombre, user_id)')
    .order('creado_en', { ascending: false })
  todasCitas = data || []

  const pendientes = todasCitas.filter(c => c.estado === 'pendiente').length
  const cntEl = document.getElementById('cnt-pendientes')
  if (pendientes > 0) { cntEl.textContent = pendientes; cntEl.style.display = 'flex' }
  else cntEl.style.display = 'none'

  render()
}

function render() {
  const filtro = tabActual === 'pendientes' ? todasCitas.filter(c => c.estado === 'pendiente')
    : tabActual === 'confirmadas' ? todasCitas.filter(c => c.estado === 'confirmada')
    : todasCitas

  const body = document.getElementById('citas-body')
  if (!filtro.length) {
    body.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:13px;padding:32px;">
      <div style="font-size:32px;margin-bottom:8px;">📅</div>
      ${tabActual === 'pendientes' ? 'No hay citas pendientes.' : 'Sin citas en esta sección.'}
    </div>`
    return
  }

  body.innerHTML = filtro.map(c => {
    const nombre = c.padres?.nombre || 'Padre'
    const ini = nombre.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase()
    const fecha = new Date(c.creado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
    const badge = `<span class="cita-badge ${c.estado}">${c.estado === 'pendiente' ? '⏳ Pendiente' : c.estado === 'confirmada' ? '✅ Confirmada' : '❌ Rechazada'}</span>`

    return `<div class="cita-card" data-id="${c.id}">
      <div class="cita-header">
        <div class="cita-avatar">${ini}</div>
        <div style="flex:1;">
          <div class="cita-nombre">${nombre}</div>
          <div class="cita-fecha">Solicitada el ${fecha}</div>
        </div>
        ${badge}
      </div>
      <div class="cita-motivo">${c.motivo || 'Sin descripción'}</div>
      <div class="cita-pref">
        ${c.fecha_preferida ? `<span class="cita-chip"><i data-lucide="calendar"></i>${c.fecha_preferida}</span>` : ''}
        ${c.hora_preferida ? `<span class="cita-chip"><i data-lucide="clock"></i>${c.hora_preferida}</span>` : ''}
      </div>
      ${c.estado === 'pendiente' ? `
        <div class="respuesta-area">
          <textarea rows="2" placeholder="Respuesta al padre (opcional)…" id="resp-${c.id}"></textarea>
        </div>
        <div class="cita-actions" style="margin-top:8px;">
          <button class="cita-btn confirm" onclick="confirmar('${c.id}','${(c.padres?.user_id||'')}')">
            <i data-lucide="check"></i> Confirmar
          </button>
          <button class="cita-btn reject" onclick="rechazar('${c.id}','${(c.padres?.user_id||'')}')">
            <i data-lucide="x"></i> Rechazar
          </button>
        </div>` : c.respuesta ? `<div style="font-size:12px;color:var(--muted);margin-top:4px;padding:8px 10px;background:#f8f9fc;border-radius:8px;">💬 ${c.respuesta}</div>` : ''}
    </div>`
  }).join('')
  lucide.createIcons()
}

window.confirmar = async function(id, padreUserId) {
  const resp = document.getElementById('resp-' + id)?.value || ''
  await sb.from('citas').update({ estado: 'confirmada', respuesta: resp }).eq('id', id)
  if (padreUserId) {
    await sb.from('mensajes').insert({
      de_user_id: user.id,
      texto: `Tu cita fue confirmada. ${resp ? 'Nota: ' + resp : 'Te esperamos en la academia.'}`,
      para_admin: false,
      destinatario_id: await getPadreId(padreUserId)
    })
  }
  await cargar()
}

window.rechazar = async function(id, padreUserId) {
  const resp = document.getElementById('resp-' + id)?.value || 'Lo sentimos, intenta con otra fecha.'
  await sb.from('citas').update({ estado: 'rechazada', respuesta: resp }).eq('id', id)
  if (padreUserId) {
    await sb.from('mensajes').insert({
      de_user_id: user.id,
      texto: `Tu solicitud de cita no pudo confirmarse. ${resp}`,
      para_admin: false,
      destinatario_id: await getPadreId(padreUserId)
    })
  }
  await cargar()
}

async function getPadreId(userId) {
  const { data } = await sb.from('padres').select('id').eq('user_id', userId).maybeSingle()
  return data?.id
}

cargar()
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{})</script>
</body>
</html>
