<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — En Casa</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen" style="background:#f0f2f5;">
    <div class="page-hero">
    <div class="page-hero-top">
      <div class="hero-logo">
        <a href="home.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
          <div class="hero-logo-circle"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
          <div class="hero-logo-txt">UNION<br>MARTIAL ARTS</div>
        </a>
      </div>
      <div class="hero-avatar" id="hero-initials">MA</div>
    </div>
    <div class="hero-title">Entrena en Casa</div>
    <div class="hero-sub">Ejercicios y videos</div>
  </div>
<div class="body">
    <div style="display:flex;gap:8px;margin-bottom:14px;" id="tabs">
      <button class="chip on" data-lvl="principiante">Principiante</button>
      <button class="chip" data-lvl="intermedio">Intermedio</button>
      <button class="chip" data-lvl="avanzado">Avanzado</button>
    </div>
    <div class="label row"><span>Rutina de hoy</span><span class="badge blue" id="cnt">0/5 hechos</span></div>
    <div class="notice green" id="notif" style="display:none;"><i data-lucide="bell-ring"></i> Se notificó a tu instructor</div>
    <div class="stack-10 mb14" id="list"></div>
    <div class="card soft center"><span style="font-size:13px;color:var(--primary);display:inline-flex;align-items:center;gap:6px;"><i data-lucide="lightbulb" class="lucide" style="width:15px;height:15px"></i> Entrena mínimo <strong>&nbsp;3 veces por semana&nbsp;</strong> en casa.</span></div>
  </div>
    <div class="brandmark"><img src="/assets/logo-union-blue.png" alt="" /><span>Union Martial Arts</span></div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  const { data: meAdmin } = await supabase.from('padres').select('es_admin').eq('user_id', user.id).maybeSingle()
  const esAdmin = !!meAdmin?.es_admin

  // Rutinas estáticas por nivel (se muestran siempre)
  const LEVELS = {
    principiante:[['flame','Calentamiento básico','10 min · Sin equipo · Estiramientos'],['dumbbell','Sentadillas + Planchas','15 min · 3 series de 10'],['target','Combinación de golpes','10 min · Frente al espejo'],['footprints','Cardio — saltar la cuerda','5 min · Ritmo moderado'],['leaf','Enfriamiento y estiramiento','5 min · Siempre al final']],
    intermedio:[['flame','Calentamiento dinámico','10 min · Movilidad articular'],['activity','Patadas al aire — series','20 min · 4 series'],['zap','Circuito de fuerza','20 min · Burpees, lagartijas'],['target','Combos avanzados','15 min · Golpe + patada']],
    avanzado:[['flame','HIIT Kickboxing','30 min · Alta intensidad'],['trophy','Simulación de combate','15 min · Shadowboxing'],['zap','Fuerza explosiva','20 min · Pliométricos'],['leaf','Recuperación activa','10 min · Foam roller']],
  }
  let lvl = 'principiante'
  const done = {}
  let videos = []

  // Cargar videos subidos por el instructor
  async function cargarVideos() {
    const { data } = await supabase.storage.from('media').list('videos', { limit: 20 })
    videos = (data || []).map(v => ({
      nombre: v.name.replace(/^\d+_/, '').replace(/\.[^.]+$/, ''),
      url: supabase.storage.from('media').getPublicUrl('videos/' + v.name).data.publicUrl
    }))
    render()
  }

  function render() {
    const items = LEVELS[lvl]
    document.getElementById('list').innerHTML = items.map((it, i) => {
      const k = lvl + i, on = !!done[k]
      // Buscar video del instructor que coincida con el nombre
      const vid = videos.find(v => v.nombre.toLowerCase().includes(it[1].toLowerCase().split(' ')[0].toLowerCase()))
      const nombreClave = it[1].toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'_').substring(0,30)
      return `<div class="row"><span class="ic amber"><i data-lucide="${it[0]}"></i></span>
        <span class="grow"><span class="t">${it[1]}</span><span class="s">${it[2]}</span></span>
        <span class="trail" style="gap:8px;">
          ${vid ? `<a class="iconbtn" href="${vid.url}" target="_blank" aria-label="Ver video"><i data-lucide="play"></i></a>` : `<button class="iconbtn" disabled style="opacity:.3;" aria-label="Sin video"><i data-lucide="play"></i></button>`}
          ${esAdmin ? `<label class="iconbtn" title="Subir video" style="cursor:pointer;"><i data-lucide="upload" style="width:14px;height:14px"></i><input type="file" accept="video/*" hidden data-ejercicio="${nombreClave}" /></label>` : ''}
          <button class="iconbtn" data-k="${k}" aria-label="Marcar" style="background:${on?'var(--green-600)':'var(--sunken)'};color:${on?'#fff':'var(--faint)'};">
            <i data-lucide="check"></i></button>
        </span></div>`
    }).join('')

    // Videos extras del instructor
    if (videos.length) {
      const extras = videos.filter(v => !items.some(it => v.nombre.toLowerCase().includes(it[1].toLowerCase().split(' ')[0].toLowerCase())))
      if (extras.length) {
        document.getElementById('list').innerHTML += `<div class="label" style="margin-top:14px;">Videos del instructor</div>` +
          extras.map(v => `<div class="row"><span class="ic amber"><i data-lucide="video"></i></span>
            <span class="grow"><span class="t">${v.nombre}</span></span>
            <a class="iconbtn" href="${v.url}" target="_blank"><i data-lucide="play"></i></a></div>`).join('')
      }
    }

    const n = items.filter((_, i) => done[lvl + i]).length
    document.getElementById('cnt').textContent = n + '/' + items.length + ' hechos'
    document.getElementById('cnt').className = 'badge ' + (n === items.length ? 'green' : 'blue')
    document.getElementById('notif').style.display = n > 0 ? 'flex' : 'none'
    lucide.createIcons()
  }

  document.getElementById('tabs').addEventListener('click', e => {
    const b = e.target.closest('[data-lvl]'); if (!b) return
    ;[...e.currentTarget.children].forEach(c => c.classList.remove('on')); b.classList.add('on')
    lvl = b.dataset.lvl; render()
  })

  let notifEnviada = {}
  document.getElementById('list').addEventListener('click', async e => {
    const b = e.target.closest('[data-k]'); if (!b) return
    done[b.dataset.k] = !done[b.dataset.k]; render()
    const items = LEVELS[lvl]
    const n = items.filter((_, i) => done[lvl + i]).length
    if (n === items.length && !notifEnviada[lvl]) {
      notifEnviada[lvl] = true
      try {
        await supabase.from('mensajes').insert({
          de_user_id: user.id,
          texto: '🏋️ Rutina en casa completada — nivel ' + lvl + ' (' + items.length + ' ejercicios) · ' + new Date().toLocaleDateString('es-MX'),
          para_admin: true
        })
      } catch(e) {}
    }
  })

  // Instructor: subir video a ejercicio específico
  document.getElementById('list').addEventListener('change', async e => {
    const input = e.target.closest('input[data-ejercicio]')
    if (!input || !esAdmin) return
    const file = input.files[0]; if (!file) return
    const ejercicio = input.dataset.ejercicio
    const ext = file.name.split('.').pop()
    const nombre = ejercicio + '.' + ext
    input.parentElement.innerHTML = '<i data-lucide="loader" style="width:14px;height:14px"></i>'
    lucide.createIcons()
    const { error } = await supabase.storage.from('media').upload('videos/' + nombre, file, { upsert: true })
    if (error) { alert('❌ Error: ' + error.message); await cargarVideos(); return }
    await cargarVideos()
  })

  cargarVideos()
</script>
</body>
</html>
