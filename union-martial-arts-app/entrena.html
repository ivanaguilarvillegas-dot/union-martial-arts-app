<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Rutina en casa</title>
<link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f2167">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Union MA">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="stylesheet" href="css/uma.css?v=18" />
<link rel="stylesheet" href="css/header-unified.css?v=1"/>
</head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead blue uma-hdr hdr-unified">
    <a href="home.html" class="navback" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="uma-hdr-brand">
      <div class="uma-hdr-logo"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
      <div class="uma-hdr-txt">UNION<br>MARTIAL ARTS</div>
    </div>
    <div class="grow"><div class="title">Rutina en casa</div></div>
  </div>
  <div class="body">
    <div class="card soft mb14" style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;">
      <i data-lucide="info" style="width:16px;height:16px;color:var(--primary);flex-shrink:0;margin-top:2px;"></i>
      <span style="font-size:13px;color:var(--text);line-height:1.5;">Practica rutinas organizadas por nivel. Marca lo completado para que tu instructor vea tu avance.</span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;" id="tabs">
      <button class="chip on" data-lvl="principiante">Principiante</button>
      <button class="chip" data-lvl="intermedio">Intermedio</button>
      <button class="chip" data-lvl="avanzado">Avanzado</button>
    </div>
    <div class="label row"><span>Rutinas disponibles</span><span class="badge blue" id="cnt">0/5 hechas</span></div>
    <div class="notice green" id="notif" style="display:none;"><i data-lucide="bell-ring"></i> Se notificó a tu instructor</div>
    <div class="stack-10 mb14" id="list"></div>
    <div class="card soft center"><span style="font-size:13px;color:var(--primary);display:inline-flex;align-items:center;gap:6px;"><i data-lucide="lightbulb" class="lucide" style="width:15px;height:15px"></i> Entrena en casa siguiendo estas rutinas y marca cada bloque completado.</span></div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  let alumnoId = null
  const _sid = localStorage.getItem('uma_padre_id')
  let _pr = null
  if (_sid) { const { data: sp } = await supabase.from('padres').select('alumno_id').eq('id', _sid).limit(1); _pr = sp?.[0] }
  if (!_pr?.alumno_id) {
    const { data: pp } = await supabase.from('padres').select('alumno_id').eq('user_id', user.id)
    _pr = (pp || []).find(x => !!x.alumno_id) || _pr
  }
  if (!_pr?.alumno_id) {
    const { data: pc } = await supabase.from('padres').select('alumno_id').eq('correo', user.email)
    _pr = (pc || []).find(x => !!x.alumno_id) || _pr
  }
  alumnoId = _pr?.alumno_id || null
  const hoy = new Date().toISOString().split('T')[0]

  let planBloqueado = false
  {
    const _sid = localStorage.getItem('uma_padre_id')
    let _pr = null
    if (_sid) { const { data: sp } = await supabase.from('padres').select('alumno_id').eq('id', _sid).limit(1); _pr = sp?.[0] }
    if (!_pr) { const { data: pp } = await supabase.from('padres').select('alumno_id').eq('user_id', user.id).limit(1); _pr = pp?.[0] }
    if (_pr?.alumno_id) {
      const { data: _al } = await supabase.from('alumnos').select('plan_pago').eq('id', _pr.alumno_id).maybeSingle()
      if (_al?.plan_pago === 'mensual') {
        planBloqueado = true
        document.querySelector('.body').innerHTML = '<div style="padding:48px 24px;text-align:center;"><div style="font-size:48px;margin-bottom:16px;">??</div><div style="font-size:16px;font-weight:700;color:#111827;margin-bottom:8px;">Acceso no disponible</div><div style="font-size:13px;color:#6b7280;line-height:1.6;">Disponible en plan anual<br>o Club Cinta Negra.</div><a href="programas.html" style="display:inline-block;margin-top:20px;padding:10px 24px;background:var(--primary);color:#fff;border-radius:22px;text-decoration:none;font-size:13px;font-weight:700;">Ver planes</a></div>'
      }
    }
  }

  const { data: meAdmin } = await supabase.from('padres').select('es_admin').eq('user_id', user.id).maybeSingle()
  const esAdmin = !!meAdmin?.es_admin

  // Rutinas por nivel alineadas con el catálogo de admin-media
  const LEVELS = {
    principiante:[
      ['flame','Calentamiento básico','10 min · Sin equipo'],
      ['dumbbell','Sentadillas y planchas','15 min · 3 series de 10'],
      ['target','Combinación de golpes','10 min · Frente al espejo'],
      ['footprints','Cardio saltar cuerda','5 min · Ritmo moderado'],
      ['leaf','Enfriamiento estiramiento','5 min · Siempre al final'],
    ],
    intermedio:[
      ['flame','Calentamiento dinámico','10 min · Movilidad articular'],
      ['activity','Patadas al aire series','20 min · 4 series'],
      ['zap','Circuito de fuerza','20 min · Burpees y lagartijas'],
      ['target','Combos avanzados','15 min · Golpe más patada'],
    ],
    avanzado:[
      ['flame','HIIT kickboxing','30 min · Alta intensidad'],
      ['trophy','Simulación de combate','15 min · Shadowboxing'],
      ['zap','Fuerza explosiva','20 min · Pliométricos'],
      ['leaf','Recuperación activa','10 min · Foam roller'],
    ],
  }
  let lvl = 'principiante'
  const done = {}
  let videos = []
  let links = {}
  const mkActToken = (item, estado) => `[[ACT]] cat=rutina;alumno=${alumnoId || ''};item=${item};fecha=${hoy};estado=${estado ? 1 : 0}`

  function clave(nombre) {
    return nombre.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '')
      .substring(0, 40)
  }

  // Cargar videos y vínculos del instructor
  async function cargarVideos() {
    const [vidRes, linkRes] = await Promise.allSettled([
      supabase.storage.from('media').list('videos', { limit: 100 }),
      supabase.from('configuracion').select('valor').eq('clave', 'media_links').maybeSingle()
    ])
    videos = (vidRes.value?.data || []).map(v => ({
      nombre: v.name.replace(/^\d+_/, '').replace(/\.[^.]+$/, ''),
      url: supabase.storage.from('media').getPublicUrl('videos/' + v.name).data.publicUrl
    }))
    try { links = JSON.parse(linkRes.value?.data?.valor || '{}') } catch { links = {} }

    try {
      const { data: msgs } = await supabase.from('mensajes')
        .select('texto, creado_en')
        .eq('de_user_id', user.id)
        .eq('para_admin', true)
        .gte('creado_en', hoy + 'T00:00:00')
        .lte('creado_en', hoy + 'T23:59:59')
        .order('creado_en', { ascending: true })
      ;(msgs || []).forEach(m => {
        const t = String(m.texto || '')
        if (!t.startsWith('[[ACT]]')) return
        if (!t.includes('cat=rutina;')) return
        if (alumnoId && !t.includes('alumno=' + alumnoId + ';')) return
        const item = (t.match(/item=([^;]+)/) || [])[1] || ''
        const estado = (t.match(/estado=([01])/) || [])[1]
        const k = item.replace('rutina_', '')
        if (!k) return
        done[k] = estado === '1'
      })
    } catch(e) {}

    render()
  }

  function render() {
    const items = LEVELS[lvl]
    if (!items) return
    document.getElementById('list').innerHTML = items.map((it, i) => {
      const k = lvl + i, on = !!done[k]
      const nombreClave = clave(it[1])
      const vid = videos.find(v => v.nombre.toLowerCase().includes(it[1].toLowerCase().split(' ')[0].toLowerCase()))
      const lnk = links[nombreClave] || null
      const playUrl = vid?.url || lnk || null
      return `<div class="row"><span class="ic amber"><i data-lucide="${it[0]}"></i></span>
        <span class="grow"><span class="t">${it[1]}</span><span class="s">${it[2]}</span></span>
        <span class="trail" style="gap:8px;">
          ${playUrl ? `<a class="iconbtn" href="${playUrl}" target="_blank" aria-label="Ver video"><i data-lucide="play"></i></a>` : `<button class="iconbtn" disabled style="opacity:.3;" aria-label="Sin video"><i data-lucide="play"></i></button>`}
          ${esAdmin ? `<label class="iconbtn" title="Subir video" style="cursor:pointer;"><i data-lucide="upload" style="width:14px;height:14px"></i><input type="file" accept="video/*" hidden data-ejercicio="${nombreClave}" /></label>` : ''}
          <button class="iconbtn" data-k="${k}" aria-label="Marcar" style="background:${on?'var(--green-600)':'var(--sunken)'};color:${on?'#fff':'var(--faint)'};">
            <i data-lucide="check"></i></button>
        </span></div>`
    }).join('')

    // Videos extras del instructor
    if (videos.length) {
      const extras = videos.filter(v => !items.some(it => v.nombre.toLowerCase().includes(it[1].toLowerCase().split(' ')[0].toLowerCase())))
      if (extras.length) {
        document.getElementById('list').innerHTML += `<div class="label" style="margin-top:14px;">Videos del instructor</div>` +
          extras.map(v => `<div class="row"><span class="ic amber"><i data-lucide="video"></i></span>
            <span class="grow"><span class="t">${v.nombre}</span></span>
            <a class="iconbtn" href="${v.url}" target="_blank"><i data-lucide="play"></i></a></div>`).join('')
      }
    }

    const n = items.filter((_, i) => done[lvl + i]).length
    document.getElementById('cnt').textContent = n + '/' + items.length + ' hechos'
    document.getElementById('cnt').className = 'badge ' + (n === items.length ? 'green' : 'blue')
    document.getElementById('notif').style.display = n > 0 ? 'flex' : 'none'
    lucide.createIcons()
  }

  document.getElementById('tabs')?.addEventListener('click', e => {
    const b = e.target.closest('[data-lvl]'); if (!b) return
    ;[...e.currentTarget.children].forEach(c => c.classList.remove('on')); b.classList.add('on')
    lvl = b.dataset.lvl; render()
  })

  let notifEnviada = {}
  document.getElementById('list')?.addEventListener('click', async e => {
    const b = e.target.closest('[data-k]'); if (!b) return
    done[b.dataset.k] = !done[b.dataset.k]; render()
    const idx = b.dataset.k
    const itemKey = 'rutina_' + idx
    const items = LEVELS[lvl]
    const nombre = items[Number(idx.replace(lvl, ''))]?.[1] || idx
    try {
      if (alumnoId) {
        if (done[idx]) {
          await supabase.from('habitos_log').insert({
            alumno_id: alumnoId,
            fecha: hoy,
            tipo: itemKey,
          })
          await supabase.from('actividades_casa').insert({
            alumno_id: alumnoId,
            fecha: hoy,
            tipo: itemKey,
          })
        } else {
          await supabase.from('habitos_log').delete()
            .eq('alumno_id', alumnoId)
            .eq('fecha', hoy)
            .eq('tipo', itemKey)
          await supabase.from('actividades_casa').delete()
            .eq('alumno_id', alumnoId)
            .eq('fecha', hoy)
            .eq('tipo', itemKey)
        }
      }
    } catch(e) {}

    try {
      await supabase.from('mensajes').insert({
        de_user_id: user.id,
        texto: `${mkActToken(itemKey, !!done[idx])} · 🏃 ${done[idx] ? 'Realizado' : 'Desmarcado'}: ${nombre}`,
        para_admin: true,
        es_automatico: true
      })
    } catch(e) {}

    const n = items.filter((_, i) => done[lvl + i]).length
    if (n === items.length && !notifEnviada[lvl]) {
      notifEnviada[lvl] = true
      try {
        await supabase.from('mensajes').insert({
          de_user_id: user.id,
          texto: 'Rutina en casa completada — nivel ' + lvl + ' (' + items.length + ' ejercicios) · ' + new Date().toLocaleDateString('es-MX'),
          para_admin: true,
          es_automatico: true
        })
      } catch(e) {}
    }
  })

  // Instructor: subir video a ejercicio específico
  document.getElementById('list')?.addEventListener('change', async e => {
    const input = e.target.closest('input[data-ejercicio]')
    if (!input || !esAdmin) return
    const file = input.files[0]; if (!file) return
    const ejercicio = input.dataset.ejercicio
    const ext = file.name.split('.').pop()
    const nombre = ejercicio + '.' + ext
    input.parentElement.innerHTML = '<i data-lucide="loader" style="width:14px;height:14px"></i>'
    lucide.createIcons()
    const { error } = await supabase.storage.from('media').upload('videos/' + nombre, file, { upsert: true })
    if (error) { alert('? Error: ' + error.message); await cargarVideos(); return }
    await cargarVideos()
  })

  if (!planBloqueado) cargarVideos()
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }
</script>
</body>
</html>
