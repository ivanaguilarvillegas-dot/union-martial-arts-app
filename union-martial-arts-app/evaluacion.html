<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Union Martial Arts — Evaluación</title>
<link rel="stylesheet" href="css/uma.css" />
</head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead blue">
    <a class="navback" href="home.html" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="sub">Progreso de Mateo</div><div class="title">Evaluación</div></div>
  </div>
  <div class="body">
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="chip on" data-tab="diaria">Diaria</button>
      <button class="chip" data-tab="mensual">Mensual</button>
    </div>

    <div id="diaria">
      <div class="card mb14">
        <div class="label row" style="margin-bottom:12px;"><span style="color:var(--muted);text-transform:none;letter-spacing:0;font-weight:500;font-size:13px;">Clase de hoy · Lunes 23 jun</span><span class="badge green">8/9</span></div>
        <div id="dailyList"></div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--ink-100);">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Nota del instructor</div>
          <div style="font-size:13.5px;font-style:italic;line-height:1.55;">“Mateo trabajó muy bien hoy. Reforcemos la puntualidad.”</div>
        </div>
      </div>
    </div>

    <div id="mensual" style="display:none;">
      <div class="card mb14">
        <div class="label row" style="margin-bottom:14px;"><span style="text-transform:none;letter-spacing:0;color:var(--muted);font-weight:500;font-size:13px;">Evaluación de Junio</span><span class="badge blue">Cinta Azul</span></div>
        <div id="progList"></div>
      </div>
      <div class="card soft center">
        <div style="font-family:var(--font-display);font-size:34px;font-weight:800;color:var(--primary);line-height:1;">7.7 <span style="font-size:18px;opacity:.5;">/ 10</span></div>
        <div style="font-size:13px;color:var(--primary);margin-top:6px;font-weight:600;">Promedio general del mes</div>
      </div>
    </div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const DAILY = [['Actitud',1],['Esfuerzo',1],['Técnica',1],['Participación',1],['Trabajo en equipo',1],['Uniforme completo',1],['Higiene y limpieza',1],['Respeto',1],['Llegó a tiempo',0]];
  document.getElementById('dailyList').innerHTML = DAILY.map(([t,ok])=>`
    <div class="checkitem ${ok?'done':''}" style="cursor:default;"><span class="box"><i data-lucide="check"></i></span><span class="txt">${t}</span></div>`).join('');

  const MENSUAL = [['Técnica de golpe',8],['Patadas',7],['Defensa',8],['Condición física',6],['Disciplina',9],['Coordinación',8]];
  document.getElementById('progList').innerHTML = MENSUAL.map(([t,v])=>`
    <div class="prog"><div class="head"><span>${t}</span><b>${v} / 10</b></div>
      <div class="track"><div class="fill" style="width:${v*10}%"></div></div></div>`).join('');

  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-tab]').forEach(c=>c.classList.remove('on')); b.classList.add('on');
    const d = b.dataset.tab==='diaria';
    document.getElementById('diaria').style.display = d?'block':'none';
    document.getElementById('mensual').style.display = d?'none':'block';
  }));
  lucide.createIcons();
</script>
</body>
</html>
