<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avisos</title><link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f2167">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Union MA">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead blue">
    <a class="navback" href="home.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Avisos</div></div>
  </div>
  <div class="body">
    <div id="privados-wrap" style="display:none;">
      <div class="label">Mensajes para ti</div>
      <div id="privados-list" class="mb18"></div>
    </div>

    <div class="label">Avisos del instructor</div>
    <div id="avisos-wrap" class="mb18">
      <div class="card soft center" style="color:var(--muted);font-size:13px;padding:16px;" id="avisos-empty">Sin avisos por el momento.</div>
    </div>

    <div class="label">Frase del día</div>
    <div id="frase-wrap" class="mb18">
      <div class="card soft center" style="color:var(--muted);font-size:13px;padding:16px;" id="frase-empty">Sin frase del día.</div>
    </div>

    <div class="label">Próximos eventos</div>
    <div class="stack-10" id="eventos-wrap">
      <div class="card soft center" style="color:var(--muted);font-size:13px;padding:16px;" id="eventos-empty">Sin eventos próximos.</div>
    </div>
  </div>
  <nav class="bottomnav">
    <a href="home.html"><i data-lucide="home"></i>Inicio</a>
    <a href="checkin.html"><i data-lucide="clipboard-check"></i>Check-in</a>
    <a href="pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  // Marcar como visto
  localStorage.setItem('notif_visto', new Date().toISOString())

  // Mensajes privados dirigidos a este padre
  const { data: privados } = await supabase.from('mensajes')
    .select('id, texto, creado_en').eq('para_admin', false).eq('destinatario_id', user.id)
    .order('creado_en', { ascending: false }).limit(10)
  if (privados?.length) {
    document.getElementById('privados-wrap').style.display = 'block'
    document.getElementById('privados-list').innerHTML = privados.map(m => {
      const fecha = new Date(m.creado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
      return `<div class="card mb10" style="border-left:3px solid var(--green-600);" id="msg-${m.id}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="color:var(--green-600);"><i data-lucide="mail" style="width:15px;height:15px"></i></span>
          <span style="font-size:11px;font-weight:600;color:var(--green-600);">MENSAJE PRIVADO</span>
          <span style="font-size:11px;color:var(--muted);margin-left:auto;">${fecha}</span>
        </div>
        <div style="font-size:13.5px;line-height:1.6;margin-bottom:10px;">${m.texto}</div>
        <button class="btn sm" style="background:var(--red-bg);color:var(--red-text);border:none;cursor:pointer;" data-del="${m.id}">
          <i data-lucide="trash-2" style="width:13px;height:13px"></i> Borrar
        </button>
      </div>`
    }).join('')
    lucide.createIcons()
  }

  // Aviso general
  const { data: aviso } = await supabase.from('configuracion').select('valor, actualizado_en').eq('clave', 'aviso_general').maybeSingle()
  if (aviso?.valor) {
    const fecha = aviso.actualizado_en ? new Date(aviso.actualizado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : ''
    document.getElementById('avisos-wrap').innerHTML = `
      <div class="card" id="aviso-card" style="border-left:3px solid var(--primary);">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px;">
          <span style="color:var(--primary);"><i data-lucide="message-square" style="width:16px;height:16px"></i></span>
          <span style="font-size:12px;font-weight:600;color:var(--primary);">INSTRUCTOR</span>
          <span style="font-size:11px;color:var(--muted);margin-left:auto;">${fecha}</span>
        </div>
        <div style="font-size:13.5px;line-height:1.6;margin-bottom:10px;">${aviso.valor}</div>
        <button class="btn sm" id="btn-del-aviso" style="background:var(--red-bg);color:var(--red-text);border:none;cursor:pointer;">
          <i data-lucide="trash-2" style="width:13px;height:13px"></i> Borrar
        </button>
      </div>`

    document.getElementById('btn-del-aviso').addEventListener('click', async () => {
      if (!confirm('¿Borrar este aviso?')) return
      await supabase.from('configuracion').delete().eq('clave', 'aviso_general')
      document.getElementById('aviso-card').remove()
    })
  }

  // Frase del día
  const { data: frase } = await supabase.from('frases').select('texto, fecha_envio').eq('activa', true).maybeSingle()
  if (frase?.texto) {
    document.getElementById('frase-wrap').innerHTML = `
      <div style="background:linear-gradient(135deg,var(--navy,#0f2167),var(--primary));border-radius:16px;padding:24px 18px;text-align:center;">
        <div style="font-size:28px;color:rgba(255,255,255,.5);line-height:1;margin-bottom:8px;">"</div>
        <div style="font-size:14.5px;font-style:italic;line-height:1.75;color:#fff;font-weight:500;">${frase.texto}</div>
        <div style="font-size:28px;color:rgba(255,255,255,.5);line-height:1;margin-top:8px;">"</div>
        <div style="margin-top:12px;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.05em;">
          <i data-lucide="award" style="width:12px;height:12px"></i> UNION MARTIAL ARTS
        </div>
      </div>`
    lucide.createIcons()
  }

  // Eventos próximos
  const hoy = new Date().toISOString().split('T')[0]
  const { data: evs } = await supabase.from('eventos').select('titulo, fecha, lugar, descripcion').gte('fecha', hoy).order('fecha').limit(5)
  if (evs?.length) {
    document.getElementById('eventos-wrap').innerHTML = evs.map(ev => `
      <div class="card mb10">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="ic amber"><i data-lucide="calendar"></i></span>
          <span class="grow">
            <span class="t">${ev.titulo}</span>
            <span class="s">${ev.fecha}${ev.lugar ? ' · ' + ev.lugar : ''}</span>
            ${ev.descripcion ? `<span style="display:block;font-size:12px;color:var(--muted);margin-top:3px;">${ev.descripcion}</span>` : ''}
          </span>
        </div>
      </div>`).join('')
  }

  // Borrar mensaje privado (padre)
  document.body.addEventListener('click', async e => {
    const btn = e.target.closest('[data-del]'); if (!btn) return
    if (!confirm('¿Borrar este mensaje?')) return
    btn.textContent = 'Borrando…'; btn.disabled = true
    const { error } = await supabase.from('mensajes').delete().eq('id', btn.dataset.del)
    if (error) {
      alert('❌ Error al borrar: ' + error.message)
      btn.textContent = 'Borrar'; btn.disabled = false
    } else {
      document.getElementById('msg-' + btn.dataset.del)?.remove()
    }
  })

  lucide.createIcons()
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }
</script>
</body></html>
