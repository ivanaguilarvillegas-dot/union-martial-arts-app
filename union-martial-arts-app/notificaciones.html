<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notificaciones — Union MA</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1818C4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Union MA">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="stylesheet" href="css/uma.css?v=18" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
<style>
.page-bg { background:#f0f2f5; min-height:100%; padding:0 0 90px; }

/* Hero */
.notif-hero { background:linear-gradient(135deg,var(--uma-blue-700) 0%,var(--primary) 100%); padding:16px 18px 22px; color:#fff; }
.notif-hero-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.hero-logo { display:flex; align-items:center; gap:10px; }
.hero-logo img { width:32px; height:32px; }
.hero-logo-txt { font-size:11px; font-weight:800; letter-spacing:.04em; line-height:1.2; opacity:.9; }
.hero-actions { display:flex; align-items:center; gap:10px; }
.hero-bell { position:relative; }
.hero-bell-ic { width:38px; height:38px; background:rgba(255,255,255,.15); border-radius:50%; display:flex; align-items:center; justify-content:center; }
.hero-bell-badge { position:absolute; top:-4px; right:-4px; background:#ef4444; color:#fff; font-size:10px; font-weight:800; min-width:18px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 4px; border:2px solid var(--uma-blue-700); }
.hero-avatar { width:38px; height:38px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:var(--uma-blue-700); }
.hero-title { font-size:22px; font-weight:800; margin-bottom:3px; }
.hero-sub { font-size:13px; opacity:.7; }

/* Sección cards */
.sec-card { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,.07); margin:0 14px 14px; }
.sec-hdr { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid #f3f4f6; }
.sec-hdr-ic { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sec-hdr-ic.blue   { background:#eff6ff; }
.sec-hdr-ic.amber  { background:#fffbeb; }
.sec-hdr-txt { flex:1; }
.sec-hdr-title { font-size:15px; font-weight:700; color:#111827; }
.sec-hdr-sub { font-size:12px; color:#6b7280; margin-top:1px; }
.sec-hdr-action { display:flex; align-items:center; gap:4px; font-size:13px; font-weight:600; color:var(--primary); text-decoration:none; white-space:nowrap; }
.sec-hdr-count { background:var(--primary); color:#fff; font-size:10px; font-weight:800; padding:2px 6px; border-radius:99px; }

/* Avisos */
.aviso-row { padding:14px 16px; border-bottom:1px solid #f9fafb; }
.aviso-row:last-child { border-bottom:none; }
.aviso-top { display:flex; align-items:flex-start; gap:12px; }
.aviso-ic { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
.aviso-ic.red   { background:#fef2f2; }
.aviso-ic.amber { background:#fffbeb; }
.aviso-ic.blue  { background:#eff6ff; }
.badge-imp { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; letter-spacing:.04em; margin-bottom:5px; }
.badge-imp.urgente     { background:#fee2e2; color:#dc2626; }
.badge-imp.importante  { background:#fef3c7; color:#b45309; }
.badge-imp.informativo { background:#dbeafe; color:var(--primary); }
.aviso-title { font-size:14px; font-weight:700; color:#111827; margin-bottom:3px; line-height:1.3; }
.aviso-msg { font-size:13px; color:#4b5563; line-height:1.5; margin-bottom:6px; }
.aviso-meta { display:flex; align-items:center; gap:4px; font-size:12px; color:#9ca3af; margin-bottom:8px; }
.btn-enterado { display:flex; align-items:center; justify-content:center; gap:6px; background:#f0fdf4; color:#16a34a; border:1.5px solid #bbf7d0; border-radius:10px; padding:9px 14px; font-size:13px; font-weight:700; cursor:pointer; width:100%; transition:all .2s; }
.btn-enterado:active { background:#dcfce7; }
.btn-enterado.confirmado { background:#f0fdf4; color:#16a34a; border-color:#86efac; pointer-events:none; opacity:.8; }

/* Mensajes */
.msg-row { display:flex; align-items:flex-start; gap:12px; padding:14px 16px; border-bottom:1px solid #f9fafb; }
.msg-row:last-child { border-bottom:none; }
.msg-dot { width:8px; height:8px; border-radius:50%; background:var(--primary); flex-shrink:0; margin-top:6px; }
.msg-dot.read { background:transparent; }
.msg-avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0; }
.msg-body { flex:1; min-width:0; }
.msg-name { font-size:14px; font-weight:700; color:#111827; }
.msg-preview { font-size:13px; color:#6b7280; margin-top:2px; line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.msg-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
.msg-nuevo { background:var(--primary); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:99px; }
.msg-time { font-size:11px; color:#9ca3af; }

/* Eventos */
.notif-categories { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; padding:0 16px 16px; }
.notif-cat { display:flex; gap:10px; align-items:flex-start; background:#f9fafb; border-radius:16px; padding:12px 14px; color:#111827; border:1px solid #e5e7eb; cursor:pointer; }
.notif-cat.active { background:#fff; border-color:#c7d2fe; box-shadow:0 4px 16px rgba(99,102,241,.12); }
.notif-cat div:first-child { flex-shrink:0; }
.notif-cat div:last-child { min-width:0; }
.notif-cat:hover { background:#fff; box-shadow:0 4px 16px rgba(15,23,42,.08); }
.eventos-scroll { display:flex; gap:10px; overflow-x:auto; padding:0 16px 16px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
.eventos-scroll::-webkit-scrollbar { display:none; }
.evento-card { background:#fff; border-radius:14px; width:210px; flex-shrink:0; scroll-snap-align:start; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.08); border:1px solid #f3f4f6; }
.evento-img { width:100%; height:100px; background:#0d1a5e; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.evento-img img { width:100%; height:100%; object-fit:cover; }
.evento-img-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:rgba(255,255,255,.6); width:100%; height:100%; }
.evento-tipo-badge { position:absolute; top:8px; left:8px; background:rgba(0,0,0,.5); color:#fff; font-size:10px; font-weight:700; padding:3px 8px; border-radius:6px; backdrop-filter:blur(4px); }
.evento-body { padding:11px 12px 13px; }
.evento-nombre { font-size:13px; font-weight:700; color:#111827; margin-bottom:7px; }
.evento-detail { display:flex; align-items:center; gap:5px; font-size:12px; color:#6b7280; margin-bottom:3px; }
.evento-btn { display:block; text-align:center; background:#eff6ff; color:var(--primary); font-size:12px; font-weight:700; padding:7px; border-radius:8px; text-decoration:none; margin-top:9px; }

/* Frase */
.frase-card { background:linear-gradient(135deg,var(--uma-blue-700),var(--primary)); border-radius:16px; padding:16px 18px; display:flex; align-items:center; gap:14px; }
.frase-ic { width:38px; height:38px; background:rgba(255,255,255,.15); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.frase-label { font-size:10px; font-weight:700; color:rgba(255,255,255,.6); margin-bottom:3px; letter-spacing:.05em; text-transform:uppercase; }
.frase-txt { font-size:13px; color:#fff; font-style:italic; line-height:1.5; }

/* Empty */
.empty-sec { padding:24px 16px; text-align:center; color:#9ca3af; }
.empty-sec p { font-size:13px; margin-top:8px; }

/* Hero tabs */
.hero-tab { flex:1; padding:8px 6px; border:none; background:rgba(255,255,255,.15); color:rgba(255,255,255,.75); font-size:11.5px; font-weight:700; border-radius:10px; cursor:pointer; font-family:inherit; transition:all .2s; }
.hero-tab.active { background:#fff; color:var(--uma-blue-700); }
</style>
</head>
<body>
<div class="phone"><div class="screen" style="background:#f0f2f5;overflow-y:auto;">

  <div class="navhead blue uma-hdr">
    <a href="home.html" class="navback" aria-label="Volver"><i data-lucide="chevron-left"></i></a>
    <div class="uma-hdr-brand">
      <div class="uma-hdr-logo"><img src="/assets/logo-union-blue.png" alt="UMA" /></div>
      <div class="uma-hdr-txt">UNION<br>MARTIAL ARTS</div>
    </div>
    <div class="grow"><div class="title" id="hero-tab-title">Notificaciones</div></div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <div style="position:relative;">
        <i data-lucide="bell" style="width:20px;height:20px;color:#fff;"></i>
        <div class="hero-bell-badge" id="bell-count" style="display:none;">0</div>
      </div>
      <div style="display:none;" id="hero-initials"></div>
    </div>
  </div>
  <!-- Tabs -->
  <div style="background:var(--uma-blue-600);padding:0 14px 12px;display:flex;gap:8px;">
    <button class="hero-tab active" data-tab="avisos" onclick="cambiarTab('avisos')">
      📢 Avisos<span id="ht-avisos" style="display:none;margin-left:4px;background:#ef4444;color:#fff;font-size:9px;font-weight:800;border-radius:99px;padding:1px 5px;"></span>
    </button>
    <button class="hero-tab" data-tab="eventos" onclick="cambiarTab('eventos')">

    </button>
  </div>

  <div class="page-bg">

    <!-- 1. AVISOS GENERALES -->
    <div class="sec-card" id="sec-avisos" style="margin-top:16px;">
      <div class="sec-hdr">
        <div class="sec-hdr-ic amber">
          <i class="ti ti-speakerphone" style="font-size:20px;color:#d97706;"></i>
        </div>
        <div class="sec-hdr-txt">
          <div class="sec-hdr-title">Avisos generales</div>
          <div class="sec-hdr-sub">Información importante y categorías clave para tu familia.</div>
        </div>
      </div>
      <div class="notif-categories">
        <button type="button" class="notif-cat active" data-category="pagos" onclick="filterAvisos('pagos')">
          <div style="font-size:18px;">💳</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:#111827;">Pagos</div>
            <div style="font-size:12px;color:#6b7280;">Filtra avisos relacionados con pagos.</div>
          </div>
        </button>
        <button type="button" class="notif-cat" data-category="citas" onclick="filterAvisos('citas')">
          <div style="font-size:18px;">📅</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:#111827;">Citas</div>
            <div style="font-size:12px;color:#6b7280;">Filtra avisos de seguimientos y citas.</div>
          </div>
        </button>
        <button type="button" class="notif-cat" data-category="ausencias" onclick="filterAvisos('ausencias')">
          <div style="font-size:18px;">❗</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:#111827;">Ausencias</div>
            <div style="font-size:12px;color:#6b7280;">Filtra avisos de faltas y registros.</div>
          </div>
        </button>
        <button type="button" class="notif-cat" data-category="checkin" onclick="filterAvisos('checkin')">
          <div style="font-size:18px;">✔️</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:#111827;">Check-in</div>
            <div style="font-size:12px;color:#6b7280;">Filtra avisos de inscripción y asistencia.</div>
          </div>
        </button>
      </div>
      <div id="avisos-list">
        <div class="empty-sec">
          <i class="ti ti-speakerphone" style="font-size:28px;display:block;margin:0 auto;opacity:.3;"></i>
          <p>No hay avisos generales por el momento.</p>
        </div>
      </div>
    </div>

    <!-- 2. PRÓXIMOS EVENTOS -->
    <div class="sec-card" id="sec-eventos" style="margin-top:16px;">
      <div class="sec-hdr" style="border-bottom:none;padding-bottom:8px;">
        <div class="sec-hdr-ic amber">
          <i class="ti ti-trophy" style="font-size:20px;color:#d97706;"></i>
        </div>
        <div class="sec-hdr-txt">
          <div class="sec-hdr-title">Próximos eventos</div>
          <div class="sec-hdr-sub">Torneos, exámenes y actividades.</div>
        </div>
        <a class="sec-hdr-action" href="torneos.html">Ver todos <i class="ti ti-chevron-right" style="font-size:14px;"></i></a>
      </div>
      <div class="eventos-scroll" id="eventos-list">
        <div style="padding:8px 0 16px;color:#9ca3af;font-size:13px;text-align:center;width:100%;">Sin eventos próximos.</div>

  </div>

  <nav class="bottomnav">

</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )

  function timeAgo(iso) {
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000)
    if (diff < 3600)   return 'Hace ' + Math.max(1, Math.floor(diff/60)) + ' min'
    if (diff < 86400)  return 'Hace ' + Math.floor(diff/3600) + ' h'
    if (diff < 172800) return 'Hace 1 día'
    return 'Hace ' + Math.floor(diff/86400) + ' días'
  }

  function initials(name) {
    if (!name) return '?'
    return name.trim().split(/\s+/).slice(0,2).map(p => p[0]).join('').toUpperCase()
  }

  function avatarColor(name) {
    const colors = ['#0047AB','#16a34a','#7c3aed','#d97706','#dc2626','#0891b2']
    let h = 0; for (const c of (name||'')) h = (h*31 + c.charCodeAt(0)) % colors.length
    return colors[h]
  }

  // Tab switcher: definido antes de las consultas para que los botones siempre respondan
  const tabTitles = { avisos: 'Notificaciones', eventos: 'Eventos' }
  window.cambiarTab = function(tab) {
    document.querySelectorAll('.hero-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab))
    document.getElementById('sec-avisos').style.display   = tab === 'avisos'   ? 'block' : 'none'
    document.getElementById('sec-eventos').style.display  = tab === 'eventos'  ? 'block' : 'none'
    document.getElementById('hero-tab-title').textContent = tabTitles[tab]
    const sec = document.getElementById('sec-' + tab)
    if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' })
  }

  const CATEGORY_FILTERS = {
    pagos:    ['pago','recibo','mensualidad','cuota','tarifa','saldo'],
    citas:    ['cita','agendar','seguimiento','consulta','entrevista'],
    ausencias:['ausencia','ausent','falta','inasist','inasistencia'],
    checkin:  ['check-in','check in','asistencia','entrada','registro']
  }
  let currentCategory = 'pagos'
  let avisosCache = []

  function normalizeText(text) {
    return (text || '').toLowerCase()
  }

  window.filterAvisos = function(category) {
    currentCategory = category
    document.querySelectorAll('.notif-cat').forEach(btn => btn.classList.toggle('active', btn.dataset.category === category))
    renderAvisos(avisosCache, category)
  }

  function renderAvisos(avisos, category) {
    const box = document.getElementById('avisos-list')
    if (!avisos?.length) {
      box.innerHTML = '<div class="empty-sec"><p>No hay avisos generales por el momento.</p></div>'
      return
    }

    const filtered = category && CATEGORY_FILTERS[category]
      ? avisos.filter(a => {
          const text = normalizeText(a.titulo + ' ' + a.mensaje)
          return CATEGORY_FILTERS[category].some(keyword => text.includes(keyword))
        })
      : avisos

    if (!filtered.length) {
      const label = category.charAt(0).toUpperCase() + category.slice(1).replace('checkin', 'Check-in')
      box.innerHTML = `<div class="empty-sec"><p>No hay avisos para ${label} en este momento.</p></div>`
      return
    }

    box.innerHTML = filtered.map(a => {
      const pMap = {
        urgente:    { cls:'red',   icon:'ti-alert-circle',  col:'#dc2626' },
        importante: { cls:'amber', icon:'ti-calendar-event',col:'#d97706' },
        informativo:{ cls:'blue',  icon:'ti-info-circle',   col:'var(--primary)' }
      }
      const p = pMap[a.prioridad] || pMap.informativo
      const fecha = new Date(a.creado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', year:'numeric' })
      const yaConfirmo = a.yaConfirmo
      return `<div class="aviso-row">
            <div class="aviso-top">
              <div class="aviso-ic ${p.cls}">
                <i class="ti ${p.icon}" style="font-size:18px;color:${p.col};"></i>
              </div>
              <div style="flex:1;min-width:0;">
                <span class="badge-imp ${a.prioridad || 'informativo'}">${(a.prioridad || 'informativo').charAt(0).toUpperCase() + (a.prioridad || 'informativo').slice(1)}</span>
                <div class="aviso-title">${a.titulo}</div>
                <div class="aviso-msg">${a.mensaje}</div>
                <div class="aviso-meta"><i data-lucide="calendar" style="width:12px;height:12px;"></i>${fecha}</div>
              </div>
            </div>
            <button class="btn-enterado${yaConfirmo ? ' confirmado' : ''}" data-id="${a.id}"${yaConfirmo ? ' disabled' : ''}>
              <i class="ti ${yaConfirmo ? 'ti-circle-check-filled' : 'ti-circle-check'}" style="font-size:16px;"></i>
              ${yaConfirmo ? '✓ Ya me enteré' : 'Me enteré'}
            </button>
          </div>`
    }).join('')
    lucide.createIcons()
  }

  async function initNotificaciones() {
    try {
      const { data: authData } = await supabase.auth.getUser()
      const user = authData?.user
      if (!user) { window.location.href = 'index.html'; return }

      localStorage.setItem('notif_visto', new Date().toISOString())

    // Padre
    let padre = null
    try {
      const { data: r1 } = await supabase.from('padres').select('id, alumno_id, nombre').eq('user_id', user.id).limit(1)
      if (r1?.length) { padre = r1[0] }
      else {
        const { data: r2 } = await supabase.from('padres').select('id, alumno_id, nombre').eq('correo', user.email).limit(1)
        if (r2?.length) { await supabase.from('padres').update({ user_id: user.id }).eq('id', r2[0].id); padre = r2[0] }
      }
    } catch(e) {}

    if (padre?.nombre) document.getElementById('hero-initials').textContent = initials(padre.nombre)

    // ── AVISOS GENERALES con confirmación ─────────────────────
    try {
      const { data: avisos, error: errAv } = await supabase.from('avisos')
        .select('id,titulo,mensaje,prioridad,creado_en')
        .eq('activo', true).order('creado_en', { ascending: false }).limit(20)
      if (errAv) { document.getElementById('avisos-list').innerHTML = `<div style="padding:16px;color:red;font-size:13px;">❌ ${errAv.message} (${errAv.code})</div>`; }

      const { data: confirmados } = await supabase.from('avisos_confirmaciones')
        .select('aviso_id').eq('user_id', user.id)

      const confirmSet = new Set((confirmados||[]).map(c => c.aviso_id))
      avisosCache = (avisos || []).map(a => ({ ...a, yaConfirmo: confirmSet.has(a.id) }))
      filterAvisos(currentCategory)

      const sinConfirmar = avisosCache.filter(a => !a.yaConfirmo).length
      if (sinConfirmar > 0) {
        document.getElementById('bell-count').textContent = sinConfirmar
        document.getElementById('bell-count').style.display = 'flex'
        const ht = document.getElementById('ht-avisos')
        ht.textContent = sinConfirmar; ht.style.display = 'inline'
      }
    } catch(e) { console.error('avisos:', e) }

    // ── PRÓXIMOS EVENTOS ──────────────────────────────────────
    try {
      const hoy = new Date().toISOString().split('T')[0]
      const { data: evs } = await supabase.from('eventos')
        .select('id,titulo,fecha,lugar,descripcion,foto_url,tipo,hora')
        .gte('fecha', hoy).order('fecha').limit(5)

      if (evs?.length) {
        const TIPO_ICON = { torneo:'ti-trophy', examen:'ti-award', actividad:'ti-star', seminario:'ti-school' }
        document.getElementById('eventos-list').innerHTML = evs.map(ev => {
          const ic = TIPO_ICON[ev.tipo?.toLowerCase()] || 'ti-calendar-event'
          const fechaFmt = new Date(ev.fecha+'T12:00:00').toLocaleDateString('es-MX', { day:'numeric', month:'long', year:'numeric' })
          const imgHTML = ev.foto_url
            ? `<img src="${ev.foto_url}" alt="${ev.titulo}" style="width:100%;height:100%;object-fit:cover;">`
            : `<div class="evento-img-placeholder"><i class="ti ${ic}" style="font-size:30px;color:rgba(255,255,255,.5);"></i></div>`
          return `<div class="evento-card">
            <div class="evento-img" style="background:#0d1a5e;">
              ${imgHTML}
              ${ev.tipo ? `<div class="evento-tipo-badge">${ev.tipo.toUpperCase()}</div>` : ''}
            </div>
            <div class="evento-body">
              <div class="evento-nombre">${ev.titulo}</div>
              <div class="evento-detail"><i class="ti ti-calendar" style="font-size:13px;color:#9ca3af;"></i>${fechaFmt}</div>
              ${ev.lugar ? `<div class="evento-detail"><i class="ti ti-map-pin" style="font-size:13px;color:#9ca3af;"></i>${ev.lugar}</div>` : ''}
              ${ev.hora  ? `<div class="evento-detail"><i class="ti ti-clock" style="font-size:13px;color:#9ca3af;"></i>${ev.hora}</div>` : ''}
              ${ev.descripcion ? `<div class="evento-detail" style="align-items:flex-start;"><i class="ti ti-info-circle" style="font-size:13px;color:#9ca3af;margin-top:1px;flex-shrink:0;"></i><span style="line-height:1.4;">${ev.descripcion}</span></div>` : ''}
              <a class="evento-btn" href="torneos.html">Ver detalles</a>
            </div>
          </div>`
        }).join('')
      }
    } catch(e) {}


    // ── BOTÓN ME ENTERÉ ───────────────────────────────────────
    document.getElementById('avisos-list').addEventListener('click', async e => {
      const btn = e.target.closest('.btn-enterado')
      if (!btn || btn.disabled) return
      const avisoId = btn.dataset.id
      btn.disabled = true
      btn.innerHTML = '<i class="ti ti-loader-2" style="font-size:16px;"></i> Guardando…'
      try {
        const { error } = await supabase.from('avisos_confirmaciones').insert({
          aviso_id: avisoId,
          user_id: user.id,
          padre_nombre: padre?.nombre || ''
        })
        if (error) throw error
        btn.classList.add('confirmado')
        btn.innerHTML = '<i class="ti ti-circle-check-filled" style="font-size:16px;"></i> ✓ Ya me enteré'
        // Actualizar contador
        const countEl = document.getElementById('bell-count')
        const cur = parseInt(countEl.textContent) - 1
        if (cur <= 0) countEl.style.display = 'none'
        else countEl.textContent = cur
      } catch(err) {
        btn.disabled = false
        btn.innerHTML = '<i class="ti ti-circle-check" style="font-size:16px;"></i> Me enteré'
      }
    })

    lucide.createIcons()

  } catch(e) { console.error('notif error:', e) }
  }

  initNotificaciones();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }
</script>
</body>
</html>
