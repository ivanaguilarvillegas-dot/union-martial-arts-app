<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enviar mensaje</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Enviar mensaje</div></div></div>
  <div class="body">
    <div id="form"><div class="card"><div class="stack">
      <div>
        <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;">Tipo de mensaje</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="tipos">
          <button class="chip on" data-t="aviso">Aviso a todos</button>
          <button class="chip" data-t="frase">Frase del día</button>
          <button class="chip" data-t="privado">Privado</button>
        </div>
      </div>
      <div id="extra"></div>
      <label class="field"><span class="lab">Mensaje</span><textarea rows="4" placeholder="Escribe tu mensaje…"></textarea></label>
      <button class="btn primary block" id="send"><i data-lucide="send"></i> Enviar</button>
    </div></div></div>
    <div id="ok" style="display:none;"><div class="card green center">
      <div style="display:inline-flex;margin-bottom:6px;color:var(--green-600);"><i data-lucide="send" style="width:26px;height:26px"></i></div>
      <div style="font-size:15px;font-weight:700;color:var(--green-text);">Mensaje enviado</div></div></div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a class="on" href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  // Cargar mensajes recibidos de padres
  async function cargarMensajes() {
    const lista = document.createElement('div')
    lista.style.marginTop = '16px'
    try {
      // Cargamos mensajes sin join (no hay FK directa entre mensajes y padres)
      const { data: msgs } = await supabase.from('mensajes')
        .select('de_user_id, texto, creado_en')
        .eq('para_admin', true)
        .order('creado_en', { ascending: false })
        .limit(20)

      // Cargamos todos los padres para hacer match por user_id
      const { data: padres } = await supabase.from('padres').select('user_id, nombre')
      const padreMap = {}
      padres?.forEach(p => { if (p.user_id) padreMap[p.user_id] = p.nombre })

      if (msgs?.length) {
        lista.innerHTML = '<div class="label" style="margin-bottom:10px">Mensajes de padres</div>' +
          msgs.map(m => {
            const nombre = padreMap[m.de_user_id] || 'Padre'
            const fecha = m.creado_en ? new Date(m.creado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—'
            return `<div class="card mb12">
              <div style="font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;">
                <span style="font-weight:600;color:var(--text);">${nombre}</span><span>${fecha}</span>
              </div>
              <div style="font-size:13.5px;line-height:1.5;">${m.texto}</div>
            </div>`
          }).join('')
      } else {
        lista.innerHTML = '<div class="label" style="margin-bottom:10px">Mensajes de padres</div><div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">Sin mensajes aún.</div>'
      }
    } catch(e) {
      lista.innerHTML = '<div class="label" style="margin-bottom:10px">Mensajes de padres</div><div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">Error al cargar mensajes.</div>'
    }
    document.querySelector('.body').appendChild(lista)
  }

  // Cargar citas pendientes
  async function cargarCitas() {
    try {
      const { data } = await supabase.from('citas').select('*').eq('estado', 'pendiente').order('fecha_preferida', { ascending: true })
      if (!data?.length) return
      const lista = document.createElement('div')
      lista.style.marginTop = '16px'
      lista.innerHTML = '<div class="label" style="margin-bottom:10px">Citas pendientes</div>' +
        data.map(c => `
          <div class="card mb12">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">${c.fecha_preferida || '—'}${c.hora_preferida ? ' · ' + c.hora_preferida : ''}</div>
            <div style="font-size:13.5px;font-weight:600;">${c.motivo || 'Sin motivo'}</div>
            <span class="badge amber" style="margin-top:8px;display:inline-block;">Pendiente</span>
          </div>`).join('')
      document.querySelector('.body').appendChild(lista)
    } catch(e) {}
  }

  const tipos = document.getElementById('tipos')
  function extra(t) {
    document.getElementById('extra').innerHTML = t==='privado'
      ? `<label class="field"><span class="lab">Destinatario</span><select id="dest-select"><option value="">Cargando...</option></select></label>`
      : t==='frase'
      ? `<div class="notice" style="background:var(--soft);color:var(--primary);border:none;"><i data-lucide="info"></i> Aparecerá en el inicio de los padres.</div>`
      : ''
    if (t === 'privado') cargarPadres()
    lucide.createIcons()
  }

  async function cargarPadres() {
    const { data } = await supabase.from('padres').select('user_id, nombre').eq('es_admin', false)
    const sel = document.getElementById('dest-select')
    if (sel && data) sel.innerHTML = data.map(p => `<option value="${p.user_id}">${p.nombre}</option>`).join('')
  }

  tipos.addEventListener('click', e => {
    const b = e.target.closest('[data-t]'); if (!b) return
    ;[...tipos.children].forEach(c => c.classList.remove('on')); b.classList.add('on')
    extra(b.dataset.t)
  })

  document.getElementById('send').addEventListener('click', async () => {
    const texto = document.querySelector('textarea').value.trim()
    const tipo = document.querySelector('#tipos .on')?.dataset.t || 'aviso'
    if (!texto) return

    if (tipo === 'frase') {
      await supabase.from('frases').update({ activa: false }).eq('activa', true)
      await supabase.from('frases').insert({ texto, activa: true, fecha_envio: new Date().toISOString().split('T')[0] })
    } else {
      const para_admin = false
      const dest = document.getElementById('dest-select')?.value || null
      await supabase.from('mensajes').insert({ de_user_id: user.id, texto, para_admin, destinatario_id: dest })
    }

    document.getElementById('form').style.display = 'none'
    document.getElementById('ok').style.display = 'block'
    lucide.createIcons()
  })

  cargarMensajes()
  cargarCitas()
  lucide.createIcons()
</script>
</body></html>
