<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enviar mensaje</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Enviar mensaje</div></div></div>
  <div class="body">
    <div id="form"><div class="card"><div class="stack">
      <div>
        <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;">Tipo de mensaje</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="tipos">
          <button class="chip on" data-t="aviso">Aviso a todos</button>
          <button class="chip" data-t="frase">Frase del día</button>
          <button class="chip" data-t="privado">Privado</button>
        </div>
      </div>
      <div id="extra"></div>
      <label class="field"><span class="lab">Mensaje</span><textarea rows="4" placeholder="Escribe tu mensaje…"></textarea></label>
      <button class="btn primary block" id="send"><i data-lucide="send"></i> Enviar</button>
    </div></div></div>
    <div id="ok" style="display:none;"><div class="card green center">
      <div style="display:inline-flex;margin-bottom:6px;color:var(--green-600);"><i data-lucide="send" style="width:26px;height:26px"></i></div>
      <div style="font-size:15px;font-weight:700;color:var(--green-text);">Mensaje enviado</div></div></div>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a class="on" href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  // Cargar mensajes recibidos de padres
  async function cargarMensajes() {
    const lista = document.createElement('div')
    lista.style.marginTop = '16px'
    try {
      // Cargamos mensajes sin join (no hay FK directa entre mensajes y padres)
      const { data: msgs } = await supabase.from('mensajes')
        .select('id, de_user_id, texto, creado_en')
        .eq('para_admin', true)
        .order('creado_en', { ascending: false })
        .limit(20)

      // Cargamos todos los padres para hacer match por user_id
      const { data: padres } = await supabase.from('padres').select('user_id, nombre')
      const padreMap = {}
      padres?.forEach(p => { if (p.user_id) padreMap[p.user_id] = p.nombre })

      if (msgs?.length) {
        lista.innerHTML = '<div class="label" style="margin-bottom:10px">Mensajes de padres</div>' +
          msgs.map((m, idx) => {
            const nombre = padreMap[m.de_user_id] || 'Padre'
            const fecha = m.creado_en ? new Date(m.creado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—'
            return `<div class="card mb12" id="msg-${idx}" data-msgid="${m.id || ''}">
              <div style="font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">
                <span style="font-weight:600;color:var(--text);">${nombre}</span><span>${fecha}</span>
              </div>
              <div style="font-size:13.5px;line-height:1.5;margin-bottom:10px;">${m.texto}</div>
              <div id="resp-${idx}" style="display:none;">
                <textarea rows="2" placeholder="Escribe tu respuesta…" style="width:100%;border:1px solid var(--border-input);border-radius:var(--r-sm);padding:8px;font-size:13px;font-family:var(--font);resize:none;" id="txt-${idx}"></textarea>
                <div style="display:flex;gap:8px;margin-top:6px;">
                  <button class="btn primary sm" data-send="${idx}" data-uid="${m.de_user_id}"><i data-lucide="send"></i> Enviar</button>
                  <button class="btn secondary sm" data-cancel="${idx}">Cancelar</button>
                </div>
              </div>
              <div style="display:flex;gap:8px;margin-top:0;">
                <button class="btn secondary sm" data-reply="${idx}"><i data-lucide="reply"></i> Responder</button>
                <button class="btn danger sm" data-borrar="${idx}" data-msgid="${m.id || ''}"><i data-lucide="trash-2"></i> Resuelto</button>
              </div>
            </div>`
          }).join('')

        lista.addEventListener('click', async e => {
          const rBtn = e.target.closest('[data-reply]')
          const cBtn = e.target.closest('[data-cancel]')
          const sBtn = e.target.closest('[data-send]')
          if (rBtn) {
            const i = rBtn.dataset.reply
            document.getElementById('resp-' + i).style.display = 'block'
            rBtn.style.display = 'none'
          }
          if (cBtn) {
            const i = cBtn.dataset.cancel
            document.getElementById('resp-' + i).style.display = 'none'
            document.querySelector(`[data-reply="${i}"]`).style.display = 'inline-flex'
          }
          if (sBtn) {
            const i = sBtn.dataset.send
            const uid = sBtn.dataset.uid
            const texto = document.getElementById('txt-' + i).value.trim()
            if (!texto) return
            sBtn.disabled = true; sBtn.textContent = 'Enviando…'
            await supabase.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: false })
            document.getElementById('msg-' + i).innerHTML += `<div style="margin-top:8px;padding:8px;background:var(--soft);border-radius:var(--r-sm);font-size:12.5px;color:var(--primary);"><b>Tu respuesta:</b> ${texto}</div>`
            document.getElementById('resp-' + i).style.display = 'none'
            lucide.createIcons()
          }

          const dBtn = e.target.closest('[data-borrar]')
          if (dBtn) {
            const msgId = dBtn.dataset.msgid
            if (!msgId) { dBtn.closest('.card')?.remove(); return }
            if (!confirm('¿Marcar como resuelto y eliminar este mensaje?')) return
            await supabase.from('mensajes').delete().eq('id', msgId)
            dBtn.closest('.card')?.remove()
          }
        })
      } else {
        lista.innerHTML = '<div class="label" style="margin-bottom:10px">Mensajes de padres</div><div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">Sin mensajes aún.</div>'
      }
    } catch(e) {
      lista.innerHTML = '<div class="label" style="margin-bottom:10px">Mensajes de padres</div><div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">Error al cargar mensajes.</div>'
    }
    document.querySelector('.body').appendChild(lista)
  }

  // Cargar citas pendientes
  async function cargarCitas() {
    try {
      const { data } = await supabase.from('citas').select('*').eq('estado', 'pendiente').order('fecha_preferida', { ascending: true })
      if (!data?.length) return
      const wrap = document.createElement('div')
      wrap.id = 'citas-wrap'
      wrap.style.marginTop = '16px'
      wrap.innerHTML = '<div class="label" style="margin-bottom:10px">Citas pendientes</div>' +
        data.map(c => `
          <div class="card mb12" id="cita-${c.id}">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">📅 ${c.fecha_preferida || '—'}${c.hora_preferida ? ' · ' + c.hora_preferida : ''}</div>
            <div style="font-size:13.5px;font-weight:600;margin-bottom:10px;">${c.motivo || 'Sin motivo'}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn primary sm" data-aceptar="${c.id}" data-uid="${c.padre_user_id}" data-fecha="${c.fecha_preferida||''}" data-hora="${c.hora_preferida||''}">
                <i data-lucide="check"></i> Aceptar
              </button>
              <button class="btn secondary sm" data-cambiar="${c.id}">
                <i data-lucide="calendar-clock"></i> Cambiar fecha
              </button>
              <button class="btn danger sm" data-rechazar="${c.id}" data-uid="${c.padre_user_id}">
                <i data-lucide="x"></i> Rechazar
              </button>
            </div>
            <div id="cambio-${c.id}" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--ink-100);">
              <div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;">PROPONER NUEVA FECHA</div>
              <div style="display:flex;gap:8px;margin-bottom:8px;">
                <input type="date" id="nfecha-${c.id}" style="flex:1;height:36px;border:1px solid var(--border-input);border-radius:var(--r-sm);padding:0 8px;font-size:13px;" />
                <input type="time" id="nhora-${c.id}" style="width:100px;height:36px;border:1px solid var(--border-input);border-radius:var(--r-sm);padding:0 8px;font-size:13px;" />
              </div>
              <button class="btn primary sm" data-proponer="${c.id}" data-uid="${c.padre_user_id}"><i data-lucide="send"></i> Enviar propuesta</button>
            </div>
          </div>`).join('')
      document.querySelector('.body').appendChild(wrap)
      lucide.createIcons()

      wrap.addEventListener('click', async e => {
        const btnA = e.target.closest('[data-aceptar]')
        const btnR = e.target.closest('[data-rechazar]')
        const btnC = e.target.closest('[data-cambiar]')
        const btnP = e.target.closest('[data-proponer]')

        if (btnC) {
          const id = btnC.dataset.cambiar
          const panel = document.getElementById('cambio-' + id)
          panel.style.display = panel.style.display === 'none' ? 'block' : 'none'
          lucide.createIcons()
          return
        }

        if (btnP) {
          const id = btnP.dataset.proponer
          const uid = btnP.dataset.uid
          const fecha = document.getElementById('nfecha-' + id).value
          const hora = document.getElementById('nhora-' + id).value
          if (!fecha) { alert('Selecciona una fecha'); return }
          btnP.disabled = true; btnP.textContent = 'Enviando…'
          await supabase.from('citas').update({ fecha_preferida: fecha, hora_preferida: hora || null }).eq('id', id)
          const texto = `📅 El instructor propone nueva fecha para tu cita: ${fecha}${hora ? ' a las ' + hora : ''}. Confirma respondiendo este mensaje.`
          await supabase.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: false })
          document.getElementById('cambio-' + id).innerHTML = '<div style="color:var(--green-text);font-size:13px;font-weight:600;">✅ Propuesta enviada al padre.</div>'
          return
        }

        if (btnA) {
          const id = btnA.dataset.aceptar
          const uid = btnA.dataset.uid
          btnA.disabled = true; btnA.textContent = 'Aceptando…'
          await supabase.from('citas').update({ estado: 'aceptada' }).eq('id', id)
          const texto = `✅ Tu cita fue confirmada — ${btnA.dataset.fecha}${btnA.dataset.hora ? ' a las ' + btnA.dataset.hora : ''}. ¡Te esperamos! 🥋`
          await supabase.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: false })
          document.getElementById('cita-' + id).innerHTML = `<div style="color:var(--green-text);font-size:13px;font-weight:600;">✅ Cita aceptada y padre notificado.</div>`
          return
        }

        if (btnR) {
          const id = btnR.dataset.rechazar
          const uid = btnR.dataset.uid
          if (!confirm('¿Rechazar esta cita?')) return
          await supabase.from('citas').update({ estado: 'rechazada' }).eq('id', id)
          await supabase.from('mensajes').insert({ de_user_id: user.id, texto: '❌ Tu solicitud de cita no pudo confirmarse. Por favor agenda otra fecha o contáctanos.', para_admin: false })
          document.getElementById('cita-' + id).innerHTML = `<div style="color:var(--red-text,#c00);font-size:13px;font-weight:600;">❌ Cita rechazada.</div>`
        }
      })
    } catch(e) {}
  }

  const tipos = document.getElementById('tipos')
  function extra(t) {
    document.getElementById('extra').innerHTML = t==='privado'
      ? `<label class="field"><span class="lab">Destinatario</span><select id="dest-select"><option value="">Cargando...</option></select></label>`
      : t==='frase'
      ? `<div class="notice" style="background:var(--soft);color:var(--primary);border:none;"><i data-lucide="info"></i> Aparecerá en el inicio de los padres.</div>`
      : ''
    if (t === 'privado') cargarPadres()
    lucide.createIcons()
  }

  async function cargarPadres() {
    const { data } = await supabase.from('padres').select('user_id, nombre').eq('es_admin', false)
    const sel = document.getElementById('dest-select')
    if (sel && data) sel.innerHTML = data.map(p => `<option value="${p.user_id}">${p.nombre}</option>`).join('')
  }

  tipos.addEventListener('click', e => {
    const b = e.target.closest('[data-t]'); if (!b) return
    ;[...tipos.children].forEach(c => c.classList.remove('on')); b.classList.add('on')
    extra(b.dataset.t)
  })

  document.getElementById('send').addEventListener('click', async () => {
    const texto = document.querySelector('textarea').value.trim()
    const tipo = document.querySelector('#tipos .on')?.dataset.t || 'aviso'
    if (!texto) return

    if (tipo === 'frase') {
      await supabase.from('frases').update({ activa: false }).eq('activa', true)
      await supabase.from('frases').insert({ texto, activa: true, fecha_envio: new Date().toISOString().split('T')[0] })
    } else if (tipo === 'aviso') {
      // Guardar aviso en configuracion (sin RLS, visible para todos los padres)
      await supabase.from('configuracion').upsert({ clave: 'aviso_general', valor: texto }, { onConflict: 'clave' })
    } else {
      // Mensaje privado
      const dest = document.getElementById('dest-select')?.value || null
      await supabase.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: false, destinatario_id: dest })
    }

    document.getElementById('form').style.display = 'none'
    document.getElementById('ok').style.display = 'block'
    lucide.createIcons()
  })

  async function cargarEnviados() {
    const { data: msgs } = await supabase.from('mensajes')
      .select('id, texto, creado_en, destinatario_id').eq('para_admin', false).eq('de_user_id', user.id)
      .order('creado_en', { ascending: false }).limit(20)
    if (!msgs?.length) return

    const { data: padres } = await supabase.from('padres').select('user_id, nombre')
    const padreMap = {}; padres?.forEach(p => { if (p.user_id) padreMap[p.user_id] = p.nombre })

    const wrap = document.createElement('div')
    wrap.style.marginTop = '16px'
    wrap.innerHTML = '<div class="label" style="margin-bottom:10px">Mensajes enviados</div>' +
      msgs.map(m => {
        const dest = m.destinatario_id ? (padreMap[m.destinatario_id] || 'Padre') : 'Todos'
        const fecha = new Date(m.creado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
        return `<div class="card mb10" id="env-${m.id}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:11px;font-weight:600;color:var(--primary);">${dest}</span>
            <span style="font-size:11px;color:var(--muted);">${fecha}</span>
          </div>
          <div style="font-size:13.5px;line-height:1.5;margin-bottom:10px;">${m.texto}</div>
          <button class="btn sm" style="background:var(--red-bg);color:var(--red-text);border:none;cursor:pointer;" data-del-env="${m.id}">
            <i data-lucide="trash-2" style="width:13px;height:13px"></i> Borrar
          </button>
        </div>`
      }).join('')

    wrap.addEventListener('click', async e => {
      const btn = e.target.closest('[data-del-env]'); if (!btn) return
      if (!confirm('¿Borrar este mensaje?')) return
      const { error } = await supabase.from('mensajes').delete().eq('id', btn.dataset.delEnv)
      if (!error) document.getElementById('env-' + btn.dataset.delEnv)?.remove()
    })

    document.querySelector('.body').appendChild(wrap)
    lucide.createIcons()
  }

  // Mostrar aviso actual con opción de borrar
  async function cargarAvisoActual() {
    const { data } = await supabase.from('configuracion').select('valor, actualizado_en').eq('clave', 'aviso_general').maybeSingle()
    if (!data?.valor) return
    const fecha = new Date(data.actualizado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
    const wrap = document.createElement('div')
    wrap.style.marginTop = '16px'
    wrap.innerHTML = `<div class="label" style="margin-bottom:10px">Aviso general activo</div>
      <div class="card" id="aviso-admin-card" style="border-left:3px solid var(--primary);">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:11px;font-weight:600;color:var(--primary);">AVISO A TODOS</span>
          <span style="font-size:11px;color:var(--muted);">${fecha}</span>
        </div>
        <div style="font-size:13.5px;line-height:1.5;margin-bottom:10px;">${data.valor}</div>
        <button class="btn sm" style="background:var(--red-bg);color:var(--red-text);border:none;cursor:pointer;" id="btn-del-aviso-admin">
          <i data-lucide="trash-2" style="width:13px;height:13px"></i> Borrar aviso
        </button>
      </div>`
    document.querySelector('.body').appendChild(wrap)
    lucide.createIcons()

    document.getElementById('btn-del-aviso-admin').addEventListener('click', async () => {
      if (!confirm('¿Borrar el aviso general?')) return
      await supabase.from('configuracion').delete().eq('clave', 'aviso_general')
      document.getElementById('aviso-admin-card').remove()
    })
  }

  cargarMensajes()
  cargarCitas()
  cargarEnviados()
  cargarAvisoActual()
  lucide.createIcons()
</script>
</body></html>
