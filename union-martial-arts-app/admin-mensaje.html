<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mensajes — UNION Admin</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A18EC">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="css/uma.css"/>
<style>
/* ── TABS ── */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--ink-100);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:none;padding:12px 14px 10px;font-size:12px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;margin-bottom:-2px;display:flex;align-items:center;gap:5px;transition:color .15s;}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);}
.tab-badge{background:var(--primary);color:#fff;font-size:9px;font-weight:800;border-radius:99px;min-width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;}

/* ── PANELS ── */
.panel{display:none;padding:16px;}
.panel.on{display:block;}

/* ── AVISO COMPOSE ── */
.compose-card{background:#fff;border-radius:16px;border:1px solid var(--ink-100);padding:16px;margin-bottom:16px;}
.compose-card textarea{width:100%;border:1.5px solid var(--ink-200);border-radius:12px;padding:10px 14px;font-size:14px;font-family:var(--font);resize:none;outline:none;min-height:80px;}
.compose-card textarea:focus{border-color:var(--primary);}

/* ── AVISO CARD ── */
.aviso-card{background:#fff;border-radius:14px;border:1px solid var(--ink-100);padding:14px;margin-bottom:12px;}
.aviso-card .av-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.aviso-card .av-texto{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:10px;}
.aviso-card .av-stats{display:flex;gap:10px;}
.stat-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;}
.stat-pill.confirmed{background:#f0fdf4;color:#16a34a;}
.stat-pill.pending{background:#fff7ed;color:#ea580c;}

/* ── CONFIRMACION CARD ── */
.conf-card{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--ink-100);}
.conf-avatar{width:36px;height:36px;border-radius:50%;background:var(--soft);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.conf-info{flex:1;}
.conf-name{font-size:13px;font-weight:700;color:var(--text);}
.conf-aviso{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.conf-time{font-size:11px;color:var(--muted);text-align:right;}

/* ── CITA CARD ── */
.cita-card{background:#fff;border-radius:14px;border:1px solid var(--ink-100);padding:14px;margin-bottom:12px;}
.cita-nombre{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;}
.cita-motivo{font-size:13px;color:var(--muted);margin-bottom:8px;line-height:1.4;}
.cita-fecha{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--primary);background:var(--soft);padding:4px 10px;border-radius:8px;margin-bottom:12px;}
.cita-btns{display:flex;gap:8px;}

/* ── CHAT LIST ── */
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--ink-100);cursor:pointer;}
.chat-avatar{width:42px;height:42px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.chat-info{flex:1;min-width:0;}
.chat-name{font-size:14px;font-weight:700;color:var(--text);}
.chat-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.chat-time{font-size:10px;color:var(--muted);}
.unread-dot{background:var(--primary);color:#fff;font-size:9px;font-weight:800;border-radius:99px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* ── CHAT WINDOW ── */
#chat-window{position:fixed;inset:0;background:#f4f6fb;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:200;}
#chat-window.open{transform:translateX(0);}
.cw-header{background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top,12px));}
.cw-back{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0;line-height:1;}
.cw-title{flex:1;font-size:15px;font-weight:700;}
.messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.bubble{max-width:76%;padding:9px 13px;border-radius:18px;font-size:13.5px;line-height:1.45;word-break:break-word;}
.bubble.from-padre{background:#fff;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.bubble.from-admin{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.bubble-time{font-size:10px;opacity:.6;margin-top:3px;text-align:right;}
.bubble-label{font-size:10px;color:var(--muted);text-align:center;margin:4px 0;}
.input-bar{background:#fff;border-top:1px solid var(--ink-100);padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom,8px));display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.input-bar textarea{flex:1;border:1.5px solid var(--ink-200);border-radius:20px;padding:8px 14px;font-size:14px;font-family:var(--font);resize:none;outline:none;max-height:100px;line-height:1.4;}
.input-bar textarea:focus{border-color:var(--primary);}
.send-btn{background:var(--primary);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn svg{width:18px;height:18px;fill:#fff;}

/* ── CAMBIO FECHA ── */
.fecha-panel{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--ink-100);}
.fecha-panel.open{display:block;}
</style>
</head>
<body>
<div class="phone"><div class="screen" style="position:relative;overflow:hidden;">

  <div class="navhead dark">
    <a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="title">Mensajes</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs">
    <div class="tab on" data-tab="avisos">📣 Avisos</div>
    <div class="tab" data-tab="confirmaciones">✅ Confirmaciones <span class="tab-badge" id="badge-conf" style="display:none"></span></div>
    <div class="tab" data-tab="citas">📅 Citas <span class="tab-badge" id="badge-citas" style="display:none"></span></div>
    <div class="tab" data-tab="privados">💬 Privados <span class="tab-badge" id="badge-priv" style="display:none"></span></div>
  </div>

  <div class="body" style="padding:0;overflow-y:auto;">

    <!-- ── PANEL 1: AVISOS ── -->
    <div class="panel on" id="panel-avisos">
      <div class="compose-card">
        <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;">Nuevo aviso a todos los padres</div>
        <textarea id="aviso-texto" placeholder="Escribe el aviso aquí…" rows="3"></textarea>
        <button class="btn primary block mt12" id="btn-enviar-aviso"><i data-lucide="send"></i> Enviar a todos</button>
      </div>
      <div id="avisos-lista"><div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Cargando avisos…</div></div>
    </div>

    <!-- ── PANEL 2: CONFIRMACIONES ── -->
    <div class="panel" id="panel-confirmaciones">
      <div id="conf-lista"><div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Cargando…</div></div>
    </div>

    <!-- ── PANEL 3: CITAS ── -->
    <div class="panel" id="panel-citas">
      <div id="citas-lista"><div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Cargando citas…</div></div>
    </div>

    <!-- ── PANEL 4: MENSAJES PRIVADOS ── -->
    <div class="panel" id="panel-privados">
      <div id="privados-lista"><div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Cargando…</div></div>
    </div>

  </div>

  <!-- ── CHAT WINDOW ── -->
  <div id="chat-window">
    <div class="cw-header">
      <button class="cw-back" onclick="cerrarChat()">‹</button>
      <div class="cw-title" id="cw-nombre">—</div>
    </div>
    <div class="messages" id="cw-messages"></div>
    <div class="input-bar">
      <textarea id="cw-input" rows="1" placeholder="Escribe…" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="enviarMsg()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
    </div>
  </div>

</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const sb = createClient(
  'https://gdajgennlsuvndanpxiz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
)
const { data:{ user } } = await sb.auth.getUser()
if (!user) { window.location.href='index.html'; }

let currentPadreId = null
let currentPadreUserId = null
let pollTimer = null

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('[data-tab]'); if (!tab) return
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'))
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'))
  tab.classList.add('on')
  document.getElementById('panel-' + tab.dataset.tab).classList.add('on')
})

// ══════════════════════════════════════
// PANEL 1 — AVISOS GENERALES
// ══════════════════════════════════════
async function cargarAvisos() {
  const { data: avisos } = await sb.from('avisos').select('*').order('creado_en', { ascending: false }).limit(20)
  const { data: padres } = await sb.from('padres').select('id').eq('es_admin', false)
  const totalPadres = padres?.length || 0

  if (!avisos?.length) {
    document.getElementById('avisos-lista').innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin avisos enviados aún.</div>'
    return
  }

  // Contar confirmaciones por aviso
  const { data: allConf } = await sb.from('confirmaciones').select('aviso_id, padre_id')
  const confMap = {}
  allConf?.forEach(c => { confMap[c.aviso_id] = (confMap[c.aviso_id] || 0) + 1 })

  document.getElementById('avisos-lista').innerHTML = avisos.map(a => {
    const confirmados = confMap[a.id] || 0
    const pendientes = Math.max(0, totalPadres - confirmados)
    const fecha = new Date(a.creado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
    return `<div class="aviso-card">
      <div class="av-header">
        <span style="font-size:11px;color:var(--muted);">${fecha}</span>
        <button class="btn danger sm" onclick="borrarAviso('${a.id}')"><i data-lucide="trash-2"></i></button>
      </div>
      <div class="av-texto">${a.texto}</div>
      <div class="av-stats">
        <span class="stat-pill confirmed">✅ ${confirmados} confirmaron</span>
        <span class="stat-pill pending">⏳ ${pendientes} pendientes</span>
      </div>
    </div>`
  }).join('')
  lucide.createIcons()
}

document.getElementById('btn-enviar-aviso').addEventListener('click', async () => {
  const texto = document.getElementById('aviso-texto').value.trim()
  if (!texto) return
  const btn = document.getElementById('btn-enviar-aviso')
  btn.disabled = true; btn.textContent = 'Enviando…'

  // Guardar en tabla avisos
  const { error } = await sb.from('avisos').insert({ texto, creado_por: user.id })
  if (error) {
    // Fallback: usar configuracion si no existe tabla avisos
    await sb.from('configuracion').upsert({ clave: 'aviso_general', valor: texto }, { onConflict: 'clave' })
  }

  document.getElementById('aviso-texto').value = ''
  btn.disabled = false; btn.innerHTML = '<i data-lucide="send"></i> Enviar a todos'
  lucide.createIcons()
  cargarAvisos()
})

window.borrarAviso = async (id) => {
  if (!confirm('¿Eliminar este aviso?')) return
  await sb.from('confirmaciones').delete().eq('aviso_id', id)
  await sb.from('avisos').delete().eq('id', id)
  cargarAvisos()
}

// ══════════════════════════════════════
// PANEL 2 — CONFIRMACIONES
// ══════════════════════════════════════
async function cargarConfirmaciones() {
  const { data: confs } = await sb.from('confirmaciones')
    .select('id, confirmado_en, padre_id, aviso_id')
    .order('confirmado_en', { ascending: false })
    .limit(50)

  const { data: padres } = await sb.from('padres').select('id, nombre')
  const padreMap = {}; padres?.forEach(p => { padreMap[p.id] = p.nombre })

  const { data: avisos } = await sb.from('avisos').select('id, texto')
  const avisoMap = {}; avisos?.forEach(a => { avisoMap[a.id] = a.texto })

  const pending = document.getElementById('badge-conf')
  if (confs?.length) { pending.textContent = confs.length; pending.style.display='inline-flex' }

  if (!confs?.length) {
    document.getElementById('conf-lista').innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin confirmaciones aún.</div>'
    return
  }

  document.getElementById('conf-lista').innerHTML = confs.map(c => {
    const nombre = padreMap[c.padre_id] || 'Padre'
    const ini = nombre.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()
    const aviso = avisoMap[c.aviso_id]?.substring(0, 40) || '—'
    const fecha = new Date(c.confirmado_en).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
    return `<div class="conf-card">
      <div class="conf-avatar">${ini}</div>
      <div class="conf-info">
        <div class="conf-name">${nombre}</div>
        <div class="conf-aviso">${aviso}…</div>
      </div>
      <div class="conf-time">${fecha}<br/><span style="color:#16a34a;font-weight:700;">✅</span></div>
    </div>`
  }).join('')
}

// ══════════════════════════════════════
// PANEL 3 — CITAS
// ══════════════════════════════════════
async function cargarCitas() {
  const { data: citas } = await sb.from('citas').select('*').eq('estado','pendiente').order('fecha_preferida', { ascending: true })

  const badge = document.getElementById('badge-citas')
  if (citas?.length) { badge.textContent = citas.length; badge.style.display='inline-flex' }
  else { badge.style.display='none' }

  if (!citas?.length) {
    document.getElementById('citas-lista').innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin solicitudes de cita pendientes.</div>'
    return
  }

  const { data: padresAll } = await sb.from('padres').select('id, nombre, user_id')
  const padreUidToId = {}; padresAll?.forEach(p => { if(p.user_id) padreUidToId[p.user_id]=p.id })
  const padreUidToNombre = {}; padresAll?.forEach(p => { if(p.user_id) padreUidToNombre[p.user_id]=p.nombre })

  document.getElementById('citas-lista').innerHTML = citas.map(c => {
    const nombre = padreUidToNombre[c.padre_user_id] || 'Padre'
    const fecha = c.fecha_preferida ? `${c.fecha_preferida}${c.hora_preferida ? ' · '+c.hora_preferida : ''}` : 'Sin fecha'
    const padreId = padreUidToId[c.padre_user_id] || ''
    return `<div class="cita-card" id="cita-${c.id}">
      <div class="cita-nombre">${nombre}</div>
      <div class="cita-motivo">${c.motivo || 'Sin motivo especificado'}</div>
      <div class="cita-fecha">📅 ${fecha}</div>
      <div class="cita-btns">
        <button class="btn primary sm" onclick="aceptarCita('${c.id}','${c.padre_user_id}','${padreId}','${c.fecha_preferida||''}','${c.hora_preferida||''}')"><i data-lucide="check"></i> Aprobar</button>
        <button class="btn secondary sm" onclick="toggleFecha('${c.id}')"><i data-lucide="calendar"></i> Cambiar</button>
        <button class="btn danger sm" onclick="rechazarCita('${c.id}','${c.padre_user_id}','${padreId}')"><i data-lucide="x"></i> Rechazar</button>
      </div>
      <div class="fecha-panel" id="fp-${c.id}">
        <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px;">PROPONER NUEVA FECHA</div>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <input type="date" id="nf-${c.id}" style="flex:1;height:36px;border:1px solid var(--border-input);border-radius:8px;padding:0 8px;font-size:13px;"/>
          <input type="time" id="nh-${c.id}" style="width:95px;height:36px;border:1px solid var(--border-input);border-radius:8px;padding:0 8px;font-size:13px;"/>
        </div>
        <button class="btn primary sm" onclick="proponerFecha('${c.id}','${c.padre_user_id}','${padreId}')"><i data-lucide="send"></i> Enviar propuesta</button>
      </div>
    </div>`
  }).join('')
  lucide.createIcons()
}

window.toggleFecha = id => {
  const fp = document.getElementById('fp-'+id)
  fp.classList.toggle('open')
}

window.aceptarCita = async (id, uid, padreId, fecha, hora) => {
  await sb.from('citas').update({ estado:'aceptada' }).eq('id', id)
  const texto = `✅ Tu cita fue confirmada — ${fecha}${hora ? ' a las '+hora : ''}. ¡Te esperamos! 🥋`
  await sb.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: false, destinatario_id: padreId || null, leido: false })
  document.getElementById('cita-'+id).remove()
  cargarCitas()
}

window.rechazarCita = async (id, uid, padreId) => {
  if (!confirm('¿Rechazar esta cita?')) return
  await sb.from('citas').update({ estado:'rechazada' }).eq('id', id)
  await sb.from('mensajes').insert({ de_user_id: user.id, texto: '❌ Tu solicitud de cita no pudo confirmarse. Por favor contáctanos para agendar.', para_admin: false, destinatario_id: padreId || null, leido: false })
  document.getElementById('cita-'+id).remove()
  cargarCitas()
}

window.proponerFecha = async (id, uid, padreId) => {
  const fecha = document.getElementById('nf-'+id).value
  const hora  = document.getElementById('nh-'+id).value
  if (!fecha) { alert('Selecciona una fecha'); return }
  await sb.from('citas').update({ fecha_preferida: fecha, hora_preferida: hora || null }).eq('id', id)
  const texto = `📅 El instructor propone nueva fecha para tu cita: ${fecha}${hora ? ' a las '+hora : ''}. Responde para confirmar.`
  await sb.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: false, destinatario_id: padreId || null, leido: false })
  document.getElementById('fp-'+id).classList.remove('open')
  document.getElementById('fp-'+id).innerHTML = '<div style="color:var(--green-text);font-size:13px;font-weight:600;">✅ Propuesta enviada.</div>'
}

// ══════════════════════════════════════
// PANEL 4 — MENSAJES PRIVADOS
// ══════════════════════════════════════
async function cargarPrivados() {
  const { data: padres } = await sb.from('padres').select('id, nombre, user_id').eq('es_admin', false).order('nombre')
  const { data: msgs } = await sb.from('mensajes').select('id, texto, creado_en, para_admin, de_user_id, destinatario_id, leido').order('creado_en', { ascending: false })

  // Último mensaje y no leídos por padre
  const ultimoMap = {}; const noLeidoMap = {}
  msgs?.forEach(m => {
    const padre = padres?.find(p => p.id === m.destinatario_id || p.user_id === m.de_user_id)
    if (!padre) return
    if (!ultimoMap[padre.id]) ultimoMap[padre.id] = m
    if (!m.leido && m.para_admin) noLeidoMap[padre.id] = (noLeidoMap[padre.id] || 0) + 1
  })

  const totalNoLeidos = Object.values(noLeidoMap).reduce((a,b)=>a+b, 0)
  const badge = document.getElementById('badge-priv')
  if (totalNoLeidos) { badge.textContent = totalNoLeidos; badge.style.display='inline-flex' }
  else badge.style.display='none'

  document.getElementById('privados-lista').innerHTML = padres?.map(p => {
    const ult = ultimoMap[p.id]
    const preview = ult ? ult.texto.substring(0,45)+'…' : 'Sin mensajes'
    const hora = ult ? new Date(ult.creado_en).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}) : ''
    const ini = p.nombre?.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase() || '?'
    const nl = noLeidoMap[p.id]
    return `<div class="chat-item" onclick="abrirChat('${p.id}','${p.user_id||''}','${p.nombre?.replace(/'/g,"\\'")||''}')">
      <div class="chat-avatar">${ini}</div>
      <div class="chat-info">
        <div class="chat-name">${p.nombre||'Padre'}</div>
        <div class="chat-preview">${preview}</div>
      </div>
      <div class="chat-meta">
        <span class="chat-time">${hora}</span>
        ${nl ? `<span class="unread-dot">${nl}</span>` : ''}
      </div>
    </div>`
  }).join('') || '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">Sin padres registrados.</div>'
}

// ── CHAT WINDOW ──
window.abrirChat = async (padreId, padreUid, nombre) => {
  currentPadreId = padreId; currentPadreUserId = padreUid
  document.getElementById('cw-nombre').textContent = nombre
  document.getElementById('chat-window').classList.add('open')
  await renderMensajes()
  await sb.from('mensajes').update({ leido: true }).eq('destinatario_id', padreId).eq('leido', false)
  clearInterval(pollTimer)
  pollTimer = setInterval(renderMensajes, 4000)
}

window.cerrarChat = () => {
  document.getElementById('chat-window').classList.remove('open')
  clearInterval(pollTimer)
  cargarPrivados()
}

async function renderMensajes() {
  if (!currentPadreId) return
  let q = `para_admin.eq.true`
  if (currentPadreUserId) q += `,and(para_admin.eq.false,destinatario_id.eq.${currentPadreId})`

  const { data: msgs } = await sb.from('mensajes')
    .select('id, texto, creado_en, para_admin, de_user_id, destinatario_id')
    .or(currentPadreUserId
      ? `and(para_admin.eq.true,de_user_id.eq.${currentPadreUserId}),and(para_admin.eq.false,destinatario_id.eq.${currentPadreId})`
      : `and(para_admin.eq.false,destinatario_id.eq.${currentPadreId})`)
    .order('creado_en', { ascending: true })

  const box = document.getElementById('cw-messages')
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60

  if (!msgs?.length) {
    box.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;padding:24px;text-align:center;">Sin mensajes aún.<br>Inicia la conversación.</div>'
    return
  }

  let lastDate = ''
  box.innerHTML = msgs.map(m => {
    const fromAdmin = m.de_user_id === user.id
    const dt = new Date(m.creado_en)
    const dateStr = dt.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})
    const timeStr = dt.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})
    let label = ''
    if (dateStr !== lastDate) { label = `<div class="bubble-label">${dateStr}</div>`; lastDate = dateStr }
    return `${label}<div class="bubble ${fromAdmin ? 'from-admin' : 'from-padre'}">${m.texto}<div class="bubble-time">${timeStr}</div></div>`
  }).join('')

  if (atBottom) box.scrollTop = box.scrollHeight
}

window.enviarMsg = async () => {
  const ta = document.getElementById('cw-input')
  const texto = ta.value.trim(); if (!texto || !currentPadreId) return
  ta.value = ''; ta.style.height = 'auto'
  await sb.from('mensajes').insert({ de_user_id: user.id, texto, para_admin: false, destinatario_id: currentPadreId, leido: false })
  await renderMensajes()
}

window.autoResize = ta => { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,100)+'px' }

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey && document.getElementById('chat-window').classList.contains('open')) {
    e.preventDefault(); window.enviarMsg()
  }
})
