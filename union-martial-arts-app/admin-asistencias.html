<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Confirmar asistencias</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="sub">Clase de hoy · 6:00 PM</div><div class="title">Confirmar asistencias</div></div></div>
  <div class="body">
    <div class="label row"><span>Lista de hoy</span><span class="badge green" id="cnt">2/6 confirmados</span></div>
    <div class="stack-8" id="list"></div>
    <button class="btn primary block mt16" onclick="location.href='admin.html'"><i data-lucide="save"></i> Guardar asistencias</button>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="/js/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
(async () => {
  const supabase = window.supabase.createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { session } } = await supabase.auth.getSession()
  const user = session?.user
  const hoy = new Date().toISOString().split('T')[0]
  let alumnos = []
  let marcados = new Set()

  if (!user) { window.location.href = 'index.html'; return }

  const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'

  async function cargar() {
    const r = await fetch(
      'https://gdajgennlsuvndanpxiz.supabase.co/rest/v1/alumnos?select=id,nombre',
      { headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + (session?.access_token || ANON_KEY) } }
    )
    const data = await r.json()
    alumnos = Array.isArray(data) ? data : []

    // Checkins de hoy registrados por padres
    const { data: checks } = await supabase.from('checkins').select('alumno_id').eq('fecha', hoy)
    marcados = new Set(checks?.map(c => c.alumno_id) || [])
    render()
  }

  function iniciales(nombre) {
    return nombre?.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase() || '?'
  }

  function render() {
    document.getElementById('list').innerHTML = alumnos.map((a, i) => {
      const ok = marcados.has(a.id)
      return `<div class="row">
        <span class="avatar" style="width:34px;height:34px;font-size:12px;">${iniciales(a.nombre)}</span>
        <span class="grow"><span class="t">${a.nombre}</span><span class="s">Clase de hoy</span></span>
        <span class="trail"><button data-id="${a.id}" style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--r-full);border:none;cursor:pointer;font-weight:600;font-size:12px;background:${ok?'var(--green-600)':'var(--sunken)'};color:${ok?'#fff':'var(--muted)'};">
          <i data-lucide="${ok?'check':'plus'}" style="width:14px;height:14px"></i> ${ok?'Asistió':'Marcar'}
        </button></span>
      </div>`
    }).join('')
    document.getElementById('cnt').textContent = marcados.size + '/' + alumnos.length + ' confirmados'
    lucide.createIcons()
  }

  const errEl = document.createElement('div')
  errEl.className = 'notice red'
  errEl.style.cssText = 'display:none;margin:8px 0;'
  document.getElementById('list').before(errEl)

  document.getElementById('list').addEventListener('click', async e => {
    const b = e.target.closest('[data-id]'); if (!b) return
    const id = b.dataset.id
    errEl.style.display = 'none'

    if (marcados.has(id)) {
      const { error } = await supabase.from('checkins').delete().eq('alumno_id', id).eq('fecha', hoy)
      if (error) { errEl.textContent = 'Error al quitar: ' + error.message; errEl.style.display = 'flex'; return }
      marcados.delete(id)
    } else {
      const { error } = await supabase.from('checkins').upsert(
        { alumno_id: id, fecha: hoy, tipo: 'presencial' },
        { onConflict: 'alumno_id,fecha', ignoreDuplicates: true }
      )
      if (error) { errEl.textContent = 'Error al guardar: ' + error.message; errEl.style.display = 'flex'; return }
      marcados.add(id)
    }
    render()
  })

  document.querySelector('.btn.primary').addEventListener('click', () => {
    alert('✅ ' + marcados.size + ' asistencias guardadas para hoy: ' + hoy)
    window.location.href = 'admin.html'
  })

  cargar()
})();
</script>
</body></html>
