<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asistencias — Admin</title><link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f2167">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Union MA">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="stylesheet" href="css/uma.css?v=18" />
<style>
.al-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--ink-100);transition:background .15s;}
.al-row:last-child{border-bottom:none;}
.al-row.ok{background:#f0fdf4;}
.al-row.aus{background:#fff5f5;}
.al-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.al-info{flex:1;min-width:0;}
.al-nombre{font-size:13px;font-weight:700;color:var(--text);}
.al-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.al-motivo{font-size:11px;color:#dc2626;margin-top:2px;}
.btn-ok,.btn-aus{width:38px;height:38px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px;transition:all .15s;font-weight:700;}
.btn-ok{border-color:#bbf7d0;background:#fff;color:#86efac;}
.btn-aus{border-color:#fecaca;background:#fff;color:#fca5a5;}
.btn-ok.activo{background:#059669;border-color:#059669;color:#fff;}
.btn-aus.activo{background:#dc2626;border-color:#dc2626;color:#fff;}
.resumen{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px;background:#f4f6fb;}
.res-box{background:#fff;border-radius:10px;padding:8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.res-n{font-size:18px;font-weight:800;}
.res-l{font-size:10px;color:var(--muted);margin-top:1px;}
</style>
</head>
<body>
<div class="phone"><div class="screen" style="background:#f4f6fb;">
  <div class="navhead dark">
    <a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow">
      <div class="sub" id="fecha-sub">Hoy</div>
      <div class="title">Asistencias</div>
    </div>
    <input type="date" id="fecha-picker" style="opacity:0;position:absolute;right:12px;top:10px;width:36px;height:36px;cursor:pointer;" />
    <button style="background:none;border:none;color:#fff;cursor:pointer;padding:4px;" onclick="document.getElementById('fecha-picker').showPicker?.() || document.getElementById('fecha-picker').click()">
      <i data-lucide="calendar"></i>
    </button>
  </div>

  <!-- Resumen -->
  <div class="resumen">
    <div class="res-box"><div class="res-n" style="color:#059669;" id="cnt-ok">—</div><div class="res-l">Asistieron</div></div>
    <div class="res-box"><div class="res-n" style="color:#dc2626;" id="cnt-aus">—</div><div class="res-l">Faltaron</div></div>
    <div class="res-box"><div class="res-n" style="color:var(--muted);" id="cnt-none">—</div><div class="res-l">Sin marcar</div></div>
  </div>

  <div class="body" style="padding:0;">
    <div class="card flush" style="margin:10px 12px;">
      <div id="lista-alumnos">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">Cargando…</div>
      </div>
    </div>
    <div class="card flush" style="margin:10px 12px;">
      <div style="padding:12px 14px;border-bottom:1px solid #f3f4f6;font-weight:800;color:#111827;">Historial de registros</div>
      <div id="historial-admin" style="padding:10px 14px;color:var(--muted);font-size:13px;">Cargando historial…</div>
    </div>
  </div>

  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-chat.html"><i data-lucide="message-square"></i>Chat</a>
  </nav>
</div></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const sb = createClient(
  'https://gdajgennlsuvndanpxiz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
)
const { data: { user } } = await sb.auth.getUser()
if (!user) { window.location.href = 'index.html' }

let fecha = new Date(new Date() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0]
let alumnos = []
let checkMap = {}   // alumno_id → { tipo, registrado_por }
let checkinsChannel = null
let pollTimer = null

const picker = document.getElementById('fecha-picker')
picker.value = fecha
picker.addEventListener('change', () => { fecha = picker.value; cargar() })

function ini(nombre) {
  return nombre?.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase() || '?'
}
function colorAvatar(nombre) {
  const cols = ['#1d4ed8','#059669','#7c3aed','#dc2626','#d97706','#0891b2']
  let h = 0; for (const c of (nombre||'')) h = (h*31 + c.charCodeAt(0)) % cols.length
  return cols[h]
}

async function cargar() {
  const label = new Date(fecha + 'T12:00:00').toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long' })
  document.getElementById('fecha-sub').textContent = label.charAt(0).toUpperCase() + label.slice(1)

  // Cargar alumnos y registros del día
  const [{ data: als }, { data: checks }] = await Promise.all([
    sb.from('alumnos').select('id, nombre, cinta').order('nombre'),
    sb.from('checkins').select('id, alumno_id, fecha, tipo, registrado_por, creado_en').eq('fecha', fecha)
  ])
  alumnos = als || []

  // Mapear checkMap usando solo checkins.registrado_por
  checkMap = {}
  ;(checks || []).forEach(c => {
    checkMap[c.alumno_id] = c
  })

  render()

  // Cargar historial del día actual (filtrado por fecha)
  const { data: recent } = await sb.from('checkins').select('id, alumno_id, fecha, tipo, registrado_por, creado_en').eq('fecha', fecha).order('creado_en', { ascending: false }).limit(20)
  renderHistorial(recent || [])
}


function renderHistorial(rows) {
  const el = document.getElementById('historial-admin')
  if (!rows.length) { el.innerHTML = '<div style="padding:8px 0;color:var(--muted);">Sin historial reciente.</div>'; return }
  el.innerHTML = rows.map(r => {
    const fecha = new Date(r.creado_en).toLocaleString('es-MX', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
    const tipo = r.tipo === 'ausencia' ? 'Ausencia' : (r.tipo || 'Clase')
    const alumno = (alumnos || []).find(x => x.id === r.alumno_id)
    const nombre = alumno ? alumno.nombre : r.alumno_id
    const registradoPor = r.registrado_por ? (r.registrado_por === 'padre' ? 'Padre' : 'Admin') : '—'
    return `<div style="padding:8px 0;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;gap:8px;"><div><div style="font-size:13px;color:#374151;">${nombre} — ${tipo}</div><div style="font-size:11px;color:#9ca3af;">Por: ${registradoPor}</div></div><div style="font-size:12px;color:#9ca3af;white-space:nowrap;">${fecha}</div></div>`
  }).join('')
}

function render() {
  let cntOk = 0, cntAus = 0, cntNone = 0
  document.getElementById('lista-alumnos').innerHTML = alumnos.map(a => {
    const c = checkMap[a.id]
    const tipo = c?.tipo?.toLowerCase() || ''
    const esOk = tipo && tipo !== 'ausente' && tipo !== 'ausencia'
    const esAus = tipo === 'ausente' || tipo === 'ausencia'
    if (esOk) cntOk++; else if (esAus) cntAus++; else cntNone++
    const rowClass = esOk ? 'ok' : esAus ? 'aus' : ''
    const subTxt = esOk ? (c.tipo || 'Clase') : esAus ? 'Faltó' : 'Sin marcar'
    const btnOkCls = esOk ? 'activo' : ''
    const btnAusCls = esAus ? 'activo' : ''
    const corregirBtn = c ? `<button class="btn-aus" style="width:auto;padding:6px 10px;border-radius:10px;margin-left:8px;background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;font-size:12px;" data-correct="${a.id}">Corregir</button>` : ''
    return `<div class="al-row ${rowClass}" id="row-${a.id}">
      <div class="al-avatar" style="background:${colorAvatar(a.nombre)}">${ini(a.nombre)}</div>
      <div class="al-info">
        <div class="al-nombre">${a.nombre}</div>
        <div class="al-sub" id="sub-${a.id}">${subTxt}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn-ok ${btnOkCls}" data-id="${a.id}" data-accion="clase" title="Asistió">✓</button>
        <button class="btn-aus ${btnAusCls}" data-id="${a.id}" data-accion="ausente" title="Faltó">✗</button>
        ${corregirBtn}
      </div>
    </div>`
  }).join('')
  document.getElementById('cnt-ok').textContent = cntOk
  document.getElementById('cnt-aus').textContent = cntAus
  document.getElementById('cnt-none').textContent = cntNone
}

function reconteo() {
  document.getElementById('cnt-ok').textContent = document.querySelectorAll('.al-row.ok').length
  document.getElementById('cnt-aus').textContent = document.querySelectorAll('.al-row.aus').length
  document.getElementById('cnt-none').textContent = alumnos.length - document.querySelectorAll('.al-row.ok').length - document.querySelectorAll('.al-row.aus').length
}

// Click en ✓ o ✗ — actualiza UI inmediatamente, luego guarda
document.getElementById('lista-alumnos').addEventListener('click', async e => {
  const btnAccion = e.target.closest('[data-accion]')
  const btnCorregir = e.target.closest('[data-correct]')
  if (btnCorregir) {
    const alumnoId = btnCorregir.dataset.correct
    if (!confirm('¿Confirmas que deseas corregir este registro para la fecha seleccionada?')) return
    btnCorregir.disabled = true
    try {
      const actual = checkMap[alumnoId]
      if (!actual?.id) {
        alert('No existe un registro para corregir.')
        await cargar()
        return
      }
      const tipoActual = (actual.tipo || '').toLowerCase()
      const nuevoTipo = (tipoActual === 'ausencia' || tipoActual === 'ausente') ? 'clase' : 'ausencia'
      const { error } = await sb.from('checkins').update({ tipo: nuevoTipo, registrado_por: 'admin' }).eq('id', actual.id)
      if (error) throw error
      await cargar()
    } catch(err) {
      alert('No se pudo corregir: ' + (err?.message || err))
      await cargar()
    }
    return
  }
  if (!btnAccion) return
  const btn = btnAccion
  const alumnoId = btn.dataset.id
  const accion = btn.dataset.accion
  const row = document.getElementById('row-' + alumnoId)

  const yaActivo = btn.classList.contains('activo')
  const tipo = accion === 'clase' ? 'clase' : 'ausencia'

  const existing = checkMap[alumnoId]
  if (yaActivo) {
    const { error } = await sb.from('checkins').delete().eq('alumno_id', alumnoId).eq('fecha', fecha)
    if (error) {
      alert('No se pudo eliminar: ' + error.message)
    }
    await cargar()
  } else {
    const { data: existRow } = existing?.id
      ? { data: { id: existing.id } }
      : await sb.from('checkins').select('id').eq('alumno_id', alumnoId).eq('fecha', fecha).maybeSingle()
    let res
    if (existRow?.id) {
      res = await sb.from('checkins').update({ tipo, registrado_por: 'admin' }).eq('id', existRow.id)
    } else {
      res = await sb.from('checkins').insert({ alumno_id: alumnoId, fecha, tipo, registrado_por: 'admin' })
    }
    if (res.error) {
      alert('No se pudo guardar: ' + res.error.message)
      await cargar()
      return
    }
    await cargar()
  }
})

function setupRealtimeCheckins() {
  if (checkinsChannel) {
    sb.removeChannel(checkinsChannel)
  }
  checkinsChannel = sb
    .channel('admin-asistencias-checkins')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'checkins' }, async payload => {
      const nuevaFecha = payload?.new?.fecha
      const viejaFecha = payload?.old?.fecha
      if (nuevaFecha === fecha || viejaFecha === fecha) {
        await cargar()
      }
    })
    .subscribe()
}

function setupAutoRefresh() {
  if (pollTimer) clearInterval(pollTimer)
  pollTimer = setInterval(() => {
    cargar()
  }, 1500)
}

cargar()
setupRealtimeCheckins()
setupAutoRefresh()
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{})</script>
</body></html>
