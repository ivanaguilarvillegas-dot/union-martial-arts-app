<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registrar evaluación</title><link rel="stylesheet" href="css/uma.css" /></head>
<body>
<div class="phone"><div class="screen">
  <div class="navhead dark"><a class="navback" href="admin.html"><i data-lucide="chevron-left"></i></a>
    <div class="grow"><div class="sub">Evaluación del día</div><div class="title">Registrar evaluación</div></div></div>
  <div class="body">
    <div class="notice green" id="ok" style="display:none;"><i data-lucide="check-circle"></i> Evaluación guardada</div>
    <div class="card mb14"><label class="field"><span class="lab">Alumno</span>
      <select><option>Mateo Reyes — Cinta Azul</option><option>Sofía Luna — Cinta Verde</option><option>Diego Ortiz — Cinta Amarilla</option></select></label></div>
    <div class="label row"><span>Áreas del día</span><span class="badge" id="cnt">0/9</span></div>
    <div class="card flush mb14" style="padding:6px;" id="list"></div>
    <label class="field mb14"><span class="lab">Nota del día (opcional)</span><textarea rows="3" placeholder="Comentario para los padres…"></textarea></label>
    <button class="btn primary block" id="save"><i data-lucide="save"></i> Guardar evaluación</button>
  </div>
  <nav class="bottomnav">
    <a href="admin.html"><i data-lucide="layout-dashboard"></i>Panel</a>
    <a href="admin-alumnos.html"><i data-lucide="users"></i>Alumnos</a>
    <a href="admin-pagos.html"><i data-lucide="credit-card"></i>Pagos</a>
    <a href="admin-mensaje.html"><i data-lucide="message-square"></i>Mensajes</a>
  </nav>
</div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient(
    'https://gdajgennlsuvndanpxiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkYWpnZW5ubHN1dm5kYW5weGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNDQsImV4cCI6MjA5NzYzNTI0NH0.1WS-prurHgq2iiRlhqePB4a8ZkiQwXv7MK0TA7GI3iI'
  )
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'index.html' }

  // Cargar alumnos reales en el select
  const { data: alumnos } = await supabase.from('alumnos').select('id, nombre, cinta').order('nombre')
  const sel = document.querySelector('select')
  if (alumnos?.length) {
    sel.innerHTML = alumnos.map(a => `<option value="${a.id}">${a.nombre}${a.cinta ? ' — Cinta ' + a.cinta : ''}</option>`).join('')
  }

  const D = ['Actitud','Esfuerzo','Técnica','Participación','Trabajo en equipo','Uniforme completo','Higiene y limpieza','Respeto','Llegó a tiempo']
  const st = {}

  function render() {
    document.getElementById('list').innerHTML = D.map((d,i) =>
      `<button class="checkitem ${st[i]?'done':''}" data-i="${i}"><span class="box"><i data-lucide="check"></i></span><span class="txt">${d}</span></button>`
    ).join('')
    const n = Object.values(st).filter(Boolean).length
    document.getElementById('cnt').textContent = n + '/' + D.length
    document.getElementById('cnt').className = 'badge ' + (n ? 'green' : '')
    lucide.createIcons()
  }

  document.getElementById('list').addEventListener('click', e => {
    const b = e.target.closest('[data-i]'); if (!b) return
    st[b.dataset.i] = !st[b.dataset.i]; render()
  })

  document.getElementById('save').addEventListener('click', async () => {
    const alumno_id = sel.value
    const nota = document.querySelector('textarea').value.trim()
    const areas = D.filter((_, i) => st[i])
    const puntuacion = Math.round((areas.length / D.length) * 100)
    const fecha = new Date().toISOString().split('T')[0]

    const { error } = await supabase.from('evaluaciones').insert({
      alumno_id, fecha, puntuacion,
      actitud: !!st[0], esfuerzo: !!st[1], tecnica: !!st[2],
      participacion: !!st[3], nota
    })

    if (error) { alert('Error al guardar: ' + error.message); return }

    document.getElementById('ok').style.display = 'flex'
    lucide.createIcons()
    document.querySelector('.body').scrollTo(0, 0)
  })

  render()
</script>
</body></html>
