<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Union Martial Arts — Registrar Evaluación</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>●●● 100%</span></div>
  <div class="nav-header dark">
    <a href="admin.html" class="back-btn">← Volver</a>
    <h1>Registrar Evaluación</h1>
  </div>
  <div class="screen-body">
    <div class="card">
      <label>Alumno</label>
      <select id="sel-alumno"><option value="">Cargando alumnos...</option></select>
      <label>Mes de evaluación</label>
      <input type="text" id="mes-eval" placeholder="Ej: Junio 2026" />
    </div>
    <div class="section-title">Calificaciones (1 — 10)</div>
    <div class="card" id="criterios-box"></div>
    <div id="promedio-box" class="card" style="background:var(--uma-blue-light); border-color:var(--uma-blue-border); text-align:center; display:none;">
      <div style="font-size:28px; font-weight:600; color:var(--uma-blue);" id="promedio-num">—</div>
      <div style="font-size:13px; color:var(--uma-blue);">Promedio general</div>
    </div>
    <div class="section-title">Comentario del instructor</div>
    <div class="card">
      <textarea id="comentario" rows="4" placeholder="Observaciones sobre el alumno este mes..."
        style="width:100%; border:0.5px solid var(--uma-blue-border); border-radius:10px; padding:12px; font-size:14px; font-family:inherit; resize:none;"></textarea>
    </div>
    <div id="msg-eval" style="font-size:13px; text-align:center; padding:10px; border-radius:8px; display:none; margin-bottom:10px;"></div>
    <button class="btn-primary" onclick="guardar()">Guardar evaluación</button>
  </div>
  <div class="bottom-nav">
    <a href="admin.html" class="bnav-item"><span class="bnav-icon">📊</span>Panel</a>
    <a href="admin-alumnos.html" class="bnav-item"><span class="bnav-icon">👥</span>Alumnos</a>
    <a href="admin-pagos.html" class="bnav-item"><span class="bnav-icon">💳</span>Pagos</a>
    <a href="admin-frase.html" class="bnav-item"><span class="bnav-icon">💬</span>Mensajes</a>
  </div>
</div>
<script type="module">
  import { supabase } from './js/supabase.js'

  const criterios = [
    { id: 'tecnica_golpe', label: 'Técnica de golpe' },
    { id: 'patadas', label: 'Patadas' },
    { id: 'defensa', label: 'Defensa' },
    { id: 'condicion_fisica', label: 'Condición física' },
    { id: 'disciplina', label: 'Disciplina' },
    { id: 'trabajo_equipo', label: 'Trabajo en equipo' },
  ]

  const box = document.getElementById('criterios-box')
  criterios.forEach(c => {
    box.innerHTML += `
      <div style="margin-bottom:14px;">
        <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;">
          <span>${c.label}</span>
          <span id="val-${c.id}" style="color:var(--uma-blue); font-weight:500;">5</span>
        </div>
        <input type="range" min="1" max="10" value="5" step="1" style="width:100%;"
          oninput="document.getElementById('val-${c.id}').textContent=this.value; calcProm()" />
      </div>`
  })

  window.calcProm = function() {
    const inputs = document.querySelectorAll('input[type=range]')
    const sum = Array.from(inputs).reduce((a, el) => a + Number(el.value), 0)
    const prom = (sum / inputs.length).toFixed(1)
    document.getElementById('promedio-num').textContent = prom + ' / 10'
    document.getElementById('promedio-box').style.display = 'block'
    return prom
  }

  async function cargarAlumnos() {
    const { data } = await supabase.from('alumnos').select('id, nombre').eq('activo', true).order('nombre')
    const sel = document.getElementById('sel-alumno')
    sel.innerHTML = '<option value="">Seleccionar alumno...</option>'
    data?.forEach(a => sel.innerHTML += `<option value="${a.id}">${a.nombre}</option>`)
  }

  window.guardar = async function() {
    const alumno_id = document.getElementById('sel-alumno').value
    const mes = document.getElementById('mes-eval').value.trim()
    const comentario = document.getElementById('comentario').value.trim()
    const msg = document.getElementById('msg-eval')

    if (!alumno_id || !mes) {
      msg.textContent = 'Selecciona un alumno y escribe el mes.'
      msg.style.background = '#FFF5F5'; msg.style.color = '#9B2C2C'
      msg.style.display = 'block'; return
    }

    const inputs = document.querySelectorAll('input[type=range]')
    const vals = Array.from(inputs).map(i => Number(i.value))
    const promedio = (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1)

    const { error } = await supabase.from('evaluaciones').insert({
      alumno_id, mes, comentario, promedio,
      tecnica_golpe: vals[0], patadas: vals[1], defensa: vals[2],
      condicion_fisica: vals[3], disciplina: vals[4], trabajo_equipo: vals[5]
    })

    if (error) {
      msg.textContent = 'Error al guardar. Intenta de nuevo.'
      msg.style.background = '#FFF5F5'; msg.style.color = '#9B2C2C'
    } else {
      msg.textContent = '✅ Evaluación guardada. El padre ya puede verla en la app.'
      msg.style.background = '#F0FFF4'; msg.style.color = '#276749'
    }
    msg.style.display = 'block'
  }

  calcProm()
  cargarAlumnos()
</script>
</body>
</html>
